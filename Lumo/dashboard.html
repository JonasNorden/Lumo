let lines = [];
let sparks = [];
let ring = [];
let leds = [];
let pixels = [];
let motes = [];
let firefly = null;
let viewport = null;

function rand(a,b){ return a + Math.random()*(b-a); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

function updateUI(){}

function lerp(a,b,t){ return a + (b-a)*t; }
function mixColor(c1,c2,t){
  return {
    r: Math.round(lerp(c1.r,c2.r,t)),
    g: Math.round(lerp(c1.g,c2.g,t)),
    b: Math.round(lerp(c1.b,c2.b,t))
  };
}
function rgb(c,a=1){ return `rgba(${c.r},${c.g},${c.b},${a})`; }
function getOrbPalette(intensity){
  // intensity: 0 = critical dark red, 1 = warm gold/amber
  const critical = {
    coreA:{r:34,g:6,b:4},
    coreB:{r:72,g:12,b:8},
    glow:{r:120,g:18,b:10},
    halo:{r:90,g:12,b:8},
    spark:{r:150,g:40,b:28},
    hot:{r:205,g:90,b:60}
  };
  const full = {
    coreA:{r:255,g:210,b:120},
    coreB:{r:255,g:132,b:34},
    glow:{r:255,g:180,b:86},
    halo:{r:255,g:130,b:24},
    spark:{r:255,g:226,b:186},
    hot:{r:255,g:245,b:220}
  };
  return {
    coreA: mixColor(critical.coreA, full.coreA, intensity),
    coreB: mixColor(critical.coreB, full.coreB, intensity),
    glow: mixColor(critical.glow, full.glow, intensity),
    halo: mixColor(critical.halo, full.halo, intensity),
    spark: mixColor(critical.spark, full.spark, intensity),
    hot: mixColor(critical.hot, full.hot, intensity),
  };
}

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = innerWidth, h = innerHeight;
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const scale = Math.min(w / MASTER_W, h / MASTER_H);
  const drawW = MASTER_W * scale;
  const drawH = MASTER_H * scale;
  viewport = {
    x: (w - drawW) * 0.5,
    y: (h - drawH) * 0.5,
    scale,
    w: drawW,
    h: drawH
  };

  rebuild();
}
window.addEventListener('resize', resize);

function getLayout(){
  const w = MASTER_W, h = MASTER_H;
  const gameplay = {x:40, y:157, w:w-80, h:861};
  const orb = {x:w*0.665, y:(h*0.165)-33, r:(Math.min(w,h)*0.084)*0.7};
  const zones = {
    left: {x:0, y:0, w:58, h:h},
    right: {x:w-58, y:0, w:58, h:h},
    bottom: {x:58, y:h-58, w:w-116, h:58},
    topLeft: {x:58, y:18, w:180, h:64},
    topRight: {x:w-240, y:18, w:182, h:64}
  };
  return {w,h,gameplay,orb,zones};
}

function pointInRect(x,y,r){
  return x >= r.x && x <= r.x+r.w && y >= r.y && y <= r.y+r.h;
}

function randomPointInZone(zone){
  return {
    x: rand(zone.x+8, zone.x+zone.w-8),
    y: rand(zone.y+8, zone.y+zone.h-8)
  };
}

function rebuild(){
  const {zones} = getLayout();
  const allowedZones = [zones.left, zones.right, zones.bottom, zones.topLeft, zones.topRight];

  lines = [];
  for(let i=0;i<28;i++){
    lines.push({
      a: rand(0, Math.PI*2),
      span: rand(.7, 1.7),
      r: rand(.08, .65),
      amp: rand(.03,.13),
      drift: rand(-.03,.03),
      width: rand(.45,1.2),
      glow: rand(3,7),
      alpha: rand(.08,.18),
      depth: rand(.5,1.25)
    });
  }

  sparks = [];
  for(let i=0;i<18;i++){
    sparks.push({
      line: Math.floor(Math.random()*lines.length),
      p: Math.random(),
      dir: Math.random()>.5?1:-1,
      speed: rand(.001,.0024),
      size: rand(1,3.4),
      alpha: rand(.3,.85)
    });
  }

  ring = [];
  for(let i=0;i<18;i++){
    ring.push({
      start: i / 18 * Math.PI*2,
      len: rand(.18,.28),
      width: rand(3.2,6.8),
      dead: Math.random() < .18,
      weak: Math.random() < .25,
      phase: rand(0,10),
      jitter: rand(-.02,.02)
    });
  }

  leds = [];
  [[80,44],[110,44],[140,44],[MASTER_W-130,44],[MASTER_W-100,44],[MASTER_W-70,44],[MASTER_W-220,MASTER_H-36],[MASTER_W-185,MASTER_H-36]]
    .forEach((d) => leds.push({
      x:d[0], y:d[1], phase: rand(0,10), dead: Math.random()<0.2, weak: Math.random()<0.45
    }));

  pixels = [];
  const startX = 88;
  const startY = MASTER_H - 40;
  for(let i=0;i<26;i++){
    pixels.push({
      x:startX + i*6.5, y:startY, dead: Math.random()<0.22, weak: Math.random()<0.3, phase: rand(0,10)
    });
  }

  motes = [];
  for(let i=0;i<24;i++){
    const zoneIndex = Math.floor(Math.random()*allowedZones.length);
    const p = randomPointInZone(allowedZones[zoneIndex]);
    motes.push({
      x:p.x, y:p.y, vx: rand(-0.025,0.025), vy: rand(-0.02,0.02),
      a: rand(0.02,0.10), r: rand(0.8,2.0), phase: rand(0,10), zoneIndex
    });
  }

  firefly = {
    visible: true,
    x: 0, y: 0,
    zoneIndex: 0,
    localT: rand(0,10),
    life: 0,
    duration: rand(220, 420),
    fade: 0,
    phase: rand(0,10),
    anchorX: 0, anchorY: 0,
    ampX: 0, ampY: 0
  };
  spawnFirefly(true);
}

function spawnFirefly(initial=false){
  const {zones} = getLayout();
  const edgeZones = [zones.left, zones.right, zones.bottom];
  const zoneIndex = Math.floor(Math.random()*edgeZones.length);
  const zone = edgeZones[zoneIndex];
  const p = randomPointInZone(zone);

  firefly.zoneIndex = zoneIndex;
  firefly.anchorX = p.x;
  firefly.anchorY = p.y;
  firefly.x = p.x;
  firefly.y = p.y;
  firefly.localT = rand(0,10);

}

function pointOnLine(f,p,ox,oy,or,time){
  const orbit = time*0.015 + f.drift*time*0.04;
  const ang = f.a + orbit + (p-.5)*f.span;
  const base = or*(.10 + f.r);
  const wob = Math.sin(p*Math.PI*(1.4 + f.a*0.2) + time*(.08 + f.r*0.05))*or*f.amp;
  const rr = base + wob;
  return {
    x: ox + Math.cos(ang)*rr,
    y: oy + Math.sin(ang)*rr*0.92
  };
}

function drawCore(ox,oy,or,time,w,h){
  const intensity = energy / 100;
  const pal = getOrbPalette(intensity);

  const halo = ctx.createRadialGradient(ox,oy,or*.10,ox,oy,or*2.35);
  halo.addColorStop(0, rgb(pal.glow, 0.03 + intensity*0.16));
  halo.addColorStop(0.34, rgb(pal.halo, 0.04 + intensity*0.18));
  halo.addColorStop(1, rgb(pal.halo, 0));
  ctx.fillStyle = halo;
  ctx.fillRect(0,0,w,h);

  const body = ctx.createRadialGradient(ox-or*.16, oy-or*.20, or*.05, ox, oy, or*1.02);
  body.addColorStop(0, rgb(pal.spark, 0.10 + intensity*0.18));
  body.addColorStop(.18, rgb(pal.coreA, 0.10 + intensity*0.16));
  body.addColorStop(.52, rgb(pal.coreB, 0.16 + intensity*0.22));
  body.addColorStop(.82, rgb(pal.halo, 0.14 + intensity*0.12));
  body.addColorStop(1, 'rgba(12,3,2,0.78)');
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(ox,oy,or,0,Math.PI*2); ctx.fill();

  // subtle internal shadow drift (stronger at low energy)
  (function(){
    const intensity = energy/100;
    const inv = 1 - intensity;
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    ctx.beginPath(); ctx.arc(ox,oy,or,0,Math.PI*2); ctx.clip();

    const count = 3;
    for(let i=0;i<count;i++){
      const a = t*(0.002 + i*0.0015) + i*2.1;
      const rx = or*(0.22 + i*0.06);
      const ry = or*(0.14 + i*0.05);
      const x = ox + Math.cos(a)*or*(0.18 + i*0.04);
      const y = oy + Math.sin(a*1.2)*or*(0.16 + i*0.05);

      const g = ctx.createRadialGradient(x,y,0,x,y,Math.max(rx,ry)*1.2);
      const alpha = 0.05 + inv*0.22; // darker when low energy
      g.addColorStop(0, `rgba(0,0,0,${alpha})`);
      g.addColorStop(0.6, `rgba(0,0,0,${alpha*0.6})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');

      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(x,y,rx,ry, a*0.3, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  })();

  ctx.save();
  ctx.beginPath(); ctx.arc(ox,oy,or,0,Math.PI*2); ctx.clip();
  ctx.globalCompositeOperation = 'screen';

  const nodeCount = 5;
  for(let i=0;i<nodeCount;i++){
    const a = time*(.004 + i*.003) + i*1.3;
    const gx = ox + Math.cos(a)*or*(.08 + i*.05);
    const gy = oy + Math.sin(a)*or*(.07 + i*.04)*.9;
    const gr = or*(.10 + i*.012);
    const g = ctx.createRadialGradient(gx,gy,gr*.05,gx,gy,gr*(1.2 + intensity*0.45));
    g.addColorStop(0, rgb(pal.hot, .04 + intensity*.24));
    g.addColorStop(.35, rgb(pal.spark, .04 + intensity*.12));
    g.addColorStop(1, rgb(pal.glow, 0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(gx,gy,gr*(1.2 + intensity*0.45),0,Math.PI*2); ctx.fill();
  }

  for(let i=0;i<lines.length;i++){
    const f = lines[i];
    const pts = [];
    for(let s=0;s<=72;s++) pts.push(pointOnLine(f,s/72,ox,oy,or,time));

    const alpha = (0.06 + f.alpha*.85) * (0.18 + intensity*.95) * f.depth;
    ctx.strokeStyle = i%7===0
      ? rgb(pal.spark, alpha*.42)
      : i%3===0
        ? rgb(pal.coreA, alpha*.34)
        : rgb(pal.coreB, alpha*.30);
    ctx.lineWidth = f.glow * f.depth * (0.9 + intensity*0.15);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let k=1;k<pts.length;k++){
      const p0 = pts[k-1], p1 = pts[k];
      const mx = (p0.x+p1.x)/2, my = (p0.y+p1.y)/2;
      ctx.quadraticCurveTo(p0.x,p0.y,mx,my);
    }
    ctx.stroke();

    ctx.strokeStyle = i%7===0
      ? rgb(pal.hot, alpha*.68)
      : i%3===0
        ? rgb(pal.spark, alpha*.55)
        : rgb(pal.coreA, alpha*.50);
    ctx.lineWidth = f.width * f.depth;
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for(let k=1;k<pts.length;k++){
      const p0 = pts[k-1], p1 = pts[k];
      const mx = (p0.x+p1.x)/2, my = (p0.y+p1.y)/2;
      ctx.quadraticCurveTo(p0.x,p0.y,mx,my);
    }
    ctx.stroke();
  }

  for(let i=0;i<sparks.length;i++){
    const s = sparks[i];
    const f = lines[s.line % lines.length];
    s.p += s.speed * s.dir * (.45 + intensity*.55);
    if(s.p > 1 || s.p < 0){
      s.p = s.dir > 0 ? 0 : 1;
      s.line = Math.floor(Math.random()*lines.length);
      s.dir = Math.random()>.5 ? 1 : -1;
      s.size = rand(1.0,3.6);
      s.alpha = rand(.2,.82);
    }
    const pt = pointOnLine(f,s.p,ox,oy,or,time);
    const sg = ctx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,s.size*(4.0 + intensity*1.4));
    sg.addColorStop(0, rgb(pal.hot, .14 + s.alpha*.46));
    sg.addColorStop(.3, rgb(pal.spark, .08 + s.alpha*.24));
    sg.addColorStop(1, rgb(pal.glow, 0));
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,s.size*(4.0 + intensity*1.4),0,Math.PI*2); ctx.fill();

    ctx.fillStyle = rgb(pal.hot, .10 + s.alpha*.46);
    ctx.beginPath(); ctx.arc(pt.x,pt.y,s.size*(0.85 + intensity*0.16),0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const spec = ctx.createRadialGradient(ox-or*.20, oy-or*.28, 2, ox-or*.20, oy-or*.28, or*(.16 + intensity*.10));
  spec.addColorStop(0, rgb(pal.hot, .04 + intensity*.18));
  spec.addColorStop(.4, rgb(pal.spark, .02 + intensity*.07));
  spec.addColorStop(1, rgb(pal.spark, 0));
  ctx.fillStyle = spec;
  ctx.beginPath();
  ctx.ellipse(ox-or*.17, oy-or*.28, or*(.15 + intensity*.05), or*(.11 + intensity*.03), -.35, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBrokenRing(ox,oy,or,time){
  const rr = or + 14;
  const intensity = energy / 100;

  // subtle global micro pulse (very small)
  const micro = 0.92 + Math.sin(time*0.35)*0.04;

  for(let i=0;i<ring.length;i++){
    const seg = ring[i];
    const threshold = (i / ring.length) * 100;
    const powered = energy >= threshold;

    const base = Math.sin(time * (0.4 + seg.phase*0.1) + seg.phase);
    const flicker = Math.sin(time * (1.2 + seg.phase*0.3) + seg.phase*2);

    const glitchChance = (Math.sin(time*0.6 + seg.phase*3) + 1) * 0.5;
    const glitch = glitchChance > 0.92 ? Math.sin(time*12 + seg.phase*10) : 0;

    let alpha = 0;
    let glowAlpha = 0;

    if(seg.dead){
      alpha = (0.08 + intensity * 0.06 + Math.max(0, base)*0.03) * micro;
      glowAlpha = (0.06 + intensity * 0.05) * micro;

      if(glitchChance > 0.97){
        alpha += 0.12;
        glowAlpha += 0.10;
      }

    } else if(powered){
      let stability = seg.weak ? 0.75 : 0.95;
      const flickerAmount = seg.weak ? flicker * 0.18 : flicker * 0.06;
      const drop = glitch * 0.25;

      alpha = (stability + flickerAmount - drop) * micro;
      alpha = Math.max(0.25, alpha);

      glowAlpha = (0.16 + intensity * 0.12) * micro;

    } else {
      alpha = (0.10 + intensity * 0.05 + Math.max(0, flicker)*0.05) * micro;
      glowAlpha = (0.08 + intensity * 0.05) * micro;

      if(glitchChance > 0.95){
        alpha += 0.10;
      }
    }

    const s = seg.start + seg.jitter;
    const e = s + seg.len;

    ctx.strokeStyle = `rgba(255,190,110,${glowAlpha})`;
    ctx.lineWidth = seg.width + 6;
    ctx.beginPath(); ctx.arc(ox,oy,rr,s,e); ctx.stroke();

    ctx.strokeStyle = `rgba(255,200,130,${alpha})`;
    ctx.lineWidth = seg.width;
    ctx.beginPath(); ctx.arc(ox,oy,rr,s,e); ctx.stroke();
  }

  if(energy > 82){
    const pulse = (0.08 + Math.sin(time*0.8)*0.02 + intensity*0.02) * micro;
    ctx.strokeStyle = `rgba(255,216,128,${pulse})`;
    ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(ox,oy,rr+6,0,Math.PI*2); ctx.stroke();
  }
}

function drawSignalLayer(time){
  const {zones, gameplay} = getLayout();
  const allZones = [zones.left, zones.right, zones.bottom, zones.topLeft, zones.topRight];
  const edgeZones = [zones.left, zones.right, zones.bottom];

  leds.forEach((d) => {
    let a = 0.05;
    if(!d.dead){
      const base = d.weak ? 0.10 : 0.18;
      const pulse = 0.65 + Math.sin(time * (d.weak ? 0.6 : 0.35) + d.phase) * 0.25;
      const glitch = d.weak && Math.sin(time*2.2 + d.phase*3.1) > 0.985 ? 0.02 : 1.0;
      a = base * pulse * glitch;
    }
    const g = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, 12);
    g.addColorStop(0, `rgba(255,225,170,${a*1.8})`);
    g.addColorStop(0.35, `rgba(255,165,90,${a})`);
    g.addColorStop(1, 'rgba(255,120,40,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(d.x,d.y,12,0,Math.PI*2); ctx.fill();

    ctx.fillStyle = d.dead ? 'rgba(95,62,48,0.55)' : `rgba(255,196,120,${0.35 + a})`;
    ctx.beginPath(); ctx.arc(d.x,d.y,3.4,0,Math.PI*2); ctx.fill();
  });

  pixels.forEach((p, i) => {
    let a = 0.08;
    if(!p.dead){
      const active = (i / pixels.length) * 100 < energy + 8;
      if(active){
        const pulse = 0.72 + Math.sin(time*0.45 + p.phase)*0.18;
        const glitch = p.weak && Math.sin(time*1.9 + p.phase*2.8) > 0.992 ? 0.0 : 1.0;
        a = 0.12 + 0.26 * pulse * glitch;
      } else if(p.weak && energy > (i/pixels.length)*100 - 10){
        a = 0.08 + Math.sin(time*1.4 + p.phase)*0.04;
      }
    }
    ctx.fillStyle = p.dead ? 'rgba(70,46,36,0.7)' : `rgba(255,176,96,${a})`;
    ctx.fillRect(p.x, p.y, 4, 2);
    if(!p.dead && a > 0.14){
      ctx.fillStyle = `rgba(255,220,160,${a*0.35})`;
      ctx.fillRect(p.x-1, p.y-1, 6, 4);
    }
  });

  motes.forEach(m => {
    const zone = allZones[m.zoneIndex];
    m.x += m.vx;
    m.y += m.vy;
    if(!pointInRect(m.x, m.y, zone) || pointInRect(m.x,m.y,gameplay)){
      const p = randomPointInZone(zone);
      m.x = p.x; m.y = p.y;
    }
    const a = m.a * (0.55 + Math.sin(time*0.4 + m.phase)*0.25);
    const g = ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*6);
    g.addColorStop(0, `rgba(255,235,180,${a*1.8})`);
    g.addColorStop(0.35, `rgba(255,170,96,${a})`);
    g.addColorStop(1, 'rgba(255,120,60,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r*6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(255,220,160,${a*0.75})`;
    ctx.beginPath(); ctx.arc(m.x,m.y,m.r,0,Math.PI*2); ctx.fill();
  });

  if(firefly.visible){
    firefly.life += 1;
    firefly.localT += 0.0036;
    const currentZone = edgeZones[firefly.zoneIndex];

    const targetX = firefly.anchorX + Math.sin(firefly.localT + firefly.phase) * firefly.ampX;
    const targetY = firefly.anchorY + Math.cos(firefly.localT*1.17 + firefly.phase*0.7) * firefly.ampY;

    firefly.x += (targetX - firefly.x) * 0.015;
    firefly.y += (targetY - firefly.y) * 0.015;

    if(!pointInRect(firefly.x, firefly.y, currentZone) || pointInRect(firefly.x, firefly.y, gameplay)){
      firefly.x = firefly.anchorX;
      firefly.y = firefly.anchorY;
    }

    const fadeIn = Math.min(1, firefly.life / 45);
    const fadeOut = Math.max(0, (firefly.duration - firefly.life) / 55);
    firefly.fade = Math.min(fadeIn, fadeOut);

    const fa = (0.10 + (0.5 + Math.sin(time*0.55 + firefly.phase)*0.5) * 0.10) * firefly.fade;
    const fg = ctx.createRadialGradient(firefly.x, firefly.y, 0, firefly.x, firefly.y, 16);
    fg.addColorStop(0, `rgba(255,245,180,${fa*1.5})`);
    fg.addColorStop(0.4, `rgba(255,180,96,${fa})`);
    fg.addColorStop(1, 'rgba(255,120,60,0)');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(firefly.x, firefly.y, 16, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(255,235,180,${fa})`;
    ctx.beginPath(); ctx.arc(firefly.x, firefly.y, 2.1, 0, Math.PI*2); ctx.fill();

    if(firefly.life >= firefly.duration){
      firefly.visible = false;
      firefly.life = 0;
      firefly.fade = 0;
    }
  } else {
    firefly.life += 1;
    if(firefly.life > rand(18, 70)) spawnFirefly(false);
  }
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  const rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}


let echo = null;

function spawnEcho(){
  const { orb } = getLayout();
  echo = {
    x: orb.x + (Math.random()-0.5)*40,
    y: orb.y + (Math.random()-0.5)*40,
    t: 0,
    life: 0,
    duration: 120 + Math.random()*120
  };
}

function drawEcho(time){
  if(!echo){
    if(Math.random() < 0.002) spawnEcho();
    return;
  }

  echo.t += 0.02;
  echo.life++;

  const a = (1 - echo.life/echo.duration) * 0.15;
  const trail = 6;

  for(let i=0;i<trail;i++){
    const px = echo.x + Math.sin(echo.t+i*0.3)*4;
    const py = echo.y + Math.cos(echo.t*1.2+i*0.2)*4;

    const alpha = a * (1 - i/trail);

    const g = ctx.createRadialGradient(px,py,0,px,py,8);
    g.addColorStop(0, `rgba(255,220,160,${alpha})`);
    g.addColorStop(1, 'rgba(255,120,60,0)');

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(px,py,8,0,Math.PI*2);
    ctx.fill();
  }

  if(echo.life > echo.duration){
    echo = null;
  }
}

function drawInsetLightStrip(time){
  const intensity = energy / 100;
  const alpha = 0.16 + intensity * 0.28;
  const pulse = 0.96 + Math.sin(time*0.42) * 0.035;

  // safely inside the bottom frame: gameplay opening ends at y=1018, bottom frame starts at y=1022
  const strips = [{x:760,  y:1035, w:168, h:1},
    {x:1490, y:1039, w:126, h:1}];

  strips.forEach((s, i) => {
    const local = pulse * (0.98 + i*0.02);

    // inset groove
    ctx.fillStyle = 'rgba(8,3,2,0.90)';
    ctx.fillRect(s.x, s.y, s.w, 2);

    // bright hairline core
    const core = ctx.createLinearGradient(s.x, s.y, s.x+s.w, s.y);
    core.addColorStop(0, 'rgba(255,160,70,0)');
    core.addColorStop(0.16, 'rgba(255,196,108,' + (alpha * local * 0.95) + ')');
    core.addColorStop(0.50, 'rgba(255,236,164,' + (alpha * local * 1.55) + ')');
    core.addColorStop(0.84, 'rgba(255,196,108,' + (alpha * local * 0.92) + ')');
    core.addColorStop(1, 'rgba(255,160,70,0)');
    ctx.fillStyle = core;
    ctx.fillRect(s.x, s.y, s.w, s.h);

    // tight halo hugging the groove
    const tight = ctx.createLinearGradient(0, s.y-4, 0, s.y+6);
    tight.addColorStop(0, 'rgba(255,130,60,0)');
    tight.addColorStop(0.50, 'rgba(255,188,98,' + (alpha * local * 0.42) + ')');
    tight.addColorStop(1, 'rgba(255,130,60,0)');
    ctx.fillStyle = tight;
    ctx.fillRect(s.x, s.y-4, s.w, 10);

    // downward spill into the metal below
    const spill = ctx.createLinearGradient(0, s.y, 0, s.y+26);
    spill.addColorStop(0, 'rgba(255,214,120,' + (alpha * local * 0.18) + ')');
    spill.addColorStop(0.26, 'rgba(255,164,86,' + (alpha * local * 0.12) + ')');
    spill.addColorStop(1, 'rgba(255,120,60,0)');
    ctx.fillStyle = spill;
    ctx.fillRect(s.x, s.y, s.w, 26);

    // tiny metallic catch line just above
    ctx.fillStyle = 'rgba(255,224,170,' + (alpha * local * 0.10) + ')';
    ctx.fillRect(s.x, s.y-2, s.w, 1);
  });
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

  ctx.fillText('LIFE', startX - 36, y + 18);

  for(let i=0;i<ownedLives;i++){
    const x = startX + i * slotW;
    const on = i < currentLives;

    const seatGrad = ctx.createLinearGradient(0, y-2, 0, y+iconH+4);
    seatGrad.addColorStop(0, 'rgba(10,4,2,0.24)');
    seatGrad.addColorStop(1, 'rgba(0,0,0,0.18)');
    ctx.fillStyle = seatGrad;
    roundRect(ctx, x-4, y-1, 34, 34, 7);
    ctx.fill();

    if(on){
      const pulse = 0.96 + Math.sin(time*0.9 + i*0.6) * 0.06;
      const gx = x + iconW/2;
      const gy = y + 10;

      // stronger broad aura behind bulb
      const auraOuter = ctx.createRadialGradient(gx, gy, 0, gx, gy, 34);
      auraOuter.addColorStop(0, 'rgba(255,246,190,' + (0.24 * pulse) + ')');
      auraOuter.addColorStop(0.30, 'rgba(255,214,110,' + (0.18 * pulse) + ')');
      auraOuter.addColorStop(0.62, 'rgba(255,168,72,' + (0.10 * pulse) + ')');
      auraOuter.addColorStop(1, 'rgba(255,120,60,0)');
      ctx.fillStyle = auraOuter;
      ctx.beginPath();
      ctx.arc(gx, gy, 34, 0, Math.PI*2);
      ctx.fill();

      // concentrated glass-hot core behind bulb
      const auraInner = ctx.createRadialGradient(gx, gy, 0, gx, gy, 18);
      auraInner.addColorStop(0, 'rgba(255,252,226,' + (0.30 * pulse) + ')');
      auraInner.addColorStop(0.45, 'rgba(255,224,132,' + (0.16 * pulse) + ')');
      auraInner.addColorStop(1, 'rgba(255,150,70,0)');
      ctx.fillStyle = auraInner;
      ctx.beginPath();
      ctx.arc(gx, gy, 18, 0, Math.PI*2);
      ctx.fill();

      if(bulbOnImg.complete && bulbOnImg.naturalWidth > 0){
        ctx.drawImage(bulbOnImg, x, y, iconW, iconH);
      }

      // faint bloom over the sprite too, so it doesn't disappear into the panel
      const overGlow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 14);
      overGlow.addColorStop(0, 'rgba(255,248,214,' + (0.14 * pulse) + ')');
      overGlow.addColorStop(0.55, 'rgba(255,210,116,' + (0.08 * pulse) + ')');
      overGlow.addColorStop(1, 'rgba(255,150,70,0)');
      ctx.fillStyle = overGlow;
      ctx.beginPath();
      ctx.arc(gx, gy, 14, 0, Math.PI*2);
      ctx.fill();
    } else {
      if(bulbOffImg.complete && bulbOffImg.naturalWidth > 0){
        ctx.globalAlpha = 0.92;
        ctx.drawImage(bulbOffImg, x, y, iconW, iconH);
        ctx.globalAlpha = 1;
      }

      ctx.fillStyle = 'rgba(0,0,0,0.10)';
      roundRect(ctx, x-1, y+1, 26, 24, 6);
      ctx.fill();
    }
  }

  ctx.restore();
}





function drawFlarePanel(time){
  const startX = 900;
  const y = 26;
  const slotW = 56;
  const iconW = 34;
  const iconH = 34;

  ctx.save();

  ctx.font = '600 9px Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,196,122,0.20)';
  ctx.fillText('FLARE', startX - 44, y + 18);

  for(let i=0;i<MAX_FLARES;i++){
    const x = startX + i * slotW;
    const on = i < currentFlares;

    // slot seat
    const seatGrad = ctx.createLinearGradient(0, y-3, 0, y+iconH+5);
    seatGrad.addColorStop(0, 'rgba(10,4,2,0.26)');
    seatGrad.addColorStop(1, 'rgba(0,0,0,0.20)');
    ctx.fillStyle = seatGrad;
    roundRect(ctx, x-6, y-2, 42, 38, 8);
    ctx.fill();

    if(on){
      const pulse = 0.95 + Math.sin(time*0.95 + i*0.8) * 0.05;
      const gx = x + iconW/2;
      const gy = y + 16;

      // green energy aura, broader falloff than lives
      const auraOuter = ctx.createRadialGradient(gx, gy, 0, gx, gy, 28);
      auraOuter.addColorStop(0, 'rgba(216,255,126,' + (0.18 * pulse) + ')');
      auraOuter.addColorStop(0.36, 'rgba(138,255,72,' + (0.14 * pulse) + ')');
      auraOuter.addColorStop(0.70, 'rgba(70,210,40,' + (0.08 * pulse) + ')');
      auraOuter.addColorStop(1, 'rgba(40,120,30,0)');
      ctx.fillStyle = auraOuter;
      ctx.beginPath();
      ctx.arc(gx, gy, 28, 0, Math.PI*2);
      ctx.fill();

      // tighter hot core
      const auraInner = ctx.createRadialGradient(gx, gy, 0, gx, gy, 14);
      auraInner.addColorStop(0, 'rgba(238,255,188,' + (0.24 * pulse) + ')');
      auraInner.addColorStop(0.52, 'rgba(182,255,110,' + (0.14 * pulse) + ')');
      auraInner.addColorStop(1, 'rgba(60,180,36,0)');
      ctx.fillStyle = auraInner;
      ctx.beginPath();
      ctx.arc(gx, gy, 14, 0, Math.PI*2);
      ctx.fill();

      if(flareImg.complete && flareImg.naturalWidth > 0){
        ctx.drawImage(flareImg, x, y, iconW, iconH);
      }

      // subtle bloom over sprite
      const overGlow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 12);
      overGlow.addColorStop(0, 'rgba(236,255,176,' + (0.14 * pulse) + ')');
      overGlow.addColorStop(0.60, 'rgba(160,255,92,' + (0.08 * pulse) + ')');
      overGlow.addColorStop(1, 'rgba(60,180,36,0)');
      ctx.fillStyle = overGlow;
      ctx.beginPath();
      ctx.arc(gx, gy, 12, 0, Math.PI*2);
      ctx.fill();
    } else {
      // empty socket
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      roundRect(ctx, x-2, y+2, 30, 28, 7);
      ctx.fill();

      ctx.strokeStyle = 'rgba(140,180,100,0.08)';
      ctx.lineWidth = 1;
      roundRect(ctx, x-2, y+2, 30, 28, 7);
      ctx.stroke();
    }
  }

  ctx.restore();
}


let panelPulseWarm = 0;
let panelPulseGreen = 0;
let prevLives = currentLives;
let prevFlares = currentFlares;

function updateSoulState(){
  // slow decay
  panelPulseWarm *= 0.90;
  panelPulseGreen *= 0.88;

  if(currentLives < prevLives){
    panelPulseWarm = Math.max(panelPulseWarm, 1.0);
  }
  if(currentFlares < prevFlares){
    panelPulseGreen = Math.max(panelPulseGreen, 1.0);
  }

  prevLives = currentLives;
  prevFlares = currentFlares;
}

function drawPanelSoul(time, orb){
  const intensity = energy / 100;

  // 1) broad micro power drift across the top panel
  const sweepX = 220 + ((Math.sin(time*0.11) * 0.5 + 0.5) * 1180);
  const drift = ctx.createLinearGradient(sweepX-260, 0, sweepX+260, 0);
  drift.addColorStop(0, 'rgba(255,180,90,0)');
  drift.addColorStop(0.5, 'rgba(255,194,118,' + (0.018 + intensity*0.018) + ')');
  drift.addColorStop(1, 'rgba(255,180,90,0)');
  ctx.fillStyle = drift;
  ctx.fillRect(80, 8, 1760, 146);

  // 2) orb bleed into the top panel metal
  const bleed = ctx.createRadialGradient(orb.x, orb.y-10, 0, orb.x, orb.y-10, 180);
  bleed.addColorStop(0, 'rgba(255,176,82,' + (0.06 + intensity*0.10) + ')');
  bleed.addColorStop(0.36, 'rgba(255,132,48,' + (0.03 + intensity*0.05) + ')');
  bleed.addColorStop(1, 'rgba(255,90,30,0)');
  ctx.fillStyle = bleed;
  ctx.beginPath();
  ctx.arc(orb.x, orb.y-8, 180, Math.PI, Math.PI*2);
  ctx.lineTo(orb.x+180, 0);
  ctx.lineTo(orb.x-180, 0);
  ctx.closePath();
  ctx.fill();

  // 3) life-loss warm pulse
  if(panelPulseWarm > 0.02){
    const a = panelPulseWarm * 0.10;
    const warm = ctx.createLinearGradient(0, 0, 0, 160);
    warm.addColorStop(0, 'rgba(255,188,100,' + a + ')');
    warm.addColorStop(0.45, 'rgba(255,120,46,' + (a*0.55) + ')');
    warm.addColorStop(1, 'rgba(255,100,30,0)');
    ctx.fillStyle = warm;
    ctx.fillRect(80, 0, 1760, 160);
  }

  // 4) flare-use green pulse
  if(panelPulseGreen > 0.02){
    const a = panelPulseGreen * 0.10;
    const green = ctx.createLinearGradient(0, 0, 0, 160);
    green.addColorStop(0, 'rgba(186,255,116,' + a + ')');
    green.addColorStop(0.50, 'rgba(92,255,64,' + (a*0.50) + ')');
    green.addColorStop(1, 'rgba(60,180,36,0)');
    ctx.fillStyle = green;
    ctx.fillRect(80, 0, 1760, 160);
  }

  // 5) tiny occasional imperfection flicker
  const glitchWindow = (Math.sin(time*0.63 + 1.2) + Math.sin(time*0.37 + 2.9))*0.5;
  if(glitchWindow > 0.93){
    const gx = 520 + ((Math.sin(time*6.7)*0.5+0.5) * 760);
    ctx.fillStyle = 'rgba(255,214,140,0.035)';
    ctx.fillRect(gx, 24, 44, 82);
  }
}



let ventSmokePuffs = [];

let eyeState = {
  active: false,
  timer: 0,
  phase: 'idle',
  blinkTimer: 0,
  nextWake: 120 + Math.random()*240,
  baseX: 1490,
  baseY: 1050,
  driftPhase: Math.random()*10,
  leftScale: 1.0,
  rightScale: 0.86,
  leftTilt: -0.12,
  rightTilt: 0.10,
  blinkCountLeft: 0
};

function resetEyes(){
  eyeState.active = true;
  eyeState.phase = 'open';
  eyeState.timer = 900; // ~15 seconds at 60fps
  eyeState.blinkTimer = 220 + Math.random()*360;
  eyeState.baseX = 1462 + Math.random()*50; // comfortably inside the vent, not near edges
  eyeState.baseY = 1048 + Math.random()*10;
  eyeState.driftPhase = Math.random()*10;
  eyeState.leftScale = 0.46 + Math.random()*0.11;
  eyeState.rightScale = 0.36 + Math.random()*0.14;
  eyeState.leftTilt = 0.10 + Math.random()*0.08;
  eyeState.rightTilt = -0.18 + Math.random()*0.08;
  eyeState.blinkCountLeft = 1; // exactly one blink
}

function updateBottomPanelLife(){
  if(Math.random() < 0.06){
    ventSmokePuffs.push({
      x: 350 + (Math.random()-0.5)*20,
      y: 1040 + (Math.random()-0.5)*4,
      vx: -0.08 + Math.random()*0.16,
      vy: -0.10 - Math.random()*0.10,
      life: 0,
      maxLife: 70 + Math.random()*30,
      r: 8 + Math.random()*8,
      drift: Math.random()*10
    });
  }
  ventSmokePuffs = ventSmokePuffs.filter(p => {
    p.life += 1;
    p.x += p.vx + Math.sin((t + p.drift) * 0.8) * 0.035;
    p.y += p.vy;
    p.r += 0.08;
    return p.life < p.maxLife;
  });

  if(!eyeState.active){
    eyeState.nextWake -= 1;
    if(eyeState.nextWake <= 0){
      resetEyes();
    }
  } else {
    eyeState.timer -= 1;
    eyeState.blinkTimer -= 1;

    if(eyeState.phase === 'open' && eyeState.blinkCountLeft > 0 && eyeState.blinkTimer <= 0){
      eyeState.phase = 'blink';
      eyeState.blinkTimer = 18 + Math.random()*10;
      eyeState.blinkCountLeft -= 1;
    } else if(eyeState.phase === 'blink' && eyeState.blinkTimer <= 0){
      eyeState.phase = 'open';
      eyeState.blinkTimer = 9999;
    }

    if(eyeState.timer <= 0){
      eyeState.active = false;
      eyeState.phase = 'idle';
      eyeState.nextWake = 1200 + Math.random()*120;
    }
  }
}

function drawBottomVentCutout(x, y, w, h, mode){

  // Recess shadow / cavity
  const cavity = ctx.createLinearGradient(0, y, 0, y+h);
  cavity.addColorStop(0, 'rgba(0,0,0,0.62)');
  cavity.addColorStop(0.5, 'rgba(8,3,2,0.85)');
  cavity.addColorStop(1, 'rgba(0,0,0,0.68)');
  ctx.fillStyle = cavity;
  roundRect(ctx, x, y, w, h, 8);
  ctx.fill();

  // Bevel: top highlight, bottom shadow to make it feel cut INTO the metal.
  ctx.strokeStyle = 'rgba(255,214,154,0.10)';
  ctx.lineWidth = 1;
  roundRect(ctx, x+0.5, y+0.5, w-1, h-1, 8);
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,220,170,0.06)';
  roundRect(ctx, x+2, y+2, w-4, 6, 6);
  ctx.fill();

  ctx.fillStyle = 'rgba(0,0,0,0.24)';
  roundRect(ctx, x+2, y+h-8, w-4, 6, 6);
  ctx.fill();

  // Deep interior before slats.
  ctx.fillStyle = 'rgba(0,0,0,0.46)';
  roundRect(ctx, x+4, y+4, w-8, h-8, 6);
  ctx.fill();

  
if(mode === 'eyes' && eyeState.active){
    const lid = eyeState.phase === 'blink' ? 0.12 : 1.0;
    const dy = Math.sin(t*0.08 + eyeState.driftPhase) * 1.0;

    const lx = eyeState.baseX - 10;
    const rx = eyeState.baseX + 12;
    const ey = eyeState.baseY + dy;

    const eyes = [
      {x: lx, y: ey, sx: 5.7*eyeState.leftScale/0.5, tilt: eyeState.leftTilt},
      {x: rx, y: ey + 0.8, sx: 5.0*eyeState.rightScale/0.5, tilt: eyeState.rightTilt}
    ];

    eyes.forEach(function(e){
      const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 8);
      g.addColorStop(0, 'rgba(255,236,160,' + (0.18*lid) + ')');
      g.addColorStop(0.42, 'rgba(255,120,54,' + (0.10*lid) + ')');
      g.addColorStop(1, 'rgba(255,80,40,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y, 7, 4.6*lid, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.tilt);

      ctx.fillStyle = 'rgba(255,234,170,' + (0.60*lid) + ')';
      ctx.beginPath();
      ctx.arc(0, 0, e.sx, 0, Math.PI, false);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(255,252,220,' + (0.30*lid) + ')';
      ctx.beginPath();
      ctx.arc(0, 0.5, e.sx*0.38, 0, Math.PI, false);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    });
  }

  // Slats
  for(let i=0;i<6;i++){
    const sy = y + 7 + i*6;
    const grad = ctx.createLinearGradient(0, sy, 0, sy+3);
    grad.addColorStop(0, 'rgba(255,214,154,0.11)');
    grad.addColorStop(0.45, 'rgba(38,14,7,0.92)');
    grad.addColorStop(1, 'rgba(0,0,0,0.46)');
    ctx.fillStyle = grad;
    roundRect(ctx, x+8, sy, w-16, 3, 2);
    ctx.fill();
  }

  // Smoke leaks through the left vent very slightly.
  if(mode === 'smoke'){
    ventSmokePuffs.forEach(p => {
      const alpha = (1 - p.life/p.maxLife) * 0.18;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0, 'rgba(230,230,230,' + alpha + ')');
      g.addColorStop(0.45, 'rgba(140,140,140,' + (alpha*0.42) + ')');
      g.addColorStop(1, 'rgba(80,80,80,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    });
  }
}

function drawBottomPanelCreatures(){
  // Properly inside the bottom panel, not hidden behind it.
  drawBottomVentCutout(256, 1028, 154, 44, 'smoke');
  drawBottomVentCutout(1410, 1028, 154, 44, 'eyes');
}







function drawTopLogoPlate(time){
  const x = 312;
  const y = 18;
  const w = 308;
  const h = 104;

  if(lumoLogoImg.complete && lumoLogoImg.naturalWidth > 0){
    const targetW = 270;
    const ratio = lumoLogoImg.naturalHeight / lumoLogoImg.naturalWidth;
    const drawW = targetW;
    const drawH = drawW * ratio;
    const dx = x + (w - drawW) / 2;
    const dy = y + (h - drawH) / 2 + 2;

    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 0.98;
    ctx.drawImage(lumoLogoImg, dx, dy, drawW, drawH);
    ctx.restore();
  }
}

function frame(){
  t += .016;
  updateSoulState();
  updateBottomPanelLife();
  ctx.clearRect(0,0,innerWidth,innerHeight);
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,innerWidth,innerHeight);

  ctx.save();
  ctx.translate(viewport.x, viewport.y);
  ctx.scale(viewport.scale, viewport.scale);

  const {w,h,orb} = getLayout();
  updateScoreDisplay();
  drawFrame(w,h,orb.x,orb.y,orb.r);
  withFrameClip(()=>{
    drawTopPanelDetail(t);
    drawPanelSoul(t, orb);
    drawFutureHudGuides();
    drawInnerEdgeWear(t);
    drawLivesPanel(t);
    drawFlarePanel(t);
  });
  drawScoreCutout(t);
  drawOrbCutout(orb.x, orb.y, orb.r);
  drawFramePatina(t);
  withFrameClip(()=>{ drawInsetLightStrip(t); drawBottomPanelCreatures(); });
  drawTechGraffiti(t);
  drawCore(orb.x,orb.y,orb.r,t,w,h);
  drawBrokenRing(orb.x,orb.y,orb.r,t);
  drawSignalLayer(t);
  drawHUD();

  ctx.restore();
  
  drawEcho(t);
  drawTopLogoPlate(t);
  requestAnimationFrame(frame);
}

window.window.addEventListener('keydown', e => {
  const k = String(e.key || '').toLowerCase();

  if (k === 'z') {
    e.preventDefault();
    energy = clamp(energy - 6, 0, 100);
  }
  if (k === 'x') {
    e.preventDefault();
    energy = clamp(energy + 6, 0, 100);
  }
  if (k === 'h') {
    e.preventDefault();
    currentLives = clamp(currentLives - 1, 0, ownedLives);
  }
  if (k === 'j') {
    e.preventDefault();
    currentLives = clamp(currentLives + 1, 0, ownedLives);
  }
  if (k === 'k') {
    e.preventDefault();
    currentFlares = clamp(currentFlares - 1, 0, MAX_FLARES);
  }
  if (k === 'l') {
    e.preventDefault();
    currentFlares = clamp(currentFlares + 1, 0, MAX_FLARES);
  }

  updateUI();
}, true);

resize();
frame();
</script>
