<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumoEditor V2</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="appShell">
    <header class="topBar" id="topBar">
      <div class="topBarBrand">
        <span class="brand">LumoEditor</span>
        <span class="version">V2</span>
      </div>

      <div class="topBarActions" role="toolbar" aria-label="Editor actions">
        <button type="button" class="topBarButton" data-topbar-action="new">New</button>
        <button type="button" class="topBarButton" data-topbar-action="import">Import</button>
        <div class="topBarMenuShell">
          <button type="button" class="topBarButton" data-topbar-menu-toggle="export" aria-haspopup="true" aria-expanded="false">Export</button>
          <div class="topBarMenu topBarExportMenu" id="topBarExportMenu"></div>
        </div>
        <button type="button" class="topBarButton" data-topbar-action="undo">Undo</button>
        <button type="button" class="topBarButton" data-topbar-action="redo">Redo</button>
        <button
          type="button"
          class="topBarButton topBarModeButton"
          data-topbar-action="toggle-darkness"
          aria-pressed="false"
        >
          Darkness Preview
        </button>

        <div class="topBarMenuShell">
          <button type="button" class="topBarIconButton" data-topbar-menu-toggle="settings" aria-label="Settings" aria-haspopup="true" aria-expanded="false">⚙</button>
          <div class="topBarMenu" id="topBarSettingsMenu"></div>
        </div>

        <div class="topBarMenuShell">
          <button type="button" class="topBarIconButton" data-topbar-menu-toggle="help" aria-label="Help" aria-haspopup="true" aria-expanded="false">?</button>
          <div class="topBarMenu" id="topBarHelpMenu"></div>
        </div>
      </div>

      <div class="topBarStatus" id="topBarStatus" aria-live="polite"></div>
    </header>

    <main class="workspace">
      <aside class="brushPanel" id="brushPanel"></aside>

      <section class="centerWorkspace">
        <section class="canvasPanel">
          <canvas id="editorCanvas"></canvas>
          <div class="floatingPanelHost" id="floatingPanelHost" aria-live="polite"></div>
          <div class="cellHud" id="cellHud" aria-live="polite"></div>
          <div class="minimapShell">
            <canvas id="minimapCanvas" aria-label="Level minimap"></canvas>
          </div>
        </section>

        <section class="bottomPanel" id="bottomPanel" aria-label="Parameter panel"></section>
      </section>

      <aside class="inspectorPanel" id="inspectorPanel"></aside>
    </main>
  </div>

  <script src="../data/audio_manifest.js"></script>
  <script src="../data/catalog_tiles.js"></script>
  <script src="../data/catalog_entities.js"></script>
  <script src="../data/tileset.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
