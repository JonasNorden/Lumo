<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumoEditor V2</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="appShell">
    <header class="topBar">
      <span class="brand">LumoEditor</span>
      <span class="version">V2</span>
    </header>

    <main class="workspace">
      <aside class="brushPanel" id="brushPanel"></aside>

      <section class="canvasPanel">
        <canvas id="editorCanvas"></canvas>
      </section>

      <aside class="inspectorPanel" id="inspectorPanel"></aside>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
