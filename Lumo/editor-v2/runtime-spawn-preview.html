<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumo Recharged - Runtime Spawn Preview</title>
    <style>
      body {
        margin: 0;
        background: #111827;
        color: #e5e7eb;
        font-family: monospace;
      }

      main {
        margin: 20px;
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 16px;
      }

      #summary {
        margin: 0;
        padding: 10px;
        background: #1f2937;
        border: 1px solid #374151;
        white-space: pre-wrap;
      }

      .level-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      #levelPathInput {
        min-width: 320px;
        flex: 1 1 420px;
        padding: 8px;
        color: #e5e7eb;
        background: #0f172a;
        border: 1px solid #4b5563;
      }

      #loadLevelButton {
        padding: 8px 12px;
        border: 1px solid #6b7280;
        background: #1f2937;
        color: #e5e7eb;
        cursor: pointer;
      }

      #error {
        margin: 0;
        padding: 10px;
        border: 1px solid #7f1d1d;
        background: #3f1010;
        color: #fecaca;
      }

      canvas {
        border: 1px solid #4b5563;
        background: #0b0f17;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Recharged Runtime Spawn Preview (Debug)</h1>
      <div class="level-controls">
        <input
          id="levelPathInput"
          type="text"
          value="./src/data/testLevelDocument.v1.json"
          aria-label="Level file path"
        />
        <button id="loadLevelButton" type="button">Load Level</button>
      </div>
      <pre id="summary">Loading preview...</pre>
      <p id="error" hidden></p>
      <canvas id="preview" width="640" height="384"></canvas>
    </main>

    <script type="module">
      import { renderRuntimeSpawnPreview } from "./src/runtime/renderRuntimeSpawnPreview.js";

      // Wire one standalone debug render pass for the first browser-side preview.
      renderRuntimeSpawnPreview({
        canvas: document.querySelector("#preview"),
        summary: document.querySelector("#summary"),
        error: document.querySelector("#error"),
        levelPathInput: document.querySelector("#levelPathInput"),
        loadLevelButton: document.querySelector("#loadLevelButton"),
      });
    </script>
  </body>
</html>
