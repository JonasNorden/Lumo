          ? entity.lightDiameter * 0.5
          : (Number.isFinite(entity?.lightRadius) ? entity.lightRadius : 120);
        const fireflyBaseStrength = Number.isFinite(entity?.lightStrength) ? entity.lightStrength : 0.8;
        lights.push({
          kind: "firefly",
          x: centerX,
          y: centerY,
          radius: fireflyBaseRadius * lightK,
          strength: fireflyBaseStrength * lightK,
        });
      }

      for (const flare of (Array.isArray(flareSnapshots) ? flareSnapshots : [])) {
        const flareLooksTileBased = coordinatesLookTileBased
          && Number.isFinite(flare?.x)
          && Number.isFinite(flare?.y)
          && flare.x <= worldWidthRaw + tileSize
          && flare.y <= worldHeightRaw + tileSize;
        const flareWorldX = flareLooksTileBased ? flare.x * worldUnitsToPx : flare.x;
        const flareWorldY = flareLooksTileBased ? flare.y * worldUnitsToPx : flare.y;
        if (!Number.isFinite(flareWorldX) || !Number.isFinite(flareWorldY)) {
          continue;
        }
        const flareRect = mapper.worldToCanvasRect(flareWorldX, flareWorldY, 1, 1);
        lights.push({
          kind: "flare",
          x: flareRect.x + flareRect.w * 0.5,
          y: flareRect.y + flareRect.h * 0.5,
          radius: resolveRechargedFlareRadii(flare).darknessRadius,
          strength: resolveRechargedFlareAlpha(flare) * 0.9,
        });
      }

      return lights;
    }

    function drawRechargedDarkness(ctx, canvas, state, lights, options) {
      if (!ctx || !canvas || !state) {
        return false;
      }
      const mapper = options?.mapper && typeof options.mapper === "object" ? options.mapper : null;
      const occlusionLookup = options?.occlusionLookup && typeof options.occlusionLookup === "object"
        ? options.occlusionLookup
        : null;
      const occlusionRects = Array.isArray(occlusionLookup?.rects) ? occlusionLookup.rects : null;
      const occOptions = options?.occlusionOptions && typeof options.occlusionOptions === "object"
        ? options.occlusionOptions
        : RECHARGED_OCCLUSION_DEFAULTS;
      const darknessState = ensureRechargedDarknessState(state, canvas);
      if (!darknessState?.ctx || !darknessState?.canvas) {
        return false;
      }
      const darknessCtx = darknessState.ctx;
      const darknessCanvas = darknessState.canvas;
      darknessCtx.clearRect(0, 0, darknessCanvas.width, darknessCanvas.height);
      darknessCtx.globalCompositeOperation = "source-over";
      darknessCtx.fillStyle = "rgba(0,0,0,0.93)";
      darknessCtx.fillRect(0, 0, darknessCanvas.width, darknessCanvas.height);
      darknessCtx.globalCompositeOperation = "destination-out";

      for (const light of (Array.isArray(lights) ? lights : [])) {
        if (!Number.isFinite(light?.x) || !Number.isFinite(light?.y)) {
          continue;
        }
        const radius = Math.max(40, Number.isFinite(light?.radius) ? light.radius : 130);
        const strength = Math.max(0, Math.min(1.25, Number.isFinite(light?.strength) ? light.strength : 0.85));

        const shouldUsePlayerOcclusion = RECHARGED_ENABLE_PLAYER_LIGHT_OCCLUSION === true
          && light?.kind === "player"
          && mapper
          && Array.isArray(occlusionRects)
          && occlusionRects.length > 0;
        if (shouldUsePlayerOcclusion) {
          const pts = buildRechargedPlayerLightOcclusionPolyScreen({
            sx: light.x,
            sy: light.y,
            radius,
            mapper,
            occlusionLookup,
            options: occOptions,
          });
          if (Array.isArray(pts) && pts.length > 0) {
            const punch = Math.max(0, Math.min(1, strength * RECHARGED_PLAYER_PUNCH_INTENSITY));
            const corePunch = Math.max(0, Math.min(1, punch * 0.10));
            const feather = Math.max(0, occOptions.featherPx | 0);
            darknessCtx.save();
            darknessCtx.beginPath();
            darknessCtx.moveTo(pts[0][0], pts[0][1]);
            for (let pointIndex = 1; pointIndex < pts.length; pointIndex += 1) {
              darknessCtx.lineTo(pts[pointIndex][0], pts[pointIndex][1]);
            }
            darknessCtx.closePath();
            darknessCtx.shadowColor = "rgba(0,0,0,1)";
            darknessCtx.shadowBlur = feather;
            darknessCtx.fillStyle = `rgba(0,0,0,${Math.max(0.05, Math.min(1, corePunch)).toFixed(3)})`;
            darknessCtx.fill();

            if (feather > 0) {
              const passes = 10;
              const downFeather = 0.0;
              for (let passIndex = 0; passIndex < passes; passIndex += 1) {
                const t = passIndex / (passes - 1);
                const extra = feather * (1.15 - 1.05 * t);
                const a0 = 0.030 + 0.170 * (1 - t);
                const alpha = a0 * punch;
                darknessCtx.beginPath();
                for (let i = 0; i < pts.length; i += 1) {
                  const px = pts[i][0];
                  const py = pts[i][1];
                  let vx = px - light.x;
                  let vy = py - light.y;
                  const norm = Math.hypot(vx, vy) || 1;
                  vx /= norm;
                  vy /= norm;
                  const down = Math.max(0, vy);
                  const expand = extra * (1 - down * (1 - downFeather));
                  const ex = px + vx * expand;
                  const ey = py + vy * expand;
                  if (i === 0) darknessCtx.moveTo(ex, ey);
                  else darknessCtx.lineTo(ex, ey);
                }
                darknessCtx.closePath();
                darknessCtx.fillStyle = `rgba(0,0,0,${alpha.toFixed(3)})`;
                darknessCtx.fill();
              }
            }
            const penumbra = Number.isFinite(occOptions.penumbra) ? occOptions.penumbra : 1;
            if (penumbra > 1.01) {
              darknessCtx.shadowBlur = feather * 1.35;
              darknessCtx.globalAlpha = 0.55 * corePunch;
              darknessCtx.fill();
            }
            darknessCtx.restore();
            continue;
          }
        }

        const gradient = darknessCtx.createRadialGradient(light.x, light.y, 0, light.x, light.y, radius);
        gradient.addColorStop(0, `rgba(0,0,0,${strength.toFixed(3)})`);
        gradient.addColorStop(0.55, `rgba(0,0,0,${(strength * 0.85).toFixed(3)})`);
        gradient.addColorStop(1, "rgba(0,0,0,0)");
        darknessCtx.fillStyle = gradient;
        darknessCtx.beginPath();
        darknessCtx.arc(light.x, light.y, radius, 0, Math.PI * 2);
        darknessCtx.fill();
      }

      drawRechargedLivingDarknessPolish(darknessCtx, darknessCanvas, state, {
        frame: Number.isFinite(options?.frame) ? options.frame : null,
        nowMs: Number.isFinite(options?.nowMs) ? options.nowMs : undefined,
      });
      ctx.globalCompositeOperation = "source-over";
      ctx.drawImage(darknessCanvas, 0, 0);
      return true;
    }

    function renderRechargedCanvasFrame(canvas, state) {
      if (!canvas || typeof canvas.getContext !== "function") {
        return false;
      }

      try {
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          return false;
        }

        const payload = readLatestRechargedBootPayload() || {};
        const statusText = typeof payload?.statusText === "string" ? payload.statusText : "";
        const livePlayer = resolveRechargedLivePlayerSnapshot(payload, state);
        const player = readRechargedPlayerSnapshot(payload);
        const flareSnapshots = readRechargedFlareSnapshots(payload, state);
        const pulseSnapshot = readRechargedPulseSnapshot(payload, state);
        const boostSnapshot = readRechargedBoostSnapshot(payload, state);
        const entitySnapshots = readRechargedEntitySnapshots(payload, state);
        const liquidVolumes = readRechargedLiquidSnapshots(payload, state);
        const fogVolumes = readRechargedFogSnapshots(payload, state);
        const decorSnapshots = readRechargedDecorSnapshots(payload);
        const reactiveGrassPatches = readRechargedReactiveGrassPatches(payload);
        const reactiveBloomPatches = readRechargedReactiveBloomPatches(payload);
        const reactiveCrystalPatches = readRechargedReactiveCrystalPatches(payload);
        const previousSnapshot = readRechargedPlayerSnapshot({
          player: state?.previousPlayerSnapshot && typeof state.previousPlayerSnapshot === "object"
            ? state.previousPlayerSnapshot
            : livePlayer.snapshot || payload?.player,
        });
        const currentSnapshot = readRechargedPlayerSnapshot({
          player: livePlayer.snapshot
            || (state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object" ? state.currentPlayerSnapshot : null)
            || payload?.player,
          energy: Number.isFinite(payload?.energy) ? payload.energy : undefined,
          playerRenderAlpha: Number.isFinite(payload?.playerRenderAlpha) ? payload.playerRenderAlpha : undefined,
        });
        const alphaRaw = Number.isFinite(state?.stepAccumulatorMs)
          ? state.stepAccumulatorMs / RECHARGED_FIXED_STEP_MS
          : 0;
        const alpha = Math.max(0, Math.min(1, alphaRaw));
        const lerp = (from, to, t) => from + (to - from) * t;
        const playerCenterX = Number.isFinite(previousSnapshot.x) && Number.isFinite(currentSnapshot.x)
          ? lerp(previousSnapshot.x, currentSnapshot.x, alpha)
          : (Number.isFinite(player.x) ? player.x : null);
        const playerFootY = Number.isFinite(previousSnapshot.y) && Number.isFinite(currentSnapshot.y)
          ? lerp(previousSnapshot.y, currentSnapshot.y, alpha)
          : (Number.isFinite(player.y) ? player.y : null);
        const fogVisualState = ensureRechargedFogVisualState(state);
        const nowMs = (typeof performance !== "undefined" && typeof performance.now === "function")
          ? performance.now()
          : Date.now();
        const fogStepDt = fogVisualState && Number.isFinite(fogVisualState.lastStepAtMs)
          ? Math.max(1 / 180, Math.min(0.05, (nowMs - fogVisualState.lastStepAtMs) / 1000))
          : (1 / 60);
        let playerVelocityX = Number.isFinite(previousSnapshot?.velocity?.x) && Number.isFinite(currentSnapshot?.velocity?.x)
          ? lerp(previousSnapshot.velocity.x, currentSnapshot.velocity.x, alpha)
          : (Number.isFinite(currentSnapshot?.velocity?.x)
              ? currentSnapshot.velocity.x
              : (Number.isFinite(player?.vx) ? player.vx : null));

        // Fallback: derive velocity from position delta if runtime did not provide it.
        if (!Number.isFinite(playerVelocityX)) {
          const prevX = Number.isFinite(previousSnapshot?.x) ? previousSnapshot.x : null;
          const currX = Number.isFinite(currentSnapshot?.x) ? currentSnapshot.x : null;
          if (prevX !== null && currX !== null && Number.isFinite(fogStepDt) && fogStepDt > 0) {
            playerVelocityX = (currX - prevX) / fogStepDt;
          } else {
            playerVelocityX = 0;
          }
        }
        const tileSize = Number.isFinite(payload?.tileSize) && payload.tileSize > 0 ? payload.tileSize : 24;
        const worldWidthRaw = Number.isFinite(payload?.worldWidth)
          ? payload.worldWidth
          : (Number.isFinite(payload?.cols) ? payload.cols : Math.max(1, Math.round(canvas.width / tileSize)));
        const worldHeightRaw = Number.isFinite(payload?.worldHeight)
          ? payload.worldHeight
          : (Number.isFinite(payload?.rows) ? payload.rows : Math.max(1, Math.round(canvas.height / tileSize)));
        const supportTiles = Array.isArray(payload?.supportTiles) ? payload.supportTiles : [];
        const maxSupportTileSpan = supportTiles.reduce((maxSpan, tile) => {
          const spanW = Number.isFinite(tile?.w) ? tile.w : 0;
          const spanH = Number.isFinite(tile?.h) ? tile.h : 0;
          return Math.max(maxSpan, spanW, spanH);
        }, 0);
        const coordinatesLookTileBased = (
          (Number.isFinite(player.x) && player.x > worldWidthRaw + tileSize) ||
          (Number.isFinite(player.y) && player.y > worldHeightRaw + tileSize) ||
          (maxSupportTileSpan > 0 && maxSupportTileSpan <= 4)
        );
        const worldUnitsToPx = coordinatesLookTileBased ? tileSize : 1;
        const worldWidthPx = Math.max(tileSize, Math.round(worldWidthRaw * worldUnitsToPx));
        const worldHeightPx = Math.max(tileSize, Math.round(worldHeightRaw * worldUnitsToPx));
        const hudGameplayViewport = getRechargedHudV2GameplayViewport(canvas);
        const worldRenderCanvas = {
          width: Math.max(1, hudGameplayViewport.w),
          height: Math.max(1, hudGameplayViewport.h),
        };
        const mapper = buildRechargedWorldToCanvasMapper({
          canvas: worldRenderCanvas,
          worldWidthPx,
          worldHeightPx,
          targetX: Number.isFinite(playerCenterX) ? playerCenterX : worldWidthPx * 0.5,
          targetY: Number.isFinite(playerFootY) ? playerFootY : worldHeightPx - 1,
        });
        const occlusionLookup = ensureRechargedOcclusionLookup(state, { supportTiles, worldUnitsToPx, tileSize });
        const occlusionRects = Array.isArray(occlusionLookup?.rects) ? occlusionLookup.rects : [];
        stepRechargedFogVolumes(fogVolumes, {
          dt: fogStepDt,
          playerCenterX,
          playerFootY,
          playerVelocityX,
        });
        if (fogVisualState) {
          fogVisualState.lastStepAtMs = nowMs;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.beginPath();
        ctx.rect(hudGameplayViewport.x, hudGameplayViewport.y, hudGameplayViewport.w, hudGameplayViewport.h);
        ctx.clip();
        ctx.translate(hudGameplayViewport.x, hudGameplayViewport.y);

        const backdropGradient = ctx.createLinearGradient(0, 0, 0, worldRenderCanvas.height);
        backdropGradient.addColorStop(0, "#0b1220");
        backdropGradient.addColorStop(1, "#111b31");
        ctx.fillStyle = backdropGradient;
        ctx.fillRect(0, 0, worldRenderCanvas.width, worldRenderCanvas.height);

        const playfieldRect = mapper.worldToCanvasRect(0, 0, worldWidthPx, worldHeightPx);
        ctx.fillStyle = "rgba(15, 23, 42, 0.52)";
        ctx.fillRect(playfieldRect.x, playfieldRect.y, playfieldRect.w, playfieldRect.h);

        // Recharged canvas lane order: backdrop -> bg tilemap -> support tiles -> liquids -> decor -> entities -> player -> HUD.
        const bg = payload?.bg;
        const bgData = Array.isArray(bg?.data) ? bg.data : null;
        const hasDenseBgTilemap = bg?.type === "tilemap"
          && Array.isArray(bgData)
          && bgData.length === (worldWidthRaw * worldHeightRaw);
        const authoredBgPlacements = Array.isArray(bg?.placements)
          ? bg.placements
            .map((placement) => {
              const x = Number.isFinite(placement?.x) ? Math.round(placement.x) : null;
              const y = Number.isFinite(placement?.y) ? Math.round(placement.y) : null;
              const size = Number.isFinite(placement?.size) ? Math.max(1, Math.round(placement.size)) : 1;
              const materialId = typeof placement?.materialId === "string" ? placement.materialId : null;
              if (!Number.isInteger(x) || !Number.isInteger(y) || !materialId) {
                return null;
              }
              return { x, y, size, materialId };
            })
            .filter(Boolean)
          : [];
        if (state.rechargedBgPlacementSummaryLogged !== true) {
          console.info("[Lumo Recharged] bg.placements", { has: authoredBgPlacements.length > 0, count: authoredBgPlacements.length });
          state.rechargedBgPlacementSummaryLogged = true;
        }

        if (hasDenseBgTilemap || authoredBgPlacements.length > 0) {
          const bgVisualState = ensureRechargedBgVisualState(state);
          if (bgVisualState) {
            const fallbackNeutralColor = "#64748b";
            const handledBgCells = new Uint8Array(worldWidthRaw * worldHeightRaw);
            const drawBgMaterialRect = (materialId, leftX, topY, span) => {
              if (leftX < 0 || topY < 0 || span <= 0 || leftX + span > worldWidthRaw || topY + span > worldHeightRaw) {
                return;
              }
              const material = bgVisualState.catalogById.get(materialId) || null;
              const worldRectX = leftX * worldUnitsToPx;
              const worldRectY = topY * worldUnitsToPx;
              const worldRectW = span * worldUnitsToPx;
              const worldRectH = span * worldUnitsToPx;
              const drawRect = mapper.worldToCanvasRect(worldRectX, worldRectY, worldRectW, worldRectH);
              const imageSrc = typeof material?.img === "string" ? material.img : null;
              let drewTileImage = false;
              if (imageSrc) {
                let img = bgVisualState.imageByKey.get(imageSrc);
                if (!img) {
                  img = new Image();
                  img.src = imageSrc;
                  img._ok = false;
                  img.onload = () => { img._ok = true; };
                  img.onerror = () => { img._ok = false; };
                  bgVisualState.imageByKey.set(imageSrc, img);
                }
                if (img._ok === true) {
                  ctx.drawImage(img, drawRect.x, drawRect.y, drawRect.w, drawRect.h);
                  drewTileImage = true;
                }
              }
              if (!drewTileImage) {
                const fallbackColor = typeof material?.fallbackColor === "string" && material.fallbackColor.length > 0
                  ? material.fallbackColor
                  : fallbackNeutralColor;
                ctx.fillStyle = fallbackColor;
                ctx.fillRect(drawRect.x, drawRect.y, drawRect.w, drawRect.h);
              }
            };
            const markBgCellsHandled = (leftX, topY, span) => {
              for (let dy = 0; dy < span; dy += 1) {
                const row = topY + dy;
                if (row < 0 || row >= worldHeightRaw) continue;
                for (let dx = 0; dx < span; dx += 1) {
                  const col = leftX + dx;
                  if (col < 0 || col >= worldWidthRaw) continue;
                  handledBgCells[(row * worldWidthRaw) + col] = 1;
                }
              }
            };

            // Author placements are source-of-truth for sized visuals; y remains bottom-anchored.
            for (const placement of authoredBgPlacements) {
              const topY = placement.y - (placement.size - 1);
              drawBgMaterialRect(placement.materialId, placement.x, topY, placement.size);
              markBgCellsHandled(placement.x, topY, placement.size);
            }

            // Fallback draw for dense 1x1 cells not covered by authored placements.
            if (hasDenseBgTilemap) {
              for (let tileY = 0; tileY < worldHeightRaw; tileY += 1) {
                for (let tileX = 0; tileX < worldWidthRaw; tileX += 1) {
                  const index = tileY * worldWidthRaw + tileX;
                  if (handledBgCells[index] === 1) continue;
                  const materialId = typeof bgData[index] === "string" ? bgData[index] : null;
                  if (!materialId) continue;
                  drawBgMaterialRect(materialId, tileX, tileY, 1);
                }
              }
            }
          }
        }

        // Draw support tiles with V1 tile assets/placement rules first.
        for (const supportTile of supportTiles) {
          const tileX = Number.isFinite(supportTile?.x) ? supportTile.x : null;
          const tileY = Number.isFinite(supportTile?.y) ? supportTile.y : null;
          const tileW = Number.isFinite(supportTile?.w) ? supportTile.w : null;
          const tileH = Number.isFinite(supportTile?.h) ? supportTile.h : null;
          if (tileX === null || tileY === null || tileW === null || tileH === null || tileW <= 0 || tileH <= 0) {
            continue;
          }

          const worldRectX = tileX * worldUnitsToPx;
          const worldRectY = tileY * worldUnitsToPx;
          const worldRectW = tileW * worldUnitsToPx;
          const worldRectH = tileH * worldUnitsToPx;
          const supportCanvasRect = mapper.worldToCanvasRect(worldRectX, worldRectY, worldRectW, worldRectH);
          const drewV1Visual = drawRechargedTileV1Visual(ctx, mapper, state, supportTile, worldUnitsToPx, tileSize);
          if (drewV1Visual) {
            continue;
          }

          // V1 fallback: plain tile fill from legacy tile behavior color when no image is available yet.
          const fallbackTileDef = (window?.Lumo?.Tileset && Number.isFinite(supportTile?.tileId))
            ? window.Lumo.Tileset[supportTile.tileId | 0]
            : null;
          ctx.fillStyle = fallbackTileDef?.color || "#2b3646";
          ctx.fillRect(supportCanvasRect.x, supportCanvasRect.y, supportCanvasRect.w, supportCanvasRect.h);
          ctx.fillStyle = "rgba(255,255,255,0.03)";
          ctx.fillRect(supportCanvasRect.x, supportCanvasRect.y, supportCanvasRect.w, Math.min(1, supportCanvasRect.h));
        }

        drawRechargedLiquidVolumes(ctx, mapper, liquidVolumes);
        if (state && state.rechargedLiquidSummaryLogged !== true) {
          const byType = liquidVolumes.reduce((acc, liquid) => {
            const key = typeof liquid?.type === "string" ? liquid.type : "unknown";
            acc[key] = (acc[key] || 0) + 1;
            return acc;
          }, {});
          console.info("[Lumo Recharged] liquid volumes", { count: liquidVolumes.length, byType });
          state.rechargedLiquidSummaryLogged = true;
        }

        // Render lanes are explicit: tiles -> decor(world) -> entities -> player -> HUD.
        // Background decor lane is parsed for future support but intentionally not drawn yet.
        const decorWorldLane = [];
        for (const decor of decorSnapshots) {
          if (decor?.anchorLayer === "background") {
            continue;
          }
          decorWorldLane.push(decor);
        }

        // Decor stays above tiles and below gameplay actors to avoid blocking entities/player.
        for (const decor of decorWorldLane) {
          drawRechargedDecorVisual(ctx, mapper, state, decor, worldUnitsToPx, tileSize, worldWidthRaw, worldHeightRaw);
        }

        const liquidEntityTypes = new Set(["water_volume", "lava_volume", "bubbling_liquid_volume"]);
        const hoverEyesAfterDarkness = [];
        const movingPlatformDebugNow = [];
        state._rechargedFrameFireflyGlowCount = 0;
        for (const entity of entitySnapshots) {
          if (entity?.active !== true) {
            continue;
          }
          if (liquidEntityTypes.has(entity?.type)) {
            continue;
          }
          const normalizedEntityType = typeof entity?.type === "string" ? entity.type.trim().toLowerCase() : "";
          // Fog uses a dedicated over-darkness pass, so this lane must never hit generic fallback.
          if (normalizedEntityType === "fog_volume") {
            continue;
          }
          // Spawn/start markers define player placement only and should never render as world visuals.
          if (normalizedEntityType === "player-spawn" || normalizedEntityType === "start_01" || normalizedEntityType === "start") {
            continue;
          }
          if (normalizedEntityType === "movingplatform" || normalizedEntityType === "moving_platform") {
            const platformParams = entity?.params && typeof entity.params === "object" ? entity.params : {};
            const widthTiles = Number.isFinite(platformParams.widthTiles) && platformParams.widthTiles > 0
              ? Math.max(1, Math.round(platformParams.widthTiles))
              : 4;
            const heightTiles = Number.isFinite(platformParams.heightTiles) && platformParams.heightTiles > 0
              ? Math.max(1, Math.round(platformParams.heightTiles))
              : 1;
            const spriteTileId = typeof platformParams.spriteTileId === "string" && platformParams.spriteTileId.trim().length > 0
              ? platformParams.spriteTileId.trim()
              : null;
            const movingPlatformLooksTileBased = Number.isFinite(entity?.x)
              && Number.isFinite(entity?.y)
              && entity.x <= worldWidthRaw + tileSize
              && entity.y <= worldHeightRaw + tileSize;
            const movingPlatformWorldX = movingPlatformLooksTileBased ? (entity.x * worldUnitsToPx) : entity.x;
            const movingPlatformWorldY = movingPlatformLooksTileBased ? (entity.y * worldUnitsToPx) : entity.y;
            const movingPlatformWidthPx = Math.max(1, widthTiles * tileSize);
            const movingPlatformHeightPx = Math.max(1, heightTiles * tileSize);
            // movingPlatform reuses Recharged tile visual catalog, but draws from runtime pixel/world rect without tile-grid reconversion.
            const movingPlatformVisualResult = drawMovingPlatformVisual(
              ctx,
              mapper,
              state,
              {
                worldX: movingPlatformWorldX,
                worldY: movingPlatformWorldY,
                widthPx: movingPlatformWidthPx,
                heightPx: movingPlatformHeightPx,
                tileSize,
                spriteTileId,
              },
            );
            const renderedMovingPlatformVisual = movingPlatformVisualResult?.drewVisual === true;
            const renderedMovingPlatformFallback = movingPlatformVisualResult?.drewFallback === true;
            movingPlatformDebugNow.push({
              id: entity?.id || null,
              x: movingPlatformWorldX,
              y: movingPlatformWorldY,
              prevX: Number.isFinite(entity?.prevX) ? entity.prevX : movingPlatformWorldX,
              prevY: Number.isFinite(entity?.prevY) ? entity.prevY : movingPlatformWorldY,
              dx: Number.isFinite(entity?.dx) ? entity.dx : 0,
              dy: Number.isFinite(entity?.dy) ? entity.dy : 0,
              origin: {
                x: Number.isFinite(entity?.originX) ? entity.originX : movingPlatformWorldX,
                y: Number.isFinite(entity?.originY) ? entity.originY : movingPlatformWorldY,
              },
              end: {
                x: Number.isFinite(entity?.endX) ? entity.endX : movingPlatformWorldX,
                y: Number.isFinite(entity?.endY) ? entity.endY : movingPlatformWorldY,
              },
              loop: typeof entity?.loop === "string" ? entity.loop : (typeof platformParams?.loop === "string" ? platformParams.loop : "pingpong"),
              speed: Number.isFinite(entity?.speed) ? entity.speed : (Number.isFinite(platformParams?.speed) ? platformParams.speed : 70),
              playerOnPlatform: entity?.playerOnPlatform === true || (typeof player?.onPlatformId === "string" && player.onPlatformId === entity?.id),
              carriedThisFrame: entity?.carriedThisFrame === true,
              coordinateMode: movingPlatformLooksTileBased ? "tile" : "pixel",
              spriteTileId,
              drewVisual: renderedMovingPlatformVisual === true,
              drewFallback: renderedMovingPlatformFallback,
              visualMode: renderedMovingPlatformVisual ? "sprite" : (renderedMovingPlatformFallback ? "fallback" : "none"),
              worldRect: movingPlatformVisualResult?.worldRect || null,
              canvasRect: movingPlatformVisualResult?.canvasRect || null,
              visualRect: movingPlatformVisualResult?.visualRect || null,
              roundedDraw: movingPlatformVisualResult?.canvasRect
                ? { x: movingPlatformVisualResult.canvasRect.x, y: movingPlatformVisualResult.canvasRect.y }
                : null,
            });
            if (renderedMovingPlatformVisual || renderedMovingPlatformFallback) {
              continue;
            }
          }
          const entityDrawW = Number.isFinite(entity.w) && entity.w > 0 ? entity.w : entity.size;
          const entityDrawH = Number.isFinite(entity.h) && entity.h > 0 ? entity.h : entity.size;
          const entityRect = mapper.worldToCanvasRect(
            entity.x,
            entity.y,
            entityDrawW,
            entityDrawH,
          );
          const flareExposure = Math.max(0, Math.min(1, entity.flareExposure || 0));
          if (entity.illuminated === true) {
            const glowRadius = Math.max(entityRect.w, entityRect.h) * (1.2 + flareExposure);
            const glow = ctx.createRadialGradient(
              entityRect.x + entityRect.w * 0.5,
              entityRect.y + entityRect.h * 0.5,
              1,
              entityRect.x + entityRect.w * 0.5,
              entityRect.y + entityRect.h * 0.5,
              glowRadius,
            );
            glow.addColorStop(0, entity.consumesFlare ? "rgba(251, 146, 60, 0.30)" : "rgba(56, 189, 248, 0.32)");
            glow.addColorStop(1, "rgba(56, 189, 248, 0)");
            ctx.fillStyle = glow;
            ctx.fillRect(
              entityRect.x - glowRadius,
              entityRect.y - glowRadius,
              entityRect.w + glowRadius * 2,
              entityRect.h + glowRadius * 2,
            );
          }

          const entityVisualState = ensureRechargedEntityVisualState(state);
          let renderedKnownEntityVisual = false;
          if (entityVisualState) {
            if (entity.type === "powercell_01") {
              // Match V1: power cell uses one 24x24 pickup sprite anchored to entity rect.
              const variants = Array.isArray(entityVisualState.powerCells) ? entityVisualState.powerCells : [];
              const idKey = typeof entity.id === "string" ? entity.id : "";
              let variantIndex = 0;
              for (let index = 0; index < idKey.length; index += 1) {
                variantIndex = (variantIndex + idKey.charCodeAt(index)) % Math.max(1, variants.length);
              }
              const sprite = variants[variantIndex] || variants[0] || null;
              if (sprite && sprite.complete) {
                ctx.drawImage(sprite, entityRect.x, entityRect.y, entityRect.w, entityRect.h);
                renderedKnownEntityVisual = true;
              }
            } else if (entity.type === "flare_pickup_01") {
              // Render flare pickup at true 1x1 footprint, centered on the entity anchor.
              const sprite = entityVisualState.flarePickup;
              if (sprite && sprite.complete) {
                const baseSize = Math.min(entityRect.w, entityRect.h);
                const drawSize = Math.min(24, Math.max(1, baseSize));
                const drawX = entityRect.x + (entityRect.w * 0.5) - (drawSize * 0.5);
                const drawY = entityRect.y + (entityRect.h * 0.5) - (drawSize * 0.5);
                ctx.drawImage(sprite, drawX, drawY, drawSize, drawSize);
                renderedKnownEntityVisual = true;
              }
            } else if (entity.type === "checkpoint_01" || entity.type === "checkpoint") {
              const sprite = getRechargedCheckpointSprite(entityVisualState, entity);
              if (sprite) {
                ctx.drawImage(sprite, entityRect.x, entityRect.y, 24, 24);
                renderedKnownEntityVisual = true;
              }
            } else if (entity.type === "exit_01" || entity.type === "exit" || entity.type === "player-exit") {
              if (entity.active === true) {
                // V1 parity: exit is a simple blue outline marker.
                ctx.strokeStyle = "rgba(120,180,255,0.95)";
                ctx.lineWidth = 2;
                ctx.strokeRect(
                  entityRect.x + 2,
                  entityRect.y + 2,
                  Math.max(1, entityRect.w - 4),
                  Math.max(1, entityRect.h - 4),
                );
              }
              renderedKnownEntityVisual = true;
            } else if (entity.type === "lantern_01") {
              // Match V1 lantern glow + BL-anchored sprite so feet anchoring stays consistent.
              const centerX = entityRect.x + entityRect.w * 0.5;
              const centerY = entityRect.y + entityRect.h * 0.5;
              const glowRadius = Math.max(entityRect.w, entityRect.h) * 2.1;
              const glow = ctx.createRadialGradient(centerX, centerY, 6, centerX, centerY, glowRadius);
              glow.addColorStop(0, "rgba(255,220,140,0.55)");
              glow.addColorStop(0.45, "rgba(255,200,110,0.22)");
              glow.addColorStop(1, "rgba(255,200,110,0)");
              ctx.fillStyle = glow;
              ctx.beginPath();
              ctx.arc(centerX, centerY, glowRadius, 0, Math.PI * 2);
              ctx.fill();

              const sprite = entityVisualState.lantern;
              if (sprite && sprite.complete) {
                const drawW = Math.max(1, Math.round(entityRect.w));
                const drawH = Math.max(1, Math.round(entityRect.h * (32 / 24)));
                const drawX = centerX - drawW * 0.5;
                const drawY = (entityRect.y + entityRect.h) - drawH;
                ctx.drawImage(sprite, drawX, drawY, drawW, drawH);
                renderedKnownEntityVisual = true;
              }
            } else if (entity.type === "dark_creature_01") {
              // V1-like dark creature: bottom-aligned 2-frame idle loop.
              const frames = Array.isArray(entityVisualState.darkCreatureIdle) ? entityVisualState.darkCreatureIdle : [];
              const frameStepMs = 400;
              const frameIndex = Math.floor((performance.now() % (frameStepMs * 2)) / frameStepMs);
              const sprite = frames[frameIndex] || frames[0] || null;
              if (sprite && sprite.complete) {
                const drawW = entityRect.w;
                const drawH = entityRect.h;
                const drawX = entityRect.x + (entityRect.w - drawW) * 0.5;
                const drawY = entityRect.y + entityRect.h - drawH;
                ctx.drawImage(sprite, drawX, drawY, drawW, drawH);
                renderedKnownEntityVisual = true;
              }
            } else if (entity.type === "hover_void_01") {
              // V1-like hover void fallback body: soft orb with center core.
              const centerX = entityRect.x + entityRect.w * 0.5;
              const centerY = entityRect.y + entityRect.h * 0.5;
              const radius = Math.max(entityRect.w, entityRect.h) * 0.55;
              const outer = ctx.createRadialGradient(centerX, centerY, radius * 0.2, centerX, centerY, radius * 1.35);
              outer.addColorStop(0, "rgba(104, 58, 170, 0.58)");
              outer.addColorStop(0.55, "rgba(60, 30, 98, 0.78)");
              outer.addColorStop(1, "rgba(16, 8, 34, 0)");
              ctx.fillStyle = outer;
              ctx.beginPath();
              ctx.arc(centerX, centerY, radius * 1.35, 0, Math.PI * 2);
              ctx.fill();
              const core = ctx.createRadialGradient(centerX - radius * 0.25, centerY - radius * 0.25, radius * 0.12, centerX, centerY, radius);
              core.addColorStop(0, "rgba(180, 130, 255, 0.56)");
              core.addColorStop(0.42, "rgba(94, 52, 154, 0.86)");
              core.addColorStop(1, "rgba(28, 14, 56, 0.95)");
              ctx.fillStyle = core;
              ctx.beginPath();
              ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
              ctx.fill();
              if (isHoverEyeRenderableFromRuntime(entity, mapper)) {
                hoverEyesAfterDarkness.push({ x: centerX, y: centerY, entity });
              }
              renderedKnownEntityVisual = true;
            } else if (entity.type === "darkSpellProjectile" || entity.type === "dark_spell_projectile") {
              // Match V1 dark spell contract: custom sprite-path first, then legacy flight fallback.
              const centerX = entityRect.x + entityRect.w * 0.5;
              const centerY = entityRect.y + entityRect.h * 0.5;
              const drawSize = Math.max(entityRect.w, entityRect.h) * 1.8;
              const projectileSpritePath = typeof entity._projectileSpritePath === "string" && entity._projectileSpritePath.length > 0
                ? entity._projectileSpritePath
                : (typeof entity.projectileSpritePath === "string" ? entity.projectileSpritePath : "");
              const customProjectileSprite = getRechargedDarkSpellCustomSprite(entityVisualState, projectileSpritePath);
              const legacyFlightSprite = entityVisualState.darkSpell?.flight;
              const projectileSprite = customProjectileSprite || (legacyFlightSprite && legacyFlightSprite.complete ? legacyFlightSprite : null);
              ctx.save();
              ctx.translate(centerX, centerY);
              ctx.rotate(Number.isFinite(entity.rot) ? entity.rot : 0);
              if (projectileSprite) {
                ctx.drawImage(projectileSprite, -drawSize * 0.5, -drawSize * 0.5, drawSize, drawSize);
              } else {
                const glow = ctx.createRadialGradient(0, 0, drawSize * 0.05, 0, 0, drawSize * 0.7);
                glow.addColorStop(0, "rgba(214, 186, 255, 0.95)");
                glow.addColorStop(0.5, "rgba(168, 120, 255, 0.86)");
                glow.addColorStop(1, "rgba(115, 72, 205, 0.15)");
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(0, 0, drawSize * 0.6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "rgba(160,120,255,0.92)";
                ctx.fillRect(-drawSize * 0.32, -drawSize * 0.32, drawSize * 0.64, drawSize * 0.64);
              }
              ctx.restore();
              renderedKnownEntityVisual = true;
            } else if (entity.type === "darkSpellHazard" || entity.type === "dark_spell_hazard") {
              // Match V1 dark spell contract: custom sprite-path first, then impact03/02/01 sequence fallback.
              const projectileSpritePath = typeof entity._projectileSpritePath === "string" && entity._projectileSpritePath.length > 0
                ? entity._projectileSpritePath
                : (typeof entity.projectileSpritePath === "string" ? entity.projectileSpritePath : "");
              const customHazardSprite = getRechargedDarkSpellCustomSprite(entityVisualState, projectileSpritePath);
              const darkSpellSprites = entityVisualState.darkSpell || {};
              const hazardT = Number.isFinite(entity.t) ? entity.t : 0;
              let hazardSprite = darkSpellSprites.impact01;
              if (hazardT < 0.15) hazardSprite = darkSpellSprites.impact03;
              else if (hazardT < 0.3) hazardSprite = darkSpellSprites.impact02;
              ctx.save();
              ctx.globalAlpha = Math.max(0, Math.min(1, Number.isFinite(entity.alpha) ? entity.alpha : 1));
              if (customHazardSprite) {
                ctx.drawImage(customHazardSprite, entityRect.x, entityRect.y, entityRect.w, entityRect.h);
              } else if (hazardSprite && hazardSprite.complete) {
                ctx.drawImage(hazardSprite, entityRect.x, entityRect.y, entityRect.w, entityRect.h);
              } else {
                const centerX = entityRect.x + entityRect.w * 0.5;
                const centerY = entityRect.y + entityRect.h * 0.5;
                const radius = Math.max(entityRect.w, entityRect.h) * 0.48;
                const ring = ctx.createRadialGradient(centerX, centerY, radius * 0.2, centerX, centerY, radius);
                ring.addColorStop(0, "rgba(210,180,255,0.65)");
                ring.addColorStop(0.6, "rgba(145,110,210,0.85)");
                ring.addColorStop(1, "rgba(145,110,210,0.12)");
                ctx.fillStyle = ring;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.fill();
              }
              ctx.restore();
              renderedKnownEntityVisual = true;
            } else if (entity.type === "firefly_01") {
              // V1-like firefly: sprite facing + runtime tail + rump halo while lit.
              const variants = Array.isArray(entityVisualState.fireflies) ? entityVisualState.fireflies : [];
              const idKey = typeof entity.id === "string" ? entity.id : "";
              let variantIndex = 0;
              for (let index = 0; index < idKey.length; index += 1) {
                variantIndex = (variantIndex + idKey.charCodeAt(index)) % Math.max(1, variants.length);
              }
              const sprite = variants[variantIndex] || variants[0] || null;
              const kGlow = Number.isFinite(entity?.lightK) ? Math.max(0, Math.min(1, entity.lightK)) : 0;
              const tail = Array.isArray(entity?._tail) ? entity._tail : [];
              for (let tailIndex = 0; tailIndex < tail.length; tailIndex += 1) {
                const point = tail[tailIndex];
                const age = Number.isFinite(point?.t) ? point.t : 0;
                const alpha = Math.max(0, 1 - (age / 0.35));
                if (alpha <= 0) continue;
                const tailRect = mapper.worldToCanvasRect(
                  Number.isFinite(point?.x) ? point.x : entity.x,
                  Number.isFinite(point?.y) ? point.y : entity.y,
                  1,
                  1,
                );
                const px = tailRect.x;
                const py = tailRect.y;
                if (tailIndex === tail.length - 1) {
                  ctx.fillStyle = `rgba(255,230,120,${(0.85 * alpha).toFixed(3)})`;
                  ctx.beginPath();
                  ctx.arc(px, py, 2, 0, Math.PI * 2);
                  ctx.fill();
                } else {
                  ctx.fillStyle = `rgba(255,255,255,${(0.45 * alpha).toFixed(3)})`;
                  ctx.beginPath();
                  ctx.arc(px, py, 1.2, 0, Math.PI * 2);
                  ctx.fill();
                }
              }
              if (kGlow > 0.01) {
                const dir = Number.isFinite(entity?.dir) && entity.dir < 0 ? -1 : 1;
                const rumpX = dir === 1 ? (entityRect.x + 2) : (entityRect.x + entityRect.w - 2);
                const rumpY = entityRect.y + entityRect.h * 0.92;
                const tailTip = tail.length > 0 ? tail[tail.length - 1] : null;
                const tailTipRect = tailTip
                  ? mapper.worldToCanvasRect(
                    Number.isFinite(tailTip?.x) ? tailTip.x : entity.x,
                    Number.isFinite(tailTip?.y) ? tailTip.y : entity.y,
                    1,
                    1,
                  )
                  : null;
                const centerX = tailTipRect ? tailTipRect.x : rumpX;
                const centerY = tailTipRect ? tailTipRect.y : rumpY;
                const glowRadius = Math.max(entityRect.w, entityRect.h) * (0.56 + (0.09 * easeOutQuad01(kGlow)));
                const glowAlphaK = easeOutQuad01(kGlow);
                const glow = ctx.createRadialGradient(centerX, centerY, 1, centerX, centerY, glowRadius);
                glow.addColorStop(0, `rgba(255, 220, 140, ${(0.52 * glowAlphaK).toFixed(3)})`);
                glow.addColorStop(0.45, `rgba(255, 195, 95, ${(0.26 * glowAlphaK).toFixed(3)})`);
                glow.addColorStop(1, "rgba(255, 195, 95, 0)");
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(centerX, centerY, glowRadius, 0, Math.PI * 2);
                ctx.fill();

                const rumpOuter = 14;
                const rumpGrad = ctx.createRadialGradient(rumpX, rumpY, 2.5, rumpX, rumpY, rumpOuter);
                rumpGrad.addColorStop(0, `rgba(255,220,140,${(0.85 * glowAlphaK).toFixed(3)})`);
                rumpGrad.addColorStop(0.35, `rgba(255,195,95,${(0.55 * glowAlphaK).toFixed(3)})`);
                rumpGrad.addColorStop(1, "rgba(255,195,95,0)");
                ctx.save();
                ctx.globalCompositeOperation = "lighter";
                ctx.fillStyle = rumpGrad;
                ctx.beginPath();
                ctx.arc(rumpX, rumpY, rumpOuter, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                window.__LUMO_FIREFLY_DEBUG__ = {
                  glowX: centerX,
                  glowY: centerY,
                  visualGlowRadius: glowRadius,
                };
                state._rechargedFrameFireflyGlowCount = (state._rechargedFrameFireflyGlowCount | 0) + 1;
              }
              if (sprite && sprite.complete) {
                // Render at true 1x1 footprint, centered on anchor, with hard 16x16 cap.
                const baseSize = Math.min(entityRect.w, entityRect.h);
                const drawSize = Math.min(16, Math.max(1, baseSize));
                const drawX = entityRect.x + (entityRect.w * 0.5) - (drawSize * 0.5);
                const drawY = entityRect.y + (entityRect.h * 0.5) - (drawSize * 0.5);
                const dir = Number.isFinite(entity?.dir) && entity.dir < 0 ? -1 : 1;
                if (dir < 0) {
                  ctx.save();
                  ctx.translate(drawX + drawSize, drawY);
                  ctx.scale(-1, 1);
                  ctx.drawImage(sprite, 0, 0, drawSize, drawSize);
                  ctx.restore();
                } else {
                  ctx.drawImage(sprite, drawX, drawY, drawSize, drawSize);
                }
                renderedKnownEntityVisual = true;
              }
            }
          }
          if (renderedKnownEntityVisual) {
            continue;
          }

          const hitAlpha = entity.hitFlashTicks > 0 ? 0.9 : 0.45;
          ctx.fillStyle = entity.hitFlashTicks > 0 ? `rgba(250, 204, 21, ${hitAlpha})` : "rgba(239, 68, 68, 0.72)";
          ctx.fillRect(entityRect.x, entityRect.y, entityRect.w, entityRect.h);
          ctx.fillStyle = entity.type === "dark_creature_01" ? "rgba(15, 23, 42, 0.8)" : "rgba(30, 41, 59, 0.8)";
          ctx.fillRect(
            entityRect.x + 2,
            entityRect.y + 2,
            Math.max(1, entityRect.w - 4),
            Math.max(1, entityRect.h - 4),
          );
        }
        window.__LUMO_RECHARGED_MOVING_PLATFORM_DEBUG__ = {
          count: movingPlatformDebugNow.length,
          playerOnPlatformId: typeof player?.onPlatformId === "string" ? player.onPlatformId : null,
          platforms: movingPlatformDebugNow,
        };

        // V1 layering parity: rear fog may be before Lumo when render.lumoBehindFog is false.
        drawRechargedFogOverDarkness(ctx, mapper, fogVolumes, {
          pass: "rear-before-player",
          playerCenterX,
          playerFacingSign: Number.isFinite(player?.vx) && player.vx < 0 ? -1 : 1,
        });

        // Visual-only local emissive glow around Lumo; does not participate in darkness/gameplay light math.
        if (player.hidden !== true && Number.isFinite(playerCenterX) && Number.isFinite(playerFootY)) {
          const playerAnchorRect = mapper.worldToCanvasRect(
            playerCenterX - 0.5,
            playerFootY - 0.5,
            1,
            1,
          );
          const cx = playerAnchorRect.x + playerAnchorRect.w * 0.5;
          const cy = playerAnchorRect.y + playerAnchorRect.h * 0.5;
          const r = 100;
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          g.addColorStop(0.0, "rgba(200,255,140,0.18)");
          g.addColorStop(0.6, "rgba(200,255,140,0.08)");
          g.addColorStop(1.0, "rgba(200,255,140,0.00)");
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        const rechargedDecorTime = (typeof performance !== "undefined" && typeof performance.now === "function") ? performance.now() : Date.now();

        renderReactiveGrass(
          ctx,
          playerCenterX,
          playerFootY,
          rechargedDecorTime,
          {
            mapper,
            patches: reactiveGrassPatches,
          },
        );

        renderReactiveBloomPlants(
          ctx,
          playerCenterX,
          playerFootY,
          rechargedDecorTime,
          { mapper, patches: reactiveBloomPatches },
        );

        const reactiveCrystalWakeSources = [];
        if (Array.isArray(entitySnapshots)) {
          for (const entity of entitySnapshots) {
            if (!entity || (entity.kind !== "lantern" && entity.kind !== "firefly")) continue;
            if (Number.isFinite(entity.x) && Number.isFinite(entity.y)) {
              reactiveCrystalWakeSources.push({ x: entity.x, y: entity.y });
            }
          }
        }
        if (Array.isArray(flareSnapshots)) {
          for (const flare of flareSnapshots) {
            if (Number.isFinite(flare?.x) && Number.isFinite(flare?.y)) reactiveCrystalWakeSources.push({ x: flare.x, y: flare.y });
          }
        }

        renderReactiveCrystals(
          ctx,
          playerCenterX,
          playerFootY,
          rechargedDecorTime,
          { mapper, clusters: reactiveCrystalPatches, wakeSources: reactiveCrystalWakeSources },
        );

        // Player is drawn after entities so Lumo visibility is never lost behind actor fills.
        if (player.hidden !== true) {
          drawRechargedPlayerSprite(ctx, mapper, state, playerCenterX, playerFootY, tileSize, boostSnapshot, currentSnapshot);
        }

        // V1 layering parity: rear fog for render.lumoBehindFog=true + front veil always after Lumo.
        drawRechargedFogOverDarkness(ctx, mapper, fogVolumes, {
          pass: "rear-after-player",
          playerCenterX,
          playerFacingSign: Number.isFinite(player?.vx) && player.vx < 0 ? -1 : 1,
        });
        drawRechargedFogOverDarkness(ctx, mapper, fogVolumes, {
          pass: "front-after-player",
          playerCenterX,
          playerFacingSign: Number.isFinite(player?.vx) && player.vx < 0 ? -1 : 1,
        });

        const darknessLights = buildRechargedDarknessLights({
          player,
          playerCenterX,
          playerFootY,
          currentSnapshot,
          entitySnapshots,
          flareSnapshots,
          mapper,
          coordinatesLookTileBased,
          worldUnitsToPx,
          worldWidthRaw,
          worldHeightRaw,
          tileSize,
        });
        drawRechargedDarkness(ctx, canvas, state, darknessLights, {
          mapper,
          occlusionLookup,
          occlusionOptions: RECHARGED_OCCLUSION_DEFAULTS,
          frame: Number.isFinite(payload?.tick) ? payload.tick : null,
          nowMs,
        });
        const playerLight = darknessLights.find((light) => light?.kind === "player");
        const playerEnergy = Number.isFinite(playerLight?.energy)
          ? playerLight.energy
          : (Number.isFinite(currentSnapshot?.energy) ? currentSnapshot.energy : 1);
        const playerLightRadius = Number.isFinite(currentSnapshot?.lightRadius)
          ? currentSnapshot.lightRadius
          : deriveRechargedPlayerLightRadiusPx(playerEnergy);
        const playerRenderLightRadius = Number.isFinite(currentSnapshot?.renderLightRadius)
          ? currentSnapshot.renderLightRadius
          : (Number.isFinite(playerLight?.radius) ? playerLight.radius : playerLightRadius);
        window.__LUMO_RECHARGED_PLAYER_LIGHT_DEBUG__ = {
          energy: playerEnergy,
          lightRadius: playerLightRadius,
          renderLightRadius: playerRenderLightRadius,
          source: livePlayer.source,
          frame: Number.isFinite(payload?.tick) ? payload.tick : null,
        };
        if (state.rechargedDarknessSummaryLogged !== true) {
          const kinds = {};
          for (const light of darknessLights) {
            const kind = typeof light?.kind === "string" ? light.kind : "unknown";
            kinds[kind] = (kinds[kind] || 0) + 1;
          }
          console.info("[Lumo Recharged] darkness", {
            enabled: true,
            lightCount: darknessLights.length,
            kinds,
            playerOcclusion: true,
            rays: RECHARGED_OCCLUSION_DEFAULTS.rays,
            stepPx: RECHARGED_OCCLUSION_DEFAULTS.stepPx,
            occlusionRectCount: occlusionRects.length,
            gridCellCount: Number.isFinite(occlusionLookup?.gridCellCount) ? occlusionLookup.gridCellCount : 0,
          });
          console.info("[Lumo Recharged] player light parity", {
            energy: playerEnergy,
            lightRadius: playerLightRadius,
            renderLightRadius: playerRenderLightRadius,
            min: 80,
            max: 320,
          });
          state.rechargedDarknessSummaryLogged = true;
        }

        // V1 parity: eyes are a dedicated post-darkness style pass (kept procedural and never sprite-based).
        for (const eyeDraw of hoverEyesAfterDarkness) {
          drawHoverVoidEyesV1(ctx, eyeDraw.x, eyeDraw.y, eyeDraw.entity, 1);
        }

        if (
          player.hidden !== true &&
          pulseSnapshot?.active === true &&
          Number.isFinite(playerCenterX) &&
          Number.isFinite(playerFootY)
        ) {
          const pulseCenterX = Number.isFinite(pulseSnapshot.x) ? pulseSnapshot.x : playerCenterX;
          const pulseCenterY = Number.isFinite(pulseSnapshot.y) ? pulseSnapshot.y : playerFootY;
          const pulseWorldRadius = Math.max(0.5, pulseSnapshot.r);
          const pulseRect = mapper.worldToCanvasRect(
            pulseCenterX - pulseWorldRadius,
            pulseCenterY - pulseWorldRadius,
            pulseWorldRadius * 2,
            pulseWorldRadius * 2,
          );
          const centerX = pulseRect.x + pulseRect.w * 0.5;
          const centerY = pulseRect.y + pulseRect.h * 0.5;
          const canvasPulseRadius = Math.max(0.5, pulseRect.w * 0.5);
          const alpha = Math.max(0, Math.min(1, pulseSnapshot.alpha));
          const band = Math.max(20, 28);
          const inner = Math.max(0.5, canvasPulseRadius - band);
          const outer = Math.max(inner + 0.5, canvasPulseRadius);

          ctx.strokeStyle = `rgba(170,120,255,${alpha.toFixed(3)})`;
          ctx.lineWidth = Math.max(1, pulseSnapshot.thickness || 2);
          ctx.beginPath();
          ctx.arc(centerX, centerY, canvasPulseRadius, 0, Math.PI * 2);
          ctx.stroke();

          const ringGradient = ctx.createRadialGradient(centerX, centerY, inner, centerX, centerY, outer);
          ringGradient.addColorStop(0.00, "rgba(170,120,255,0.00)");
          ringGradient.addColorStop(1.00, `rgba(170,120,255,${(alpha * 0.10).toFixed(3)})`);
          ctx.strokeStyle = ringGradient;
          ctx.lineWidth = band;
          ctx.beginPath();
          ctx.arc(centerX, centerY, (inner + outer) * 0.5, 0, Math.PI * 2);
          ctx.stroke();
        }

        const entityVisualState = ensureRechargedEntityVisualState(state);
        const flareSprite = entityVisualState?.flareThrown || entityVisualState?.flarePickup || null;
        let visibleFlares = 0;
        for (const flare of flareSnapshots) {
          const flareLooksTileBased = coordinatesLookTileBased
            && Number.isFinite(flare.x)
            && Number.isFinite(flare.y)
            && flare.x <= worldWidthRaw + tileSize
            && flare.y <= worldHeightRaw + tileSize;
          const flareWorldX = flareLooksTileBased ? flare.x * worldUnitsToPx : flare.x;
          const flareWorldY = flareLooksTileBased ? flare.y * worldUnitsToPx : flare.y;
          const { visualGlowRadius: flareVisualGlowRadius, darknessRadius: flareDarknessRadius } = resolveRechargedFlareRadii(flare);
          const flareRect = mapper.worldToCanvasRect(
            flareWorldX - flareVisualGlowRadius,
            flareWorldY - flareVisualGlowRadius,
            flareVisualGlowRadius * 2,
            flareVisualGlowRadius * 2,
          );
          const centerX = flareRect.x + flareRect.w * 0.5;
          const centerY = flareRect.y + flareRect.h * 0.5;
          if (centerX >= 0 && centerX <= canvas.width && centerY >= 0 && centerY <= canvas.height) {
            visibleFlares += 1;
          }
          const flareAlpha = resolveRechargedFlareAlpha(flare);
          const flareGlowAlpha = easeOutQuad01(flareAlpha);
          const glowRadius = Math.max(1, flareRect.w * 0.5);
          const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowRadius);
          glowGradient.addColorStop(0, `rgba(110, 231, 183, ${(0.35 * flareGlowAlpha).toFixed(3)})`);
          glowGradient.addColorStop(1, "rgba(110, 231, 183, 0)");
          ctx.fillStyle = glowGradient;
          ctx.fillRect(centerX - glowRadius, centerY - glowRadius, glowRadius * 2, glowRadius * 2);

          const spriteFootprintRect = mapper.worldToCanvasRect(
            flareWorldX - (RECHARGED_FLARE_LIGHT_PICKUP_FOOTPRINT_PX * 0.5),
            flareWorldY - (RECHARGED_FLARE_LIGHT_PICKUP_FOOTPRINT_PX * 0.5),
            RECHARGED_FLARE_LIGHT_PICKUP_FOOTPRINT_PX,
            RECHARGED_FLARE_LIGHT_PICKUP_FOOTPRINT_PX,
          );
          const spriteDrawSize = Math.max(1, Math.min(spriteFootprintRect.w, spriteFootprintRect.h));
          const spriteDrawX = centerX - (spriteDrawSize * 0.5);
          const spriteDrawY = centerY - (spriteDrawSize * 0.5);
          ctx.save();
          ctx.globalAlpha = flareAlpha;
          if (flareSprite && flareSprite.complete) {
            const flareAngle = (Math.abs(flare.vx) + Math.abs(flare.vy)) > 0.5
              ? Math.atan2(flare.vy, flare.vx)
              : 0;
            ctx.translate(centerX, centerY);
            ctx.rotate(flareAngle);
            ctx.drawImage(flareSprite, -spriteDrawSize * 0.5, -spriteDrawSize * 0.5, spriteDrawSize, spriteDrawSize);
          } else {
            ctx.fillStyle = "#fde68a";
            ctx.fillRect(spriteDrawX, spriteDrawY, spriteDrawSize, spriteDrawSize);
            ctx.fillStyle = "#f97316";
            ctx.fillRect(spriteDrawX + 1, spriteDrawY + 1, Math.max(1, spriteDrawSize - 2), Math.max(1, spriteDrawSize - 2));
          }
          ctx.restore();
        }

        window.__LUMO_RECHARGED_FLARE_VISUAL_DEBUG__ = {
          count: flareSnapshots.length,
          spritePath: (flareSnapshots[0]?.spritePath || RECHARGED_ENTITY_SPRITE_FLARE_PICKUP),
          alpha: flareSnapshots[0]?.alpha ?? null,
          visualGlowRadius: flareSnapshots[0]?.visualGlowRadius ?? flareSnapshots[0]?.renderRadius ?? null,
          darknessRadius: flareSnapshots[0]?.darknessRadius ?? flareSnapshots[0]?.finalRadius ?? flareSnapshots[0]?.lightRadius ?? null,
          age: flareSnapshots[0]?.ageTicks ?? null,
          lifetime: flareSnapshots[0]?.lifetimeTicks ?? null,
          normalizedLife: flareSnapshots[0]?.normalizedLife ?? null,
        };
        window.__LUMO_RECHARGED_LIGHT_DEBUG__ = {
          player: {
            energy: playerEnergy,
            lightRadius: playerLightRadius,
            renderLightRadius: playerRenderLightRadius,
          },
          flares: {
            count: flareSnapshots.length,
            visibleCount: visibleFlares,
            firstAlpha: flareSnapshots[0] ? resolveRechargedFlareAlpha(flareSnapshots[0]) : null,
            firstVisualGlowRadius: flareSnapshots[0] ? resolveRechargedFlareRadii(flareSnapshots[0]).visualGlowRadius : null,
            firstDarknessRadius: flareSnapshots[0] ? resolveRechargedFlareRadii(flareSnapshots[0]).darknessRadius : null,
          },
          fireflies: {
            visualGlowCount: state._rechargedFrameFireflyGlowCount | 0,
          },
          frame: Number.isFinite(payload?.tick) ? payload.tick : null,
        };

        ctx.restore();

        drawRechargedHudReplica(canvas, state);

        let overlayDrawn = false;
        try {
          overlayDrawn = drawRechargedGameOverOverlay(canvas, ctx, payload, state);
          if (overlayDrawn !== true) {
            overlayDrawn = drawRechargedIntermissionOverlay(canvas, ctx, payload, state);
          }
          if (overlayDrawn !== true) {
            overlayDrawn = drawRechargedRespawnOverlay(canvas, ctx, payload, state);
          }
        } catch (_error) {
          overlayDrawn = false;
        }

        if (overlayDrawn !== true && statusText.length > 0) {
          const centerX = canvas.width * 0.5;
          const centerY = canvas.height * 0.36;
          const fontSize = Math.max(28, Math.round(canvas.height * 0.06));
          ctx.save();
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `700 ${fontSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
          ctx.fillStyle = "#ffffff";
          ctx.shadowColor = "rgba(0,0,0,0.82)";
          ctx.shadowBlur = Math.max(4, Math.round(fontSize * 0.2));
          ctx.shadowOffsetX = 0;
          ctx.shadowOffsetY = 2;
          ctx.fillText(statusText, centerX, centerY);
          ctx.restore();
        }

        if (state && typeof state === "object") {
          state.lastPlayerX = Number.isFinite(playerCenterX) ? playerCenterX : null;
          state.lastPlayerY = Number.isFinite(playerFootY) ? playerFootY : null;
          state.lastFlareCount = flareSnapshots.length;
          state.lastFlareVisibleCount = visibleFlares;
          state.lastPulseActive = pulseSnapshot?.active === true;
          state.lastBoostActive = boostSnapshot?.active === true;
          state.lastEntityCount = entitySnapshots.length;
          state.renderAlpha = alpha;
          state.lastRenderOk = true;
        }
        return true;
      } catch (_error) {
        if (state && typeof state === "object") {
          state.lastRenderOk = false;
        }
        return false;
      }
    }

    // Builds one safe intermission model from live payload + adapter snapshot values.
    function buildRechargedIntermissionModel(payload, state) {
      const hudSnapshot = buildRechargedHudSnapshot(payload, state);
      const isIntermission = (
        hudSnapshot?.gameState === "intermission"
        || hudSnapshot?.intermissionReadyForInput === true
        || hudSnapshot?.levelComplete === true
      );
      const toWhole = (value, fallback = 0) => Number.isFinite(value) ? Math.max(0, Math.floor(value)) : fallback;
      const energyRatio = Number.isFinite(hudSnapshot?.energy) ? Math.max(0, Math.min(1, hudSnapshot.energy)) : 0;
      return {
        active: isIntermission,
        title: "Level complete",
        score: toWhole(hudSnapshot?.score, 0),
        lives: toWhole(hudSnapshot?.lives, 0),
        flares: toWhole(hudSnapshot?.flareStash, 0),
        energy: Math.round(energyRatio * 100),
        prompt: "Press Enter to continue",
        acknowledgedMessage: typeof state?.intermissionAcknowledgedMessage === "string" ? state.intermissionAcknowledgedMessage : "",
      };
    }

    function drawRechargedIntermissionOverlay(canvas, ctx, payload, state) {
      const model = buildRechargedIntermissionModel(payload, state);
      if (model.active !== true) {
        return false;
      }

      const panelWidth = Math.max(300, Math.min(canvas.width * 0.72, 620));
      const panelHeight = Math.max(230, Math.min(canvas.height * 0.62, 390));
      const panelX = (canvas.width - panelWidth) * 0.5;
      const panelY = (canvas.height - panelHeight) * 0.5;
      const titleSize = Math.max(24, Math.round(canvas.height * 0.052));
      const valueSize = Math.max(18, Math.round(canvas.height * 0.032));
      const promptSize = Math.max(16, Math.round(canvas.height * 0.026));

      ctx.save();
      ctx.fillStyle = "rgba(2, 6, 23, 0.65)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(15, 23, 42, 0.88)";
      ctx.strokeStyle = "rgba(148, 163, 184, 0.55)";
      ctx.lineWidth = 2;
      ctx.fillRect(panelX, panelY, panelWidth, panelHeight);
      ctx.strokeRect(panelX + 1, panelY + 1, panelWidth - 2, panelHeight - 2);

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffffff";
      ctx.font = `700 ${titleSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      ctx.fillText(model.title, canvas.width * 0.5, panelY + titleSize * 1.3);

      ctx.textAlign = "left";
      ctx.font = `600 ${valueSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      const statsX = panelX + Math.max(24, panelWidth * 0.18);
      const statsY = panelY + Math.max(72, panelHeight * 0.34);
      const rowGap = Math.max(26, valueSize * 1.5);
      const rows = [
        `Score: ${model.score}`,
        `Lives: ${model.lives}`,
        `Flares: ${model.flares}`,
        `Energy: ${model.energy}%`,
      ];
      for (let index = 0; index < rows.length; index += 1) {
        ctx.fillText(rows[index], statsX, statsY + rowGap * index);
      }

      ctx.textAlign = "center";
      ctx.fillStyle = "#bfdbfe";
      ctx.font = `600 ${promptSize}px system-ui, -apple-system, Segoe UI, sans-serif`;
      ctx.fillText(model.prompt, canvas.width * 0.5, panelY + panelHeight - Math.max(32, promptSize * 1.8));

      if (model.acknowledgedMessage.length > 0) {
        ctx.fillStyle = "#fcd34d";
        ctx.font = `600 ${Math.max(14, promptSize - 1)}px system-ui, -apple-system, Segoe UI, sans-serif`;
        ctx.fillText(model.acknowledgedMessage, canvas.width * 0.5, panelY + panelHeight - Math.max(14, promptSize));
      }
      ctx.restore();
      return true;
    }

    function resolveAutoplayTickStatus(queryBootResult) {
      try {
        if (queryBootResult?.autoplay !== true) {
          return null;
        }

        if (!Array.isArray(queryBootResult?.warnings)) {
          return queryBootResult?.booted === true;
        }

        const hasAutoplayWarning = queryBootResult.warnings.some((warning) => (
          typeof warning === "string" && warning.includes("Autoplay tick burst did not complete cleanly.")
        ));

        return hasAutoplayWarning !== true && queryBootResult?.booted === true;
      } catch (_error) {
        return false;
      }
    }


    function syncRechargedCanvasDrawingBuffer(canvas, state) {
      if (!canvas || typeof canvas !== "object") {
        return;
      }

      const nextWidth = Math.max(1, Math.floor(canvas.clientWidth || canvas.offsetWidth || 0));
      const nextHeight = Math.max(1, Math.floor(canvas.clientHeight || canvas.offsetHeight || 0));

      if (canvas.width !== nextWidth) {
        canvas.width = nextWidth;
      }
      if (canvas.height !== nextHeight) {
        canvas.height = nextHeight;
      }

      if (state && typeof state === "object") {
        state.width = canvas.width;
        state.height = canvas.height;
      }
    }

    function installRechargedCanvasResizeSync(canvas, state) {
      if (!canvas || typeof canvas !== "object") {
        return;
      }

      const resizeHandler = () => {
        syncRechargedCanvasDrawingBuffer(canvas, state);
      };

      resizeHandler();
      try {
        window.addEventListener("resize", resizeHandler, { passive: true });
      } catch (_error) {
        // Resize sync is best-effort and must never throw.
      }
    }

    function drawRechargedPlayerSprite(ctx, mapper, state, playerCenterX, playerFootY, tileSize, boostSnapshot, playerSnapshot) {
      if (!ctx || !mapper || !state) {
        return;
      }

      const spriteCache = ensureRechargedPlayerSpriteCache(state);
      if (!spriteCache) {
        return;
      }

      const snapshotFacingX = Number.isFinite(playerSnapshot?.facingX) ? playerSnapshot.facingX : 0;
      const snapshotVelocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      if (Math.abs(snapshotFacingX) > 0) {
        state.playerFacing = snapshotFacingX < 0 ? -1 : 1;
      } else if (Math.abs(snapshotVelocityX) > RECHARGED_PLAYER_HORIZONTAL_SPEED_EPSILON) {
        state.playerFacing = snapshotVelocityX < 0 ? -1 : 1;
      } else if (!Number.isFinite(state.playerFacing) || state.playerFacing === 0) {
        state.playerFacing = 1;
      }
      state.previousRenderPlayerCenterX = playerCenterX;

      const animationState = resolveRechargedPlayerAnimationState(
        playerSnapshot,
        typeof state.playerAnimationState === "string" ? state.playerAnimationState : "idle",
      );
      state.playerAnimationState = animationState;

      const nowMs = typeof performance?.now === "function" ? performance.now() : Date.now();
      const activeSprite = animationState === "idle"
        ? resolveRechargedIdleSpriteFrame(state, spriteCache, animationState, nowMs)
        : (animationState === "run"
          ? resolveRechargedRunSpriteFrame(state, spriteCache, animationState, playerSnapshot, nowMs)
          : (spriteCache[animationState] || spriteCache.idle));
      const safeSprite = activeSprite?.complete === true
        ? activeSprite
        : (animationState === "run" ? spriteCache.run : spriteCache.idle);
      if (!safeSprite?.complete) {
        return;
      }

      // V1 parity: Recharged render follows V1 hitbox footprint (22x28),
      // then draws the visual sprite at V1 visual size (24x38) anchored to feet.
      const playerWorldRect = {
        x: playerCenterX - (RECHARGED_PLAYER_HITBOX_WIDTH * 0.5),
        y: playerFootY + 1 - RECHARGED_PLAYER_HITBOX_HEIGHT,
        w: RECHARGED_PLAYER_HITBOX_WIDTH,
        h: RECHARGED_PLAYER_HITBOX_HEIGHT,
      };
      const playerCanvasRect = mapper.worldToCanvasRect(playerWorldRect.x, playerWorldRect.y, playerWorldRect.w, playerWorldRect.h);
      const footY = playerCanvasRect.y + playerCanvasRect.h;
      const sourceWidth = Math.max(1, safeSprite.naturalWidth || safeSprite.width || 1);
      const sourceHeight = Math.max(1, safeSprite.naturalHeight || safeSprite.height || 1);
      let spriteHeight = Math.max(
        1,
        playerCanvasRect.h * (RECHARGED_PLAYER_SPRITE_HEIGHT / RECHARGED_PLAYER_HITBOX_HEIGHT),
      );
      let spriteWidth = Math.max(
        1,
        playerCanvasRect.w * (RECHARGED_PLAYER_SPRITE_WIDTH / RECHARGED_PLAYER_HITBOX_WIDTH),
      );
      if (animationState === "brake") {
        const brakeTargetHeight = playerCanvasRect.h * (RECHARGED_PLAYER_BRAKE_SPRITE_HEIGHT / RECHARGED_PLAYER_HITBOX_HEIGHT);
        const brakeScale = brakeTargetHeight / sourceHeight;
        spriteHeight = Math.max(1, sourceHeight * brakeScale);
        spriteWidth = Math.max(1, sourceWidth * brakeScale);
        const maxBrakeWidth = playerCanvasRect.w * (RECHARGED_PLAYER_BRAKE_SPRITE_MAX_WIDTH / RECHARGED_PLAYER_HITBOX_WIDTH);
        if (spriteWidth > maxBrakeWidth) {
          const shrink = maxBrakeWidth / spriteWidth;
          spriteWidth *= shrink;
          spriteHeight *= shrink;
        }
      }
      const drawX = playerCanvasRect.x + (playerCanvasRect.w - spriteWidth) * 0.5;
      const drawY = footY - spriteHeight;

      ctx.fillStyle = "rgba(15, 23, 42, 0.35)";
      ctx.fillRect(playerCanvasRect.x + 2, footY, Math.max(2, playerCanvasRect.w - 4), 2);

      if (boostSnapshot?.active === true) {
        const trailWidth = Math.max(2, Math.floor(playerCanvasRect.w * 0.4));
        const trailX = playerCanvasRect.x + Math.floor((playerCanvasRect.w - trailWidth) * 0.5);
        const trailY = playerCanvasRect.y + Math.floor(playerCanvasRect.h * 0.2);
        const trailH = Math.max(4, Math.floor(playerCanvasRect.h * 0.9));
        const trailGradient = ctx.createLinearGradient(0, trailY, 0, trailY + trailH);
        trailGradient.addColorStop(0, "rgba(56, 189, 248, 0.45)");
        trailGradient.addColorStop(1, "rgba(56, 189, 248, 0.00)");
        ctx.fillStyle = trailGradient;
        ctx.fillRect(trailX, trailY, trailWidth, trailH);
      }

      // Keep feet anchored to collision truth while flipping sprite by movement direction.
      ctx.save();
      ctx.globalAlpha = Number.isFinite(playerSnapshot?.renderAlpha)
        ? Math.max(0, Math.min(1, playerSnapshot.renderAlpha))
        : 1;
      if ((state.playerFacing || 1) < 0) {
        const centerX = drawX + spriteWidth * 0.5;
        ctx.translate(centerX, 0);
        ctx.scale(-1, 1);
        ctx.translate(-centerX, 0);
      }
      ctx.drawImage(safeSprite, drawX, drawY, spriteWidth, spriteHeight);
      ctx.restore();
    }

    function startRechargedCanvasVerificationLoop(state) {
      if (!state || typeof state !== "object") {
        return;
      }

      const canvas = document.getElementById("game");
      const runFrame = () => {
        try {
          state.frameCount = Number.isFinite(state.frameCount) ? state.frameCount + 1 : 1;
          tickLiveRechargedAdapter(state);
          const payload = readLatestRechargedBootPayload() || {};
          updateRechargedHudOverlay(state?.hud, payload, state);
          renderRechargedCanvasFrame(canvas, state);
        } catch (_error) {
          state.lastRenderOk = false;
        }

        try {
          window.requestAnimationFrame(runFrame);
        } catch (_error) {
          // Verification loop is best-effort and must never throw.
        }
      };

      try {
        window.requestAnimationFrame(runFrame);
      } catch (_error) {
        // Verification loop is best-effort and must never throw.
      }
    }

    // Loads legacy app.js only when Recharged mode is not active or did not boot.
    function loadLegacyBootScript() {
      return new Promise((resolve) => {
        const script = document.createElement("script");
        script.src = "src/app.js";
        script.defer = true;
        script.onload = () => resolve(true);
        script.onerror = () => resolve(false);
        document.body.appendChild(script);
      });
    }

    // Runs query-driven Recharged opt-in boot with safe legacy fallback behavior.
    async function bootLumoRuntime() {
      const rechargedCanvasVerification = ensureLumoRechargedCanvasVerificationState();
      let queryBootResult = null;
      let liveAdapter = null;

      try {
        queryBootResult = await bootLumoRechargedFromQuery({
          search: window.location.search,
          createAdapter(options = {}) {
            const adapter = createLumoRechargedBootAdapter(options);
            liveAdapter = adapter;
            return adapter;
          },
        });
      } catch (error) {
        queryBootResult = {
          ok: false,
          enabled: true,
          booted: false,
          mode: "recharged",
          status: "invalid",
          errors: [error?.message || "Lumo query boot failed."],
          warnings: [],
        };
      }

      if (queryBootResult && typeof queryBootResult === "object" && liveAdapter && typeof liveAdapter === "object") {
        queryBootResult.adapter = liveAdapter;
      }
      window.__LumoRechargedBoot = queryBootResult;
      try {
        const canvas = document.getElementById("game");
        rechargedCanvasVerification.active = queryBootResult?.enabled === true && queryBootResult?.booted === true;
        rechargedCanvasVerification.canvasId = typeof canvas?.id === "string" ? canvas.id : "";
        rechargedCanvasVerification.autoplay = queryBootResult?.autoplay === true;
        rechargedCanvasVerification.lastTickOk = resolveAutoplayTickStatus(queryBootResult);
        const payload = readLatestRechargedBootPayload();
        const initialPlayerSnapshot = payload?.player && typeof payload.player === "object" ? payload.player : null;
        rechargedCanvasVerification.previousPlayerSnapshot = initialPlayerSnapshot;
        rechargedCanvasVerification.currentPlayerSnapshot = initialPlayerSnapshot;
        rechargedCanvasVerification.lastPlayerX = Number.isFinite(payload?.playerX) ? payload.playerX : null;
        rechargedCanvasVerification.lastPlayerY = Number.isFinite(payload?.playerY) ? payload.playerY : null;
        rechargedCanvasVerification.currentLevelPath = typeof queryBootResult?.levelPath === "string" ? queryBootResult.levelPath : "";

        if (rechargedCanvasVerification.active === true) {
          rechargedCanvasVerification.hud = createRechargedHudOverlay();
          updateRechargedHudOverlay(rechargedCanvasVerification.hud, payload || {}, rechargedCanvasVerification);
          rechargedCanvasVerification.input = installRechargedInputIntentSync();
          syncRechargedCanvasDrawingBuffer(canvas, rechargedCanvasVerification);
          installRechargedCanvasResizeSync(canvas, rechargedCanvasVerification);
          startRechargedCanvasVerificationLoop(rechargedCanvasVerification);
        }
      } catch (_error) {
        // Keeps verification support non-fatal and behavior-neutral.
      }

      if (queryBootResult?.enabled === true && queryBootResult?.booted === true) {
        console.info("[Lumo] Recharged query boot active", queryBootResult);
        return;
      }

      if (queryBootResult?.enabled === true && queryBootResult?.booted !== true) {
        console.warn("[Lumo] Recharged query boot failed; falling back to legacy boot", queryBootResult);
      }

      const legacyLoaded = await loadLegacyBootScript();
      if (!legacyLoaded) {
        console.error("[Lumo] Legacy app.js failed to load.");
      }
    }

    void bootLumoRuntime();
  </script>
</body>
</html>
