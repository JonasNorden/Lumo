<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lumo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Boot / Loading overlay (future: Menu) -->
  <div id="bootOverlay" aria-hidden="true">
    <div class="bootScreen" role="presentation"></div>
    <div class="bootHUD" role="presentation">
      <div class="bootBar" id="bootBar"></div>
      <div class="bootText" id="bootText">Loading...</div>
    </div>
  </div>

  <!-- Legacy DOM hooks required by app.js (kept hidden via CSS) -->
  <button id="btnRestart" type="button">Restart</button>
  <input id="fileLevel" type="file" accept=".json,.js,application/json,text/javascript" />
  <div id="hudLives"></div>
  <div id="hudEnergy"></div>
  <div id="hudLight"></div>
  <div id="hudCP"></div>
  <div id="hudDebug"></div>

  <script defer src="data/tileset.js"></script>
  <script defer src="data/catalog_profiles.js"></script>
  <script defer src="data/catalog_bg.js"></script>
  <script defer src="data/catalog_tiles.js"></script>
  <script defer src="data/levels/level01.js"></script>
  <script defer src="src/core/util.js"></script>
  <script defer src="src/core/input.js"></script>
  <script defer src="src/core/time.js"></script>
  <script defer src="src/core/camera.js"></script>
  <script defer src="src/core/renderer.js"></script>
  <script defer src="src/game/world.js"></script>
  <script defer src="src/game/player.js"></script>
  <script defer src="data/catalog_entities.js"></script>
  <script defer src="src/game/entities.js"></script>
  <script defer src="data/audio_global_config.js"></script>
  <script type="module" defer>
    import { bootLumoRechargedFromQuery } from "./editor-v2/src/runtime/bootLumoRechargedFromQuery.js";
    import { createLumoRechargedBootAdapter } from "./editor-v2/src/runtime/createLumoRechargedBootAdapter.js";

    const RECHARGED_FIXED_STEP_MS = 1000 / 60;
    const RECHARGED_MAX_CATCH_UP_STEPS = 6;

    function createLumoRechargedCanvasVerificationState() {
      return {
        active: false,
        canvasId: "",
        autoplay: false,
        frameCount: 0,
        lastPlayerX: null,
        lastPlayerY: null,
        lastRenderOk: false,
        lastTickOk: null,
        previousPlayerSnapshot: null,
        currentPlayerSnapshot: null,
        renderAlpha: 0,
        stepAccumulatorMs: 0,
        lastStepAtMs: null,
        width: null,
        height: null,
      };
    }

    function ensureLumoRechargedCanvasVerificationState() {
      try {
        if (!window.__LumoRechargedCanvas || typeof window.__LumoRechargedCanvas !== "object") {
          window.__LumoRechargedCanvas = createLumoRechargedCanvasVerificationState();
        }
      } catch (_error) {
        // Keeps this verification support strictly non-fatal.
      }

      try {
        return window.__LumoRechargedCanvas || createLumoRechargedCanvasVerificationState();
      } catch (_error) {
        return createLumoRechargedCanvasVerificationState();
      }
    }

    function readLatestRechargedBootPayload() {
      try {
        const payload = window.__LumoRechargedBoot;
        if (!payload || typeof payload !== "object") {
          return null;
        }

        return payload;
      } catch (_error) {
        return null;
      }
    }

    function createRechargedInputIntentState() {
      return {
        left: false,
        right: false,
        jump: false,
        flare: false,
        pulse: false,
        boost: false,
      };
    }

    function installRechargedInputIntentSync() {
      const state = createRechargedInputIntentState();

      const readCode = (event) => (typeof event?.code === "string" ? event.code : "");
      const update = (event, pressed) => {
        const code = readCode(event);
        if (code === "ArrowLeft") {
          state.left = pressed;
        } else if (code === "ArrowRight") {
          state.right = pressed;
        } else if (code === "KeyA") {
          state.jump = pressed;
        } else if (code === "KeyS") {
          state.flare = pressed;
        } else if (code === "KeyD") {
          state.pulse = pressed;
        } else if (code === "Space") {
          state.boost = pressed;
        }
      };

      try {
        window.addEventListener("keydown", (event) => update(event, true), { passive: true });
        window.addEventListener("keyup", (event) => update(event, false), { passive: true });
      } catch (_error) {
        // Input sync is best-effort and must never throw.
      }

      return state;
    }

    function tickLiveRechargedAdapter(state) {
      try {
        const payload = readLatestRechargedBootPayload();
        const adapter = payload && typeof payload.adapter === "object" ? payload.adapter : null;
        if (!adapter || typeof adapter.tick !== "function") {
          if (state && typeof state === "object") {
            state.lastTickOk = null;
          }
          return;
        }

        const intent = {
          left: state?.input?.left === true,
          right: state?.input?.right === true,
          jump: state?.input?.jump === true,
          flare: state?.input?.flare === true,
          pulse: state?.input?.pulse === true,
          boost: state?.input?.boost === true,
        };

        const nowMs = (typeof performance !== "undefined" && typeof performance.now === "function")
          ? performance.now()
          : Date.now();
        const previousTickMs = Number.isFinite(state?.lastStepAtMs) ? state.lastStepAtMs : null;
        const frameDeltaMs = previousTickMs === null
          ? RECHARGED_FIXED_STEP_MS
          : Math.max(0, Math.min(250, nowMs - previousTickMs));
        const currentAccumulatorMs = Number.isFinite(state?.stepAccumulatorMs) ? state.stepAccumulatorMs : 0;
        let nextAccumulatorMs = currentAccumulatorMs + frameDeltaMs;
        let stepsToRun = Math.floor(nextAccumulatorMs / RECHARGED_FIXED_STEP_MS);

        if (stepsToRun > RECHARGED_MAX_CATCH_UP_STEPS) {
          stepsToRun = RECHARGED_MAX_CATCH_UP_STEPS;
          nextAccumulatorMs = RECHARGED_FIXED_STEP_MS * RECHARGED_MAX_CATCH_UP_STEPS;
        }

        const readSnapshot = () => {
          const snapshot = adapter.getPlayerSnapshot?.();
          return snapshot && typeof snapshot === "object" ? snapshot : null;
        };

        let tickResult = {
          ok: true,
          stepped: false,
        };
        let previousPlayerSnapshot = state?.previousPlayerSnapshot && typeof state.previousPlayerSnapshot === "object"
          ? state.previousPlayerSnapshot
          : null;
        let currentPlayerSnapshot = readSnapshot();
        let steppedAtLeastOnce = false;

        for (let stepIndex = 0; stepIndex < stepsToRun; stepIndex += 1) {
          tickResult = adapter.tick(intent);
          if (tickResult?.ok !== true || tickResult?.stepped !== true) {
            break;
          }
          previousPlayerSnapshot = currentPlayerSnapshot;
          currentPlayerSnapshot = readSnapshot();
          steppedAtLeastOnce = true;
          nextAccumulatorMs -= RECHARGED_FIXED_STEP_MS;
        }

        if (state && typeof state === "object") {
          state.lastTickOk = tickResult?.ok === true && tickResult?.stepped === true;
          state.lastStepAtMs = nowMs;
          state.stepAccumulatorMs = Math.max(0, nextAccumulatorMs);
          if (steppedAtLeastOnce) {
            state.previousPlayerSnapshot = previousPlayerSnapshot && typeof previousPlayerSnapshot === "object"
              ? previousPlayerSnapshot
              : currentPlayerSnapshot;
            state.currentPlayerSnapshot = currentPlayerSnapshot;
          } else if (!state.currentPlayerSnapshot || typeof state.currentPlayerSnapshot !== "object") {
            state.currentPlayerSnapshot = currentPlayerSnapshot;
            state.previousPlayerSnapshot = currentPlayerSnapshot;
          }
        }

        const nextPayload = adapter.getBootPayload?.();
        const nextPlayerSnapshot = currentPlayerSnapshot || readSnapshot();
        if (nextPayload && typeof nextPayload === "object") {
          window.__LumoRechargedBoot = {
            ...(payload && typeof payload === "object" ? payload : {}),
            ...nextPayload,
            player: nextPlayerSnapshot && typeof nextPlayerSnapshot === "object"
              ? nextPlayerSnapshot
              : (payload?.player && typeof payload.player === "object" ? payload.player : null),
            adapter,
          };
        }
      } catch (_error) {
        if (state && typeof state === "object") {
          state.lastTickOk = false;
        }
      }
    }

    function readRechargedPlayerSnapshot(payload) {
      try {
        const nestedPlayer = payload && typeof payload.player === "object" ? payload.player : null;
        const flatX = Number.isFinite(payload?.playerX) ? payload.playerX : null;
        const flatY = Number.isFinite(payload?.playerY) ? payload.playerY : null;
        const nestedX = Number.isFinite(nestedPlayer?.x) ? nestedPlayer.x : null;
        const nestedY = Number.isFinite(nestedPlayer?.y) ? nestedPlayer.y : null;
        const x = flatX !== null ? flatX : nestedX;
        const y = flatY !== null ? flatY : nestedY;
        const status = typeof payload?.playerStatus === "string"
          ? payload.playerStatus
          : (
            nestedPlayer?.grounded === true
              ? "grounded"
              : (nestedPlayer?.falling === true ? "falling" : "")
          );
        return {
          x,
          y,
          status,
          hidden: status === "respawning-out-of-bounds",
        };
      } catch (_error) {
        return {
          x: null,
          y: null,
          status: "",
          hidden: false,
        };
      }
    }

    function readRechargedFlareSnapshots(payload, state) {
      try {
        const playerSnapshot = state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object"
          ? state.currentPlayerSnapshot
          : (payload?.player && typeof payload.player === "object" ? payload.player : null);
        const flares = Array.isArray(playerSnapshot?.flares) ? playerSnapshot.flares : [];
        return flares
          .map((flare) => ({
            x: Number.isFinite(flare?.x) ? flare.x : null,
            y: Number.isFinite(flare?.y) ? flare.y : null,
            radius: Number.isFinite(flare?.radius) && flare.radius > 0 ? flare.radius : 4,
          }))
          .filter((flare) => flare.x !== null && flare.y !== null);
      } catch (_error) {
        return [];
      }
    }

    function buildRechargedWorldToCanvasMapper({ canvas, worldWidthPx, worldHeightPx, targetX, targetY }) {
      const viewportWorldWidth = Math.max(1, Math.min(canvas.width, Math.round(worldWidthPx)));
      const viewportWorldHeight = Math.max(1, Math.min(canvas.height, Math.round(worldHeightPx)));
      const maxCameraX = Math.max(0, Math.round(worldWidthPx) - viewportWorldWidth);
      const maxCameraY = Math.max(0, Math.round(worldHeightPx) - viewportWorldHeight);
      const cameraX = Math.max(0, Math.min(maxCameraX, Math.round(targetX - viewportWorldWidth * 0.5)));
      const cameraY = Math.max(0, Math.min(maxCameraY, Math.round(targetY - viewportWorldHeight * 0.5)));
      const offsetX = Math.floor((canvas.width - viewportWorldWidth) * 0.5);
      const offsetY = Math.floor((canvas.height - viewportWorldHeight) * 0.5);

      return {
        viewportWorldWidth,
        viewportWorldHeight,
        worldToCanvasRect(rectX, rectY, rectW, rectH) {
          return {
            x: Math.round(rectX - cameraX + offsetX),
            y: Math.round(rectY - cameraY + offsetY),
            w: Math.max(1, Math.round(rectW)),
            h: Math.max(1, Math.round(rectH)),
          };
        },
      };
    }

    function renderRechargedCanvasFrame(canvas, state) {
      if (!canvas || typeof canvas.getContext !== "function") {
        return false;
      }

      try {
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          return false;
        }

        const payload = readLatestRechargedBootPayload() || {};
        const player = readRechargedPlayerSnapshot(payload);
        const flareSnapshots = readRechargedFlareSnapshots(payload, state);
        const previousSnapshot = readRechargedPlayerSnapshot({
          player: state?.previousPlayerSnapshot && typeof state.previousPlayerSnapshot === "object"
            ? state.previousPlayerSnapshot
            : payload?.player,
        });
        const currentSnapshot = readRechargedPlayerSnapshot({
          player: state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object"
            ? state.currentPlayerSnapshot
            : payload?.player,
        });
        const alphaRaw = Number.isFinite(state?.stepAccumulatorMs)
          ? state.stepAccumulatorMs / RECHARGED_FIXED_STEP_MS
          : 0;
        const alpha = Math.max(0, Math.min(1, alphaRaw));
        const lerp = (from, to, t) => from + (to - from) * t;
        const playerCenterX = Number.isFinite(previousSnapshot.x) && Number.isFinite(currentSnapshot.x)
          ? lerp(previousSnapshot.x, currentSnapshot.x, alpha)
          : (Number.isFinite(player.x) ? player.x : null);
        const playerFootY = Number.isFinite(previousSnapshot.y) && Number.isFinite(currentSnapshot.y)
          ? lerp(previousSnapshot.y, currentSnapshot.y, alpha)
          : (Number.isFinite(player.y) ? player.y : null);
        const tileSize = Number.isFinite(payload?.tileSize) && payload.tileSize > 0 ? payload.tileSize : 24;
        const worldWidthRaw = Number.isFinite(payload?.worldWidth)
          ? payload.worldWidth
          : (Number.isFinite(payload?.cols) ? payload.cols : Math.max(1, Math.round(canvas.width / tileSize)));
        const worldHeightRaw = Number.isFinite(payload?.worldHeight)
          ? payload.worldHeight
          : (Number.isFinite(payload?.rows) ? payload.rows : Math.max(1, Math.round(canvas.height / tileSize)));
        const supportTiles = Array.isArray(payload?.supportTiles) ? payload.supportTiles : [];
        const maxSupportTileSpan = supportTiles.reduce((maxSpan, tile) => {
          const spanW = Number.isFinite(tile?.w) ? tile.w : 0;
          const spanH = Number.isFinite(tile?.h) ? tile.h : 0;
          return Math.max(maxSpan, spanW, spanH);
        }, 0);
        const coordinatesLookTileBased = (
          (Number.isFinite(player.x) && player.x > worldWidthRaw + tileSize) ||
          (Number.isFinite(player.y) && player.y > worldHeightRaw + tileSize) ||
          (maxSupportTileSpan > 0 && maxSupportTileSpan <= 4)
        );
        const worldUnitsToPx = coordinatesLookTileBased ? tileSize : 1;
        const worldWidthPx = Math.max(tileSize, Math.round(worldWidthRaw * worldUnitsToPx));
        const worldHeightPx = Math.max(tileSize, Math.round(worldHeightRaw * worldUnitsToPx));
        const mapper = buildRechargedWorldToCanvasMapper({
          canvas,
          worldWidthPx,
          worldHeightPx,
          targetX: Number.isFinite(playerCenterX) ? playerCenterX : worldWidthPx * 0.5,
          targetY: Number.isFinite(playerFootY) ? playerFootY : worldHeightPx - 1,
        });

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const backdropGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        backdropGradient.addColorStop(0, "#0b1220");
        backdropGradient.addColorStop(1, "#111b31");
        ctx.fillStyle = backdropGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const playfieldRect = mapper.worldToCanvasRect(0, 0, worldWidthPx, worldHeightPx);
        ctx.fillStyle = "rgba(15, 23, 42, 0.52)";
        ctx.fillRect(playfieldRect.x, playfieldRect.y, playfieldRect.w, playfieldRect.h);

        // Draw real runtime support geometry from Recharged world tile data in tileSize-scaled world pixels.
        for (const supportTile of supportTiles) {
          const tileX = Number.isFinite(supportTile?.x) ? supportTile.x : null;
          const tileY = Number.isFinite(supportTile?.y) ? supportTile.y : null;
          const tileW = Number.isFinite(supportTile?.w) ? supportTile.w : null;
          const tileH = Number.isFinite(supportTile?.h) ? supportTile.h : null;
          if (tileX === null || tileY === null || tileW === null || tileH === null || tileW <= 0 || tileH <= 0) {
            continue;
          }

          const worldRectX = tileX * worldUnitsToPx;
          const worldRectY = tileY * worldUnitsToPx;
          const worldRectW = tileW * worldUnitsToPx;
          const worldRectH = tileH * worldUnitsToPx;
          const supportCanvasRect = mapper.worldToCanvasRect(worldRectX, worldRectY, worldRectW, worldRectH);

          ctx.fillStyle = "#1f2937";
          ctx.fillRect(supportCanvasRect.x, supportCanvasRect.y, supportCanvasRect.w, supportCanvasRect.h);
          ctx.fillStyle = "#334155";
          ctx.fillRect(
            supportCanvasRect.x + 1,
            supportCanvasRect.y + 1,
            Math.max(1, supportCanvasRect.w - 2),
            Math.max(1, supportCanvasRect.h - 2),
          );
          ctx.fillStyle = "#94a3b8";
          ctx.fillRect(supportCanvasRect.x, supportCanvasRect.y, supportCanvasRect.w, Math.min(4, supportCanvasRect.h));
          ctx.fillStyle = "rgba(15, 23, 42, 0.35)";
          ctx.fillRect(
            supportCanvasRect.x,
            supportCanvasRect.y + Math.max(0, supportCanvasRect.h - 3),
            supportCanvasRect.w,
            Math.min(3, supportCanvasRect.h),
          );
        }

        // Draw true world bounds in the same world-to-canvas mapping used by player and support geometry.
        ctx.strokeStyle = "#64748b";
        ctx.lineWidth = 1;
        const worldBoundsRect = mapper.worldToCanvasRect(0, 0, worldWidthPx, worldHeightPx);
        ctx.strokeRect(worldBoundsRect.x + 0.5, worldBoundsRect.y + 0.5, Math.max(0, worldBoundsRect.w - 1), Math.max(0, worldBoundsRect.h - 1));

        if (player.hidden !== true) {
          const playerWorldRect = {
            x: playerCenterX - tileSize * 0.5,
            y: playerFootY + 1 - tileSize,
            w: tileSize,
            h: tileSize,
          };
          const playerCanvasRect = mapper.worldToCanvasRect(playerWorldRect.x, playerWorldRect.y, playerWorldRect.w, playerWorldRect.h);
          const playerHeadHeight = Math.max(4, Math.floor(playerCanvasRect.h * 0.34));
          const playerBodyY = playerCanvasRect.y + playerHeadHeight;
          const playerBodyHeight = Math.max(2, playerCanvasRect.h - playerHeadHeight);
          const eyeSize = Math.max(1, Math.floor(playerCanvasRect.w * 0.12));
          const eyeY = playerCanvasRect.y + Math.max(1, Math.floor(playerHeadHeight * 0.36));
          const eyeOffsetX = Math.max(2, Math.floor(playerCanvasRect.w * 0.28));

          ctx.fillStyle = "rgba(15, 23, 42, 0.35)";
          ctx.fillRect(playerCanvasRect.x + 2, playerCanvasRect.y + playerCanvasRect.h, Math.max(2, playerCanvasRect.w - 4), 2);

          // Keep player color neutral in real Recharged mode to avoid misleading grounded/airborne signals.
          ctx.fillStyle = "#60a5fa";
          ctx.fillRect(playerCanvasRect.x, playerBodyY, playerCanvasRect.w, playerBodyHeight);
          ctx.fillStyle = "#93c5fd";
          ctx.fillRect(playerCanvasRect.x, playerCanvasRect.y, playerCanvasRect.w, playerHeadHeight);
          ctx.fillStyle = "#dbeafe";
          ctx.fillRect(playerCanvasRect.x + eyeOffsetX, eyeY, eyeSize, eyeSize);
          ctx.fillRect(playerCanvasRect.x + playerCanvasRect.w - eyeOffsetX - eyeSize, eyeY, eyeSize, eyeSize);
        }

        for (const flare of flareSnapshots) {
          const flareRadius = Math.max(2, Math.round(flare.radius));
          const flareRect = mapper.worldToCanvasRect(
            flare.x - flareRadius,
            flare.y - flareRadius,
            flareRadius * 2,
            flareRadius * 2,
          );
          const centerX = flareRect.x + flareRect.w * 0.5;
          const centerY = flareRect.y + flareRect.h * 0.5;
          const glowRadius = Math.max(flareRect.w, flareRect.h) * 1.8;
          const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowRadius);
          glowGradient.addColorStop(0, "rgba(251, 191, 36, 0.95)");
          glowGradient.addColorStop(1, "rgba(251, 191, 36, 0)");
          ctx.fillStyle = glowGradient;
          ctx.fillRect(centerX - glowRadius, centerY - glowRadius, glowRadius * 2, glowRadius * 2);

          ctx.fillStyle = "#fde68a";
          ctx.fillRect(flareRect.x, flareRect.y, flareRect.w, flareRect.h);
          ctx.fillStyle = "#f97316";
          ctx.fillRect(flareRect.x + 1, flareRect.y + 1, Math.max(1, flareRect.w - 2), Math.max(1, flareRect.h - 2));
        }

        if (state && typeof state === "object") {
          state.lastPlayerX = Number.isFinite(playerCenterX) ? playerCenterX : null;
          state.lastPlayerY = Number.isFinite(playerFootY) ? playerFootY : null;
          state.renderAlpha = alpha;
          state.lastRenderOk = true;
        }
        return true;
      } catch (_error) {
        if (state && typeof state === "object") {
          state.lastRenderOk = false;
        }
        return false;
      }
    }

    function resolveAutoplayTickStatus(queryBootResult) {
      try {
        if (queryBootResult?.autoplay !== true) {
          return null;
        }

        if (!Array.isArray(queryBootResult?.warnings)) {
          return queryBootResult?.booted === true;
        }

        const hasAutoplayWarning = queryBootResult.warnings.some((warning) => (
          typeof warning === "string" && warning.includes("Autoplay tick burst did not complete cleanly.")
        ));

        return hasAutoplayWarning !== true && queryBootResult?.booted === true;
      } catch (_error) {
        return false;
      }
    }


    function syncRechargedCanvasDrawingBuffer(canvas, state) {
      if (!canvas || typeof canvas !== "object") {
        return;
      }

      const nextWidth = Math.max(1, Math.floor(canvas.clientWidth || canvas.offsetWidth || 0));
      const nextHeight = Math.max(1, Math.floor(canvas.clientHeight || canvas.offsetHeight || 0));

      if (canvas.width !== nextWidth) {
        canvas.width = nextWidth;
      }
      if (canvas.height !== nextHeight) {
        canvas.height = nextHeight;
      }

      if (state && typeof state === "object") {
        state.width = canvas.width;
        state.height = canvas.height;
      }
    }

    function installRechargedCanvasResizeSync(canvas, state) {
      if (!canvas || typeof canvas !== "object") {
        return;
      }

      const resizeHandler = () => {
        syncRechargedCanvasDrawingBuffer(canvas, state);
      };

      resizeHandler();
      try {
        window.addEventListener("resize", resizeHandler, { passive: true });
      } catch (_error) {
        // Resize sync is best-effort and must never throw.
      }
    }

    function startRechargedCanvasVerificationLoop(state) {
      if (!state || typeof state !== "object") {
        return;
      }

      const canvas = document.getElementById("game");
      const runFrame = () => {
        try {
          state.frameCount = Number.isFinite(state.frameCount) ? state.frameCount + 1 : 1;
          tickLiveRechargedAdapter(state);
          renderRechargedCanvasFrame(canvas, state);
        } catch (_error) {
          state.lastRenderOk = false;
        }

        try {
          window.requestAnimationFrame(runFrame);
        } catch (_error) {
          // Verification loop is best-effort and must never throw.
        }
      };

      try {
        window.requestAnimationFrame(runFrame);
      } catch (_error) {
        // Verification loop is best-effort and must never throw.
      }
    }

    // Loads legacy app.js only when Recharged mode is not active or did not boot.
    function loadLegacyBootScript() {
      return new Promise((resolve) => {
        const script = document.createElement("script");
        script.src = "src/app.js";
        script.defer = true;
        script.onload = () => resolve(true);
        script.onerror = () => resolve(false);
        document.body.appendChild(script);
      });
    }

    // Runs query-driven Recharged opt-in boot with safe legacy fallback behavior.
    async function bootLumoRuntime() {
      const rechargedCanvasVerification = ensureLumoRechargedCanvasVerificationState();
      let queryBootResult = null;
      let liveAdapter = null;

      try {
        queryBootResult = await bootLumoRechargedFromQuery({
          search: window.location.search,
          createAdapter(options = {}) {
            const adapter = createLumoRechargedBootAdapter(options);
            liveAdapter = adapter;
            return adapter;
          },
        });
      } catch (error) {
        queryBootResult = {
          ok: false,
          enabled: true,
          booted: false,
          mode: "recharged",
          status: "invalid",
          errors: [error?.message || "Lumo query boot failed."],
          warnings: [],
        };
      }

      if (queryBootResult && typeof queryBootResult === "object" && liveAdapter && typeof liveAdapter === "object") {
        queryBootResult.adapter = liveAdapter;
      }
      window.__LumoRechargedBoot = queryBootResult;
      try {
        const canvas = document.getElementById("game");
        rechargedCanvasVerification.active = queryBootResult?.enabled === true && queryBootResult?.booted === true;
        rechargedCanvasVerification.canvasId = typeof canvas?.id === "string" ? canvas.id : "";
        rechargedCanvasVerification.autoplay = queryBootResult?.autoplay === true;
        rechargedCanvasVerification.lastTickOk = resolveAutoplayTickStatus(queryBootResult);
        const payload = readLatestRechargedBootPayload();
        const initialPlayerSnapshot = payload?.player && typeof payload.player === "object" ? payload.player : null;
        rechargedCanvasVerification.previousPlayerSnapshot = initialPlayerSnapshot;
        rechargedCanvasVerification.currentPlayerSnapshot = initialPlayerSnapshot;
        rechargedCanvasVerification.lastPlayerX = Number.isFinite(payload?.playerX) ? payload.playerX : null;
        rechargedCanvasVerification.lastPlayerY = Number.isFinite(payload?.playerY) ? payload.playerY : null;

        if (rechargedCanvasVerification.active === true) {
          rechargedCanvasVerification.input = installRechargedInputIntentSync();
          syncRechargedCanvasDrawingBuffer(canvas, rechargedCanvasVerification);
          installRechargedCanvasResizeSync(canvas, rechargedCanvasVerification);
          startRechargedCanvasVerificationLoop(rechargedCanvasVerification);
        }
      } catch (_error) {
        // Keeps verification support non-fatal and behavior-neutral.
      }

      if (queryBootResult?.enabled === true && queryBootResult?.booted === true) {
        console.info("[Lumo] Recharged query boot active", queryBootResult);
        return;
      }

      if (queryBootResult?.enabled === true && queryBootResult?.booted !== true) {
        console.warn("[Lumo] Recharged query boot failed; falling back to legacy boot", queryBootResult);
      }

      const legacyLoaded = await loadLegacyBootScript();
      if (!legacyLoaded) {
        console.error("[Lumo] Legacy app.js failed to load.");
      }
    }

    void bootLumoRuntime();
  </script>
</body>
