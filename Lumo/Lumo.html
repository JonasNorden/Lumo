      const image = new Image();

    function ensureRechargedPlayerSpriteCache(state) {
      if (!state || typeof state !== "object") {
        return null;
      }

      if (!state.playerSpriteCache || typeof state.playerSpriteCache !== "object") {
        state.playerSpriteCache = {
          idleFrames: RECHARGED_PLAYER_SPRITE_IDLE_FRAMES.map((src) => createRechargedSpriteImage(src)),
          idle: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_IDLE_FRAMES[0]),
          runFrames: RECHARGED_PLAYER_SPRITE_RUN_FRAMES.map((src) => createRechargedSpriteImage(src)),
          run: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_RUN_FRAMES[0]),
          jump: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_JUMP),
          fall: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_FALL),
          brake: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_BRAKE),
        };
      }

      return state.playerSpriteCache;
    }

    function resolveRechargedPlayerAnimationState(playerSnapshot, previousAnimationState = "idle") {
      const grounded = playerSnapshot?.grounded === true;
      const rising = playerSnapshot?.rising === true;
      const falling = playerSnapshot?.falling === true;
      const locomotion = typeof playerSnapshot?.locomotion === "string" ? playerSnapshot.locomotion : "";
      const velocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      const velocityY = Number.isFinite(playerSnapshot?.velocity?.y) ? playerSnapshot.velocity.y : 0;
      const movingHorizontally = Math.abs(velocityX) > RECHARGED_PLAYER_HORIZONTAL_SPEED_EPSILON;

      if (grounded) {
        if (locomotion === "braking-grounded") {
          return "brake";
        }
        return movingHorizontally || locomotion === "moving-grounded" ? "run" : "idle";
      }

      if (rising || locomotion === "rising" || velocityY < -RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON) {
        return "jump";
      }

      if (falling || locomotion === "falling" || velocityY > RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON) {
        return "fall";
      }

      if (locomotion === "airborne-moving" || locomotion === "airborne-neutral") {
        return "jump";
      }

      return previousAnimationState === "fall" ? "fall" : "jump";
    }

    // Mirrors V1 idle animation cadence exactly: 0→1→2→3→2→1→...
    function resolveRechargedIdleSpriteFrame(state, spriteCache, animationState, nowMs) {
      if (!state || !spriteCache || animationState !== "idle") {
        return spriteCache?.idle || null;
      }

      if (!state.playerIdleAnimation || typeof state.playerIdleAnimation !== "object") {
        state.playerIdleAnimation = { i: 0, dir: 1, t: 0, lastAtMs: null };
      }

      const idleAnimation = state.playerIdleAnimation;
      const frames = Array.isArray(spriteCache.idleFrames) ? spriteCache.idleFrames : [spriteCache.idle];
      const frameStepMs = 1000 / Math.max(1, RECHARGED_PLAYER_IDLE_FPS);
      const safeNowMs = Number.isFinite(nowMs) ? nowMs : performance.now();
      const elapsedMs = idleAnimation.lastAtMs === null ? 0 : Math.max(0, safeNowMs - idleAnimation.lastAtMs);
      idleAnimation.lastAtMs = safeNowMs;
      idleAnimation.t += elapsedMs;

      while (idleAnimation.t >= frameStepMs) {
        idleAnimation.t -= frameStepMs;
        idleAnimation.i += idleAnimation.dir;
        if (idleAnimation.i >= RECHARGED_PLAYER_IDLE_LAST_INDEX) {
          idleAnimation.i = RECHARGED_PLAYER_IDLE_LAST_INDEX;
          idleAnimation.dir = -1;
        }
        if (idleAnimation.i <= 0) {
          idleAnimation.i = 0;
          idleAnimation.dir = 1;
        }
      }

      const frameIndex = Math.max(0, Math.min(RECHARGED_PLAYER_IDLE_LAST_INDEX, idleAnimation.i | 0));
      return frames[frameIndex] || frames[0] || spriteCache.idle || null;
    }

    // Mirrors V1 grounded walk cadence: 0→1→2→3→0 with speed-scaled fps.
    function resolveRechargedRunSpriteFrame(state, spriteCache, animationState, playerSnapshot, nowMs) {
      if (!state || !spriteCache || animationState !== "run") {
        return spriteCache?.run || spriteCache?.idle || null;
      }

      if (!state.playerRunAnimation || typeof state.playerRunAnimation !== "object") {
        state.playerRunAnimation = { i: 0, t: 0, lastAtMs: null };
      }

      const runAnimation = state.playerRunAnimation;
      const frames = Array.isArray(spriteCache.runFrames) ? spriteCache.runFrames : [spriteCache.run];
      const velocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      const speedRatio = Math.max(0, Math.min(1.75, Math.abs(velocityX) / Math.max(1, RECHARGED_PLAYER_RUN_BASE_SPEED)));
      const runFps = RECHARGED_PLAYER_RUN_FPS * (0.65 + 0.55 * speedRatio);
      const frameStepMs = 1000 / Math.max(1, runFps);
      const safeNowMs = Number.isFinite(nowMs) ? nowMs : performance.now();
      const elapsedMs = runAnimation.lastAtMs === null ? 0 : Math.max(0, safeNowMs - runAnimation.lastAtMs);
      runAnimation.lastAtMs = safeNowMs;
      runAnimation.t += elapsedMs;

      while (runAnimation.t >= frameStepMs) {
        runAnimation.t -= frameStepMs;
        runAnimation.i = (runAnimation.i + 1) % (RECHARGED_PLAYER_RUN_LAST_INDEX + 1);
      }

      const frameIndex = Math.max(0, Math.min(RECHARGED_PLAYER_RUN_LAST_INDEX, runAnimation.i | 0));
      return frames[frameIndex] || frames[0] || spriteCache.run || spriteCache.idle || null;
    }

    // Runs one safe intermission Enter transition to the next local Recharged level.
    async function tryLoadNextRechargedLevel(state) {
      if (!state || typeof state !== "object" || state.nextLevelLoadPending === true) {
        return false;
      }

      state.nextLevelLoadPending = true;
      try {
        const transition = await loadNextRechargedLevelFromIntermission({
          currentLevelPath: state.currentLevelPath,
          bootFromQuery(options = {}) {
            let liveAdapter = null;
            return bootLumoRechargedFromQuery({
              search: options?.search,
              createAdapter(adapterOptions = {}) {
                const adapter = createLumoRechargedBootAdapter(adapterOptions);
                liveAdapter = adapter;
                return adapter;
              },
            }).then((result) => (
              liveAdapter && typeof liveAdapter === "object"
                ? { ...(result && typeof result === "object" ? result : {}), adapter: liveAdapter }
                : result
            ));
          },
        });

        if (transition?.ok === true && transition?.bootResult && typeof transition.bootResult === "object") {
          window.__LumoRechargedBoot = transition.bootResult;
          state.currentLevelPath = transition.nextLevelPath;
          state.intermissionAcknowledged = false;
          state.intermissionAcknowledgedMessage = "";
          const payload = readLatestRechargedBootPayload();
          const playerSnapshot = payload?.player && typeof payload.player === "object" ? payload.player : null;
          state.previousPlayerSnapshot = playerSnapshot;
          state.currentPlayerSnapshot = playerSnapshot;
          state.lastPlayerX = Number.isFinite(payload?.playerX) ? payload.playerX : null;
          state.lastPlayerY = Number.isFinite(payload?.playerY) ? payload.playerY : null;
          state.scoreAwardedEvents = new Set();
          state.scoreLastCheckpointKey = "";
          state.scoreLiveEntitiesByKey = new Map();
          state.comboCount = 0;
          state.comboLastEventTime = Number.NEGATIVE_INFINITY;
          state.comboMultiplier = 1;
          if (playerSnapshot && typeof playerSnapshot === "object") {
            playerSnapshot.score = Number.isFinite(state.score) ? Math.max(0, Math.floor(state.score)) : 0;
          }
          return true;
        }

        state.intermissionAcknowledged = true;
        state.intermissionAcknowledgedMessage = "Next level not available";
        return false;
      } catch (_error) {
        state.intermissionAcknowledged = true;
        state.intermissionAcknowledgedMessage = "Next level not available";
        return false;
      } finally {
        state.nextLevelLoadPending = false;
      }
    }

    function ensureLumoRechargedCanvasVerificationState() {
      try {
        if (!window.__LumoRechargedCanvas || typeof window.__LumoRechargedCanvas !== "object") {
          window.__LumoRechargedCanvas = createLumoRechargedCanvasVerificationState();
        }
      } catch (_error) {
        // Keeps this verification support strictly non-fatal.
      }

      try {
        return window.__LumoRechargedCanvas || createLumoRechargedCanvasVerificationState();
      } catch (_error) {
        return createLumoRechargedCanvasVerificationState();
      }
    }

    function readLatestRechargedBootPayload() {
      try {
        const payload = window.__LumoRechargedBoot;
        if (!payload || typeof payload !== "object") {
          return null;
        }

        return payload;
      } catch (_error) {
        return null;
      }
    }

    function createRechargedInputIntentState() {

    function installRechargedInputIntentSync() {
      const state = createRechargedInputIntentState();

      const readCode = (event) => (typeof event?.code === "string" ? event.code : "");
      const update = (event, pressed) => {
        const code = readCode(event);
        if (code === "ArrowLeft") {
          state.left = pressed;
        } else if (code === "ArrowRight") {
          state.right = pressed;
        } else if (code === "KeyA") {
          state.jump = pressed;
        } else if (code === "KeyS") {
          state.flare = pressed;
        } else if (code === "KeyD") {
          state.pulse = pressed;
        } else if (code === "Space") {
          state.boost = pressed;
        } else if (code === "Enter") {
          if (pressed === true && state._enterDown !== true) {
            state.continuePressed = true;
          }
          state._enterDown = pressed;
        }
      };

      try {
        window.addEventListener("keydown", (event) => update(event, true), { passive: true });
        window.addEventListener("keyup", (event) => update(event, false), { passive: true });
      } catch (_error) {
        // Input sync is best-effort and must never throw.
      }

      return state;
    }

        gameplay: { x: 40, y: 157, w: w - 80, h: 861 },

    function getRechargedHudV2Viewport(canvas) {
      const w = Number.isFinite(canvas?.width) && canvas.width > 0 ? canvas.width : RECHARGED_HUD_V2_MASTER_W;
      const h = Number.isFinite(canvas?.height) && canvas.height > 0 ? canvas.height : RECHARGED_HUD_V2_MASTER_H;
      const scale = Math.min(w / RECHARGED_HUD_V2_MASTER_W, h / RECHARGED_HUD_V2_MASTER_H);
      const drawW = RECHARGED_HUD_V2_MASTER_W * scale;
      const drawH = RECHARGED_HUD_V2_MASTER_H * scale;
      return {
        x: (w - drawW) * 0.5,
        y: (h - drawH) * 0.5,
        scale,
        w: drawW,
        h: drawH,
      };
    }

    function getRechargedHudV2GameplayViewport(canvas) {
      const viewport = getRechargedHudV2Viewport(canvas);
      const { gameplay } = getRechargedHudV2Layout();
      return {
        x: viewport.x + gameplay.x * viewport.scale,
        y: viewport.y + gameplay.y * viewport.scale,
        w: gameplay.w * viewport.scale,
        h: gameplay.h * viewport.scale,
        scale: viewport.scale,
      };

    function updateRechargedHudV2PanelSoulState(lives, flares) {
      rechargedHudV2PanelPulseWarm *= 0.90;
      rechargedHudV2PanelPulseGreen *= 0.88;

      if (Number.isFinite(rechargedHudV2PrevLivesForSoul) && lives < rechargedHudV2PrevLivesForSoul) {
        rechargedHudV2PanelPulseWarm = Math.max(rechargedHudV2PanelPulseWarm, 1.0);
      }
      if (Number.isFinite(rechargedHudV2PrevFlaresForSoul) && flares < rechargedHudV2PrevFlaresForSoul) {
        rechargedHudV2PanelPulseGreen = Math.max(rechargedHudV2PanelPulseGreen, 1.0);
      }

      rechargedHudV2PrevLivesForSoul = lives;
      rechargedHudV2PrevFlaresForSoul = flares;
    }

    function drawRechargedHudV2PanelSoul(ctx, time, orb, energyPct) {
      const intensity = Math.max(0, Math.min(1, energyPct / 100));
      const sweepX = 220 + ((Math.sin(time * 0.11) * 0.5 + 0.5) * 1180);
      const drift = ctx.createLinearGradient(sweepX - 260, 0, sweepX + 260, 0);
      drift.addColorStop(0, "rgba(255,180,90,0)");
      drift.addColorStop(0.5, `rgba(255,194,118,${0.018 + (intensity * 0.018)})`);
      drift.addColorStop(1, "rgba(255,180,90,0)");
      ctx.fillStyle = drift;
      ctx.fillRect(80, 8, 1760, 146);

      const bleed = ctx.createRadialGradient(orb.x, orb.y - 10, 0, orb.x, orb.y - 10, 180);
      bleed.addColorStop(0, `rgba(255,176,82,${0.06 + (intensity * 0.10)})`);
      bleed.addColorStop(0.36, `rgba(255,132,48,${0.03 + (intensity * 0.05)})`);
      bleed.addColorStop(1, "rgba(255,90,30,0)");
      ctx.fillStyle = bleed;
      ctx.beginPath();
      ctx.arc(orb.x, orb.y - 8, 180, Math.PI, Math.PI * 2);
      ctx.lineTo(orb.x + 180, 0);
      ctx.lineTo(orb.x - 180, 0);
      ctx.closePath();

        ctx.fillRect(80, 0, 1760, 160);

    // - drawBottomPanelCreatures() placements (256,1028,154,44) and (1410,1028,154,44)
    function resetRechargedHudV2Eyes() {
      rechargedHudV2EyeState.active = true;
      rechargedHudV2EyeState.phase = "open";
      rechargedHudV2EyeState.timer = 900;
      rechargedHudV2EyeState.blinkTimer = 220 + (Math.random() * 360);
      rechargedHudV2EyeState.baseX = 1462 + (Math.random() * 50);
      rechargedHudV2EyeState.baseY = 1048 + (Math.random() * 10);
      rechargedHudV2EyeState.driftPhase = Math.random() * 10;
      rechargedHudV2EyeState.leftScale = 0.46 + (Math.random() * 0.11);
      rechargedHudV2EyeState.rightScale = 0.36 + (Math.random() * 0.14);
      rechargedHudV2EyeState.leftTilt = 0.10 + (Math.random() * 0.08);
      rechargedHudV2EyeState.rightTilt = -0.18 + (Math.random() * 0.08);
      rechargedHudV2EyeState.blinkCountLeft = 1;
    }

    function updateRechargedHudV2BottomPanelLife(time) {
      if (Math.random() < 0.06) {
        rechargedHudV2VentSmokePuffs.push({
          x: 350 + ((Math.random() - 0.5) * 20),
          y: 1040 + ((Math.random() - 0.5) * 4),
          vx: -0.08 + (Math.random() * 0.16),
          vy: -0.10 - (Math.random() * 0.10),
          life: 0,
          maxLife: 70 + (Math.random() * 30),
          r: 8 + (Math.random() * 8),
          drift: Math.random() * 10,
        });
      }
      rechargedHudV2VentSmokePuffs = rechargedHudV2VentSmokePuffs.filter((p) => {
        p.life += 1;
        p.x += p.vx + (Math.sin((time + p.drift) * 0.8) * 0.035);
        p.y += p.vy;
        p.r += 0.08;
        return p.life < p.maxLife;
      });

      if (!rechargedHudV2EyeState.active) {
        rechargedHudV2EyeState.nextWake -= 1;
        if (rechargedHudV2EyeState.nextWake <= 0) {
          resetRechargedHudV2Eyes();
        }
      } else {
        rechargedHudV2EyeState.timer -= 1;
        rechargedHudV2EyeState.blinkTimer -= 1;
        if (rechargedHudV2EyeState.phase === "open" && rechargedHudV2EyeState.blinkCountLeft > 0 && rechargedHudV2EyeState.blinkTimer <= 0) {
          rechargedHudV2EyeState.phase = "blink";
          rechargedHudV2EyeState.blinkTimer = 18 + (Math.random() * 10);
          rechargedHudV2EyeState.blinkCountLeft -= 1;
        } else if (rechargedHudV2EyeState.phase === "blink" && rechargedHudV2EyeState.blinkTimer <= 0) {
          rechargedHudV2EyeState.phase = "open";
          rechargedHudV2EyeState.blinkTimer = 9999;
        }
        if (rechargedHudV2EyeState.timer <= 0) {
          rechargedHudV2EyeState.active = false;
          rechargedHudV2EyeState.phase = "idle";
          rechargedHudV2EyeState.nextWake = 1200 + (Math.random() * 120);
        }
      }
    }

    function drawRechargedHudV2BottomVentCutout(ctx, x, y, w, h, mode, time) {
      const cavity = ctx.createLinearGradient(0, y, 0, y + h);
      cavity.addColorStop(0, "rgba(0,0,0,0.62)");
      cavity.addColorStop(0.5, "rgba(8,3,2,0.85)");
      cavity.addColorStop(1, "rgba(0,0,0,0.68)");
      ctx.fillStyle = cavity;
      drawRechargedHudV2RoundedRectPath(ctx, x, y, w, h, 8);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,214,154,0.10)";
      ctx.lineWidth = 1;
      drawRechargedHudV2RoundedRectPath(ctx, x + 0.5, y + 0.5, w - 1, h - 1, 8);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,220,170,0.06)";
      drawRechargedHudV2RoundedRectPath(ctx, x + 2, y + 2, w - 4, 6, 6);
      ctx.fill();

      ctx.fillStyle = "rgba(0,0,0,0.24)";
      drawRechargedHudV2RoundedRectPath(ctx, x + 2, y + h - 8, w - 4, 6, 6);
      ctx.fill();

      ctx.fillStyle = "rgba(0,0,0,0.46)";
      drawRechargedHudV2RoundedRectPath(ctx, x + 4, y + 4, w - 8, h - 8, 6);
      ctx.fill();

      if (mode === "eyes" && rechargedHudV2EyeState.active) {
        const lid = rechargedHudV2EyeState.phase === "blink" ? 0.12 : 1.0;
        const dy = Math.sin((time * 0.08) + rechargedHudV2EyeState.driftPhase) * 1.0;
        const lx = rechargedHudV2EyeState.baseX - 10;
        const rx = rechargedHudV2EyeState.baseX + 12;
        const ey = rechargedHudV2EyeState.baseY + dy;
        const eyes = [
          { x: lx, y: ey, sx: (5.7 * rechargedHudV2EyeState.leftScale) / 0.5, tilt: rechargedHudV2EyeState.leftTilt },
          { x: rx, y: ey + 0.8, sx: (5.0 * rechargedHudV2EyeState.rightScale) / 0.5, tilt: rechargedHudV2EyeState.rightTilt },
        ];
        eyes.forEach((e) => {
          const g = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, 8);
          g.addColorStop(0, `rgba(255,236,160,${0.18 * lid})`);
          g.addColorStop(0.42, `rgba(255,120,54,${0.10 * lid})`);
          g.addColorStop(1, "rgba(255,80,40,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.ellipse(e.x, e.y, 7, 4.6 * lid, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.save();
          ctx.translate(e.x, e.y);
          ctx.rotate(e.tilt);
          ctx.fillStyle = `rgba(255,234,170,${0.60 * lid})`;
          ctx.beginPath();
          ctx.arc(0, 0, e.sx, 0, Math.PI, false);
          ctx.closePath();
          ctx.fill();
          ctx.fillStyle = `rgba(255,252,220,${0.30 * lid})`;
          ctx.beginPath();
          ctx.arc(0, 0.5, e.sx * 0.38, 0, Math.PI, false);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });
      }

      for (let i = 0; i < 6; i += 1) {
        const sy = y + 7 + i * 6;
        const slatGrad = ctx.createLinearGradient(0, sy, 0, sy + 3);
        slatGrad.addColorStop(0, "rgba(255,214,154,0.11)");
        slatGrad.addColorStop(0.45, "rgba(38,14,7,0.92)");
        slatGrad.addColorStop(1, "rgba(0,0,0,0.46)");
        ctx.fillStyle = slatGrad;
        drawRechargedHudV2RoundedRectPath(ctx, x + 8, sy, w - 16, 3, 2);
        ctx.fill();
      }

      if (mode === "smoke") {
        rechargedHudV2VentSmokePuffs.forEach((p) => {
          const alpha = (1 - (p.life / p.maxLife)) * 0.18;
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
          g.addColorStop(0, `rgba(230,230,230,${alpha})`);
          g.addColorStop(0.45, `rgba(140,140,140,${alpha * 0.42})`);
          g.addColorStop(1, "rgba(80,80,80,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }

    function drawRechargedHudV2BottomVents(ctx, time) {
      drawRechargedHudV2BottomVentCutout(ctx, 256, 1028, 154, 44, "smoke", time);
      drawRechargedHudV2BottomVentCutout(ctx, 1410, 1028, 154, 44, "eyes", time);
    }

    function drawRechargedHudV2VintageRadioScale(ctx, time) {
      const w = 516;
      const h = 34;
      const x = Math.round((RECHARGED_HUD_V2_MASTER_W - w) * 0.5);
      const y = 1023;
      const pad = 12;
      const innerX = x + pad;
      const innerY = y + 8;
      const innerW = w - (pad * 2);
      const innerH = h - 16;
      const scaleY = innerY + innerH * 0.56;

      ctx.save();
      const frameGrad = ctx.createLinearGradient(0, y, 0, y + h);
      frameGrad.addColorStop(0, "rgba(104,76,52,0.56)");
      frameGrad.addColorStop(0.42, "rgba(68,46,30,0.72)");

      ctx.fillStyle = "rgba(0,0,0,0.22)";
      drawRechargedHudV2RoundedRectPath(ctx, x + 2, y + h - 8, w - 4, 6, 6);
      ctx.fill();

      const glassGrad = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
      glassGrad.addColorStop(0, "rgba(12,8,6,0.88)");
      glassGrad.addColorStop(0.45, "rgba(28,18,12,0.86)");
      glassGrad.addColorStop(1, "rgba(6,4,3,0.90)");
      ctx.fillStyle = glassGrad;
      drawRechargedHudV2RoundedRectPath(ctx, innerX, innerY, innerW, innerH, 5);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,205,140,0.10)";
      drawRechargedHudV2RoundedRectPath(ctx, innerX + 0.5, innerY + 0.5, innerW - 1, innerH - 1, 5);
      ctx.stroke();

      const warmScan = ctx.createLinearGradient(innerX, 0, innerX + innerW, 0);
      warmScan.addColorStop(0, "rgba(255,180,106,0)");
      warmScan.addColorStop(0.5, "rgba(255,196,128,0.08)");
      warmScan.addColorStop(1, "rgba(255,180,106,0)");
      ctx.fillStyle = warmScan;
      ctx.fillRect(innerX + 2, innerY + 2, innerW - 4, innerH - 4);

      ctx.shadowColor = "rgba(255,182,104,0.30)";
      ctx.shadowBlur = 4.2;
      ctx.strokeStyle = "rgba(236,186,122,0.42)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(innerX + 8, scaleY);
      ctx.lineTo(innerX + innerW - 8, scaleY);
      ctx.stroke();

      const majorStep = 8;
      const tickCount = 40;
      for (let i = 0; i <= tickCount; i += 1) {
        const t = i / tickCount;
        const tx = innerX + 8 + (t * (innerW - 16));
        const major = i % majorStep === 0;
        const mid = !major && i % 4 === 0;
        const tickH = major ? 7 : (mid ? 5 : 3);
        if (major) {
          ctx.shadowBlur = 4.8;
          ctx.strokeStyle = "rgba(248,202,136,0.58)";
        } else if (mid) {
          ctx.shadowBlur = 3.2;
          ctx.strokeStyle = "rgba(230,176,112,0.34)";
        } else {
          ctx.shadowBlur = 1.8;
          ctx.strokeStyle = "rgba(216,166,104,0.26)";
        }
        ctx.beginPath();
        ctx.moveTo(tx, scaleY - tickH);
        ctx.lineTo(tx, scaleY + 1);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";

      const labels = [88, 92, 96, 100, 104, 108];
      ctx.fillStyle = "rgba(248,206,146,0.68)";
      ctx.font = "600 8px 'Courier New', monospace";
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.shadowColor = "rgba(255,186,112,0.56)";
      ctx.shadowBlur = 4.6;
      for (let i = 0; i < labels.length; i += 1) {
        const t = i / (labels.length - 1);
        const lx = innerX + 8 + (t * (innerW - 16));
        ctx.fillText(String(labels[i]), lx, innerY + innerH - 1);
      }
      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";

      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(236,188,132,0.46)";
      ctx.shadowColor = "rgba(255,178,98,0.32)";
      ctx.shadowBlur = 2.2;
      ctx.fillText("FM", innerX + 6, innerY + 7);
      ctx.textAlign = "right";
      ctx.fillText("MHz", innerX + innerW - 6, innerY + 7);
      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";

      for (let i = 0; i < 10; i += 1) {
        const t = i / 9;
        const sx = innerX + 10 + (t * (innerW - 20)) + (Math.sin((time * 0.09) + i * 1.7) * 2.8);
        const sy = innerY + 3 + (Math.sin((time * 0.13) + i * 0.9) * 1.4);
        const sa = 0.02 + ((Math.sin((time * 0.17) + i * 2.4) * 0.5 + 0.5) * 0.03);
        ctx.strokeStyle = `rgba(255,220,182,${sa.toFixed(3)})`;
        ctx.beginPath();
        ctx.moveTo(sx - 5, sy);
        ctx.lineTo(sx + 7, sy + 0.4);
        ctx.stroke();
      }

      const edgeSparkPhases = [0.0, 1.3, 2.8, 3.9, 5.1, 6.2];
      for (let i = 0; i < edgeSparkPhases.length; i += 1) {
        const t = i / (edgeSparkPhases.length - 1);
        const ex = innerX + 16 + (t * (innerW - 32));
        const pulse = Math.sin((time * 0.062) + edgeSparkPhases[i]) * 0.5 + 0.5;
        const edgeA = 0.014 + pulse * 0.035;
        const sparkW = 8 + pulse * 2;
        ctx.strokeStyle = `rgba(255,214,160,${edgeA.toFixed(3)})`;
        ctx.beginPath();
        ctx.moveTo(ex - sparkW * 0.5, innerY + 1.6);
        ctx.lineTo(ex + sparkW * 0.5, innerY + 1.6);
        ctx.stroke();

        ctx.strokeStyle = `rgba(212,156,102,${(edgeA * 0.62).toFixed(3)})`;
        ctx.beginPath();
        ctx.moveTo(ex - (sparkW * 0.4), innerY + innerH - 1.6);
        ctx.lineTo(ex + (sparkW * 0.4), innerY + innerH - 1.6);
        ctx.stroke();
      }

      const markerBase =
        0.5
        + (Math.sin((time * 0.081) + 0.7) * 0.26)
        + (Math.sin((time * 0.047) + 2.1) * 0.17)
        + (Math.sin((time * 0.133) + 4.6) * 0.09);
      const markerT = Math.max(0.02, Math.min(0.98, markerBase));
      const markerX = innerX + 8 + (markerT * (innerW - 16));
      const markerPulse = 0.86 + ((Math.sin((time * 0.25) + 0.5) * 0.5 + 0.5) * 0.22);
      const markerGlow = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
      markerGlow.addColorStop(0, `rgba(255,236,194,${(0.50 * markerPulse).toFixed(3)})`);
      markerGlow.addColorStop(0.5, `rgba(255,196,120,${(0.36 * markerPulse).toFixed(3)})`);
      markerGlow.addColorStop(1, `rgba(188,126,84,${(0.24 * markerPulse).toFixed(3)})`);
      ctx.shadowColor = `rgba(255,184,108,${(0.54 * markerPulse).toFixed(3)})`;
      ctx.shadowBlur = 8.8;
      ctx.fillStyle = markerGlow;
      ctx.fillRect(markerX - 0.75, innerY + 1, 1.5, innerH - 2);
      ctx.fillStyle = `rgba(255,224,170,${(0.30 * markerPulse).toFixed(3)})`;
      ctx.fillRect(markerX - 2.6, innerY + 1, 5.2, innerH - 2);
      ctx.fillStyle = `rgba(255,245,220,${(0.56 * markerPulse).toFixed(3)})`;
      ctx.fillRect(markerX - 0.32, innerY + 1.2, 0.64, innerH - 2.4);

      const markerCapGlow = ctx.createRadialGradient(markerX, innerY + 2.1, 0.2, markerX, innerY + 2.1, 4.2);
      markerCapGlow.addColorStop(0, `rgba(255,240,196,${(0.56 * markerPulse).toFixed(3)})`);
      markerCapGlow.addColorStop(0.45, `rgba(255,196,126,${(0.30 * markerPulse).toFixed(3)})`);
      markerCapGlow.addColorStop(1, "rgba(255,190,120,0)");
      ctx.fillStyle = markerCapGlow;
      ctx.beginPath();
      ctx.ellipse(markerX, innerY + 2.1, 3.6, 2.1, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowColor = "rgba(255,174,96,0.24)";
      ctx.shadowBlur = 2.4;
      ctx.strokeStyle = "rgba(255,208,150,0.22)";
      ctx.lineWidth = 1;
      drawRechargedHudV2RoundedRectPath(ctx, innerX + 1.5, innerY + 1.5, innerW - 3, innerH - 3, 4);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";

      ctx.restore();
    }

    // Dashboard.html structural port (Phase 5): drawLivesPanel(time)
    // Source mapping:
    // - startX=610,y=26,slotW=42,iconW=30,iconH=30
    // - label "LIFE" at startX-36,y+18
    // - loop count: ownedLives
    // - active slot condition: i < currentLives
    // - active/inactive bulb sprite + seat/aura rendering
    function drawRechargedHudV2LivesPanel(ctx, time, lives, livesMax) {
      const drawRoundedRectPath = (x, ry, w, h, r) => {
        ctx.beginPath();
        ctx.moveTo(x + r, ry);
        ctx.arcTo(x + w, ry, x + w, ry + h, r);
        ctx.arcTo(x + w, ry + h, x, ry + h, r);
        ctx.arcTo(x, ry + h, x, ry, r);
        ctx.arcTo(x, ry, x + w, ry, r);
        ctx.closePath();
      };
      const startX = 610;
      const y = 26;
      const slotW = 42;
      const iconW = 30;
      const iconH = 30;
      const ownedLives = Math.max(1, Math.floor(livesMax));
      const currentLives = Math.max(0, Math.min(ownedLives, Math.floor(lives)));

      ctx.save();
      ctx.font = "600 9px Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255,196,122,0.20)";
      ctx.fillText("LIFE", startX - 36, y + 18);

      for (let i = 0; i < ownedLives; i += 1) {
        const x = startX + i * slotW;
        const on = i < currentLives;

        const seatGrad = ctx.createLinearGradient(0, y - 2, 0, y + iconH + 4);
        seatGrad.addColorStop(0, "rgba(10,4,2,0.24)");
        seatGrad.addColorStop(1, "rgba(0,0,0,0.18)");
        ctx.fillStyle = seatGrad;
        drawRoundedRectPath(x - 4, y - 1, 34, 34, 7);
        ctx.fill();

        if (on) {
          const pulse = 0.96 + Math.sin(time * 0.9 + i * 0.6) * 0.06;
          const gx = x + iconW / 2;
          const gy = y + 10;

          const auraOuter = ctx.createRadialGradient(gx, gy, 0, gx, gy, 34);
          auraOuter.addColorStop(0, `rgba(255,246,190,${0.24 * pulse})`);
          auraOuter.addColorStop(0.30, `rgba(255,214,110,${0.18 * pulse})`);
          auraOuter.addColorStop(0.62, `rgba(255,168,72,${0.10 * pulse})`);
          auraOuter.addColorStop(1, "rgba(255,120,60,0)");
          ctx.fillStyle = auraOuter;
          ctx.beginPath();
          ctx.arc(gx, gy, 34, 0, Math.PI * 2);
          ctx.fill();

          const auraInner = ctx.createRadialGradient(gx, gy, 0, gx, gy, 18);
          auraInner.addColorStop(0, `rgba(255,252,226,${0.30 * pulse})`);
          auraInner.addColorStop(0.45, `rgba(255,224,132,${0.16 * pulse})`);
          auraInner.addColorStop(1, "rgba(255,150,70,0)");
          ctx.fillStyle = auraInner;
          ctx.beginPath();
          ctx.arc(gx, gy, 18, 0, Math.PI * 2);
          ctx.fill();

          if (rechargedHudV2BulbOnImg.complete && rechargedHudV2BulbOnImg.naturalWidth > 0) {
            ctx.drawImage(rechargedHudV2BulbOnImg, x, y, iconW, iconH);
          }

          const overGlow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 14);
          overGlow.addColorStop(0, `rgba(255,248,214,${0.14 * pulse})`);
          overGlow.addColorStop(0.55, `rgba(255,210,116,${0.08 * pulse})`);
          overGlow.addColorStop(1, "rgba(255,150,70,0)");
          ctx.fillStyle = overGlow;
          ctx.beginPath();
          ctx.arc(gx, gy, 14, 0, Math.PI * 2);
          ctx.fill();
        } else {
          if (rechargedHudV2BulbOffImg.complete && rechargedHudV2BulbOffImg.naturalWidth > 0) {
            ctx.globalAlpha = 0.92;
            ctx.drawImage(rechargedHudV2BulbOffImg, x, y, iconW, iconH);
            ctx.globalAlpha = 1;
          }
          ctx.fillStyle = "rgba(0,0,0,0.10)";
          drawRoundedRectPath(x - 1, y + 1, 26, 24, 6);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    // Dashboard.html structural port (Phase 6): drawFlarePanel(time)

    // - startX=900,y=26,slotW=56,iconW=34,iconH=34
    // - label "FLARE" at startX-44,y+18

        ctx.arcTo(x + w, ry + h, x, ry + h, r);

      };
      const startX = 900;
