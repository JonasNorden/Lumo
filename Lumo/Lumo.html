<!doctype html>
<html lang="sv">

    <div class="bootHUD" role="presentation">
      <div class="bootBar" id="bootBar"></div>

  <!-- Legacy DOM hooks required by app.js (kept hidden via CSS) -->
  <button id="btnRestart" type="button">Restart</button>
  <input id="fileLevel" type="file" accept=".json,.js,application/json,text/javascript" />
  <div id="hudLives"></div>

  <div id="hudCP"></div>
  <div id="hudDebug"></div>

  <script defer src="data/tileset.js"></script>
  <script defer src="data/catalog_profiles.js"></script>
  <script defer src="data/catalog_bg.js"></script>
  <script defer src="data/catalog_tiles.js"></script>
  <script defer src="data/levels/level01.js"></script>
  <script defer src="src/core/util.js"></script>
  <script defer src="src/core/input.js"></script>
  <script defer src="src/core/time.js"></script>
  <script defer src="src/core/camera.js"></script>
  <script defer src="src/core/renderer.js"></script>
  <script defer src="src/game/world.js"></script>
  <script defer src="src/game/player.js"></script>
  <script defer src="data/catalog_entities.js"></script>
  <script defer src="src/game/entities.js"></script>
  <script defer src="data/audio_global_config.js"></script>
  <script type="module" defer>
    import { bootLumoRechargedFromQuery } from "./editor-v2/src/runtime/bootLumoRechargedFromQuery.js";
    import { createLumoRechargedBootAdapter } from "./editor-v2/src/runtime/createLumoRechargedBootAdapter.js";
    import { loadNextRechargedLevelFromIntermission } from "./editor-v2/src/runtime/rechargedIntermissionNextLevelFlow.js";
    import { buildRechargedHudSnapshot } from "./editor-v2/src/runtime/buildRechargedHudSnapshot.js";
    import {
      FIREFLY_AUDIO_PATH,
      createFireflyAudioBridge,
      syncFireflyAudioFrame,
    } from "./editor-v2/src/runtime/fireflyAudioRuntime.js";

    const RECHARGED_FIXED_STEP_MS = 1000 / 60;
    const RECHARGED_MAX_CATCH_UP_STEPS = 6;
    const RECHARGED_PLAYER_SPRITE_IDLE_FRAMES = [
      "data/assets/sprites/lumo/lumo_idle_1.png",
      "data/assets/sprites/lumo/lumo_idle_2.png",
      "data/assets/sprites/lumo/lumo_idle_3.png",
      "data/assets/sprites/lumo/lumo_idle_4.png",
    ];
    const RECHARGED_PLAYER_SPRITE_RUN_FRAMES = [
      "data/assets/sprites/lumo/lumo_walk_1.png",
      "data/assets/sprites/lumo/lumo_walk_2.png",
      "data/assets/sprites/lumo/lumo_walk_3.png",
      "data/assets/sprites/lumo/lumo_walk_4.png",
    ];
    const RECHARGED_PLAYER_SPRITE_JUMP = "data/assets/sprites/lumo/lumo_jump_up.png";
    const RECHARGED_PLAYER_SPRITE_FALL = "data/assets/sprites/lumo/lumo_jump_down.png";
    const RECHARGED_PLAYER_SPRITE_BRAKE = "data/assets/sprites/lumo/lumo_brake_1.png";
    const RECHARGED_ENTITY_SPRITE_FLARE_PICKUP = "data/assets/sprites/pickups/flare_pickup_01.png";
    const RECHARGED_ENTITY_SPRITE_POWERCELLS = [
      "data/assets/sprites/pickups/pc_01.png",
      "data/assets/sprites/pickups/pc_02.png",
      "data/assets/sprites/pickups/pc_03.png",
      "data/assets/sprites/pickups/pc_04.png",
    ];
    const RECHARGED_ENTITY_SPRITE_CHECKPOINT = "data/assets/sprites/lights/lantern_2.png";
    const RECHARGED_ENTITY_SPRITE_LANTERN = "data/assets/sprites/lights/lantern_01.png";
    const RECHARGED_ENTITY_SPRITE_DARK_CREATURE_IDLE = [
      "data/assets/sprites/creatures/dc_idle_3.png",
      "data/assets/sprites/creatures/dc_idle_4.png",
    ];
    const RECHARGED_ENTITY_SPRITE_FIREFLIES = [
      "data/assets/sprites/lights/firefly_01.png",
      "data/assets/sprites/lights/firefly_02.png",
      "data/assets/sprites/lights/firefly_03.png",
    ];
    const RECHARGED_ENTITY_SPRITE_DARK_SPELL_FLIGHT = "data/assets/sprites/creatures/void_m_04.png";
    const RECHARGED_ENTITY_SPRITE_DARK_SPELL_IMPACT03 = "data/assets/sprites/creatures/void_m_03.png";
    const RECHARGED_ENTITY_SPRITE_DARK_SPELL_IMPACT02 = "data/assets/sprites/creatures/void_m_02.png";
    const RECHARGED_ENTITY_SPRITE_DARK_SPELL_IMPACT01 = "data/assets/sprites/creatures/void_m_01.png";
    const RECHARGED_PLAYER_HORIZONTAL_SPEED_EPSILON = 0.05;
    const RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON = 0.05;
    const RECHARGED_PLAYER_IDLE_FPS = 7;
    const RECHARGED_PLAYER_IDLE_LAST_INDEX = 3;
    const RECHARGED_PLAYER_RUN_FPS = 9;
    const RECHARGED_PLAYER_RUN_LAST_INDEX = 3;
    const RECHARGED_PLAYER_RUN_BASE_SPEED = 230;
    const RECHARGED_PLAYER_HITBOX_WIDTH = 22;
    const RECHARGED_PLAYER_HITBOX_HEIGHT = 28;
    const RECHARGED_PLAYER_SPRITE_WIDTH = 24;
    const RECHARGED_PLAYER_SPRITE_HEIGHT = 38;
    const RECHARGED_PLAYER_BRAKE_SPRITE_HEIGHT = 48;
    const RECHARGED_PLAYER_BRAKE_SPRITE_MAX_WIDTH = 28;
    const RECHARGED_UI_GAME_OVER_IMAGE = "data/assets/ui/gameover.png";

    function createRechargedSpriteImage(src) {
      const image = new Image();
      image.decoding = "async";
      image.src = src;
      return image;
    }

    function ensureRechargedPlayerSpriteCache(state) {
      if (!state || typeof state !== "object") {
        return null;
      }

      if (!state.playerSpriteCache || typeof state.playerSpriteCache !== "object") {
        state.playerSpriteCache = {
          idleFrames: RECHARGED_PLAYER_SPRITE_IDLE_FRAMES.map((src) => createRechargedSpriteImage(src)),
          idle: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_IDLE_FRAMES[0]),
          runFrames: RECHARGED_PLAYER_SPRITE_RUN_FRAMES.map((src) => createRechargedSpriteImage(src)),
          run: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_RUN_FRAMES[0]),
          jump: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_JUMP),
          fall: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_FALL),
          brake: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_BRAKE),
        };
      }

      return state.playerSpriteCache;
    }

    function resolveRechargedPlayerAnimationState(playerSnapshot, previousAnimationState = "idle") {
      const grounded = playerSnapshot?.grounded === true;
      const rising = playerSnapshot?.rising === true;
      const falling = playerSnapshot?.falling === true;
      const locomotion = typeof playerSnapshot?.locomotion === "string" ? playerSnapshot.locomotion : "";
      const velocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      const velocityY = Number.isFinite(playerSnapshot?.velocity?.y) ? playerSnapshot.velocity.y : 0;
      const movingHorizontally = Math.abs(velocityX) > RECHARGED_PLAYER_HORIZONTAL_SPEED_EPSILON;

      if (grounded) {
        if (locomotion === "braking-grounded") {
          return "brake";
        }
        return movingHorizontally || locomotion === "moving-grounded" ? "run" : "idle";
      }

      if (rising || locomotion === "rising" || velocityY < -RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON) {
        return "jump";
      }

      if (falling || locomotion === "falling" || velocityY > RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON) {
        return "fall";
      }

      if (locomotion === "airborne-moving" || locomotion === "airborne-neutral") {
        return "jump";
      }

      return previousAnimationState === "fall" ? "fall" : "jump";
    }

    // Mirrors V1 idle animation cadence exactly: 0→1→2→3→2→1→...
    function resolveRechargedIdleSpriteFrame(state, spriteCache, animationState, nowMs) {
      if (!state || !spriteCache || animationState !== "idle") {
        return spriteCache?.idle || null;
      }

      if (!state.playerIdleAnimation || typeof state.playerIdleAnimation !== "object") {
        state.playerIdleAnimation = { i: 0, dir: 1, t: 0, lastAtMs: null };
      }

      const idleAnimation = state.playerIdleAnimation;
      const frames = Array.isArray(spriteCache.idleFrames) ? spriteCache.idleFrames : [spriteCache.idle];
      const frameStepMs = 1000 / Math.max(1, RECHARGED_PLAYER_IDLE_FPS);
      const safeNowMs = Number.isFinite(nowMs) ? nowMs : performance.now();
      const elapsedMs = idleAnimation.lastAtMs === null ? 0 : Math.max(0, safeNowMs - idleAnimation.lastAtMs);
      idleAnimation.lastAtMs = safeNowMs;
      idleAnimation.t += elapsedMs;

      while (idleAnimation.t >= frameStepMs) {
        idleAnimation.t -= frameStepMs;
        idleAnimation.i += idleAnimation.dir;
        if (idleAnimation.i >= RECHARGED_PLAYER_IDLE_LAST_INDEX) {
          idleAnimation.i = RECHARGED_PLAYER_IDLE_LAST_INDEX;
          idleAnimation.dir = -1;
        }
        if (idleAnimation.i <= 0) {
          idleAnimation.i = 0;
          idleAnimation.dir = 1;
        }
      }

      const frameIndex = Math.max(0, Math.min(RECHARGED_PLAYER_IDLE_LAST_INDEX, idleAnimation.i | 0));
      return frames[frameIndex] || frames[0] || spriteCache.idle || null;
    }

    // Mirrors V1 grounded walk cadence: 0→1→2→3→0 with speed-scaled fps.
    function resolveRechargedRunSpriteFrame(state, spriteCache, animationState, playerSnapshot, nowMs) {
      if (!state || !spriteCache || animationState !== "run") {
        return spriteCache?.run || spriteCache?.idle || null;
      }

      if (!state.playerRunAnimation || typeof state.playerRunAnimation !== "object") {
        state.playerRunAnimation = { i: 0, t: 0, lastAtMs: null };
      }

      const runAnimation = state.playerRunAnimation;
      const frames = Array.isArray(spriteCache.runFrames) ? spriteCache.runFrames : [spriteCache.run];
      const velocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      const speedRatio = Math.max(0, Math.min(1.75, Math.abs(velocityX) / Math.max(1, RECHARGED_PLAYER_RUN_BASE_SPEED)));
      const runFps = RECHARGED_PLAYER_RUN_FPS * (0.65 + 0.55 * speedRatio);
      const frameStepMs = 1000 / Math.max(1, runFps);
      const safeNowMs = Number.isFinite(nowMs) ? nowMs : performance.now();
      const elapsedMs = runAnimation.lastAtMs === null ? 0 : Math.max(0, safeNowMs - runAnimation.lastAtMs);
      runAnimation.lastAtMs = safeNowMs;
      runAnimation.t += elapsedMs;

      while (runAnimation.t >= frameStepMs) {
        runAnimation.t -= frameStepMs;
        runAnimation.i = (runAnimation.i + 1) % (RECHARGED_PLAYER_RUN_LAST_INDEX + 1);
      }

      const frameIndex = Math.max(0, Math.min(RECHARGED_PLAYER_RUN_LAST_INDEX, runAnimation.i | 0));
      return frames[frameIndex] || frames[0] || spriteCache.run || spriteCache.idle || null;
    }

    function createLumoRechargedCanvasVerificationState() {
      return {
        active: false,
        canvasId: "",
        autoplay: false,
        frameCount: 0,
        lastPlayerX: null,
        lastPlayerY: null,
        lastRenderOk: false,
        lastTickOk: null,
        previousPlayerSnapshot: null,
        currentPlayerSnapshot: null,
        playerAnimationState: "idle",
        playerIdleAnimation: null,
        playerRunAnimation: null,
        renderAlpha: 0,
        stepAccumulatorMs: 0,
        lastStepAtMs: null,
        width: null,
        height: null,
        hud: null,
        currentLevelPath: "",
        nextLevelLoadPending: false,
      };
    }

    // Runs one safe intermission Enter transition to the next local Recharged level.
    async function tryLoadNextRechargedLevel(state) {
      if (!state || typeof state !== "object" || state.nextLevelLoadPending === true) {
        return false;
      }

      state.nextLevelLoadPending = true;
      try {
        const transition = await loadNextRechargedLevelFromIntermission({
          currentLevelPath: state.currentLevelPath,
          bootFromQuery(options = {}) {
            let liveAdapter = null;
            return bootLumoRechargedFromQuery({
              search: options?.search,
              createAdapter(adapterOptions = {}) {
                const adapter = createLumoRechargedBootAdapter(adapterOptions);
                liveAdapter = adapter;
                return adapter;
              },
            }).then((result) => (
              liveAdapter && typeof liveAdapter === "object"
                ? { ...(result && typeof result === "object" ? result : {}), adapter: liveAdapter }
                : result
            ));
          },
        });

        if (transition?.ok === true && transition?.bootResult && typeof transition.bootResult === "object") {
          window.__LumoRechargedBoot = transition.bootResult;
          state.currentLevelPath = transition.nextLevelPath;
          state.intermissionAcknowledged = false;
          state.intermissionAcknowledgedMessage = "";
          const payload = readLatestRechargedBootPayload();
          const playerSnapshot = payload?.player && typeof payload.player === "object" ? payload.player : null;
          state.previousPlayerSnapshot = playerSnapshot;
          state.currentPlayerSnapshot = playerSnapshot;
          state.lastPlayerX = Number.isFinite(payload?.playerX) ? payload.playerX : null;
          state.lastPlayerY = Number.isFinite(payload?.playerY) ? payload.playerY : null;
          return true;
        }

        state.intermissionAcknowledged = true;
        state.intermissionAcknowledgedMessage = "Next level not available";
        return false;
      } catch (_error) {
        state.intermissionAcknowledged = true;
        state.intermissionAcknowledgedMessage = "Next level not available";
        return false;
      } finally {
        state.nextLevelLoadPending = false;
      }
    }

    function ensureLumoRechargedCanvasVerificationState() {
      try {
        if (!window.__LumoRechargedCanvas || typeof window.__LumoRechargedCanvas !== "object") {
          window.__LumoRechargedCanvas = createLumoRechargedCanvasVerificationState();
        }
      } catch (_error) {
        // Keeps this verification support strictly non-fatal.
      }

      try {
        return window.__LumoRechargedCanvas || createLumoRechargedCanvasVerificationState();
      } catch (_error) {
        return createLumoRechargedCanvasVerificationState();
      }
    }

    function readLatestRechargedBootPayload() {
      try {
        const payload = window.__LumoRechargedBoot;
        if (!payload || typeof payload !== "object") {
          return null;
        }

        return payload;
      } catch (_error) {
        return null;
      }
    }

    function createRechargedInputIntentState() {
      return {
        left: false,
        right: false,
        jump: false,
        flare: false,
        pulse: false,
        boost: false,
        continuePressed: false,
      };
    }

    function installRechargedInputIntentSync() {
      const state = createRechargedInputIntentState();

      const readCode = (event) => (typeof event?.code === "string" ? event.code : "");
      const update = (event, pressed) => {
        const code = readCode(event);
        if (code === "ArrowLeft") {
          state.left = pressed;
        } else if (code === "ArrowRight") {
          state.right = pressed;
        } else if (code === "KeyA") {
          state.jump = pressed;
        } else if (code === "KeyS") {
          state.flare = pressed;
        } else if (code === "KeyD") {
          state.pulse = pressed;
        } else if (code === "Space") {
          state.boost = pressed;
        } else if (code === "Enter") {
          if (pressed === true && state._enterDown !== true) {
            state.continuePressed = true;
          }
          state._enterDown = pressed;
        }
      };

      try {
        window.addEventListener("keydown", (event) => update(event, true), { passive: true });
        window.addEventListener("keyup", (event) => update(event, false), { passive: true });
      } catch (_error) {
        // Input sync is best-effort and must never throw.
      }

      return state;
    }

    function createRechargedHudOverlay() {
      return {
        lives: 4,
        livesMax: 4,
        energyPct: 100,
        flares: 0,
        flareFlash: 0,
        score: 0,
        checkpointLit: false,
        checkpointRingT: 0,
        popups: [],
        _prevFlares: 0,
        _pauseBtnHover: false,
      };
    }

    function ensureRechargedHudRenderer(state, canvas) {
      if (!state || !canvas || typeof canvas.getContext !== "function") {
        return null;
      }

      const rendererCtor = window?.Lumo?.Renderer;
      if (typeof rendererCtor !== "function") {
        return null;
      }

      if (!state.rechargedHudRenderer || state.rechargedHudRenderer.cv !== canvas) {
        state.rechargedHudRenderer = new rendererCtor(canvas);
      }

      return state.rechargedHudRenderer;
    }

    function drawRechargedHudReplica(canvas, state) {
      const hud = state?.hud;
      if (!hud) {
        return;
      }

      const renderer = ensureRechargedHudRenderer(state, canvas);
      if (!renderer || typeof renderer.drawHUD !== "function") {
        return;
      }

      renderer.w = canvas.width;
      renderer.h = canvas.height;
      const hudCtx = renderer.ctx;
      const originalFillText = hudCtx && typeof hudCtx.fillText === "function"
        ? hudCtx.fillText.bind(hudCtx)
        : null;
      if (hudCtx && originalFillText) {
        hudCtx.fillText = (text, ...args) => {
          if (typeof text === "string" && text.trim().toUpperCase() === "MENU") {
            return;
          }
          return originalFillText(text, ...args);
        };
      }
      try {
        renderer.drawHUD(hud);
      } finally {
        if (hudCtx && originalFillText) {
          hudCtx.fillText = originalFillText;
        }
      }
      hud._pauseBtn = null;
    }

    // Updates Recharged HUD model from live adapter snapshots with safe fallbacks.
    function updateRechargedHudOverlay(hud, payload, state) {
      if (!hud) {
        return;
      }

      const snapshot = buildRechargedHudSnapshot(payload, state);
      const energyRatio = Number.isFinite(snapshot.energy) ? Math.max(0, Math.min(1, snapshot.energy)) : 0;
      const flareStash = Number.isFinite(snapshot.flareStash) ? Math.max(0, Math.floor(snapshot.flareStash)) : 0;
      const nowMs = typeof performance?.now === "function" ? performance.now() : Date.now();
      const previousMs = Number.isFinite(state?.lastHudUpdateAtMs) ? state.lastHudUpdateAtMs : nowMs;
      const dt = Math.max(0, (nowMs - previousMs) / 1000);

      if (flareStash !== (hud._prevFlares | 0)) {
        hud.flareFlash = 0.25;
      } else {
        hud.flareFlash = Math.max(0, Number(hud.flareFlash || 0) - dt);
      }

      hud._prevFlares = flareStash;
      hud.lives = Number.isFinite(snapshot.lives) ? Math.max(0, Math.floor(snapshot.lives)) : hud.lives;
      hud.energyPct = Math.round(energyRatio * 100);
      hud.flares = flareStash;
      const hudDebug = document.getElementById("hudDebug");
      if (hudDebug) {
        hudDebug.textContent = state?.intermissionAcknowledgedMessage || "";
      }

      if (state && typeof state === "object") {
        state.lastHudUpdateAtMs = nowMs;
      }
    }

    function createRechargedFireflyAudioState() {
      return {
        keyByEntityId: new Map(),
        handlesByKey: new Map(),
        nextFireflyAudioId: 1,
        bridge: null,
      };
    }

    // Renders V1-style respawn countdown overlay in active Recharged canvas.
    function drawRechargedRespawnOverlay(canvas, ctx, payload, state) {
      const hudSnapshot = buildRechargedHudSnapshot(payload, state);
      const payloadRespawnPending = payload?.respawnPending === true;
      const payloadRespawnCount = Number.isFinite(payload?.respawnCount) ? Math.max(0, Math.ceil(payload.respawnCount)) : null;
      if (payloadRespawnPending !== true) {
        return false;
      }

      const fallbackCount = Number.isFinite(hudSnapshot?.respawnCount) ? Math.max(0, Math.ceil(hudSnapshot.respawnCount)) : 0;
      const n = Number.isFinite(payloadRespawnCount) ? Math.max(0, Math.floor(payloadRespawnCount)) : Math.max(0, Math.floor(fallbackCount));
      const cx = canvas.width * 0.5;
      const cy = canvas.height * 0.45;
      const gap = Math.max(54, Math.round(canvas.width * 0.055));
      const wordFontSize = Math.max(52, Math.round(canvas.height * 0.11));
      const numberFontSize = Math.max(58, Math.round(canvas.height * 0.12));

      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.font = `700 ${wordFontSize}px "Cooper Black","Arial Black",Impact,sans-serif`;
      const wordGradient = ctx.createLinearGradient(0, cy - wordFontSize, 0, cy + wordFontSize);
      wordGradient.addColorStop(0.00, "#FFF3B0");
      wordGradient.addColorStop(0.45, "#FFD44D");
      wordGradient.addColorStop(1.00, "#FF8A00");
      ctx.fillStyle = wordGradient;
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.lineWidth = Math.max(10, Math.round(wordFontSize * 0.3));
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.strokeText("RESPAWN", cx - gap * 0.5, cy);
      ctx.lineWidth = Math.max(6, Math.round(wordFontSize * 0.18));
      ctx.strokeStyle = "rgba(40,90,170,0.95)";
      ctx.strokeText("RESPAWN", cx - gap * 0.5, cy);
      ctx.fillText("RESPAWN", cx - gap * 0.5, cy);

      ctx.textAlign = "left";
      ctx.font = `700 ${numberFontSize}px "Cooper Black","Arial Black",Impact,sans-serif`;
      const numberGradient = ctx.createLinearGradient(0, cy - numberFontSize, 0, cy + numberFontSize);
      numberGradient.addColorStop(0.00, "#111");
      numberGradient.addColorStop(0.55, "#B10014");
      numberGradient.addColorStop(1.00, "#FF2B2B");
      ctx.fillStyle = numberGradient;
      ctx.lineWidth = Math.max(8, Math.round(numberFontSize * 0.2));
      ctx.strokeStyle = "rgba(0,0,0,0.70)";
      ctx.strokeText(String(n), cx + gap * 0.5, cy);
      ctx.lineWidth = Math.max(4, Math.round(numberFontSize * 0.1));
      ctx.strokeStyle = "rgba(255,210,120,0.95)";
      ctx.strokeText(String(n), cx + gap * 0.5, cy);
      ctx.fillText(String(n), cx + gap * 0.5, cy);
      ctx.restore();
      return true;
    }

    function drawRechargedGameOverOverlay(canvas, ctx, payload, state) {
      const hudSnapshot = buildRechargedHudSnapshot(payload, state);
      if (hudSnapshot?.gameState !== "gameover") {
        return false;
      }

      if (!state.rechargedGameOverImage) {
        state.rechargedGameOverImage = createRechargedSpriteImage(RECHARGED_UI_GAME_OVER_IMAGE);
      }
      const image = state.rechargedGameOverImage;
      const imageReady = image && image.complete && image.naturalWidth > 0;

      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      if (imageReady) {
        const scale = Math.min(canvas.width / image.naturalWidth, canvas.height / image.naturalHeight);
        const drawW = image.naturalWidth * scale;
        const drawH = image.naturalHeight * scale;
        const drawX = (canvas.width - drawW) * 0.5;
        const drawY = (canvas.height - drawH) * 0.5;
        ctx.drawImage(image, drawX, drawY, drawW, drawH);
      } else {
        ctx.fillStyle = "#080A13";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // Keep runtime game-over rendering limited to the authored texture/pass only.
      // Temporary debug marker/menu-copy text is intentionally removed.
      ctx.restore();
      return true;

    function readRechargedLiquidSnapshots(payload, state) {

    function drawRechargedLiquidVolumes(ctx, mapper, liquidVolumes) {

        const surfaceY = rect.y;
        const bodyBottomY = rect.y + rect.h;

          bodyGradient.addColorStop(0, topColor);
          bodyGradient.addColorStop(1, bodyColor);

          for (let i = 0; i < surfacePoints.length; i += 1) {

            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          ctx.strokeStyle = "rgba(220,246,255,0.9)";
          ctx.lineWidth = 1.4;
          ctx.stroke();
          const sheenGradient = ctx.createLinearGradient(rect.x, surfaceY - surfaceBand * 0.2, rect.x, surfaceY + surfaceBand * 1.2);
          sheenGradient.addColorStop(0, "rgba(232,252,255,0.42)");
          sheenGradient.addColorStop(1, "rgba(232,252,255,0)");
          ctx.fillStyle = sheenGradient;
          ctx.fillRect(rect.x, rect.y, rect.w, Math.max(2, surfaceBand));
        } else if (volume.type === "lava_volume") {
          const hotness = volume.temperature;
          const crust = volume.crustAmount;
          const flowSpeed = Math.max(0.15, volume.flowSpeed);
          const surfaceAmp = Math.max(1.2, Math.min(14, (1.9 + hotness * 4.2) * (0.7 + flowSpeed * 0.36)));
          const surfacePoints = buildSurfacePoints(
            rect,
            surfaceAmp,
            9.4 + flowSpeed * 1.8,
            1.2 + flowSpeed * 2.8,
            nowSeconds,
            6,
          );
          const bodyGradient = ctx.createLinearGradient(rect.x, rect.y, rect.x, bodyBottomY);
          bodyGradient.addColorStop(0, `rgba(255,${Math.round(112 + hotness * 55)},34,0.98)`);
          bodyGradient.addColorStop(1, `rgba(${Math.round(85 + crust * 40)},26,8,0.98)`);
          ctx.save();
          ctx.beginPath();
          ctx.rect(rect.x, rect.y, rect.w, rect.h);
          ctx.clip();
          fillLiquidBodyFromSurface(surfacePoints, rect, bodyGradient);

          const streakAlpha = Math.max(0.16, Math.min(0.5, 0.2 + flowSpeed * 0.17));
          ctx.fillStyle = `rgba(255,210,120,${streakAlpha.toFixed(3)})`;
          const streakW = Math.max(2, Math.round(rect.w / 14));
          for (let sx = rect.x; sx < rect.x + rect.w; sx += streakW * 3) {
            const offset = Math.sin((sx * 0.03) + (nowSeconds * flowSpeed * 3.2)) * 3;
            ctx.fillRect(sx, rect.y + 2 + offset, streakW, Math.max(2, rect.h - 6));
          }
          const crustPieces = Math.max(4, Math.round((rect.w / 26) * (0.5 + crust * 2.2)));
          for (let idx = 0; idx < crustPieces; idx += 1) {
            const seed = idx + (volume.id ? volume.id.length * 0.31 : 0);
            const nx = hash01(seed * 1.91);
            const drift = Math.sin((nowSeconds * flowSpeed * (0.9 + hash01(seed * 2.7))) + seed) * (6 + crust * 10);
            const x = rect.x + (nx * rect.w) + drift;
            const w = Math.max(4, (rect.w * (0.06 + hash01(seed * 4.2) * 0.08)) * (0.5 + crust));
            const h = Math.max(2, surfaceBand * (0.28 + hash01(seed * 6.8) * 0.8));
            const y = rect.y + Math.max(1, hash01(seed * 7.4) * (surfaceBand * 1.8));
            ctx.fillStyle = `rgba(${Math.round(38 + crust * 52)},${Math.round(22 + crust * 18)},${Math.round(16 + crust * 14)},${(0.5 + crust * 0.32).toFixed(3)})`;
            ctx.beginPath();
            ctx.ellipse(x, y, w * 0.5, h * 0.5, hash01(seed * 3.1) * Math.PI, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
          ctx.beginPath();
          for (let i = 0; i < surfacePoints.length; i += 1) {
            const p = surfacePoints[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          ctx.strokeStyle = `rgba(255,236,173,${(0.65 + hotness * 0.26).toFixed(3)})`;
          ctx.lineWidth = 1.5;
          ctx.stroke();

          const shimmerHeight = Math.max(6, Math.round((6 + hotness * 11 + flowSpeed * 2.2) * (rect.h / 20)));
          ctx.save();
          ctx.beginPath();
          ctx.rect(rect.x, rect.y - shimmerHeight, rect.w, shimmerHeight + surfaceBand);
          ctx.clip();
          for (let i = 0; i < 8; i += 1) {
            const sy = rect.y - ((i + 1) / 8) * shimmerHeight;
            const wobble = Math.sin((nowSeconds * (2.3 + flowSpeed)) + i * 0.75) * (1.2 + hotness * 2.4);
            const alpha = 0.03 + (hotness * 0.06) * (1 - i / 8);
            ctx.fillStyle = `rgba(255,190,100,${alpha.toFixed(3)})`;
            ctx.fillRect(rect.x + wobble, sy, rect.w, 2);
          }
          ctx.restore();
        } else if (volume.type === "bubbling_liquid_volume") {
          const bodyColor = volume.bottomColor || "#356b28";
          const topColor = volume.topColor || "#8ef767";
          const activity = Math.max(0.05, volume.surfaceActivity);
          const bubbleDensity = Math.max(0.08, volume.bubbleAmount);
          const fumeDensity = Math.max(0, volume.fumeAmount);
          const surfaceAmp = Math.max(1.1, Math.min(12, 1.2 + activity * 5.6));
          const surfacePoints = buildSurfacePoints(
            rect,
            surfaceAmp,
            11.2 + activity * 3.5,
            1.05 + activity * 2.25,
            nowSeconds,
            6,
          );
          const bodyGradient = ctx.createLinearGradient(rect.x, rect.y, rect.x, bodyBottomY);
          bodyGradient.addColorStop(0, topColor);
          bodyGradient.addColorStop(1, bodyColor);
          ctx.save();
          ctx.beginPath();
          ctx.rect(rect.x, rect.y, rect.w, rect.h);
          ctx.clip();
          fillLiquidBodyFromSurface(surfacePoints, rect, bodyGradient);

          const toxicity = Math.max(activity, bubbleDensity);
          ctx.fillStyle = `rgba(214,255,175,${(0.3 + toxicity * 0.35).toFixed(3)})`;
          ctx.fillRect(rect.x, rect.y, rect.w, Math.max(surfaceBand, Math.round(surfaceAmp * 1.7)));
          const bubbleCount = Math.max(2, Math.round((rect.w / 24) * (1 + bubbleDensity * 2.1)));
          for (let i = 0; i < bubbleCount; i += 1) {
            const seed = i * 31.7;
            const loop = 2.4 + hash01(seed * 0.39) * (3.2 - bubbleDensity * 0.9);
            const phase = ((nowSeconds * (0.5 + activity * 1.8 + hash01(seed * 0.73))) + hash01(seed * 1.3) * loop) % loop;
            const t = phase / loop;
            const bx = rect.x + ((hash01(seed * 0.57) * 0.9 + 0.05) * rect.w) + Math.sin((nowSeconds * 1.7) + seed) * (0.8 + bubbleDensity * 2.4);
            const rise = t * (rect.h * 0.9);
            const by = bodyBottomY - 2 - rise;
            const radius = 0.9 + (hash01(seed * 1.9) * (2.2 + bubbleDensity * 3.2));
            ctx.fillStyle = `rgba(230,255,198,${(0.13 + fumeDensity * 0.16).toFixed(3)})`;
            ctx.beginPath();
            ctx.arc(bx, by, radius, 0, Math.PI * 2);
            ctx.fill();
            if (t > 0.86) {
              const popRadius = radius + ((t - 0.86) / 0.14) * (2 + activity * 4);
              ctx.strokeStyle = `rgba(218,255,178,${(0.28 * (1 - ((t - 0.86) / 0.14))).toFixed(3)})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.arc(bx, rect.y + 1 + Math.sin(seed) * surfaceAmp * 0.25, popRadius, 0, Math.PI * 2);
              ctx.stroke();
            }
          }
          ctx.restore();
          ctx.beginPath();
          for (let i = 0; i < surfacePoints.length; i += 1) {
            const p = surfacePoints[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          ctx.strokeStyle = `rgba(229,255,194,${(0.62 + activity * 0.22).toFixed(3)})`;
          ctx.lineWidth = 1.4;
          ctx.stroke();

          const fumePlumes = Math.max(1, Math.round((rect.w / 48) * (1 + fumeDensity * 5)));
          for (let i = 0; i < fumePlumes; i += 1) {
            const seed = i * 17.3 + (volume.id ? volume.id.length : 0);
            const drift = Math.sin(nowSeconds * (0.7 + hash01(seed * 2.1)) + seed) * (2 + fumeDensity * 6);
            const px = rect.x + (hash01(seed * 3.2) * rect.w) + drift;
            const py = rect.y - (4 + hash01(seed * 4.1) * (9 + fumeDensity * 18));
            const pr = 2 + hash01(seed * 5.3) * (3 + fumeDensity * 9);
            const plume = ctx.createRadialGradient(px, py, 0, px, py, pr);
            plume.addColorStop(0, `rgba(194,255,154,${(0.18 + fumeDensity * 0.25).toFixed(3)})`);
            plume.addColorStop(1, "rgba(194,255,154,0)");
            ctx.fillStyle = plume;
            ctx.beginPath();
            ctx.arc(px, py, pr, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }

    // Reads decor from world snapshots while keeping decor flow separate from runtime entities.
    function readRechargedDecorSnapshots(payload) {
      const normalizeDecorAnchorLayer = (value) => {
        const normalized = String(value || "").trim().toLowerCase();
        if (normalized === "background" || normalized === "world" || normalized === "entities" || normalized === "player" || normalized === "hud") {
          return normalized;
        }
        // Keep default decor lane in world-space (between tiles and entities) for safe parity.
        return "world";
      };

      try {
        const adapter = payload?.adapter && typeof payload.adapter === "object" ? payload.adapter : null;
        const adapterWorldSnapshot = adapter?.getWorldSnapshot?.();
        const sourceDecor = Array.isArray(payload?.decorItems)
          ? payload.decorItems
          : Array.isArray(adapterWorldSnapshot?.decorItems)
            ? adapterWorldSnapshot.decorItems
            : [];
        return sourceDecor
          .map((decor, index) => ({
            decorId: typeof decor?.decorId === "string" ? decor.decorId : `decor-${index + 1}`,
            sourceIndex: index,
            decorType: typeof decor?.decorType === "string" ? decor.decorType : "decor",
            x: Number.isFinite(decor?.x) ? decor.x : null,
            y: Number.isFinite(decor?.y) ? decor.y : null,
            order: Number.isFinite(decor?.order) ? decor.order : index,
            anchorLayer: normalizeDecorAnchorLayer(decor?.anchorLayer),
            flipX: decor?.flipX === true,
            variant: Number.isFinite(decor?.variant) || typeof decor?.variant === "string" ? decor.variant : null,
            img: typeof decor?.img === "string" ? decor.img : null,
            drawW: Number.isFinite(decor?.drawW) ? decor.drawW : null,
            drawH: Number.isFinite(decor?.drawH) ? decor.drawH : null,
            drawOffX: Number.isFinite(decor?.drawOffX) ? decor.drawOffX : 0,
            drawOffY: Number.isFinite(decor?.drawOffY) ? decor.drawOffY : 0,
            drawAnchor: typeof decor?.drawAnchor === "string" ? decor.drawAnchor : "BL",
          }))
          .filter((decor) => decor.x !== null && decor.y !== null)
          // Stable decor sorting: explicit order first, then stable source index/id fallback.
          .sort((left, right) => (
            (left.order - right.order)
            || (left.sourceIndex - right.sourceIndex)
            || left.decorId.localeCompare(right.decorId)
          ));
      } catch (_error) {
        return [];
      }
    }

    function buildRechargedWorldToCanvasMapper({ canvas, worldWidthPx, worldHeightPx, targetX, targetY }) {
      const viewportWorldWidth = Math.max(1, Math.min(canvas.width, Math.round(worldWidthPx)));
      const viewportWorldHeight = Math.max(1, Math.min(canvas.height, Math.round(worldHeightPx)));
      const maxCameraX = Math.max(0, Math.round(worldWidthPx) - viewportWorldWidth);
      const maxCameraY = Math.max(0, Math.round(worldHeightPx) - viewportWorldHeight);
      const cameraX = Math.max(0, Math.min(maxCameraX, Math.round(targetX - viewportWorldWidth * 0.5)));
      const cameraY = Math.max(0, Math.min(maxCameraY, Math.round(targetY - viewportWorldHeight * 0.5)));
      const offsetX = Math.floor((canvas.width - viewportWorldWidth) * 0.5);
      const offsetY = Math.floor((canvas.height - viewportWorldHeight) * 0.5);

      return {
        cameraX,
        cameraY,
        viewportWorldWidth,
        viewportWorldHeight,
        worldToCanvasRect(rectX, rectY, rectW, rectH) {
          return {
            x: Math.round(rectX - cameraX + offsetX),
            y: Math.round(rectY - cameraY + offsetY),
            w: Math.max(1, Math.round(rectW)),
            h: Math.max(1, Math.round(rectH)),
          };
        },
      };
    }

    function isHoverEyeRenderableFromRuntime(entity, mapper) {
      if (!entity || entity.type !== "hover_void_01" || entity.active !== true || entity.awake !== true) {
        return false;
      }
      const eyeBlend = Number.isFinite(entity.eyeBlend) ? entity.eyeBlend : 0;
      if (eyeBlend <= 0.01) {
        return false;
      }
      if (!mapper || typeof mapper !== "object") {
        return true;
      }
      const x = Number.isFinite(entity.x) ? entity.x : 0;
      const y = Number.isFinite(entity.y) ? entity.y : 0;
      const w = Number.isFinite(entity.w) && entity.w > 0 ? entity.w : (Number.isFinite(entity.size) && entity.size > 0 ? entity.size : 24);
      const h = Number.isFinite(entity.h) && entity.h > 0 ? entity.h : (Number.isFinite(entity.size) && entity.size > 0 ? entity.size : 24);
      const margin = 96;
      const left = x - margin;
      const top = y - margin;
      const right = x + w + margin;
      const bottom = y + h + margin;
      const viewLeft = Number.isFinite(mapper.cameraX) ? mapper.cameraX : 0;
      const viewTop = Number.isFinite(mapper.cameraY) ? mapper.cameraY : 0;
      const viewRight = viewLeft + (Number.isFinite(mapper.viewportWorldWidth) ? mapper.viewportWorldWidth : 0);
      const viewBottom = viewTop + (Number.isFinite(mapper.viewportWorldHeight) ? mapper.viewportWorldHeight : 0);
      return left < viewRight && right > viewLeft && top < viewBottom && bottom > viewTop;
    }

    function drawHoverVoidEyesV1(ctx, centerX, centerY, entity, alphaMul = 1) {
      const eyeBlend = Math.max(0, Math.min(1, Number.isFinite(entity?.eyeBlend) ? entity.eyeBlend : 0));
      if (eyeBlend <= 0.01) {
        return;
      }
      const angry = (Number.isFinite(entity?._angryT) && entity._angryT > 0) || (typeof entity?._lungeState === "string" && entity._lungeState !== "idle");
      const blink = Number.isFinite(entity?._blinkDur) && entity._blinkDur > 0 ? 0.15 : 1;
      const facingX = Number.isFinite(entity?._facingX) && entity._facingX < 0 ? -1 : 1;
      const hoverVoidEyeBaselineBody = 24;
      const sEye = hoverVoidEyeBaselineBody / 16;
      const largeR = 2.8 * sEye * 0.75;
      const smallR = 1.9 * sEye * 0.75;
      const largeX = centerX - (7 * sEye) * facingX + (1.5 * facingX);
      const largeY = centerY - (6 * sEye);
      const smallX = centerX + (6 * sEye) * facingX - (1.5 * facingX);
      const smallY = centerY - (4 * sEye);
      const eyeAlpha = Math.max(0, Math.min(1, eyeBlend * Math.max(0, Math.min(1, alphaMul))));
      if (eyeAlpha <= 0.001) {
        return;
      }

      ctx.save();
      ctx.fillStyle = `rgba(246,250,255,${eyeAlpha.toFixed(3)})`;
      ctx.shadowColor = `rgba(205,240,255,${(0.95 * eyeBlend * alphaMul).toFixed(3)})`;
      ctx.shadowBlur = 11;

      if (!angry) {
        ctx.beginPath();
        ctx.ellipse(largeX, largeY, largeR, largeR * blink, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(smallX, smallY, smallR, smallR * blink, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        const drawFilledAngryEye = (x, y, r, tilt) => {
          ctx.save();
          ctx.translate(x, y);
          ctx.beginPath();
          if (tilt < 0) {
            ctx.moveTo(-r * 1.6, -r * 0.95);
            ctx.lineTo(r * 1.6, -r * 0.20);
            ctx.lineTo(r * 1.6, r * 1.6);
            ctx.lineTo(-r * 1.6, r * 1.6);
          } else {
            ctx.moveTo(-r * 1.6, -r * 0.20);
            ctx.lineTo(r * 1.6, -r * 0.95);
            ctx.lineTo(r * 1.6, r * 1.6);
            ctx.lineTo(-r * 1.6, r * 1.6);
          }
          ctx.closePath();
          ctx.clip();
          ctx.fillStyle = `rgba(243,240,255,${eyeAlpha.toFixed(3)})`;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        };
        if ((Number.isFinite(entity?._blinkDur) ? entity._blinkDur : 0) <= 0) {

          drawFilledAngryEye(smallX, smallY, smallR, 1 * facingX);

          ctx.strokeStyle = `rgba(243,240,255,${eyeAlpha.toFixed(3)})`;
          ctx.lineWidth = 1.8;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(largeX - 3.2 * sEye * facingX, largeY - 2.0 * sEye);
          ctx.lineTo(largeX + 2.8 * sEye * facingX, largeY + 0.2 * sEye);
          ctx.moveTo(smallX - 2.0 * sEye * facingX, smallY + 0.2 * sEye);
          ctx.lineTo(smallX + 2.2 * sEye * facingX, smallY - 2.0 * sEye);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function ensureRechargedTileVisualState(state) {
      if (!state || typeof state !== "object") {
        return null;
      }

      if (!state.rechargedTileVisualState || typeof state.rechargedTileVisualState !== "object") {
        const catalogByTileId = new Map();
        const catalogById = new Map();
        const catalog = Array.isArray(window.LUMO_CATALOG_TILES) ? window.LUMO_CATALOG_TILES : [];
        for (const entry of catalog) {
          if (!entry || typeof entry !== "object") continue;
          if (Number.isFinite(entry.tileId)) {
            catalogByTileId.set(entry.tileId | 0, entry);
          }
          if (typeof entry.id === "string" && entry.id.length > 0) {
            catalogById.set(entry.id, entry);
          }
        }
        state.rechargedTileVisualState = {
          catalogByTileId,
          catalogById,
          imageByKey: new Map(),
        };
      }

      return state.rechargedTileVisualState;
    }

    function ensureRechargedDecorVisualState(state) {
      if (!state || typeof state !== "object") {

      if (!state.rechargedDecorVisualState || typeof state.rechargedDecorVisualState !== "object") {
        state.rechargedDecorVisualState = {
          imageByKey: new Map(),

      return state.rechargedDecorVisualState;

    // Resolves authored decor image paths into runtime-safe candidates for live Lumo.html loading.
    function buildRechargedDecorImageCandidates(imageSrc) {
      if (typeof imageSrc !== "string") {
        return [];
      }
      const trimmed = imageSrc.trim();
      if (!trimmed) {
        return [];
      }

      const candidates = [];
      const pushCandidate = (value) => {
        if (typeof value !== "string" || value.length === 0) return;
        if (!candidates.includes(value)) {
          candidates.push(value);
        }
      };

      pushCandidate(trimmed);
      if (/^(https?:|data:|blob:)/i.test(trimmed)) {
        return candidates;
      }

      const withoutDotPrefix = trimmed.replace(/^\.?\//, "");
      pushCandidate(withoutDotPrefix);

      // Editor-authored decor commonly persists "../data/..." paths; remap to runtime "data/...".
      const withoutParentPrefix = trimmed.replace(/^(\.\.\/)+/, "");
      pushCandidate(withoutParentPrefix);

      return candidates;
    }

    function ensureRechargedEntityVisualState(state) {

    function getRechargedDarkSpellCustomSprite(entityVisualState, projectileSpritePath) {

    // Mirrors V1 tile visual selection: tile id -> catalog entry image + draw metadata (no neighbor autotile pass).
    function drawRechargedTileV1Visual(ctx, mapper, state, supportTile, worldUnitsToPx, tileSize) {
      const visualState = ensureRechargedTileVisualState(state);
      if (!visualState || !supportTile || typeof supportTile !== "object") {

      const numericTileId = Number.isFinite(supportTile?.tileId) ? (supportTile.tileId | 0) : null;
