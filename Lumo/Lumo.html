          let runtime = fogVisualState.byKey.get(fogKey) || null;
          if (!runtime || runtime.widthWorld !== Math.max(1, fog.x1 - fog.x0)) {
            runtime = buildRechargedFogRuntime(fogKey, fog);
            fogVisualState.byKey.set(fogKey, runtime);
          }
          fog.runtime = runtime;
        }
        fogVolumes.push(fog);
      }
      if (fogVisualState) {
        for (const key of fogVisualState.byKey.keys()) {
          if (!activeKeys.has(key)) {
            fogVisualState.byKey.delete(key);
          }
        }
      }
      return fogVolumes;
    }

    // Steps the live V1 fog simulation for each authored fog volume (field + vel chain).
    function stepRechargedFogVolumes(fogVolumes, options = {}) {
      if (!Array.isArray(fogVolumes) || fogVolumes.length <= 0) return;
      const dt = Math.max(0.0001, Math.min(0.05, Number.isFinite(options?.dt) ? options.dt : (1 / 60)));
      const playerCenterX = Number.isFinite(options?.playerCenterX) ? options.playerCenterX : null;
      const playerFootY = Number.isFinite(options?.playerFootY) ? options.playerFootY : null;
      const playerVelocityX = Number.isFinite(options?.playerVelocityX) ? options.playerVelocityX : 0;
      const playerHalfWidth = RECHARGED_PLAYER_HITBOX_WIDTH * 0.5;
      const playerTopY = playerFootY === null ? null : (playerFootY + 1 - RECHARGED_PLAYER_HITBOX_HEIGHT);
      const playerBottomY = playerFootY === null ? null : (playerFootY + 1);
      const speed = Math.abs(playerVelocityX);
      for (const fog of fogVolumes) {
        const runtime = fog?.runtime;
        if (!runtime || !(runtime.field instanceof Float32Array) || !(runtime.vel instanceof Float32Array)) continue;
        const field = runtime.field;
        const vel = runtime.vel;
        const N = runtime.sampleCount;
        if (!Number.isFinite(N) || N < 3) continue;
        for (let i = 1; i < N - 1; i += 1) {
          const lap = field[i - 1] - (2 * field[i]) + field[i + 1];
          vel[i] += lap * fog.diffuse * 120 * dt;
        }
        for (let i = 0; i < N; i += 1) {
          vel[i] += (0 - field[i]) * fog.relax * 120 * dt;
          vel[i] *= fog.visc;
          field[i] += vel[i] * dt;
          if (field[i] > 2.2) field[i] = 2.2;
          if (field[i] < -2.2) field[i] = -2.2;
        }
        if (Math.abs(fog.drift) > 0.001) {
          const shift = fog.drift * 0.85 * dt;
          if (Math.abs(shift) > 0.00001) {
            const tmp = new Float32Array(N);
            for (let i = 0; i < N; i += 1) {
              const src = i - shift;
              const i0 = Math.floor(src);
              const f = src - i0;
              const a = field[Math.max(0, Math.min(N - 1, i0))];
              const b = field[Math.max(0, Math.min(N - 1, i0 + 1))];
              tmp[i] = (a * (1 - f)) + (b * f);
            }
            field.set(tmp);
          }
        }
        // Strict per-volume gate: prevents distant/global fog bulges from generic movement.
        // Also blocks airborne-above-fog influence unless Lumo vertically overlaps the fog body.
        if (playerCenterX === null || playerTopY === null || playerBottomY === null || speed <= fog.gate) continue;
        const horizontalContactSlack = 2;
        const playerLeft = playerCenterX - playerHalfWidth;
        const playerRight = playerCenterX + playerHalfWidth;
        const fogLeft = Math.min(fog.x0, fog.x1);
        const fogRight = Math.max(fog.x0, fog.x1);
        const overlapsHorizontally = (playerRight >= (fogLeft - horizontalContactSlack))
          && (playerLeft <= (fogRight + horizontalContactSlack));
        if (!overlapsHorizontally) continue;

        const verticalContactSlack = 2;
        const fogTopY = fog.y0 - Math.max(1, fog.lift + fog.thickness);
        const fogBottomY = fog.y0;
        const overlapsVertically = (playerBottomY >= (fogTopY - verticalContactSlack))
          && (playerTopY <= (fogBottomY + verticalContactSlack));
        if (!overlapsVertically) continue;

        const widthWorld = Math.max(1, fog.x1 - fog.x0);
        const u = (playerCenterX - fog.x0) / widthWorld;
        const center = Math.max(0, Math.min(N - 1, Math.floor(u * (N - 1))));
        const pxPerCell = widthWorld / Math.max(1, (N - 1));
        const radCells = Math.max(3, Math.floor(fog.radius / Math.max(0.001, pxPerCell)));
        const dir = playerVelocityX >= 0 ? 1 : -1;
        const amp = Math.min(2.2, speed / 210);
        const aheadOffset = Math.max(2, Math.floor(radCells * 0.35));
        const bulgeCenter = center + (dir * aheadOffset);
        const behindOffset = Math.max(1, Math.floor(radCells * 0.15));
        const clearCenter = center - (dir * behindOffset);
        for (let k = -radCells; k <= radCells; k += 1) {
          const i = bulgeCenter + k;
          if (i < 0 || i >= N) continue;
          const u = (k / radCells) * dir;
          const frontMask = smooth01(u + 0.05);
          const q = 1 - (Math.abs(k) / radCells);
          const ridge = fog.bulge * amp * q * q * (0.18 + (0.82 * frontMask));
          field[i] += ridge * 0.32;
        }
        for (let k = -radCells; k <= radCells; k += 1) {
          const i = clearCenter + k;
          if (i < 0 || i >= N) continue;
          const u = (k / radCells) * dir;
          const backMask = smooth01((-u) + 0.10);
          const q = 1 - (Math.abs(k) / radCells);
          const wake = (fog.push * fog.behind) * amp * q * q * (0.25 + (0.75 * backMask));
          field[i] -= wake * 0.46;
          vel[i] += dir * wake * 0.0022;
        }
      }
    }

    // Fog overlay pass with V1-backed layering control:
    // - render.lumoBehindFog controls whether rear fog is before or after Lumo.
    // - front fog veil always draws after Lumo (smooke-style two-pass feel).
    function drawRechargedFogOverDarkness(ctx, mapper, fogVolumes, options = {}) {
      if (!Array.isArray(fogVolumes) || fogVolumes.length <= 0) {
        return;
      }
      const pass = typeof options.pass === "string" ? options.pass : "rear-before-player";
      const frontPass = pass === "front-after-player";
      const rearAfterPlayer = pass === "rear-after-player";
      for (const fog of fogVolumes) {
        const authoredLumoBehindFog = fog?.lumoBehindFog !== false;
        if (frontPass !== true) {
          if (rearAfterPlayer && !authoredLumoBehindFog) continue;
          if (!rearAfterPlayer && authoredLumoBehindFog) continue;
        }
        const widthWorld = Math.max(1, fog.x1 - fog.x0);
        const heightWorld = Math.max(16, Math.round(fog.lift + fog.thickness + 140));
        const fogRect = mapper.worldToCanvasRect(fog.x0, fog.y0 - heightWorld, widthWorld, heightWorld);
        const width = Math.max(1, Math.round(fogRect.w));
        const height = Math.max(1, Math.round(fogRect.h));
        if (width < 1 || height < 1) {
          continue;
        }
        const offscreen = document.createElement("canvas");
        offscreen.width = width;
        offscreen.height = height;
        const octx = offscreen.getContext("2d");
        if (!octx) {
          continue;
        }

        let cr = 225;
        let cg = 238;
        let cb = 255;
        const color = typeof fog.color === "string" ? fog.color : "#E1EEFF";
        if (color[0] === "#" && (color.length === 7 || color.length === 4)) {
          if (color.length === 7) {
            cr = parseInt(color.slice(1, 3), 16);
            cg = parseInt(color.slice(3, 5), 16);
            cb = parseInt(color.slice(5, 7), 16);
          } else {
            cr = parseInt(color[1] + color[1], 16);
            cg = parseInt(color[2] + color[2], 16);
            cb = parseInt(color[3] + color[3], 16);
          }
        }

        const runtime = fog?.runtime;
        if (!runtime || !(runtime.field instanceof Float32Array) || runtime.sampleCount < 3) {
          continue;
        }
        const authoredLayers = Math.max(6, Math.min(36, fog.layers | 0));
        const layers = frontPass ? Math.max(3, Math.round(authoredLayers * 0.45)) : authoredLayers;
        const field = runtime.field;
        const N = runtime.sampleCount;
        const t = performance.now() * 0.001;
        const pxPerCell = width / Math.max(1, (N - 1));
        const falloffPx = Math.max(1, Math.min(width * 0.5, (fog.falloff / Math.max(1, widthWorld)) * width));
        const crestScale = frontPass ? 0.24 : 1;
        const waveScale = frontPass ? 0.60 : 1;
        for (let li = 0; li < layers; li += 1) {
          const a = layers <= 1 ? 0 : (li / (layers - 1));
          const passAlpha = frontPass ? 0.24 : 0.82;
          const sliceAlpha = 1 - a;
          const alpha = Math.max(0, Math.min(1, (fog.density * 0.18) * (0.22 + (sliceAlpha * 0.98)) * fog.exposure * passAlpha));
          if (alpha <= 0.001) continue;
          const yBase = height - fog.lift - (a * fog.thickness);
          octx.beginPath();
          for (let i = 0; i < N; i += 1) {
            const x = i * pxPerCell;
            const d = Math.min(x, width - x);
            const edgeMask = fog.falloff > 0 ? smooth01(Math.max(0, Math.min(1, d / falloffPx))) : 1;
            if (edgeMask <= 0.0005) {
              if (i === 0) octx.moveTo(x, height);
              else octx.lineTo(x, height);
              continue;
            }
            const topWeight = smooth01(Math.max(0, Math.min(1, (0.55 - a) / 0.55)));
            const org = organicMaskAtX(fog.x0 + ((i / Math.max(1, N - 1)) * widthWorld), t, fog) * (0.70 + (0.30 * topWeight));
            const dev = field[i];
            const bulge = Math.max(0, dev);
            const n = noise1((i * 0.22) + (t * (0.95 + (a * 0.85))) + fog.seed);
            const m = (n * 0.5) + 0.5;
            const wave = (fog.noise * waveScale) * (m - 0.5) * (10 + ((1 - a) * 18));
            const yyBaseRaw = yBase + wave - ((bulge * crestScale) * (10 + ((1 - a) * 30)));
            const yyOrg = height - ((height - yyBaseRaw) * org);
            const yyBase = Math.min(yyOrg, height - 1);
            const y = height - ((height - yyBase) * edgeMask);
            if (i === 0) octx.moveTo(x, y);
            else octx.lineTo(x, y);
          }
          octx.lineTo(width, height);
          octx.lineTo(0, height);
          octx.closePath();
          octx.fillStyle = `rgba(${cr},${cg},${cb},${alpha})`;
          octx.fill();
        }
        if (!frontPass) {
          const topBase = height - fog.lift;
          const topLineAlpha = Math.min(0.30, fog.density * 0.35);
          octx.lineWidth = 18;
          octx.lineJoin = "round";
          octx.strokeStyle = `rgba(${Math.max(0, cr - 15)},${Math.max(0, cg - 10)},${Math.max(0, cb)},${Math.max(0, Math.min(1, topLineAlpha))})`;
          octx.beginPath();
          for (let i = 0; i < N; i += 1) {
            const x = i * pxPerCell;
            const d = Math.min(x, width - x);
            const edgeMask = fog.falloff > 0 ? smooth01(Math.max(0, Math.min(1, d / falloffPx))) : 1;
            if (edgeMask <= 0.0005) {
              if (i === 0) octx.moveTo(x, height);
              else octx.lineTo(x, height);
              continue;
            }
            const org = organicMaskAtX(fog.x0 + ((i / Math.max(1, N - 1)) * widthWorld), t, fog);
            const dev = field[i];
            const bulge = Math.max(0, dev);
            const n = noise1((i * 0.22) + (t * 1.05) + fog.seed);
            const m = (n * 0.5) + 0.5;
            const wave = fog.noise * (m - 0.5) * 10;
            const yyBaseRaw = topBase + wave - (bulge * 22);
            const yyOrg = height - ((height - yyBaseRaw) * org);
            const yyBase = Math.min(yyOrg, height - 1);
            const y = height - ((height - yyBase) * edgeMask);
            if (i === 0) octx.moveTo(x, y);
            else octx.lineTo(x, y);
          }
          octx.stroke();
        }

        ctx.save();
        const blend = typeof fog.blend === "string" ? fog.blend : "screen";
        ctx.globalCompositeOperation = blend === "add" ? "lighter" : (blend === "normal" ? "source-over" : "screen");
        ctx.globalAlpha = 0.60;
        ctx.drawImage(offscreen, Math.round(fogRect.x), Math.round(fogRect.y), width, height);
        ctx.restore();
      }
    }

    function drawRechargedLiquidVolumes(ctx, mapper, liquidVolumes) {
      if (!ctx || !mapper || !Array.isArray(liquidVolumes) || liquidVolumes.length === 0) {
        return;
      }
      const nowSeconds = (typeof performance?.now === "function" ? performance.now() : Date.now()) * 0.001;
      const hash01 = (seed) => {
        const x = Math.sin(seed * 127.1) * 43758.5453123;
        return x - Math.floor(x);
      };
      const buildSurfacePoints = (rect, amp, freq, speed, phase, stepMin = 7) => {
        const points = [];
        const step = Math.max(stepMin, Math.round(rect.w / 30));
        for (let x = rect.x; x <= rect.x + rect.w + step; x += step) {
          const nx = (x - rect.x) / Math.max(1, rect.w);
          const waveA = Math.sin((nx * freq) + (phase * speed));
          const waveB = Math.sin((nx * (freq * 0.63)) - (phase * speed * 1.33));
          const y = rect.y + ((waveA * 0.65 + waveB * 0.35) * amp);
          points.push({ x, y });
        }
        return points;
      };
      const fillLiquidBodyFromSurface = (surfacePoints, rect, fillStyle) => {
        if (!Array.isArray(surfacePoints) || surfacePoints.length < 2) return;
        ctx.beginPath();
        ctx.moveTo(surfacePoints[0].x, surfacePoints[0].y);
        for (let index = 1; index < surfacePoints.length; index += 1) {
          ctx.lineTo(surfacePoints[index].x, surfacePoints[index].y);
        }
        ctx.lineTo(rect.x + rect.w, rect.y + rect.h);
        ctx.lineTo(rect.x, rect.y + rect.h);
        ctx.closePath();
        ctx.fillStyle = fillStyle;
        ctx.fill();
      };
      const buildSurfaceSamples = (rect, sampleStep, sampleFn) => {
        const points = [];
        const step = Math.max(2, Math.round(sampleStep));
        const endX = rect.x + rect.w;
        for (let x = rect.x; x <= endX; x += step) {
          points.push({ x, y: sampleFn(x) });
        }
        if (points.length === 0 || points[points.length - 1].x < endX) {
          points.push({ x: endX, y: sampleFn(endX) });
        }
        return points;
      };
      const sampleSurfaceY = (surfacePoints, targetX, fallbackY) => {
        if (!Array.isArray(surfacePoints) || surfacePoints.length === 0) return fallbackY;
        if (targetX <= surfacePoints[0].x) return surfacePoints[0].y;
        for (let i = 1; i < surfacePoints.length; i += 1) {
          const left = surfacePoints[i - 1];
          const right = surfacePoints[i];
          if (targetX <= right.x) {
            const span = Math.max(0.0001, right.x - left.x);
            const t = (targetX - left.x) / span;
            return left.y + ((right.y - left.y) * t);
          }
        }
        return surfacePoints[surfacePoints.length - 1].y;
      };
      for (const volume of liquidVolumes) {
        const rect = mapper.worldToCanvasRect(volume.left, volume.top, volume.width, volume.height);
        if (rect.w <= 0 || rect.h <= 0) {
          continue;
        }
        const surfaceY = rect.y;
        const bodyBottomY = rect.y + rect.h;
        const surfaceBand = Math.max(2, Math.round(rect.h * 0.14));

        if (volume.type === "water_volume") {
          const bodyColor = volume.bottomColor || "#0f3c76";
          const topColor = volume.topColor || "#4d9de0";
          const bodyGradient = ctx.createLinearGradient(rect.x, rect.y, rect.x, bodyBottomY);
          bodyGradient.addColorStop(0, topColor);
          bodyGradient.addColorStop(1, bodyColor);
          const amp = Math.max(1, Math.min(14, volume.waveAmount));
          const speed = Math.max(0.2, volume.waveSpeed);
          const surfacePoints = buildSurfacePoints(
            rect,
            amp,
            10.8 + (volume.waveAmount * 0.28),
            1.4 + (speed * 1.6),
            nowSeconds,
            6,
          );
          ctx.save();
          ctx.beginPath();
          ctx.rect(rect.x, rect.y, rect.w, rect.h);
          ctx.clip();
          fillLiquidBodyFromSurface(surfacePoints, rect, bodyGradient);

          const bandCount = Math.max(3, Math.min(8, 3 + Math.round(volume.waveAmount * 0.7)));
          for (let band = 0; band < bandCount; band += 1) {
            const depthMix = (band + 1) / (bandCount + 1);
            const bandY = rect.y + depthMix * rect.h;
            const bandAmp = Math.max(0.75, amp * (1 - depthMix) * 0.7);
            ctx.beginPath();
            for (let i = 0; i < surfacePoints.length; i += 1) {
              const point = surfacePoints[i];
              const nx = (point.x - rect.x) / Math.max(1, rect.w);
              const offset = Math.sin((nx * 8.1) + (nowSeconds * (1.25 + speed * 1.2)) + band) * bandAmp;
              const x = point.x;
              const y = bandY + offset;
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgba(196,234,255,${(0.04 + (1 - depthMix) * 0.08).toFixed(3)})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
          ctx.restore();
          ctx.beginPath();
          for (let i = 0; i < surfacePoints.length; i += 1) {
            const p = surfacePoints[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
          }
          ctx.strokeStyle = "rgba(220,246,255,0.9)";
          ctx.lineWidth = 1.4;
          ctx.stroke();
          const sheenGradient = ctx.createLinearGradient(rect.x, surfaceY - surfaceBand * 0.2, rect.x, surfaceY + surfaceBand * 1.2);
          sheenGradient.addColorStop(0, "rgba(232,252,255,0.42)");
          sheenGradient.addColorStop(1, "rgba(232,252,255,0)");
          ctx.fillStyle = sheenGradient;
          ctx.fillRect(rect.x, rect.y, rect.w, Math.max(2, surfaceBand));
        } else if (volume.type === "lava_volume") {
          const hotness = volume.temperature;
          const crust01 = Math.max(0, Math.min(1, (Number(volume.crustAmount) || 0) / 100));
          const flowSpeed = Math.max(0.15, volume.flowSpeed);
          const surfaceAmp = Math.max(0.8, Math.min(5.2, (1.1 + hotness * 1.8) * (0.52 + flowSpeed * 0.14)));
          const lavaPhaseA = nowSeconds * (0.08 + flowSpeed * 0.11);
          const lavaPhaseB = nowSeconds * (0.05 + flowSpeed * 0.07);
          const surfacePoints = buildSurfaceSamples(rect, Math.max(2, rect.w / 48), (x) => {
            const nx = (x - rect.x) / Math.max(1, rect.w);
            const waveA = Math.sin((nx * 5.2) + lavaPhaseA) * (0.62 + hotness * 0.24);
            const waveB = Math.sin((nx * 9.3) + (lavaPhaseB + 0.65)) * 0.28;
            return rect.y + (waveA + waveB) * surfaceAmp;
          });
          const bodyGradient = ctx.createLinearGradient(rect.x, rect.y, rect.x, bodyBottomY);
          bodyGradient.addColorStop(0, `rgba(255,${Math.round(128 + hotness * 44)},${Math.round(34 + hotness * 18)},0.98)`);
          bodyGradient.addColorStop(0.6, "rgba(198,64,12,0.98)");
          bodyGradient.addColorStop(1, "rgba(20,8,4,0.98)");
          ctx.save();
          ctx.beginPath();
          ctx.rect(rect.x, rect.y, rect.w, rect.h);
          ctx.clip();
          fillLiquidBodyFromSurface(surfacePoints, rect, bodyGradient);

          // Keep top surface geometry untouched; interior motion uses slow multi-core vortex fields only below the surface.
          const lavaSwirlPhase = nowSeconds * (0.12 + flowSpeed * 0.09);
          const vortexCores = [
            {
              x: rect.x + (rect.w * (0.22 + (Math.sin(lavaSwirlPhase * 0.37) * 0.04))),
              y: rect.y + (rect.h * (0.36 + (Math.cos(lavaSwirlPhase * 0.21) * 0.06))),
              spin: 1,
              radius: rect.w * 0.23,
            },
            {
              x: rect.x + (rect.w * (0.56 + (Math.sin((lavaSwirlPhase * 0.29) + 1.9) * 0.05))),
              y: rect.y + (rect.h * (0.58 + (Math.cos((lavaSwirlPhase * 0.24) + 0.8) * 0.05))),
              spin: -1,
              radius: rect.w * 0.27,
            },
            {
              x: rect.x + (rect.w * (0.82 + (Math.sin((lavaSwirlPhase * 0.33) + 3.1) * 0.04))),
              y: rect.y + (rect.h * (0.44 + (Math.cos((lavaSwirlPhase * 0.27) + 2.2) * 0.06))),
              spin: 1,
              radius: rect.w * 0.2,
            },
          ];
          // V1-like: exactly 3 internal glow bands.
          for (let band = 0; band < 3; band += 1) {
            const yRatio = (band + 1) / 4;
            const yBase = rect.y + (rect.h * yRatio);
            ctx.beginPath();
            for (let x = rect.x; x <= rect.x + rect.w; x += 3) {
              const nx = (x - rect.x) / Math.max(1, rect.w);
              const wobble = Math.sin((nx * (7.2 + band * 0.8)) + lavaPhaseA * (1.1 + band * 0.2) + band * 1.7);
              // Multi-core curl field gives each band true turning motion (twist + slow relaxation), not just vertical shimmer.
              let curlX = 0;
              let curlY = 0;
              for (let coreIdx = 0; coreIdx < vortexCores.length; coreIdx += 1) {
                const core = vortexCores[coreIdx];
                const dx = x - core.x;
                const dy = yBase - core.y;
                const dist = Math.hypot(dx, dy);
                const falloff = Math.max(0, 1 - (dist / Math.max(1, core.radius)));
                if (falloff <= 0) continue;
                const twist = Math.pow(falloff, 1.6) * core.spin;
                curlX += (-dy / Math.max(12, core.radius)) * twist * (5.8 + (1 - yRatio) * 4.1);
                curlY += (dx / Math.max(12, core.radius)) * twist * (3.4 + (1 - yRatio) * 2.7);
              }
              const swirlA = Math.sin((nx * (6.1 + band * 0.55)) - lavaSwirlPhase + (yRatio * 10.2));
              const swirlB = Math.sin((nx * (11.3 + band * 0.9)) + (lavaSwirlPhase * 1.38) - (yRatio * 13.4));
              const swirl = (swirlA * (0.95 + (1 - yRatio) * 1.75)) + (swirlB * (0.62 + (1 - yRatio) * 1.2));
              const xCurl = x + curlX;
              const y = yBase + (wobble * (0.95 + (1 - yRatio) * 1.95)) + swirl + curlY;
              if (x === rect.x) ctx.moveTo(xCurl, y);
              else ctx.lineTo(xCurl, y);
            }
            const alpha = 0.09 + ((1 - yRatio) * 0.12 * (0.7 + hotness * 0.55));
            ctx.strokeStyle = `rgba(255,${Math.round(152 + hotness * 58)},${Math.round(32 + hotness * 18)},${alpha.toFixed(3)})`;
            ctx.lineWidth = 1.45;
            ctx.stroke();
          }

          // Irregular ash-like crust fragments: slow reseeding + subtle drift to avoid static rectangular reads.
          const crustPieces = Math.max(5, Math.round((rect.w * 0.05) + (crust01 * rect.w * 0.12)));
          for (let idx = 0; idx < crustPieces; idx += 1) {
            const fragmentLifetime = 9.5 + (hash01(((Number(volume.bubblingSeed) || 0) * 0.31) + idx * 2.7) * 7.8);
            const fragmentCycle = nowSeconds / fragmentLifetime;
            const fragmentGeneration = Math.floor(fragmentCycle);

    function drawMovingPlatformVisual(ctx, mapper, state, options) {

      const widthPx = Number.isFinite(options?.widthPx) && options.widthPx > 0 ? options.widthPx : null;
      const heightPx = Number.isFinite(options?.heightPx) && options.heightPx > 0 ? options.heightPx : null;

    // Draws one decor entry as a visual-only layer; never contributes collision or gameplay geometry.
    function drawRechargedDecorVisual(ctx, mapper, state, decor, worldUnitsToPx, tileSize, worldWidthRaw, worldHeightRaw) {

    function ensureRechargedDarknessState(state, canvas) {
      if (!state || typeof state !== "object" || !canvas) {

      try {
        const width = Number.isFinite(canvas.width) && canvas.width > 0 ? Math.floor(canvas.width) : 0;

    function ensureRechargedDarknessPolishState(state, canvas) {

        const width = Number.isFinite(canvas.width) && canvas.width > 0 ? Math.floor(canvas.width) : 0;
        const height = Number.isFinite(canvas.height) && canvas.height > 0 ? Math.floor(canvas.height) : 0;

        }

          state.rechargedDarknessPolishState = {

            noisePattern: null,
            noiseReady: false,
            noiseTileSize: 96,
            mode: "noise-vignette-breathe",
          };

        const polishState = state.rechargedDarknessPolishState;
        const tileSize = Number.isFinite(polishState.noiseTileSize) && polishState.noiseTileSize > 0
          ? Math.floor(polishState.noiseTileSize)
          : 96;

          || polishState.noiseCanvas.width !== tileSize
          || polishState.noiseCanvas.height !== tileSize

          noiseCanvas.height = tileSize;

            polishState.noisePattern = null;

          for (let y = 0; y < tileSize; y += 2) {
            for (let x = 0; x < tileSize; x += 2) {

              noiseCtx.fillStyle = `rgba(${v},${v},${v},${(0.10 + Math.random() * 0.26).toFixed(3)})`;

    function drawRechargedLivingDarknessPolish(darknessCtx, darknessCanvas, state, options = {}) {
      if (!darknessCtx || !darknessCanvas || !state) {
        return;
      }
      const polishState = ensureRechargedDarknessPolishState(state, darknessCanvas);
      const frame = Number.isFinite(options?.frame) ? options.frame : null;
      const nowMs = Number.isFinite(options?.nowMs)
        ? options.nowMs
        : ((typeof performance !== "undefined" && typeof performance.now === "function") ? performance.now() : Date.now());
      const breathe = 0.5 + (0.5 * Math.sin(nowMs * 0.00055));
      const polishAlpha = 0.02 + (0.03 * breathe);
      const width = darknessCanvas.width | 0;
      const height = darknessCanvas.height | 0;
      if (width <= 0 || height <= 0 || !polishState) {
        window.__LUMO_RECHARGED_DARKNESS_POLISH_DEBUG__ = {
          enabled: true,
          frame,
          noiseReady: false,
          alpha: Number(polishAlpha.toFixed(4)),
          mode: "noise-vignette-breathe",
        };

      darknessCtx.globalCompositeOperation = "source-atop";
      darknessCtx.globalAlpha = Math.max(0, Math.min(1, polishAlpha));

        width * 0.5,
        height * 0.5,
        Math.max(width, height) * 0.72,

        noiseReady: polishState.noiseReady === true,
        alpha: Number(polishAlpha.toFixed(4)),

    const RECHARGED_ENABLE_PLAYER_LIGHT_OCCLUSION = true;
    const RECHARGED_PLAYER_PUNCH_INTENSITY = 0.55;
    const RECHARGED_PLAYER_DOWNLIGHT = 0.20;
    const RECHARGED_OCCLUSION_DEFAULTS = Object.freeze({
      // V1 used 312.
      // Recharged starts at 192 for runtime performance.
      rays: 192,
      // V1 used 1.
      // Recharged uses 2 for performance.
      stepPx: 2,
      featherPx: 45,
      penumbra: 1.7,
      contactGlowPx: 60,
      contactGlowIntensity: 1.2,
    });

    function buildRechargedOcclusionLookup({ supportTiles, worldUnitsToPx, tileSize }) {
      if (!Array.isArray(supportTiles) || !Number.isFinite(worldUnitsToPx) || worldUnitsToPx <= 0) {
        return {
          rects: [],
          grid: new Map(),
          cellSize: 48,
          gridCellCount: 0,
        };
      }
      const fallbackCellSize = 48;
      const tileCellSize = Number.isFinite(tileSize) && tileSize > 0 ? Math.round(tileSize * worldUnitsToPx) : 0;
      const cellSize = Math.max(1, tileCellSize > 0 ? tileCellSize : fallbackCellSize);
      const rects = [];
      const grid = new Map();
      for (const tile of supportTiles) {
        const tileX = Number.isFinite(tile?.x) ? tile.x : null;
        const tileY = Number.isFinite(tile?.y) ? tile.y : null;
        const tileW = Number.isFinite(tile?.w) ? tile.w : null;
        const tileH = Number.isFinite(tile?.h) ? tile.h : null;
        if (tileX === null || tileY === null || tileW === null || tileH === null || tileW <= 0 || tileH <= 0) {
          continue;
        }
        const rect = {
          x: tileX * worldUnitsToPx,
          y: tileY * worldUnitsToPx,
          w: tileW * worldUnitsToPx,
          h: tileH * worldUnitsToPx,
        };
        const rectIndex = rects.length;
        rects.push(rect);
        const minCellX = Math.floor(rect.x / cellSize);
        const minCellY = Math.floor(rect.y / cellSize);
        const maxCellX = Math.floor((rect.x + Math.max(0, rect.w - 1e-6)) / cellSize);
        const maxCellY = Math.floor((rect.y + Math.max(0, rect.h - 1e-6)) / cellSize);
        for (let cellY = minCellY; cellY <= maxCellY; cellY += 1) {
          for (let cellX = minCellX; cellX <= maxCellX; cellX += 1) {
            const cellKey = `${cellX},${cellY}`;
            let bucket = grid.get(cellKey);
            if (!bucket) {
              bucket = [];
              grid.set(cellKey, bucket);
            }
            bucket.push(rectIndex);
          }
        }
      }
      return {
        rects,
        grid,
        cellSize,
        gridCellCount: grid.size,
      };
    }

    function ensureRechargedOcclusionLookup(state, { supportTiles, worldUnitsToPx, tileSize }) {
      const cache = state && typeof state === "object" ? state.rechargedOcclusionLookupCache : null;
      if (
        cache
        && cache.supportTilesRef === supportTiles
        && cache.worldUnitsToPx === worldUnitsToPx
        && cache.tileSize === tileSize
        && cache.lookup

      const lookup = buildRechargedOcclusionLookup({ supportTiles, worldUnitsToPx, tileSize });

          supportTilesRef: supportTiles,
          worldUnitsToPx,
          tileSize,
          lookup,
        };
      }
      return lookup;
    }

    function isRechargedOcclusionSolidAtWorld(wx, wy, occlusionLookup) {
      if (!Number.isFinite(wx) || !Number.isFinite(wy)) {
        return false;
      }
      const lookup = occlusionLookup && typeof occlusionLookup === "object" ? occlusionLookup : null;
      const occlusionRects = Array.isArray(lookup?.rects)
        ? lookup.rects
        : (Array.isArray(occlusionLookup) ? occlusionLookup : []);
      if (occlusionRects.length <= 0) {
        return false;
      }
      const cellSize = Number.isFinite(lookup?.cellSize) && lookup.cellSize > 0 ? lookup.cellSize : 0;
      const grid = lookup?.grid instanceof Map ? lookup.grid : null;
      const indices = (grid && cellSize > 0)
        ? grid.get(`${Math.floor(wx / cellSize)},${Math.floor(wy / cellSize)}`)
        : null;
      if (Array.isArray(indices) && indices.length > 0) {
        for (let bucketIndex = 0; bucketIndex < indices.length; bucketIndex += 1) {
          const rect = occlusionRects[indices[bucketIndex]];
          if (!rect) continue;
          const rx = Number.isFinite(rect.x) ? rect.x : null;
          const ry = Number.isFinite(rect.y) ? rect.y : null;
          const rw = Number.isFinite(rect.w) ? rect.w : null;
          const rh = Number.isFinite(rect.h) ? rect.h : null;
          if (rx === null || ry === null || rw === null || rh === null || rw <= 0 || rh <= 0) {

          }
          if (wx >= rx && wx <= (rx + rw) && wy >= ry && wy <= (ry + rh)) {
            return true;
          }

        return false;
      }
      for (let index = 0; index < occlusionRects.length; index += 1) {
        const rect = occlusionRects[index];
        if (!rect) continue;
        const rx = Number.isFinite(rect.x) ? rect.x : null;
        const ry = Number.isFinite(rect.y) ? rect.y : null;
        const rw = Number.isFinite(rect.w) ? rect.w : null;
        const rh = Number.isFinite(rect.h) ? rect.h : null;
        if (rx === null || ry === null || rw === null || rh === null || rw <= 0 || rh <= 0) {
          continue;
        }
        if (wx >= rx && wx <= (rx + rw) && wy >= ry && wy <= (ry + rh)) {
          return true;
        }
      }
      return false;
    }

    function buildRechargedPlayerLightOcclusionPolyScreen({ sx, sy, radius, mapper, occlusionLookup, options }) {
      if (!Number.isFinite(sx) || !Number.isFinite(sy) || !Number.isFinite(radius) || radius <= 0) {
        return null;
      }
      if (!mapper || typeof mapper.canvasToWorldPoint !== "function") {
        return null;
      }
      const rects = Array.isArray(occlusionLookup?.rects)
        ? occlusionLookup.rects
        : (Array.isArray(occlusionLookup) ? occlusionLookup : []);
      if (rects.length <= 0) {
        return null;

      const opt = options && typeof options === "object" ? options : RECHARGED_OCCLUSION_DEFAULTS;

    function clamp01(value) {

      const PLAYER_LIGHT_MAX_RADIUS_PX = 320;

        + ((PLAYER_LIGHT_MAX_RADIUS_PX - PLAYER_LIGHT_MIN_RADIUS_PX) * clamp01(energy));

    function resolveRechargedFlareRadii(flare) {

    function buildRechargedDarknessLights(options) {
      const lights = [];
      if (!options || typeof options !== "object") {
        return lights;

      const {
        player,
        playerCenterX,
        playerFootY,
        currentSnapshot,
        entitySnapshots,
        flareSnapshots,
        mapper,
        coordinatesLookTileBased,
        worldUnitsToPx,
        worldWidthRaw,

      if (Number.isFinite(playerCenterX) && Number.isFinite(playerFootY)) {

        const playerRect = mapper.worldToCanvasRect(playerCenterX, playerLightWorldY, 1, 1);

          : (Number.isFinite(currentSnapshot?.lightRadius)

          kind: "player",
          x: playerRect.x + (playerRect.w * 0.5),
          y: playerRect.y + (playerRect.h * 0.5),

          strength: 0.6,

      }

      for (const entity of (Array.isArray(entitySnapshots) ? entitySnapshots : [])) {
        const entityType = typeof entity?.type === "string" ? entity.type : "";
        if (entityType !== "lantern_01" && entityType !== "lantern" && entityType !== "firefly_01" && entityType !== "firefly") {
          continue;
        }
        const entityWorldX = Number.isFinite(entity?.x) ? entity.x : null;
        const entityWorldY = Number.isFinite(entity?.y) ? entity.y : null;
        const entityWorldW = Number.isFinite(entity?.w) && entity.w > 0 ? entity.w : null;
        const entityWorldH = Number.isFinite(entity?.h) && entity.h > 0 ? entity.h : null;
        if (entityWorldX === null || entityWorldY === null || entityWorldW === null || entityWorldH === null) {
          continue;

        const entityRect = mapper.worldToCanvasRect(entityWorldX, entityWorldY, entityWorldW, entityWorldH);
        const centerX = entityRect.x + entityRect.w * 0.5;
        const centerY = entityRect.y + entityRect.h * 0.5;

          lights.push({
            kind: "lantern",
            x: centerX,
            y: centerY,
            radius: Number.isFinite(entity?.radius)
              ? entity.radius
              : (Number.isFinite(entity?.params?.radius) ? entity.params.radius : 170),
            strength: Number.isFinite(entity?.strength)
              ? entity.strength
              : (Number.isFinite(entity?.params?.strength) ? entity.params.strength : 0.85),

        if (lightK <= 0.01) {
