      const iconW = 34;
      const iconH = 34;
      const maxFlares = Number.isFinite(flareMax) ? Math.max(1, Math.floor(flareMax)) : 3;
      const currentFlares = Math.max(0, Math.min(maxFlares, Math.floor(flares)));

      ctx.save();
      ctx.font = "600 9px Arial, sans-serif";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(255,196,122,0.20)";
      ctx.fillText("FLARE", startX - 44, y + 18);

      for (let i = 0; i < maxFlares; i += 1) {
        const x = startX + i * slotW;
        const on = i < currentFlares;

        const seatGrad = ctx.createLinearGradient(0, y - 3, 0, y + iconH + 5);
        seatGrad.addColorStop(0, "rgba(10,4,2,0.26)");
        seatGrad.addColorStop(1, "rgba(0,0,0,0.20)");
        ctx.fillStyle = seatGrad;
        drawRoundedRectPath(x - 6, y - 2, 42, 38, 8);
        ctx.fill();

        if (on) {
          const pulse = 0.95 + Math.sin(time * 0.95 + i * 0.8) * 0.05;
          const gx = x + iconW / 2;
          const gy = y + 16;

          const auraOuter = ctx.createRadialGradient(gx, gy, 0, gx, gy, 28);
          auraOuter.addColorStop(0, `rgba(216,255,126,${0.18 * pulse})`);
          auraOuter.addColorStop(0.36, `rgba(138,255,72,${0.14 * pulse})`);
          auraOuter.addColorStop(0.70, `rgba(70,210,40,${0.08 * pulse})`);
          auraOuter.addColorStop(1, "rgba(40,120,30,0)");
          ctx.fillStyle = auraOuter;
          ctx.beginPath();
          ctx.arc(gx, gy, 28, 0, Math.PI * 2);
          ctx.fill();

          const auraInner = ctx.createRadialGradient(gx, gy, 0, gx, gy, 14);
          auraInner.addColorStop(0, `rgba(238,255,188,${0.24 * pulse})`);
          auraInner.addColorStop(0.52, `rgba(182,255,110,${0.14 * pulse})`);
          auraInner.addColorStop(1, "rgba(60,180,36,0)");
          ctx.fillStyle = auraInner;
          ctx.beginPath();
          ctx.arc(gx, gy, 14, 0, Math.PI * 2);
          ctx.fill();

          if (rechargedHudV2FlareImg.complete && rechargedHudV2FlareImg.naturalWidth > 0) {
            ctx.drawImage(rechargedHudV2FlareImg, x, y, iconW, iconH);
          }

          const overGlow = ctx.createRadialGradient(gx, gy, 0, gx, gy, 12);
          overGlow.addColorStop(0, `rgba(236,255,176,${0.14 * pulse})`);
          overGlow.addColorStop(0.60, `rgba(160,255,92,${0.08 * pulse})`);
          overGlow.addColorStop(1, "rgba(60,180,36,0)");
          ctx.fillStyle = overGlow;
          ctx.beginPath();
          ctx.arc(gx, gy, 12, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = "rgba(0,0,0,0.18)";
          drawRoundedRectPath(x - 2, y + 2, 30, 28, 7);
          ctx.fill();

          ctx.strokeStyle = "rgba(140,180,100,0.08)";
          ctx.lineWidth = 1;
          drawRoundedRectPath(x - 2, y + 2, 30, 28, 7);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawRechargedHudV2NixieScore(ctx, time, score, options = {}) {
      const comboMultiplier = Number.isFinite(options?.comboMultiplier) ? Math.max(1, Math.min(2, options.comboMultiplier)) : 1;
      const scorePulse = Number.isFinite(options?.scorePulse) ? Math.max(0, Math.min(1, options.scorePulse)) : 0;
      const comboHeat = comboMultiplier >= 2 ? 1 : comboMultiplier >= 1.5 ? 0.55 : 0;
      const panelX = 1240 + 150;
      const panelY = 20 + 20;
      const panelW = 290;
      const panelH = 88;
      const digits = String(Math.max(0, Math.floor(score))).padStart(5, "0").slice(-5);
      const tubeGap = 8;
      const innerPadX = 10;
      const innerPadY = 6;
      const tubeW = (panelW - (innerPadX * 2) - (tubeGap * 4)) / 5;
      const tubeH = panelH - (innerPadY * 2);

      ctx.save();
      drawRechargedHudV2RoundedRectPath(ctx, panelX, panelY, panelW, panelH, 12);
      const panelGrad = ctx.createLinearGradient(panelX, panelY, panelX, panelY + panelH);
      panelGrad.addColorStop(0, "rgba(20,12,8,0.66)");
      panelGrad.addColorStop(1, "rgba(8,4,2,0.78)");
      ctx.fillStyle = panelGrad;
      ctx.fill();
      ctx.strokeStyle = "rgba(180,124,72,0.25)";
      ctx.lineWidth = 1;
      ctx.stroke();

      const panelAuraAlpha = (0.045 + (comboHeat * 0.05) + (scorePulse * 0.11));
      if (panelAuraAlpha > 0.001) {
        const panelMidX = panelX + (panelW * 0.5);
        const panelMidY = panelY + (panelH * 0.56);
        const panelAura = ctx.createRadialGradient(panelMidX, panelMidY, panelH * 0.25, panelMidX, panelMidY, panelW * 0.88);
        panelAura.addColorStop(0, `rgba(255,162,74,${panelAuraAlpha})`);
        panelAura.addColorStop(0.6, `rgba(255,132,64,${panelAuraAlpha * 0.45})`);
        panelAura.addColorStop(1, "rgba(255,118,62,0)");
        ctx.fillStyle = panelAura;
        ctx.fillRect(panelX - 18, panelY - 10, panelW + 36, panelH + 24);
      }

      for (let i = 0; i < 5; i += 1) {
        const tx = panelX + innerPadX + i * (tubeW + tubeGap);
        const ty = panelY + innerPadY;
        const tr = Math.min(tubeW, tubeH) * 0.44;
        const digitValue = Number.parseInt(digits[i], 10) || 0;
        const flickerAmplitude = 0.08 + (comboHeat * 0.02) + (scorePulse * 0.015);
        const flickerBase = 0.92 + (comboHeat * 0.04) + (scorePulse * 0.05);
        const flicker = flickerBase + (Math.sin((time * (4.5 + (comboHeat * 0.4))) + (i * 0.72)) * flickerAmplitude);
        const tubeMidX = tx + (tubeW * 0.5);
        const tubeBottomY = ty + tubeH - 7;
        const tubeDigitY = ty + tubeH * 0.52;

        ctx.save();
        drawRechargedHudV2RoundedRectPath(ctx, tx, ty, tubeW, tubeH, tr);
        ctx.clip();

        const glassGrad = ctx.createLinearGradient(tx, ty, tx, ty + tubeH);
        glassGrad.addColorStop(0, "rgba(48,30,20,0.56)");
        glassGrad.addColorStop(0.45, "rgba(20,12,8,0.30)");
        glassGrad.addColorStop(1, "rgba(8,4,2,0.62)");
        ctx.fillStyle = glassGrad;
        ctx.fillRect(tx, ty, tubeW, tubeH);

        const innerGlow = ctx.createRadialGradient(tubeMidX, tubeDigitY, 4, tubeMidX, tubeDigitY, tubeW * 1.1);
        const innerGlowAlpha = 0.10 + (comboHeat * 0.05) + (scorePulse * 0.06);
        innerGlow.addColorStop(0, `rgba(255,168,80,${innerGlowAlpha})`);
        innerGlow.addColorStop(1, "rgba(255,120,60,0)");
        ctx.fillStyle = innerGlow;
        ctx.fillRect(tx, ty, tubeW, tubeH);

        const topShade = ctx.createLinearGradient(tx, ty, tx, ty + (tubeH * 0.25));
        topShade.addColorStop(0, "rgba(255,220,184,0.08)");
        topShade.addColorStop(1, "rgba(255,220,184,0)");
        ctx.fillStyle = topShade;
        ctx.fillRect(tx, ty, tubeW, tubeH * 0.32);

        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(tx + (tubeW * 0.18), ty + 4, tubeW * 0.08, tubeH * 0.74);
        ctx.fillStyle = "rgba(255,255,255,0.03)";
        ctx.fillRect(tx + (tubeW * 0.30), ty + 8, tubeW * 0.05, tubeH * 0.62);

        ctx.strokeStyle = "rgba(255,214,176,0.08)";
        ctx.lineWidth = 0.8;
        for (let gy = ty + 10; gy < ty + tubeH - 8; gy += 6) {
          ctx.beginPath();
          ctx.moveTo(tx + 3, gy + ((i % 2) * 0.5));
          ctx.lineTo(tx + tubeW - 3, gy + ((i % 2) * 0.5));
          ctx.stroke();
        }
        ctx.strokeStyle = "rgba(255,214,176,0.05)";
        for (let gx = tx + 4; gx < tx + tubeW - 3; gx += 5) {
          ctx.beginPath();
          ctx.moveTo(gx, ty + 8);
          ctx.lineTo(gx, ty + tubeH - 9);
          ctx.stroke();
        }

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `600 ${Math.floor(tubeH * 0.68)}px "Courier New", monospace`;
        ctx.save();
        ctx.translate(tubeMidX, tubeDigitY);
        ctx.scale(0.76, 1);
        for (let d = 9; d >= 0; d -= 1) {
          const delta = d - digitValue;
          const yOffset = delta * 0.44;
          const xOffset = delta * 0.08;
          if (d === digitValue) {
            const activeDigitGlowBoost = 1 + (comboHeat * 0.16) + (scorePulse * 0.18);
            ctx.shadowColor = `rgba(255,162,78,${0.56 * flicker * activeDigitGlowBoost})`;
            ctx.shadowBlur = 4;
            ctx.fillStyle = `rgba(255,210,142,${0.88 * flicker * activeDigitGlowBoost})`;
            ctx.fillText(String(d), xOffset, yOffset);
            ctx.shadowBlur = 14;
            ctx.fillStyle = `rgba(255,150,64,${0.45 * flicker * activeDigitGlowBoost})`;
            ctx.fillText(String(d), xOffset, yOffset);
            ctx.shadowBlur = 28;
            ctx.fillStyle = `rgba(255,116,42,${0.24 * flicker * activeDigitGlowBoost})`;
            ctx.fillText(String(d), xOffset, yOffset);
            ctx.shadowBlur = 0;
          } else {
            const alpha = Math.max(0.025, 0.065 - (Math.abs(delta) * 0.005));
            ctx.fillStyle = `rgba(255,172,106,${alpha})`;
            ctx.fillText(String(d), xOffset, yOffset);
          }
        }
        ctx.restore();

        const baseGlow = ctx.createRadialGradient(tubeMidX, tubeBottomY, 0, tubeMidX, tubeBottomY, tubeW * 0.6);
        const tubeBaseGlowBoost = 1 + (comboHeat * 0.18) + (scorePulse * 0.2);
        baseGlow.addColorStop(0, `rgba(255,138,58,${0.30 * flicker * tubeBaseGlowBoost})`);
        baseGlow.addColorStop(1, "rgba(255,120,52,0)");
        ctx.fillStyle = baseGlow;
        ctx.fillRect(tx + 2, ty + tubeH - 16, tubeW - 4, 16);

        ctx.strokeStyle = "rgba(212,146,82,0.30)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tubeMidX - (tubeW * 0.16), ty + tubeH - 3);
        ctx.lineTo(tubeMidX + (tubeW * 0.16), ty + tubeH - 3);
        ctx.stroke();
        ctx.restore();

        ctx.strokeStyle = "rgba(196,132,78,0.34)";
        ctx.lineWidth = 1;
        drawRechargedHudV2RoundedRectPath(ctx, tx, ty, tubeW, tubeH, tr);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Dashboard.html structural port (Phase 9): center orb system only.
    // Source mapping:
    // - getLayout().orb
    // - rebuild(): lines/sparks/ring model
    // - drawOrbCutout(), drawCore(), drawBrokenRing()
    const rechargedHudV2OrbModel = {
      lines: [],
      sparks: [],
      ring: [],
      seeded: false,
    };
    const rechargedHudV2AmbientMotesModel = {
      leds: [],
      pixels: [],
      motes: [],
      seeded: false,
    };
    const rechargedHudV2Rand = (a, b) => a + (Math.random() * (b - a));
    const rechargedHudV2Lerp = (a, b, t) => a + ((b - a) * t);
    const rechargedHudV2MixColor = (c1, c2, t) => ({
      r: Math.round(rechargedHudV2Lerp(c1.r, c2.r, t)),
      g: Math.round(rechargedHudV2Lerp(c1.g, c2.g, t)),
      b: Math.round(rechargedHudV2Lerp(c1.b, c2.b, t)),
    });
    const rechargedHudV2Rgb = (c, a = 1) => `rgba(${c.r},${c.g},${c.b},${a})`;

    function getRechargedHudV2OrbPalette(intensity) {
      const critical = {
        coreA: { r: 34, g: 6, b: 4 },
        coreB: { r: 72, g: 12, b: 8 },
        glow: { r: 120, g: 18, b: 10 },
        halo: { r: 90, g: 12, b: 8 },
        spark: { r: 150, g: 40, b: 28 },
        hot: { r: 205, g: 90, b: 60 },
      };
      const full = {
        coreA: { r: 255, g: 210, b: 120 },
        coreB: { r: 255, g: 132, b: 34 },
        glow: { r: 255, g: 180, b: 86 },
        halo: { r: 255, g: 130, b: 24 },
        spark: { r: 255, g: 226, b: 186 },
        hot: { r: 255, g: 245, b: 220 },
      };
      return {
        coreA: rechargedHudV2MixColor(critical.coreA, full.coreA, intensity),
        coreB: rechargedHudV2MixColor(critical.coreB, full.coreB, intensity),
        glow: rechargedHudV2MixColor(critical.glow, full.glow, intensity),
        halo: rechargedHudV2MixColor(critical.halo, full.halo, intensity),
        spark: rechargedHudV2MixColor(critical.spark, full.spark, intensity),
        hot: rechargedHudV2MixColor(critical.hot, full.hot, intensity),
      };
    }

    function seedRechargedHudV2OrbModel() {
      if (rechargedHudV2OrbModel.seeded) return;
      for (let i = 0; i < 28; i += 1) {
        rechargedHudV2OrbModel.lines.push({
          a: rechargedHudV2Rand(0, Math.PI * 2),
          span: rechargedHudV2Rand(0.7, 1.7),
          r: rechargedHudV2Rand(0.08, 0.65),
          amp: rechargedHudV2Rand(0.03, 0.13),
          drift: rechargedHudV2Rand(-0.03, 0.03),
          width: rechargedHudV2Rand(0.45, 1.2),
          glow: rechargedHudV2Rand(3, 7),
          alpha: rechargedHudV2Rand(0.08, 0.18),
          depth: rechargedHudV2Rand(0.5, 1.25),
        });
      }
      for (let i = 0; i < 18; i += 1) {
        rechargedHudV2OrbModel.sparks.push({
          line: Math.floor(Math.random() * rechargedHudV2OrbModel.lines.length),
          p: Math.random(),
          dir: Math.random() > 0.5 ? 1 : -1,
          speed: rechargedHudV2Rand(0.001, 0.0024),
          size: rechargedHudV2Rand(1, 3.4),
          alpha: rechargedHudV2Rand(0.3, 0.85),
        });
      }
      for (let i = 0; i < 18; i += 1) {
        rechargedHudV2OrbModel.ring.push({
          start: (i / 18) * Math.PI * 2,
          len: rechargedHudV2Rand(0.18, 0.28),
          width: rechargedHudV2Rand(3.2, 6.8),
          dead: Math.random() < 0.18,
          weak: Math.random() < 0.25,
          phase: rechargedHudV2Rand(0, 10),
          jitter: rechargedHudV2Rand(-0.02, 0.02),
        });
      }
      rechargedHudV2OrbModel.seeded = true;
    }

    function pointInRechargedHudV2Rect(x, y, r) {
      return x >= r.x && x <= (r.x + r.w) && y >= r.y && y <= (r.y + r.h);
    }

    function getRechargedHudV2MoteRandomPointInZone(zone) {
      return {
        x: rechargedHudV2Rand(zone.x + 8, (zone.x + zone.w) - 8),
        y: rechargedHudV2Rand(zone.y + 8, (zone.y + zone.h) - 8),
      };
    }

    function seedRechargedHudV2AmbientMotesModel() {
      if (rechargedHudV2AmbientMotesModel.seeded) return;
      [
        [80, 44], [110, 44], [140, 44],
        [RECHARGED_HUD_V2_MASTER_W - 130, 44], [RECHARGED_HUD_V2_MASTER_W - 100, 44], [RECHARGED_HUD_V2_MASTER_W - 70, 44],
        [RECHARGED_HUD_V2_MASTER_W - 220, RECHARGED_HUD_V2_MASTER_H - 36], [RECHARGED_HUD_V2_MASTER_W - 185, RECHARGED_HUD_V2_MASTER_H - 36],
      ].forEach((d) => {
        rechargedHudV2AmbientMotesModel.leds.push({
          x: d[0],
          y: d[1],
          phase: rechargedHudV2Rand(0, 10),
          dead: Math.random() < 0.2,
          weak: Math.random() < 0.45,
        });
      });
      const pixelStartX = 88;
      const pixelY = RECHARGED_HUD_V2_MASTER_H - 40;
      for (let i = 0; i < 26; i += 1) {
        rechargedHudV2AmbientMotesModel.pixels.push({
          x: pixelStartX + (i * 6.5),
          y: pixelY,
          dead: Math.random() < 0.22,
          weak: Math.random() < 0.3,
          phase: rechargedHudV2Rand(0, 10),
        });
      }
      const { w, h } = getRechargedHudV2Layout();
      const gameplay = { x: 40, y: 157, w: w - 80, h: 861 };
      const zones = {
        left: { x: 0, y: 0, w: 58, h },
        right: { x: w - 58, y: 0, w: 58, h },
        bottom: { x: 58, y: h - 58, w: w - 116, h: 58 },
        topLeft: { x: 58, y: 18, w: 180, h: 64 },
        topRight: { x: w - 240, y: 18, w: 182, h: 64 },
      };
      const allowedZones = [zones.left, zones.right, zones.bottom, zones.topLeft, zones.topRight];
      for (let i = 0; i < 24; i += 1) {
        const zoneIndex = Math.floor(Math.random() * allowedZones.length);
        const p = getRechargedHudV2MoteRandomPointInZone(allowedZones[zoneIndex]);
        rechargedHudV2AmbientMotesModel.motes.push({
          x: p.x,
          y: p.y,
          vx: rechargedHudV2Rand(-0.025, 0.025),
          vy: rechargedHudV2Rand(-0.02, 0.02),
          a: rechargedHudV2Rand(0.02, 0.10),
          r: rechargedHudV2Rand(0.8, 2.0),
          phase: rechargedHudV2Rand(0, 10),
          zoneIndex,
        });
      }
      rechargedHudV2AmbientMotesModel.seeded = true;
    }

    function drawRechargedHudV2CornerLeds(ctx, time, energyPct) {
      ctx.save();
      for (let i = 0; i < rechargedHudV2AmbientMotesModel.leds.length; i += 1) {
        const d = rechargedHudV2AmbientMotesModel.leds[i];
        let a = 0.05;
        if (!d.dead) {
          const base = d.weak ? 0.10 : 0.18;
          const pulse = 0.65 + (Math.sin((time * (d.weak ? 0.6 : 0.35)) + d.phase) * 0.25);
          const glitch = d.weak && Math.sin((time * 2.2) + (d.phase * 3.1)) > 0.985 ? 0.02 : 1.0;
          a = base * pulse * glitch;
        }
        const g = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, 12);
        g.addColorStop(0, `rgba(255,225,170,${a * 1.8})`);
        g.addColorStop(0.35, `rgba(255,165,90,${a})`);
        g.addColorStop(1, "rgba(255,120,40,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(d.x, d.y, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = d.dead
          ? "rgba(95,62,48,0.55)"
          : `rgba(255,196,120,${0.35 + a})`;
        ctx.beginPath();
        ctx.arc(d.x, d.y, 3.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawRechargedHudV2LowerEnergyPixels(ctx, time, energyPct) {
      ctx.save();
      for (let i = 0; i < rechargedHudV2AmbientMotesModel.pixels.length; i += 1) {
        const p = rechargedHudV2AmbientMotesModel.pixels[i];
        let a = 0.08;
        if (!p.dead) {
          const active = ((i / rechargedHudV2AmbientMotesModel.pixels.length) * 100) < (energyPct + 8);
          if (active) {
            const pulse = 0.72 + (Math.sin((time * 0.45) + p.phase) * 0.18);
            const glitch = p.weak && Math.sin((time * 1.9) + (p.phase * 2.8)) > 0.992 ? 0.0 : 1.0;
            a = 0.12 + (0.26 * pulse * glitch);
          } else if (p.weak && energyPct > ((i / rechargedHudV2AmbientMotesModel.pixels.length) * 100) - 10) {
            a = 0.08 + (Math.sin((time * 1.4) + p.phase) * 0.04);
          }
        }
        ctx.fillStyle = p.dead ? "rgba(70,46,36,0.7)" : `rgba(255,176,96,${a})`;
        ctx.fillRect(p.x, p.y, 4, 2);
        if (!p.dead && a > 0.14) {
          ctx.fillStyle = `rgba(255,220,160,${a * 0.35})`;
          ctx.fillRect(p.x - 1, p.y - 1, 6, 4);
        }
      }
      ctx.restore();
    }

    function drawRechargedHudV2AmbientMotes(ctx, time, energyPct) {
      ctx.save();
      drawRechargedHudV2CornerLeds(ctx, time, energyPct);
      drawRechargedHudV2LowerEnergyPixels(ctx, time, energyPct);
      const { w, h } = getRechargedHudV2Layout();
      const gameplay = { x: 40, y: 157, w: w - 80, h: 861 };
      const zones = {
        left: { x: 0, y: 0, w: 58, h },
        right: { x: w - 58, y: 0, w: 58, h },
        bottom: { x: 58, y: h - 58, w: w - 116, h: 58 },
        topLeft: { x: 58, y: 18, w: 180, h: 64 },
        topRight: { x: w - 240, y: 18, w: 182, h: 64 },
      };
      const allZones = [zones.left, zones.right, zones.bottom, zones.topLeft, zones.topRight];
      for (let i = 0; i < rechargedHudV2AmbientMotesModel.motes.length; i += 1) {
        const m = rechargedHudV2AmbientMotesModel.motes[i];
        const zone = allZones[m.zoneIndex];
        m.x += m.vx;
        m.y += m.vy;
        if (!pointInRechargedHudV2Rect(m.x, m.y, zone) || pointInRechargedHudV2Rect(m.x, m.y, gameplay)) {
          const p = getRechargedHudV2MoteRandomPointInZone(zone);
          m.x = p.x;
          m.y = p.y;
        }
        const a = m.a * (0.55 + (Math.sin(time * 0.4 + m.phase) * 0.25));
        const g = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r * 6);
        g.addColorStop(0, `rgba(255,235,180,${a * 1.8})`);
        g.addColorStop(0.35, `rgba(255,170,96,${a})`);
        g.addColorStop(1, "rgba(255,120,60,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r * 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(255,220,160,${a * 0.75})`;
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawRechargedHudV2OrbSideEnergyPct(ctx, orb, energyPct) {
      ctx.save();
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.font = "700 9px Arial";
      const x = orb.x + orb.r + 28;
      const y = orb.y - (orb.r * 0.05);
      const intensity = Math.max(0, Math.min(1, energyPct / 100));
      const pctGlow = 0.12 + (intensity * 0.22);
      ctx.fillStyle = `rgba(255,170,120,${0.10 + (pctGlow * 0.25)})`;
      drawRechargedHudV2RoundedRectPath(ctx, x - 9, y - 9, 38, 18, 6);
      ctx.fill();
      ctx.strokeStyle = `rgba(170,72,42,${0.16 + (pctGlow * 0.18)})`;
      ctx.lineWidth = 1;
      drawRechargedHudV2RoundedRectPath(ctx, x - 9, y - 9, 38, 18, 6);
      ctx.stroke();
      ctx.shadowColor = `rgba(255,90,40,${0.08 + (pctGlow * 0.12)})`;
      ctx.shadowBlur = 6;
      const label = {
        r: Math.round(120 + (intensity * 120)),
        g: Math.round(18 + (intensity * 120)),
        b: Math.round(16 + (intensity * 80)),
      };
      ctx.fillStyle = `rgba(${label.r},${label.g},${label.b},${0.72 + (intensity * 0.16)})`;
      ctx.fillText(`${Math.round(energyPct)}%`, x, y + 0.5);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function pointOnRechargedHudV2OrbLine(f, p, ox, oy, or, time) {
      const orbit = (time * 0.015) + (f.drift * time * 0.04);
      const ang = f.a + orbit + ((p - 0.5) * f.span);
      const base = or * (0.10 + f.r);
      const wob = Math.sin((p * Math.PI * (1.4 + (f.a * 0.2))) + (time * (0.08 + (f.r * 0.05)))) * or * f.amp;
      const rr = base + wob;
      return {
        x: ox + (Math.cos(ang) * rr),
        y: oy + (Math.sin(ang) * rr * 0.92),
      };
    }

    function drawRechargedHudV2OrbCutout(ctx, ox, oy, or) {
      const r = or + 18;
      const shadow = ctx.createRadialGradient(ox, oy, r * 0.6, ox, oy, r * 1.2);
      shadow.addColorStop(0, "rgba(0,0,0,0)");
      shadow.addColorStop(1, "rgba(0,0,0,0.45)");
      ctx.fillStyle = shadow;
      ctx.beginPath();
      ctx.arc(ox, oy, r * 1.2, 0, Math.PI * 2);
      ctx.fill();

      const ring = ctx.createRadialGradient(ox, oy, r * 0.7, ox, oy, r);
      ring.addColorStop(0, "rgba(10,3,2,0.8)");
      ring.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = ring;
      ctx.beginPath();
      ctx.arc(ox, oy, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,210,150,0.12)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(ox, oy, r - 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawRechargedHudV2OrbCore(ctx, ox, oy, or, time, w, h, energyPct, sparkStepScale = 1) {
      const intensity = Math.max(0, Math.min(1, energyPct / 100));
      const inv = 1 - intensity;
      const pal = getRechargedHudV2OrbPalette(intensity);

      const halo = ctx.createRadialGradient(ox, oy, or * 0.10, ox, oy, or * 2.35);
      halo.addColorStop(0, rechargedHudV2Rgb(pal.glow, 0.03 + (intensity * 0.16)));
      halo.addColorStop(0.34, rechargedHudV2Rgb(pal.halo, 0.04 + (intensity * 0.18)));
      halo.addColorStop(1, rechargedHudV2Rgb(pal.halo, 0));
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, w, h);

      const body = ctx.createRadialGradient(ox - (or * 0.16), oy - (or * 0.20), or * 0.05, ox, oy, or * 1.02);
      body.addColorStop(0, rechargedHudV2Rgb(pal.spark, 0.10 + (intensity * 0.18)));
      body.addColorStop(0.18, rechargedHudV2Rgb(pal.coreA, 0.10 + (intensity * 0.16)));
      body.addColorStop(0.52, rechargedHudV2Rgb(pal.coreB, 0.16 + (intensity * 0.22)));
      body.addColorStop(0.82, rechargedHudV2Rgb(pal.halo, 0.14 + (intensity * 0.12)));
      body.addColorStop(1, "rgba(12,3,2,0.78)");
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.arc(ox, oy, or, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.globalCompositeOperation = "multiply";
      ctx.beginPath();
      ctx.arc(ox, oy, or, 0, Math.PI * 2);
      ctx.clip();
      for (let i = 0; i < 3; i += 1) {
        const a = (time * (0.002 + (i * 0.0015))) + (i * 2.1);
        const rx = or * (0.22 + (i * 0.06));
        const ry = or * (0.14 + (i * 0.05));
        const x = ox + (Math.cos(a) * or * (0.18 + (i * 0.04)));
        const y = oy + (Math.sin(a * 1.2) * or * (0.16 + (i * 0.05)));
        const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry) * 1.2);
        const alpha = 0.05 + (inv * 0.22);
        g.addColorStop(0, `rgba(0,0,0,${alpha})`);
        g.addColorStop(0.6, `rgba(0,0,0,${alpha * 0.6})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.ellipse(x, y, rx, ry, a * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      ctx.save();
      ctx.beginPath();
      ctx.arc(ox, oy, or, 0, Math.PI * 2);
      ctx.clip();
      ctx.globalCompositeOperation = "screen";

      for (let i = 0; i < 5; i += 1) {
        const a = (time * (0.004 + (i * 0.003))) + (i * 1.3);
        const gx = ox + (Math.cos(a) * or * (0.08 + (i * 0.05)));
        const gy = oy + (Math.sin(a) * or * (0.07 + (i * 0.04)) * 0.9);
        const gr = or * (0.10 + (i * 0.012));
        const g = ctx.createRadialGradient(gx, gy, gr * 0.05, gx, gy, gr * (1.2 + (intensity * 0.45)));
        g.addColorStop(0, rechargedHudV2Rgb(pal.hot, 0.04 + (intensity * 0.24)));
        g.addColorStop(0.35, rechargedHudV2Rgb(pal.spark, 0.04 + (intensity * 0.12)));
        g.addColorStop(1, rechargedHudV2Rgb(pal.glow, 0));
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(gx, gy, gr * (1.2 + (intensity * 0.45)), 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < rechargedHudV2OrbModel.lines.length; i += 1) {
        const f = rechargedHudV2OrbModel.lines[i];
        const pts = [];
        for (let s = 0; s <= 72; s += 1) {
          pts.push(pointOnRechargedHudV2OrbLine(f, s / 72, ox, oy, or, time));
        }

        const alpha = (0.06 + (f.alpha * 0.85)) * (0.18 + (intensity * 0.95)) * f.depth;
        ctx.strokeStyle = i % 7 === 0
          ? rechargedHudV2Rgb(pal.spark, alpha * 0.42)
          : i % 3 === 0
            ? rechargedHudV2Rgb(pal.coreA, alpha * 0.34)
            : rechargedHudV2Rgb(pal.coreB, alpha * 0.30);
        ctx.lineWidth = f.glow * f.depth * (0.9 + (intensity * 0.15));
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let k = 1; k < pts.length; k += 1) {
          const p0 = pts[k - 1];
          const p1 = pts[k];
          const mx = (p0.x + p1.x) / 2;
          const my = (p0.y + p1.y) / 2;
          ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
        }
        ctx.stroke();

        ctx.strokeStyle = i % 7 === 0
          ? rechargedHudV2Rgb(pal.hot, alpha * 0.68)
          : i % 3 === 0
            ? rechargedHudV2Rgb(pal.spark, alpha * 0.55)
            : rechargedHudV2Rgb(pal.coreA, alpha * 0.50);
        ctx.lineWidth = f.width * f.depth;
        ctx.beginPath();
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let k = 1; k < pts.length; k += 1) {
          const p0 = pts[k - 1];
          const p1 = pts[k];
          const mx = (p0.x + p1.x) / 2;
          const my = (p0.y + p1.y) / 2;
          ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
        }
        ctx.stroke();
      }

      for (let i = 0; i < rechargedHudV2OrbModel.sparks.length; i += 1) {
        const s = rechargedHudV2OrbModel.sparks[i];
        const f = rechargedHudV2OrbModel.lines[s.line % rechargedHudV2OrbModel.lines.length];
        s.p += s.speed * s.dir * (0.45 + (intensity * 0.55)) * sparkStepScale * RECHARGED_HUD_V2_ORB_SPEED_TUNING;
        if (s.p > 1 || s.p < 0) {
          s.p = s.dir > 0 ? 0 : 1;
          s.line = Math.floor(Math.random() * rechargedHudV2OrbModel.lines.length);
          s.dir = Math.random() > 0.5 ? 1 : -1;
          s.size = rechargedHudV2Rand(1.0, 3.6);
          s.alpha = rechargedHudV2Rand(0.2, 0.82);
        }
        const pt = pointOnRechargedHudV2OrbLine(f, s.p, ox, oy, or, time);
        const sg = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, s.size * (4.0 + (intensity * 1.4)));
        sg.addColorStop(0, rechargedHudV2Rgb(pal.hot, 0.14 + (s.alpha * 0.46)));
        sg.addColorStop(0.3, rechargedHudV2Rgb(pal.spark, 0.08 + (s.alpha * 0.24)));
        sg.addColorStop(1, rechargedHudV2Rgb(pal.glow, 0));
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, s.size * (4.0 + (intensity * 1.4)), 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = rechargedHudV2Rgb(pal.hot, 0.10 + (s.alpha * 0.46));
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, s.size * (0.85 + (intensity * 0.16)), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const spec = ctx.createRadialGradient(
        ox - (or * 0.20),
        oy - (or * 0.28),
        2,
        ox - (or * 0.20),
        oy - (or * 0.28),
        or * (0.16 + (intensity * 0.10)),
      );
      spec.addColorStop(0, rechargedHudV2Rgb(pal.hot, 0.04 + (intensity * 0.18)));
      spec.addColorStop(0.4, rechargedHudV2Rgb(pal.spark, 0.02 + (intensity * 0.07)));
      spec.addColorStop(1, rechargedHudV2Rgb(pal.spark, 0));
      ctx.fillStyle = spec;
      ctx.beginPath();
      ctx.ellipse(
        ox - (or * 0.17),
        oy - (or * 0.28),
        or * (0.15 + (intensity * 0.05)),
        or * (0.11 + (intensity * 0.03)),
        -0.35,
        0,
        Math.PI * 2,
      );
      ctx.fill();
      ctx.restore();
    }

    function drawRechargedHudV2OrbBrokenRing(ctx, ox, oy, or, time, energyPct) {
      const rr = or + 14;
      const intensity = Math.max(0, Math.min(1, energyPct / 100));
      const micro = 0.92 + (Math.sin(time * 0.35) * 0.04);

      for (let i = 0; i < rechargedHudV2OrbModel.ring.length; i += 1) {
        const seg = rechargedHudV2OrbModel.ring[i];
        const threshold = (i / rechargedHudV2OrbModel.ring.length) * 100;
        const powered = energyPct >= threshold;

        const base = Math.sin((time * (0.4 + (seg.phase * 0.1))) + seg.phase);
        const flicker = Math.sin((time * (1.2 + (seg.phase * 0.3))) + (seg.phase * 2));
        const glitchChance = (Math.sin((time * 0.6) + (seg.phase * 3)) + 1) * 0.5;
        const glitch = glitchChance > 0.92 ? Math.sin((time * 12) + (seg.phase * 10)) : 0;

        let alpha = 0;
        let glowAlpha = 0;
        if (seg.dead) {
          alpha = (0.08 + (intensity * 0.06) + (Math.max(0, base) * 0.03)) * micro;
          glowAlpha = (0.06 + (intensity * 0.05)) * micro;
          if (glitchChance > 0.97) {
            alpha += 0.12;
            glowAlpha += 0.10;
          }
        } else if (powered) {
          const stability = seg.weak ? 0.75 : 0.95;
          const flickerAmount = seg.weak ? flicker * 0.18 : flicker * 0.06;
          const drop = glitch * 0.25;
          alpha = (stability + flickerAmount - drop) * micro;
          alpha = Math.max(0.25, alpha);
          glowAlpha = (0.16 + (intensity * 0.12)) * micro;
        } else {
          alpha = (0.10 + (intensity * 0.05) + (Math.max(0, flicker) * 0.05)) * micro;
          glowAlpha = (0.08 + (intensity * 0.05)) * micro;
          if (glitchChance > 0.95) {
            alpha += 0.10;
          }
        }

        const s = seg.start + seg.jitter;
        const e = s + seg.len;
        ctx.strokeStyle = `rgba(255,190,110,${glowAlpha})`;
        ctx.lineWidth = seg.width + 6;
        ctx.beginPath();
        ctx.arc(ox, oy, rr, s, e);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255,200,130,${alpha})`;
        ctx.lineWidth = seg.width;
        ctx.beginPath();
        ctx.arc(ox, oy, rr, s, e);
        ctx.stroke();
      }

      if (energyPct > 82) {
        const pulse = (0.08 + (Math.sin(time * 0.8) * 0.02) + (intensity * 0.02)) * micro;
        ctx.strokeStyle = `rgba(255,216,128,${pulse})`;
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.arc(ox, oy, rr + 6, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawRechargedHudV2(canvas, ctx, state, hudSnapshot) {
      if (!canvas || !ctx || !hudSnapshot) return;
      const frame = Number.isFinite(state?.frameCount) ? state.frameCount : 0;
      const nowSec = (typeof performance?.now === "function" ? performance.now() : Date.now()) / 1000;
      const prevNowSec = Number.isFinite(state?.hudLastVisualNowSec) ? state.hudLastVisualNowSec : nowSec;
      const visualDt = Math.max(1 / 240, Math.min(0.05, nowSec - prevNowSec));
      const visualTime = Math.max(0, Number(state?.hudVisualTimeSec || 0) + visualDt);
      const sparkStepScale = visualDt / (1 / 60);
      state.hudVisualTimeSec = visualTime;
      state.hudLastVisualNowSec = nowSec;
      const energyPct = Number.isFinite(hudSnapshot.energyPct) ? Math.max(0, Math.min(100, Math.round(hudSnapshot.energyPct))) : 0;
      const lives = Number.isFinite(hudSnapshot.lives) ? Math.max(0, Math.floor(hudSnapshot.lives)) : 0;
      const livesMax = Number.isFinite(hudSnapshot.livesMax) ? Math.max(1, Math.floor(hudSnapshot.livesMax)) : Math.max(1, lives);
      const flares = Number.isFinite(hudSnapshot.flares) ? Math.max(0, Math.floor(hudSnapshot.flares)) : 0;
      const flareMax = Number.isFinite(hudSnapshot.flareMax) ? Math.max(1, Math.floor(hudSnapshot.flareMax)) : 3;
      const score = Number.isFinite(hudSnapshot.score) ? Math.max(0, Math.floor(hudSnapshot.score)) : 0;
      const comboMultiplier = Number.isFinite(hudSnapshot.comboMultiplier) ? Math.max(1, Math.min(2, hudSnapshot.comboMultiplier)) : 1;
      const scorePulse = Number.isFinite(state?.hud?.scorePulse) ? Math.max(0, Math.min(1, state.hud.scorePulse)) : 0;
      const viewport = getRechargedHudV2Viewport(canvas);
      const gameplayViewport = getRechargedHudV2GameplayViewport(canvas);
      const { w, h } = getRechargedHudV2Layout();
      const orb = {
        x: w * 0.665,
        y: (h * 0.165) - 33,
        r: (Math.min(w, h) * 0.084) * 0.7,
      };
      seedRechargedHudV2OrbModel();
      seedRechargedHudV2AmbientMotesModel();
      updateRechargedHudV2BottomPanelLife(visualTime);
      updateRechargedHudV2PanelSoulState(lives, flares);

      ctx.save();
      ctx.translate(viewport.x, viewport.y);
      ctx.scale(viewport.scale, viewport.scale);
      drawRechargedHudV2BaseFrame(ctx);
      drawRechargedHudV2WithFrameClip(ctx, () => {
        drawRechargedHudV2TopPanelSurfacePolish(ctx, visualTime);
        drawRechargedHudV2PanelSoul(ctx, visualTime, orb, energyPct);
        drawRechargedHudV2FutureHudGuides(ctx);
        drawRechargedHudV2InnerEdgeWear(ctx, visualTime);
        drawRechargedHudV2LivesPanel(ctx, frame / 60, lives, livesMax);
        drawRechargedHudV2FlarePanel(ctx, frame / 60, flares, flareMax);
        drawRechargedHudV2NixieScore(ctx, visualTime, score, {
          comboMultiplier,
          scorePulse,
        });
      });
      drawRechargedHudV2OrbCutout(ctx, orb.x, orb.y, orb.r);
      drawRechargedHudV2FramePatina(ctx, visualTime);
      drawRechargedHudV2WithFrameClip(ctx, () => {
        drawRechargedHudV2InsetLightStrip(ctx, visualTime, energyPct);
        drawRechargedHudV2BottomVents(ctx, visualTime);
        drawRechargedHudV2VintageRadioScale(ctx, visualTime);
      });
      drawRechargedHudV2TechGraffiti(ctx, visualTime);
      drawRechargedHudV2OrbCore(ctx, orb.x, orb.y, orb.r, visualTime, w, h, energyPct, sparkStepScale);
      drawRechargedHudV2OrbBrokenRing(ctx, orb.x, orb.y, orb.r, visualTime, energyPct);
      drawRechargedHudV2OrbSideEnergyPct(ctx, orb, energyPct);
      drawRechargedHudV2AmbientMotes(ctx, visualTime, energyPct);
      drawRechargedHudV2TopLogoPlate(ctx);
      ctx.restore();

      window.__LUMO_RECHARGED_HUD_V2_DEBUG__ = {
        enabled: true,
        source: "dashboard-html-structural-code-port",
        frame,
        energyPct,
        lives,
        livesMax,
        flares,
        flareMax,
        score,
        comboMultiplier,
        scorePulse,
        logoReady: !!(rechargedHudV2LumoLogoImg.complete && rechargedHudV2LumoLogoImg.naturalWidth > 0),
        playfieldRect: {
          x: gameplayViewport.x,
          y: gameplayViewport.y,
          w: gameplayViewport.w,
          h: gameplayViewport.h,
        },
        runtimeUsesDashboardHtml: false,
      };
    }

    function drawRechargedHudReplica(canvas, state) {
      const hud = state?.hud;
      if (!hud) {
        return;
      }
      const ctx = canvas?.getContext?.("2d");
      if (!ctx) {
        return;
      }
      drawRechargedHudV2(canvas, ctx, state, hud);
    }

    // Updates Recharged HUD model from live adapter snapshots with safe fallbacks.
    function updateRechargedHudOverlay(hud, payload, state) {
      if (!hud) {
        return;
      }

      const snapshot = buildRechargedHudSnapshot(payload, state);
      const energyRatio = Number.isFinite(snapshot.energy) ? Math.max(0, Math.min(1, snapshot.energy)) : 0;
      const flareStash = Number.isFinite(snapshot.flareStash) ? Math.max(0, Math.floor(snapshot.flareStash)) : 0;
      const nowMs = typeof performance?.now === "function" ? performance.now() : Date.now();
      const previousMs = Number.isFinite(state?.lastHudUpdateAtMs) ? state.lastHudUpdateAtMs : nowMs;
      const dt = Math.max(0, (nowMs - previousMs) / 1000);

      if (flareStash !== (hud._prevFlares | 0)) {
        hud.flareFlash = 0.25;
      } else {
        hud.flareFlash = Math.max(0, Number(hud.flareFlash || 0) - dt);
      }

      hud._prevFlares = flareStash;
      const previousScore = Number.isFinite(hud.score) ? Math.max(0, Math.floor(hud.score)) : 0;
      const snapshotScore = Number.isFinite(snapshot.score) ? Math.max(0, Math.floor(snapshot.score)) : previousScore;
      if (snapshotScore > previousScore) {
        hud._scorePulseAgeSec = 0;
      } else if (!Number.isFinite(hud._scorePulseAgeSec)) {
        hud._scorePulseAgeSec = RECHARGED_HUD_V2_SCORE_PULSE_DURATION_SEC;
      } else {
        hud._scorePulseAgeSec += dt;
      }
      const pulseDurationSec = Math.max(0.18, RECHARGED_HUD_V2_SCORE_PULSE_DURATION_SEC);
      const pulseT = Math.max(0, Math.min(1, (hud._scorePulseAgeSec || 0) / pulseDurationSec));
      const pulseEase = 1 - (pulseT * pulseT);
      hud.scorePulse = pulseT < 1 ? pulseEase : 0;

      hud.lives = Number.isFinite(snapshot.lives) ? Math.max(0, Math.floor(snapshot.lives)) : hud.lives;
      const payloadPlayer = payload?.player && typeof payload.player === "object" ? payload.player : null;
      const nextLivesMax = Number.isFinite(payloadPlayer?.maxLives)
        ? Math.max(1, Math.floor(payloadPlayer.maxLives))
        : Number.isFinite(payloadPlayer?.livesMax)
          ? Math.max(1, Math.floor(payloadPlayer.livesMax))
          : null;
      if (Number.isFinite(nextLivesMax)) {
        hud.livesMax = Math.max(hud.lives, nextLivesMax);
      } else if (!Number.isFinite(hud.livesMax) || hud.livesMax < hud.lives) {
        hud.livesMax = Math.max(hud.lives, 4);
      }
      const nextFlareMax = Number.isFinite(payloadPlayer?.maxFlares)
        ? Math.max(1, Math.floor(payloadPlayer.maxFlares))
        : Number.isFinite(payloadPlayer?.flaresMax)
          ? Math.max(1, Math.floor(payloadPlayer.flaresMax))
          : Number.isFinite(payloadPlayer?.flareMax)
            ? Math.max(1, Math.floor(payloadPlayer.flareMax))
            : null;
      if (Number.isFinite(nextFlareMax)) {
        hud.flareMax = nextFlareMax;
      } else if (!Number.isFinite(hud.flareMax) || hud.flareMax < 1) {
        hud.flareMax = 3;
      }
      hud.energyPct = Math.round(energyRatio * 100);
      hud.flares = flareStash;
      hud.score = snapshotScore;
      hud.comboMultiplier = Number.isFinite(snapshot.comboMultiplier)
        ? Math.max(1, Math.min(2, snapshot.comboMultiplier))
        : 1;
      const hudDebug = document.getElementById("hudDebug");
      if (hudDebug) {
        hudDebug.textContent = state?.intermissionAcknowledgedMessage || "";
      }

      if (state && typeof state === "object") {
        state.lastHudUpdateAtMs = nowMs;
      }
    }

    function createRechargedFireflyAudioState() {
      return {
        keyByEntityId: new Map(),
        handlesByKey: new Map(),
        nextFireflyAudioId: 1,
        bridge: null,
      };
    }

    function createRechargedPlayerActionAudioState() {
      return {
        lastPulseId: 0,
      };
    }

    function ensureRechargedPlayerActionAudioState(state) {
      if (!state || typeof state !== "object") {
        return createRechargedPlayerActionAudioState();
      }
      if (!state.rechargedPlayerActionAudio || typeof state.rechargedPlayerActionAudio !== "object") {
        state.rechargedPlayerActionAudio = createRechargedPlayerActionAudioState();
      }
      return state.rechargedPlayerActionAudio;
    }

    function resolveRechargedSfxVolume() {
      try {
        if (window?.Lumo && typeof window.Lumo.getAudioSettings === "function") {
          const settings = window.Lumo.getAudioSettings();
          if (Number.isFinite(settings?.sfxVolume)) {
            return Math.max(0, Math.min(1, settings.sfxVolume));
          }
        }
      } catch (_error) {
        // Safe fallback keeps runtime SFX audible when settings lookup fails.
      }
      return 1;
    }

    function playRechargedPlayerActionSfx(path, volume = 1) {
      if (typeof path !== "string" || path.length === 0) return;
      const AudioCtor = window?.Audio;
      if (typeof AudioCtor !== "function") return;
      const sfxVolume = resolveRechargedSfxVolume();
      const finalVolume = Math.max(0, Math.min(1, volume * sfxVolume));
      if (finalVolume <= 0) return;
      try {
        const audio = new AudioCtor(path);
        audio.preload = "auto";
        audio.volume = finalVolume;
        const playPromise = audio.play?.();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      } catch (_error) {
        // Ignore action SFX failures so runtime simulation is never blocked by audio.
      }
    }

    function resolveRechargedPlayerActionSfxVolume(actionType) {
      const actionVolume = Number.isFinite(RECHARGED_PLAYER_ACTION_SFX_VOLUME?.[actionType])
        ? RECHARGED_PLAYER_ACTION_SFX_VOLUME[actionType]
        : 1;
      return Math.max(0, Math.min(1, actionVolume));
    }

    function syncRechargedPlayerActionSfx(state, previousPlayerSnapshot, currentPlayerSnapshot) {
      if (!state || !currentPlayerSnapshot || typeof currentPlayerSnapshot !== "object") return;
      const playerAudioState = ensureRechargedPlayerActionAudioState(state);
      const previous = previousPlayerSnapshot && typeof previousPlayerSnapshot === "object"
        ? previousPlayerSnapshot
        : null;
      const current = currentPlayerSnapshot;
      const hasPrevious = previous !== null;

      const previousGrounded = previous?.grounded === true;
      const currentGrounded = current?.grounded === true;
      const currentVelocityY = Number.isFinite(current?.velocity?.y) ? current.velocity.y : 0;
      const currentRising = current?.rising === true || currentVelocityY < -1;
      const jumpStarted = hasPrevious && previousGrounded && !currentGrounded && currentRising;

      const landingTransition = hasPrevious && (current?.landed === true || (!previousGrounded && currentGrounded));

      const currentPulseId = Number.isFinite(current?.pulse?.id) ? Math.max(0, Math.floor(current.pulse.id)) : 0;
      const pulseStarted = currentPulseId > playerAudioState.lastPulseId && current?.pulse?.active === true;
      if (currentPulseId > playerAudioState.lastPulseId) {
        playerAudioState.lastPulseId = currentPulseId;
      }

      if (jumpStarted) {
        playRechargedPlayerActionSfx(RECHARGED_PLAYER_ACTION_SFX.jump, resolveRechargedPlayerActionSfxVolume("jump"));
      }
      if (landingTransition) {
        playRechargedPlayerActionSfx(RECHARGED_PLAYER_ACTION_SFX.land, resolveRechargedPlayerActionSfxVolume("land"));
      }
      if (pulseStarted) {
        playRechargedPlayerActionSfx(RECHARGED_PLAYER_ACTION_SFX.pulse, resolveRechargedPlayerActionSfxVolume("pulse"));
      }
    }

    function ensureRechargedAuthoredAudioState(state) {
      if (!state || typeof state !== "object") {
        return createRechargedAuthoredAudioState();
      }
      if (!state.rechargedAuthoredAudio || typeof state.rechargedAuthoredAudio !== "object") {
        state.rechargedAuthoredAudio = createRechargedAuthoredAudioState();
      }
      return state.rechargedAuthoredAudio;
    }

    // Reads authored world audio payload from adapter snapshots with payload-level fallback.
    function readRechargedAuthoredAudioItems(payload) {
      if (!payload || typeof payload !== "object") return [];
      const payloadItems = Array.isArray(payload.audioItems) ? payload.audioItems : null;
      if (payloadItems) return payloadItems;
      const adapter = payload?.adapter && typeof payload.adapter === "object" ? payload.adapter : null;
      const worldSnapshot = adapter?.getWorldSnapshot?.();
      return Array.isArray(worldSnapshot?.audioItems) ? worldSnapshot.audioItems : [];
    }

    function resolveRechargedAuthoredAudioCoordinateScale(payload, state, audioItems) {
      const tileSize = Number.isFinite(payload?.tileSize) && payload.tileSize > 0 ? payload.tileSize : 24;
      const worldWidthRaw = Number.isFinite(payload?.worldWidth)
        ? payload.worldWidth
        : (Number.isFinite(payload?.cols) ? payload.cols : null);
      const worldHeightRaw = Number.isFinite(payload?.worldHeight)
        ? payload.worldHeight
        : (Number.isFinite(payload?.rows) ? payload.rows : null);
      const playerSnapshot = state?.currentPlayerSnapshot;
      const playerLooksPixel = (
        Number.isFinite(playerSnapshot?.x)
        && Number.isFinite(worldWidthRaw)
        && playerSnapshot.x > worldWidthRaw + tileSize
      ) || (
        Number.isFinite(playerSnapshot?.y)
        && Number.isFinite(worldHeightRaw)
        && playerSnapshot.y > worldHeightRaw + tileSize
      );
      if (!playerLooksPixel) return 1;
      const authoredEntries = Array.isArray(audioItems) ? audioItems.filter((item) => Number.isFinite(item?.x) && Number.isFinite(item?.y)) : [];
      if (authoredEntries.length <= 0) return 1;
      const authoredLooksTile = authoredEntries.every((item) => (
        (!Number.isFinite(worldWidthRaw) || item.x <= worldWidthRaw + 1)
        && (!Number.isFinite(worldHeightRaw) || item.y <= worldHeightRaw + 1)
      ));
      return authoredLooksTile ? tileSize : 1;
    }

    function syncRechargedAuthoredAudio(payload, state) {
      if (!payload || !state) return;
      const authoredAudioItems = readRechargedAuthoredAudioItems(payload);
      const authoredAudioState = ensureRechargedAuthoredAudioState(state);
      const authoredCoordinateScale = resolveRechargedAuthoredAudioCoordinateScale(payload, state, authoredAudioItems);
      // Authored audio reuses the same live bridge backend as runtime entities, but keeps its own persistent authored handle maps.
      if (!authoredAudioState.bridge) {
        authoredAudioState.bridge = createFireflyAudioBridge({
          runtimeGlobal: window,
          getSfxVolume() {
            try {
              if (window?.Lumo && typeof window.Lumo.getAudioSettings === "function") {
                const settings = window.Lumo.getAudioSettings();
                if (Number.isFinite(settings?.sfxVolume)) {
                  return settings.sfxVolume;
                }
              }
            } catch (_error) {
              // Safe fallback keeps authored runtime audio audible when settings lookup fails.
            }
            return 1;
          },
        });
      }
      // Per-frame authored audio sync consumes payload audioItems and drives trigger/spot/zone handle activation directly in live runtime.
      syncRechargedAuthoredAudioFrame({
        audioItems: authoredAudioItems,
        playerSnapshot: state.currentPlayerSnapshot,
        previousPlayerSnapshot: state.previousPlayerSnapshot,
        tileSize: Number.isFinite(payload?.tileSize) ? payload.tileSize : 24,
        coordinateScale: authoredCoordinateScale,
        bridge: authoredAudioState.bridge,
        runtimeState: authoredAudioState,
      });
      const authoredDebug = {
        ...(authoredAudioState.debug && typeof authoredAudioState.debug === "object" ? authoredAudioState.debug : {}),
        bridgeReady: authoredAudioState?.bridge?.ready === true,
        bridgeSource: typeof authoredAudioState?.bridge?.source === "string" ? authoredAudioState.bridge.source : "none",
      };
      payload.rechargedAuthoredAudioDebug = authoredDebug;
      window.__LUMO_RECHARGED_AUTHORED_AUDIO_DEBUG__ = authoredDebug;
    }

    // Renders V1-style respawn countdown overlay in active Recharged canvas.
    function drawRechargedRespawnOverlay(canvas, ctx, payload, state) {
      const hudSnapshot = buildRechargedHudSnapshot(payload, state);
      const payloadRespawnPending = payload?.respawnPending === true;
      const payloadRespawnCount = Number.isFinite(payload?.respawnCount) ? Math.max(0, Math.ceil(payload.respawnCount)) : null;
      if (payloadRespawnPending !== true) {
        return false;
      }

      const fallbackCount = Number.isFinite(hudSnapshot?.respawnCount) ? Math.max(0, Math.ceil(hudSnapshot.respawnCount)) : 0;
      const n = Number.isFinite(payloadRespawnCount) ? Math.max(0, Math.floor(payloadRespawnCount)) : Math.max(0, Math.floor(fallbackCount));
      const cx = canvas.width * 0.5;
      const cy = canvas.height * 0.45;
      const gap = Math.max(54, Math.round(canvas.width * 0.055));
      const wordFontSize = Math.max(52, Math.round(canvas.height * 0.11));
      const numberFontSize = Math.max(58, Math.round(canvas.height * 0.12));

      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.font = `700 ${wordFontSize}px "Cooper Black","Arial Black",Impact,sans-serif`;
      const wordGradient = ctx.createLinearGradient(0, cy - wordFontSize, 0, cy + wordFontSize);
      wordGradient.addColorStop(0.00, "#FFF3B0");
      wordGradient.addColorStop(0.45, "#FFD44D");
      wordGradient.addColorStop(1.00, "#FF8A00");
      ctx.fillStyle = wordGradient;
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.lineWidth = Math.max(10, Math.round(wordFontSize * 0.3));
      ctx.strokeStyle = "rgba(0,0,0,0.55)";
      ctx.strokeText("RESPAWN", cx - gap * 0.5, cy);
      ctx.lineWidth = Math.max(6, Math.round(wordFontSize * 0.18));
      ctx.strokeStyle = "rgba(40,90,170,0.95)";
      ctx.strokeText("RESPAWN", cx - gap * 0.5, cy);
      ctx.fillText("RESPAWN", cx - gap * 0.5, cy);

      ctx.textAlign = "left";
      ctx.font = `700 ${numberFontSize}px "Cooper Black","Arial Black",Impact,sans-serif`;
      const numberGradient = ctx.createLinearGradient(0, cy - numberFontSize, 0, cy + numberFontSize);
      numberGradient.addColorStop(0.00, "#111");
      numberGradient.addColorStop(0.55, "#B10014");
      numberGradient.addColorStop(1.00, "#FF2B2B");
      ctx.fillStyle = numberGradient;
      ctx.lineWidth = Math.max(8, Math.round(numberFontSize * 0.2));
      ctx.strokeStyle = "rgba(0,0,0,0.70)";
      ctx.strokeText(String(n), cx + gap * 0.5, cy);
      ctx.lineWidth = Math.max(4, Math.round(numberFontSize * 0.1));
      ctx.strokeStyle = "rgba(255,210,120,0.95)";
      ctx.strokeText(String(n), cx + gap * 0.5, cy);
      ctx.fillText(String(n), cx + gap * 0.5, cy);
      ctx.restore();
      return true;
    }

    function drawRechargedGameOverOverlay(canvas, ctx, payload, state) {
      const hudSnapshot = buildRechargedHudSnapshot(payload, state);
      if (hudSnapshot?.gameState !== "gameover") {
        return false;
      }

      if (!state.rechargedGameOverImage) {
        state.rechargedGameOverImage = createRechargedSpriteImage(RECHARGED_UI_GAME_OVER_IMAGE);
      }
      const image = state.rechargedGameOverImage;
      const imageReady = image && image.complete && image.naturalWidth > 0;

      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      if (imageReady) {
        const scale = Math.min(canvas.width / image.naturalWidth, canvas.height / image.naturalHeight);
        const drawW = image.naturalWidth * scale;
        const drawH = image.naturalHeight * scale;
        const drawX = (canvas.width - drawW) * 0.5;
        const drawY = (canvas.height - drawH) * 0.5;
        ctx.drawImage(image, drawX, drawY, drawW, drawH);
      } else {
        ctx.fillStyle = "#080A13";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      // Keep runtime game-over rendering limited to the authored texture/pass only.
      // Temporary debug marker/menu-copy text is intentionally removed.
      ctx.restore();
      return true;
    }

    function ensureRechargedFireflyAudioState(state) {
      if (!state || typeof state !== "object") {
        return createRechargedFireflyAudioState();
      }
      if (!state.rechargedFireflyAudio || typeof state.rechargedFireflyAudio !== "object") {
        state.rechargedFireflyAudio = createRechargedFireflyAudioState();
      }
      return state.rechargedFireflyAudio;
    }

    function createRechargedFireflyAudioBridge() {
      return createFireflyAudioBridge({
        runtimeGlobal: window,
        getSfxVolume() {
          try {
            if (window?.Lumo && typeof window.Lumo.getAudioSettings === "function") {
              const settings = window.Lumo.getAudioSettings();
              if (Number.isFinite(settings?.sfxVolume)) {
                return settings.sfxVolume;
              }
            }
          } catch (_error) {
            // Safe default keeps SFX audible even when settings lookup fails.
          }
          return 1;
        },
      });
    }

    function publishRechargedFireflyAudioState(payload, state, details = {}) {
      if (!payload || typeof payload !== "object") return;
      const fireflyAudioState = state?.rechargedFireflyAudio && typeof state.rechargedFireflyAudio === "object"
        ? state.rechargedFireflyAudio
        : null;
      const handlesByKey = fireflyAudioState?.handlesByKey instanceof Map ? fireflyAudioState.handlesByKey : null;
      let realAudioCount = 0;
      let playingCount = 0;
      let samplePaused = null;
      let sampleVolume = null;
      if (handlesByKey) {
        for (const handle of handlesByKey.values()) {
          const audio = handle?.audio;
          if (!audio || typeof audio !== "object") continue;
          realAudioCount += 1;
          // Count only truly audible handles (not just HTMLMediaElements reporting paused=false while context is suspended).
          const isActuallyAudible = fireflyAudioState?.bridge && typeof fireflyAudioState.bridge.isHandleActuallyAudible === "function"
            ? fireflyAudioState.bridge.isHandleActuallyAudible(handle)
            : (audio.paused === false);
          if (isActuallyAudible) playingCount += 1;
          if (samplePaused === null) {
            samplePaused = audio.paused === true;
          }
          if (sampleVolume === null) {
            sampleVolume = Number.isFinite(audio.volume) ? audio.volume : null;
          }
        }
      }
      payload.rechargedFireflyAudio = {
        updateFrame: Number.isFinite(state?.frameCount) ? state.frameCount : 0,
        bridgeReady: fireflyAudioState?.bridge?.ready === true,
        trackedEntityCount: fireflyAudioState?.keyByEntityId instanceof Map ? fireflyAudioState.keyByEntityId.size : 0,
        trackedHandleCount: handlesByKey ? handlesByKey.size : 0,
        activeFireflyCount: Number.isFinite(details.activeFireflyCount) ? details.activeFireflyCount : 0,
        realAudioCount,
        playingCount,
        samplePaused,
        sampleVolume,
        source: typeof fireflyAudioState?.bridge?.source === "string" ? fireflyAudioState.bridge.source : "none",
      };
    }

    function syncRechargedFireflyAudio(payload, state) {
      if (!payload || !state) return null;
      const entities = readRechargedEntitySnapshots(payload, state);
      const fireflyAudioState = ensureRechargedFireflyAudioState(state);
      if (!fireflyAudioState.bridge) {
        fireflyAudioState.bridge = createRechargedFireflyAudioBridge();
      }
      const bridge = fireflyAudioState.bridge;
      if (!bridge) {
        publishRechargedFireflyAudioState(payload, state, { activeFireflyCount: 0 });
        return null;
      }
      const playerSnapshot = state.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object"
        ? state.currentPlayerSnapshot
        : (payload?.player && typeof payload.player === "object" ? payload.player : null);
      const tileSize = Number.isFinite(payload?.tileSize) ? payload.tileSize : 24;
      const activeFireflyKeys = syncFireflyAudioFrame({
        entities,
        playerSnapshot,
        tileSize,
        ensureAudioKey(entity) {
          const entityId = typeof entity?.id === "string" ? entity.id : "";
          if (!entityId) return "";
          const known = fireflyAudioState.keyByEntityId.get(entityId);
          if (known) return known;
          const next = `firefly-${fireflyAudioState.nextFireflyAudioId++}`;
          fireflyAudioState.keyByEntityId.set(entityId, next);
          return next;
        },
        ensureHandle(key) {
          const existing = fireflyAudioState.handlesByKey.get(key);
          if (existing) return existing;
          const handle = bridge.getHandle(FIREFLY_AUDIO_PATH, true, key);
          if (!handle) return null;
          bridge.ensureSpatial(handle);
          fireflyAudioState.handlesByKey.set(key, handle);
          return handle;
        },
        setPan(handle, pan) {
          bridge.setPan(handle, pan);
        },
        setVolume(handle, targetVolume) {
          bridge.setVolume(handle, targetVolume);
        },
        visitKnownHandles(visitor) {
          for (const [key, handle] of fireflyAudioState.handlesByKey.entries()) {
            visitor(key, handle);
          }
        },
      });

      publishRechargedFireflyAudioState(payload, state, {
        activeFireflyCount: activeFireflyKeys?.size || 0,
      });
      return activeFireflyKeys;
    }

    function makeRechargedScoreEntityKey(entity) {
      if (!entity || typeof entity !== "object") {
        return "";
      }
      if (typeof entity.id === "string" && entity.id.trim().length > 0) {
        return entity.id.trim();
      }
      const type = typeof entity.type === "string" ? entity.type : "entity";
      const x = Number.isFinite(entity.x) ? Math.round(entity.x) : "x";
      const y = Number.isFinite(entity.y) ? Math.round(entity.y) : "y";
      return `${type}:${x}:${y}`;
    }

    function resolveRechargedCheckpointKey(checkpoint) {
      if (!checkpoint || typeof checkpoint !== "object") {
        return "";
      }
      const tx = Number.isFinite(checkpoint.tx) ? Math.floor(checkpoint.tx) : null;
      const ty = Number.isFinite(checkpoint.ty) ? Math.floor(checkpoint.ty) : null;
      if (!Number.isFinite(tx) || !Number.isFinite(ty)) {
        return "";
      }
      return `${tx},${ty}`;
    }

    function resolveRechargedCheckpointActivationKey(livePlayer) {
      if (!livePlayer || typeof livePlayer !== "object") {
        return "";
      }
      const runtimeActivationKey = typeof livePlayer?.checkpointActivationKey === "string"
        ? livePlayer.checkpointActivationKey.trim()
        : "";
      if (runtimeActivationKey.length > 0) {
        return runtimeActivationKey;
      }
      return resolveRechargedCheckpointKey(livePlayer?.checkpoint);
    }

    function getRechargedComboMultiplier(state, nowMs) {
      if (!state || typeof state !== "object") {
        return 1;
      }

      if (!Number.isFinite(state.comboCount)) {
        state.comboCount = 0;
      }
      if (!Number.isFinite(state.comboLastEventTime)) {
        state.comboLastEventTime = Number.NEGATIVE_INFINITY;
      }
      if (!Number.isFinite(state.comboMultiplier)) {
        state.comboMultiplier = 1;
      }

      const normalizedNowMs = Number.isFinite(nowMs) ? nowMs : Date.now();
      if ((normalizedNowMs - state.comboLastEventTime) > 2000) {
        state.comboCount = 0;
      }

      state.comboCount += 1;
      let multiplier = 1;
      if (state.comboCount === 2) {
        multiplier = 1.5;
      } else if (state.comboCount >= 3) {
        multiplier = 2;
      }

      state.comboLastEventTime = normalizedNowMs;
      state.comboMultiplier = multiplier;
      return multiplier;
    }

    function awardRechargedScore(state, eventKey, points) {
      if (!state || typeof state !== "object") {
        return;
      }
      if (typeof eventKey !== "string" || eventKey.trim().length === 0 || !Number.isFinite(points) || points <= 0) {
        return;
      }
      if (!(state.scoreAwardedEvents instanceof Set)) {
        state.scoreAwardedEvents = new Set();
      }
      if (!Number.isFinite(state.score)) {
        state.score = 0;
      }

      const normalizedEventKey = eventKey.trim();
      if (state.scoreAwardedEvents.has(normalizedEventKey)) {
        return;
      }

      const nowMs = (typeof performance !== "undefined" && typeof performance.now === "function")
        ? performance.now()
        : Date.now();
      const multiplier = getRechargedComboMultiplier(state, nowMs);
      const finalPoints = Math.floor(points * multiplier);
      state.scoreAwardedEvents.add(normalizedEventKey);
      state.score += finalPoints;

      if (window.__LUMO_RECHARGED_SCORE_DEBUG__ === true) {
        console.log("[Lumo Recharged score]", {
          eventKey: normalizedEventKey,
          basePoints: points,
          multiplier,
          finalPoints,
          comboCount: Number.isFinite(state.comboCount) ? state.comboCount : 0,
          score: Math.max(0, Math.floor(state.score)),
        });
      }
    }

    function isRechargedEntityInactiveForScore(entity) {
      if (!entity || typeof entity !== "object") {
        return true;
      }
      const entityState = typeof entity?.state === "string" ? entity.state.toLowerCase() : "";
      return entity?.active !== true
        || entity?.alive === false
        || entityState === "collected"
        || entityState === "inactive"
        || entityState === "destroyed"
        || entityState === "dead"
        || entityState === "defeated"
        || entityState === "dissolving";
    }

    function applyRechargedRuntimeScoreEvents(state, payload) {
      if (!state || typeof state !== "object") {
        return;
      }
      if (!(state.scoreLiveEntitiesByKey instanceof Map)) {
        state.scoreLiveEntitiesByKey = new Map();
      }

      const currentByKey = new Map();
      for (const entity of readRechargedLiveEntitySnapshots(payload, state)) {
        const entityType = typeof entity?.type === "string" ? entity.type : "";
        if (
          entityType !== "powercell_01"
          && entityType !== "flare_pickup_01"
          && entityType !== "dark_creature_01"
          && entityType !== "hover_void_01"
        ) {
          continue;
        }
        const key = makeRechargedScoreEntityKey(entity);
        if (key.length === 0) {
          continue;
        }
        currentByKey.set(key, {
          key,
          type: entityType,
          active: entity?.active === true,
          alive: entity?.alive === true,
          state: typeof entity?.state === "string" ? entity.state : "",
        });
      }

      for (const [key, previousEntity] of state.scoreLiveEntitiesByKey.entries()) {
        const currentEntity = currentByKey.get(key) || null;
        const wasLive = previousEntity?.active === true || previousEntity?.alive === true;
        const nowInactive = currentEntity === null || isRechargedEntityInactiveForScore(currentEntity);
        if (!wasLive || !nowInactive) {
          continue;
        }

        if (previousEntity.type === "powercell_01") {
          awardRechargedScore(state, `pickup:${key}`, 50);
        } else if (previousEntity.type === "flare_pickup_01") {
          awardRechargedScore(state, `pickup:${key}`, 50);
        } else if (previousEntity.type === "dark_creature_01") {
          awardRechargedScore(state, `kill:${key}`, 200);
        } else if (previousEntity.type === "hover_void_01") {
          awardRechargedScore(state, `kill:${key}`, 300);
        }
      }

      const livePlayer = resolveRechargedLivePlayerSnapshot(payload, state).snapshot;
      const checkpointTouched = livePlayer?.checkpointTouched === true;
      const checkpointKey = resolveRechargedCheckpointActivationKey(livePlayer);
      if (checkpointTouched && checkpointKey.length > 0 && checkpointKey !== state.scoreLastCheckpointKey) {
        awardRechargedScore(state, `checkpoint:${checkpointKey}`, 500);
        state.scoreLastCheckpointKey = checkpointKey;
      }

      state.scoreLiveEntitiesByKey = currentByKey;
    }

    function tickLiveRechargedAdapter(state) {
      try {
        const payload = readLatestRechargedBootPayload();
        const adapter = payload && typeof payload.adapter === "object" ? payload.adapter : null;
        if (!adapter || typeof adapter.tick !== "function") {
          if (state && typeof state === "object") {
            state.lastTickOk = null;
          }
          return;
        }

        const intent = {
          left: state?.input?.left === true,
          right: state?.input?.right === true,
          jump: state?.input?.jump === true,
          flare: state?.input?.flare === true,
          pulse: state?.input?.pulse === true,
          boost: state?.input?.boost === true,
        };

        const nowMs = (typeof performance !== "undefined" && typeof performance.now === "function")
          ? performance.now()
          : Date.now();
        const previousTickMs = Number.isFinite(state?.lastStepAtMs) ? state.lastStepAtMs : null;
        const frameDeltaMs = previousTickMs === null
          ? RECHARGED_FIXED_STEP_MS
          : Math.max(0, Math.min(250, nowMs - previousTickMs));
        const currentAccumulatorMs = Number.isFinite(state?.stepAccumulatorMs) ? state.stepAccumulatorMs : 0;
        let nextAccumulatorMs = currentAccumulatorMs + frameDeltaMs;
        let stepsToRun = Math.floor(nextAccumulatorMs / RECHARGED_FIXED_STEP_MS);

        if (stepsToRun > RECHARGED_MAX_CATCH_UP_STEPS) {
          stepsToRun = RECHARGED_MAX_CATCH_UP_STEPS;
          nextAccumulatorMs = RECHARGED_FIXED_STEP_MS * RECHARGED_MAX_CATCH_UP_STEPS;
        }

        const readSnapshot = () => {
          const snapshot = adapter.getPlayerSnapshot?.();
          return snapshot && typeof snapshot === "object" ? snapshot : null;
        };

        let tickResult = {
          ok: true,
          stepped: false,
        };
        let previousPlayerSnapshot = state?.previousPlayerSnapshot && typeof state.previousPlayerSnapshot === "object"
          ? state.previousPlayerSnapshot
          : null;
        let currentPlayerSnapshot = readSnapshot();
        let steppedAtLeastOnce = false;

        for (let stepIndex = 0; stepIndex < stepsToRun; stepIndex += 1) {
          tickResult = adapter.tick(intent);
          if (tickResult?.ok !== true || tickResult?.stepped !== true) {
            break;
          }
          previousPlayerSnapshot = currentPlayerSnapshot;
