<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lumo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Boot / Loading overlay (future: Menu) -->
  <div id="bootOverlay" aria-hidden="true">
    <div class="bootScreen" role="presentation"></div>
    <div class="bootHUD" role="presentation">
      <div class="bootBar" id="bootBar"></div>
      <div class="bootText" id="bootText">Loading...</div>
    </div>
  </div>

  <!-- Legacy DOM hooks required by app.js (kept hidden via CSS) -->
  <button id="btnRestart" type="button">Restart</button>
  <input id="fileLevel" type="file" accept=".json,.js,application/json,text/javascript" />
  <div id="hudLives"></div>
  <div id="hudEnergy"></div>
  <div id="hudLight"></div>
  <div id="hudCP"></div>
  <div id="hudDebug"></div>

  <script defer src="data/tileset.js"></script>
  <script defer src="data/catalog_profiles.js"></script>
  <script defer src="data/catalog_bg.js"></script>
  <script defer src="data/catalog_tiles.js"></script>
  <script defer src="data/levels/level01.js"></script>
  <script defer src="src/core/util.js"></script>
  <script defer src="src/core/input.js"></script>
  <script defer src="src/core/time.js"></script>
  <script defer src="src/core/camera.js"></script>
  <script defer src="src/core/renderer.js"></script>
  <script defer src="src/game/world.js"></script>
  <script defer src="src/game/player.js"></script>
  <script defer src="data/catalog_entities.js"></script>
  <script defer src="src/game/entities.js"></script>
  <script defer src="data/audio_global_config.js"></script>
  <script type="module" defer>
    import { bootLumoRechargedFromQuery } from "./editor-v2/src/runtime/bootLumoRechargedFromQuery.js";

    const RECHARGED_CANVAS_ID = "recharged-runtime-canvas";

    function safeNumber(value, fallback) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function resolvePayload(boot) {
      return boot?.result || boot || null;
    }

    function readRuntimeState(payload) {
      const player = payload?.player || payload?.runtime?.player || payload?.state?.player || payload?.snapshot?.player || null;
      const world = payload?.world || payload?.runtime?.world || payload?.state?.world || payload?.snapshot?.world || null;

      const tileSize = safeNumber(
        world?.tileSize || payload?.tileSize || payload?.config?.tileSize,
        16,
      );

      const worldWidth = safeNumber(
        world?.width || world?.tilesWide,
        50,
      ) * tileSize;
      const worldHeight = safeNumber(
        world?.height || world?.tilesHigh,
        38,
      ) * tileSize;

      const playerX = safeNumber(player?.x ?? payload?.playerX, tileSize * 4);
      const playerY = safeNumber(player?.y ?? payload?.playerY, tileSize * 4);
      const grounded = Boolean(player?.grounded ?? payload?.grounded ?? false);

      return {
        playerX,
        playerY,
        grounded,
        tileSize,
        worldWidth,
        worldHeight,
      };
    }

    function tickRechargedAdapter(boot) {
      const candidateFns = [
        boot?.adapter?.tick,
        boot?.result?.adapter?.tick,
        boot?.tick,
        boot?.result?.tick,
      ];

      for (const candidate of candidateFns) {
        if (typeof candidate === "function") {
          try {
            candidate.call(boot?.adapter || boot?.result?.adapter || boot);
          } catch {
            // Never throw from minimal bridge renderer.
          }
          return;
        }
      }
    }

    function startRechargedCanvasBridge() {
      const boot = window.__LumoRechargedBoot;
      if (!(boot?.enabled === true && boot?.booted === true)) {
        return;
      }

      const existingCanvas = document.getElementById(RECHARGED_CANVAS_ID);
      if (existingCanvas) {
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.id = RECHARGED_CANVAS_ID;
      canvas.width = 800;
      canvas.height = 600;
      canvas.style.display = "block";
      canvas.style.margin = "0 auto";
      canvas.style.background = "#090d16";

      document.body.appendChild(canvas);

      const context = canvas.getContext("2d");
      if (!context) {
        return;
      }

      const searchParams = new URLSearchParams(window.location.search);
      const autoplayEnabled = searchParams.get("autoplay") === "1";

      const frame = () => {
        const currentBoot = window.__LumoRechargedBoot;
        if (!(currentBoot?.enabled === true && currentBoot?.booted === true)) {
          return;
        }

        if (autoplayEnabled) {
          tickRechargedAdapter(currentBoot);
        }

        const payload = resolvePayload(currentBoot);
        const runtime = readRuntimeState(payload);

        context.fillStyle = "#0b1120";
        context.fillRect(0, 0, canvas.width, canvas.height);

        context.strokeStyle = "#22314f";
        context.lineWidth = 2;
        context.strokeRect(16, 16, Math.min(runtime.worldWidth, canvas.width - 32), Math.min(runtime.worldHeight, canvas.height - 32));

        const clampedX = Math.max(0, Math.min(canvas.width - runtime.tileSize, runtime.playerX));
        const clampedY = Math.max(0, Math.min(canvas.height - runtime.tileSize, runtime.playerY));

        context.fillStyle = runtime.grounded ? "#4ade80" : "#60a5fa";
        context.fillRect(clampedX, clampedY, runtime.tileSize, runtime.tileSize);

        window.requestAnimationFrame(frame);
      };

      window.requestAnimationFrame(frame);
    }

    // Loads legacy app.js only when Recharged mode is not active or did not boot.
    function loadLegacyBootScript() {
      return new Promise((resolve) => {
        const script = document.createElement("script");
        script.src = "src/app.js";
        script.defer = true;
        script.onload = () => resolve(true);
        script.onerror = () => resolve(false);
        document.body.appendChild(script);
      });
    }

    // Runs query-driven Recharged opt-in boot with safe legacy fallback behavior.
    async function bootLumoRuntime() {
      let queryBootResult = null;

      try {
        queryBootResult = await bootLumoRechargedFromQuery({
          search: window.location.search,
        });
      } catch (error) {
        queryBootResult = {
          ok: false,
          enabled: true,
          booted: false,
          mode: "recharged",
          status: "invalid",
          errors: [error?.message || "Lumo query boot failed."],
          warnings: [],
        };
      }

      window.__LumoRechargedBoot = queryBootResult;

      if (queryBootResult?.enabled === true && queryBootResult?.booted === true) {
        console.info("[Lumo] Recharged query boot active", queryBootResult);
        startRechargedCanvasBridge();
        return;
      }

      if (queryBootResult?.enabled === true && queryBootResult?.booted !== true) {
        console.warn("[Lumo] Recharged query boot failed; falling back to legacy boot", queryBootResult);
      }

      const legacyLoaded = await loadLegacyBootScript();
      if (!legacyLoaded) {
        console.error("[Lumo] Legacy app.js failed to load.");
      }
    }

    void bootLumoRuntime();
  </script>
</body>
</html>
