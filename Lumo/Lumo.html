<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lumo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Boot / Loading overlay (future: Menu) -->
  <div id="bootOverlay" aria-hidden="true">
    <div class="bootScreen" role="presentation"></div>
    <div class="bootHUD" role="presentation">
      <div class="bootBar" id="bootBar"></div>
      <div class="bootText" id="bootText">Loading...</div>
    </div>
  </div>

  <!-- Legacy DOM hooks required by app.js (kept hidden via CSS) -->
  <button id="btnRestart" type="button">Restart</button>
  <input id="fileLevel" type="file" accept=".json,.js,application/json,text/javascript" />
  <div id="hudLives"></div>
  <div id="hudEnergy"></div>
  <div id="hudLight"></div>
  <div id="hudCP"></div>
  <div id="hudDebug"></div>

  <script defer src="data/tileset.js"></script>
  <script defer src="data/catalog_profiles.js"></script>
  <script defer src="data/catalog_bg.js"></script>
  <script defer src="data/catalog_tiles.js"></script>
  <script defer src="data/levels/level01.js"></script>
  <script defer src="src/core/util.js"></script>
  <script defer src="src/core/input.js"></script>
  <script defer src="src/core/time.js"></script>
  <script defer src="src/core/camera.js"></script>
  <script defer src="src/core/renderer.js"></script>
  <script defer src="src/game/world.js"></script>
  <script defer src="src/game/player.js"></script>
  <script defer src="data/catalog_entities.js"></script>
  <script defer src="src/game/entities.js"></script>
  <script defer src="data/audio_global_config.js"></script>
  <script type="module" defer>
    import { bootLumoRechargedFromQuery } from "./editor-v2/src/runtime/bootLumoRechargedFromQuery.js";
    import { createLumoRechargedBootAdapter } from "./editor-v2/src/runtime/createLumoRechargedBootAdapter.js";
    import { buildRechargedHudSnapshot } from "./editor-v2/src/runtime/buildRechargedHudSnapshot.js";

    const RECHARGED_FIXED_STEP_MS = 1000 / 60;
    const RECHARGED_MAX_CATCH_UP_STEPS = 6;
    const RECHARGED_PLAYER_SPRITE_IDLE_FRAMES = [
      "data/assets/sprites/lumo/lumo_idle_1.png",
      "data/assets/sprites/lumo/lumo_idle_2.png",
      "data/assets/sprites/lumo/lumo_idle_3.png",
      "data/assets/sprites/lumo/lumo_idle_4.png",
    ];
    const RECHARGED_PLAYER_SPRITE_RUN_FRAMES = [
      "data/assets/sprites/lumo/lumo_walk_1.png",
      "data/assets/sprites/lumo/lumo_walk_2.png",
      "data/assets/sprites/lumo/lumo_walk_3.png",
      "data/assets/sprites/lumo/lumo_walk_4.png",
    ];
    const RECHARGED_PLAYER_SPRITE_JUMP = "data/assets/sprites/lumo/lumo_jump_up.png";
    const RECHARGED_PLAYER_SPRITE_FALL = "data/assets/sprites/lumo/lumo_jump_down.png";
    const RECHARGED_PLAYER_SPRITE_BRAKE = "data/assets/sprites/lumo/lumo_brake_1.png";
    const RECHARGED_PLAYER_HORIZONTAL_SPEED_EPSILON = 0.05;
    const RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON = 0.05;
    const RECHARGED_PLAYER_IDLE_FPS = 7;
    const RECHARGED_PLAYER_IDLE_LAST_INDEX = 3;
    const RECHARGED_PLAYER_RUN_FPS = 9;
    const RECHARGED_PLAYER_RUN_LAST_INDEX = 3;
    const RECHARGED_PLAYER_RUN_BASE_SPEED = 230;
    const RECHARGED_PLAYER_HITBOX_WIDTH = 22;
    const RECHARGED_PLAYER_HITBOX_HEIGHT = 28;
    const RECHARGED_PLAYER_SPRITE_WIDTH = 24;
    const RECHARGED_PLAYER_SPRITE_HEIGHT = 38;
    const RECHARGED_PLAYER_BRAKE_SPRITE_HEIGHT = 48;
    const RECHARGED_PLAYER_BRAKE_SPRITE_MAX_WIDTH = 28;

    function createRechargedSpriteImage(src) {
      const image = new Image();
      image.decoding = "async";
      image.src = src;
      return image;
    }

    function ensureRechargedPlayerSpriteCache(state) {
      if (!state || typeof state !== "object") {
        return null;
      }

      if (!state.playerSpriteCache || typeof state.playerSpriteCache !== "object") {
        state.playerSpriteCache = {
          idleFrames: RECHARGED_PLAYER_SPRITE_IDLE_FRAMES.map((src) => createRechargedSpriteImage(src)),
          idle: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_IDLE_FRAMES[0]),
          runFrames: RECHARGED_PLAYER_SPRITE_RUN_FRAMES.map((src) => createRechargedSpriteImage(src)),
          run: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_RUN_FRAMES[0]),
          jump: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_JUMP),
          fall: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_FALL),
          brake: createRechargedSpriteImage(RECHARGED_PLAYER_SPRITE_BRAKE),
        };
      }

      return state.playerSpriteCache;
    }

    function resolveRechargedPlayerAnimationState(playerSnapshot, previousAnimationState = "idle") {
      const grounded = playerSnapshot?.grounded === true;
      const rising = playerSnapshot?.rising === true;
      const falling = playerSnapshot?.falling === true;
      const locomotion = typeof playerSnapshot?.locomotion === "string" ? playerSnapshot.locomotion : "";
      const velocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      const velocityY = Number.isFinite(playerSnapshot?.velocity?.y) ? playerSnapshot.velocity.y : 0;
      const movingHorizontally = Math.abs(velocityX) > RECHARGED_PLAYER_HORIZONTAL_SPEED_EPSILON;

      if (grounded) {
        if (locomotion === "braking-grounded") {
          return "brake";
        }
        return movingHorizontally || locomotion === "moving-grounded" ? "run" : "idle";
      }

      if (rising || locomotion === "rising" || velocityY < -RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON) {
        return "jump";
      }

      if (falling || locomotion === "falling" || velocityY > RECHARGED_PLAYER_VERTICAL_SPEED_EPSILON) {
        return "fall";
      }

      if (locomotion === "airborne-moving" || locomotion === "airborne-neutral") {
        return "jump";
      }

      return previousAnimationState === "fall" ? "fall" : "jump";
    }

    // Mirrors V1 idle animation cadence exactly: 0→1→2→3→2→1→...
    function resolveRechargedIdleSpriteFrame(state, spriteCache, animationState, nowMs) {
      if (!state || !spriteCache || animationState !== "idle") {
        return spriteCache?.idle || null;
      }

      if (!state.playerIdleAnimation || typeof state.playerIdleAnimation !== "object") {
        state.playerIdleAnimation = { i: 0, dir: 1, t: 0, lastAtMs: null };
      }

      const idleAnimation = state.playerIdleAnimation;
      const frames = Array.isArray(spriteCache.idleFrames) ? spriteCache.idleFrames : [spriteCache.idle];
      const frameStepMs = 1000 / Math.max(1, RECHARGED_PLAYER_IDLE_FPS);
      const safeNowMs = Number.isFinite(nowMs) ? nowMs : performance.now();
      const elapsedMs = idleAnimation.lastAtMs === null ? 0 : Math.max(0, safeNowMs - idleAnimation.lastAtMs);
      idleAnimation.lastAtMs = safeNowMs;
      idleAnimation.t += elapsedMs;

      while (idleAnimation.t >= frameStepMs) {
        idleAnimation.t -= frameStepMs;
        idleAnimation.i += idleAnimation.dir;
        if (idleAnimation.i >= RECHARGED_PLAYER_IDLE_LAST_INDEX) {
          idleAnimation.i = RECHARGED_PLAYER_IDLE_LAST_INDEX;
          idleAnimation.dir = -1;
        }
        if (idleAnimation.i <= 0) {
          idleAnimation.i = 0;
          idleAnimation.dir = 1;
        }
      }

      const frameIndex = Math.max(0, Math.min(RECHARGED_PLAYER_IDLE_LAST_INDEX, idleAnimation.i | 0));
      return frames[frameIndex] || frames[0] || spriteCache.idle || null;
    }

    // Mirrors V1 grounded walk cadence: 0→1→2→3→0 with speed-scaled fps.
    function resolveRechargedRunSpriteFrame(state, spriteCache, animationState, playerSnapshot, nowMs) {
      if (!state || !spriteCache || animationState !== "run") {
        return spriteCache?.run || spriteCache?.idle || null;
      }

      if (!state.playerRunAnimation || typeof state.playerRunAnimation !== "object") {
        state.playerRunAnimation = { i: 0, t: 0, lastAtMs: null };
      }

      const runAnimation = state.playerRunAnimation;
      const frames = Array.isArray(spriteCache.runFrames) ? spriteCache.runFrames : [spriteCache.run];
      const velocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      const speedRatio = Math.max(0, Math.min(1.75, Math.abs(velocityX) / Math.max(1, RECHARGED_PLAYER_RUN_BASE_SPEED)));
      const runFps = RECHARGED_PLAYER_RUN_FPS * (0.65 + 0.55 * speedRatio);
      const frameStepMs = 1000 / Math.max(1, runFps);
      const safeNowMs = Number.isFinite(nowMs) ? nowMs : performance.now();
      const elapsedMs = runAnimation.lastAtMs === null ? 0 : Math.max(0, safeNowMs - runAnimation.lastAtMs);
      runAnimation.lastAtMs = safeNowMs;
      runAnimation.t += elapsedMs;

      while (runAnimation.t >= frameStepMs) {
        runAnimation.t -= frameStepMs;
        runAnimation.i = (runAnimation.i + 1) % (RECHARGED_PLAYER_RUN_LAST_INDEX + 1);
      }

      const frameIndex = Math.max(0, Math.min(RECHARGED_PLAYER_RUN_LAST_INDEX, runAnimation.i | 0));
      return frames[frameIndex] || frames[0] || spriteCache.run || spriteCache.idle || null;
    }

    function createLumoRechargedCanvasVerificationState() {
      return {
        active: false,
        canvasId: "",
        autoplay: false,
        frameCount: 0,
        lastPlayerX: null,
        lastPlayerY: null,
        lastRenderOk: false,
        lastTickOk: null,
        previousPlayerSnapshot: null,
        currentPlayerSnapshot: null,
        playerAnimationState: "idle",
        playerIdleAnimation: null,
        playerRunAnimation: null,
        renderAlpha: 0,
        stepAccumulatorMs: 0,
        lastStepAtMs: null,
        width: null,
        height: null,
        hud: null,
      };
    }

    function ensureLumoRechargedCanvasVerificationState() {
      try {
        if (!window.__LumoRechargedCanvas || typeof window.__LumoRechargedCanvas !== "object") {
          window.__LumoRechargedCanvas = createLumoRechargedCanvasVerificationState();
        }
      } catch (_error) {
        // Keeps this verification support strictly non-fatal.
      }

      try {
        return window.__LumoRechargedCanvas || createLumoRechargedCanvasVerificationState();
      } catch (_error) {
        return createLumoRechargedCanvasVerificationState();
      }
    }

    function readLatestRechargedBootPayload() {
      try {
        const payload = window.__LumoRechargedBoot;
        if (!payload || typeof payload !== "object") {
          return null;
        }

        return payload;
      } catch (_error) {
        return null;
      }
    }

    function createRechargedInputIntentState() {
      return {
        left: false,
        right: false,
        jump: false,
        flare: false,
        pulse: false,
        boost: false,
      };
    }

    function installRechargedInputIntentSync() {
      const state = createRechargedInputIntentState();

      const readCode = (event) => (typeof event?.code === "string" ? event.code : "");
      const update = (event, pressed) => {
        const code = readCode(event);
        if (code === "ArrowLeft") {
          state.left = pressed;
        } else if (code === "ArrowRight") {
          state.right = pressed;
        } else if (code === "KeyA") {
          state.jump = pressed;
        } else if (code === "KeyS") {
          state.flare = pressed;
        } else if (code === "KeyD") {
          state.pulse = pressed;
        } else if (code === "Space") {
          state.boost = pressed;
        }
      };

      try {
        window.addEventListener("keydown", (event) => update(event, true), { passive: true });
        window.addEventListener("keyup", (event) => update(event, false), { passive: true });
      } catch (_error) {
        // Input sync is best-effort and must never throw.
      }

      return state;
    }

    function createRechargedHudOverlay() {
      return {
        lives: 4,
        livesMax: 4,
        energyPct: 100,
        flares: 0,
        flareFlash: 0,
        score: 0,
        checkpointLit: false,
        checkpointRingT: 0,
        popups: [],
        _prevFlares: 0,
        _pauseBtnHover: false,
      };
    }

    function ensureRechargedHudRenderer(state, canvas) {
      if (!state || !canvas || typeof canvas.getContext !== "function") {
        return null;
      }

      const rendererCtor = window?.Lumo?.Renderer;
      if (typeof rendererCtor !== "function") {
        return null;
      }

      if (!state.rechargedHudRenderer || state.rechargedHudRenderer.cv !== canvas) {
        state.rechargedHudRenderer = new rendererCtor(canvas);
      }

      return state.rechargedHudRenderer;
    }

    function drawRechargedHudReplica(canvas, state) {
      const hud = state?.hud;
      if (!hud) {
        return;
      }

      const renderer = ensureRechargedHudRenderer(state, canvas);
      if (!renderer || typeof renderer.drawHUD !== "function") {
        return;
      }

      renderer.w = canvas.width;
      renderer.h = canvas.height;
      renderer.drawHUD(hud);
    }

    // Updates Recharged HUD model from live adapter snapshots with safe fallbacks.
    function updateRechargedHudOverlay(hud, payload, state) {
      if (!hud) {
        return;
      }

      const snapshot = buildRechargedHudSnapshot(payload, state);
      const energyRatio = Number.isFinite(snapshot.energy) ? Math.max(0, Math.min(1, snapshot.energy)) : 0;
      const flareStash = Number.isFinite(snapshot.flareStash) ? Math.max(0, Math.floor(snapshot.flareStash)) : 0;
      const nowMs = typeof performance?.now === "function" ? performance.now() : Date.now();
      const previousMs = Number.isFinite(state?.lastHudUpdateAtMs) ? state.lastHudUpdateAtMs : nowMs;
      const dt = Math.max(0, (nowMs - previousMs) / 1000);

      if (flareStash !== (hud._prevFlares | 0)) {
        hud.flareFlash = 0.25;
      } else {
        hud.flareFlash = Math.max(0, Number(hud.flareFlash || 0) - dt);
      }

      hud._prevFlares = flareStash;
      hud.energyPct = Math.round(energyRatio * 100);
      hud.flares = flareStash;

      if (state && typeof state === "object") {
        state.lastHudUpdateAtMs = nowMs;
      }
    }

    function tickLiveRechargedAdapter(state) {
      try {
        const payload = readLatestRechargedBootPayload();
        const adapter = payload && typeof payload.adapter === "object" ? payload.adapter : null;
        if (!adapter || typeof adapter.tick !== "function") {
          if (state && typeof state === "object") {
            state.lastTickOk = null;
          }
          return;
        }

        const intent = {
          left: state?.input?.left === true,
          right: state?.input?.right === true,
          jump: state?.input?.jump === true,
          flare: state?.input?.flare === true,
          pulse: state?.input?.pulse === true,
          boost: state?.input?.boost === true,
        };

        const nowMs = (typeof performance !== "undefined" && typeof performance.now === "function")
          ? performance.now()
          : Date.now();
        const previousTickMs = Number.isFinite(state?.lastStepAtMs) ? state.lastStepAtMs : null;
        const frameDeltaMs = previousTickMs === null
          ? RECHARGED_FIXED_STEP_MS
          : Math.max(0, Math.min(250, nowMs - previousTickMs));
        const currentAccumulatorMs = Number.isFinite(state?.stepAccumulatorMs) ? state.stepAccumulatorMs : 0;
        let nextAccumulatorMs = currentAccumulatorMs + frameDeltaMs;
        let stepsToRun = Math.floor(nextAccumulatorMs / RECHARGED_FIXED_STEP_MS);

        if (stepsToRun > RECHARGED_MAX_CATCH_UP_STEPS) {
          stepsToRun = RECHARGED_MAX_CATCH_UP_STEPS;
          nextAccumulatorMs = RECHARGED_FIXED_STEP_MS * RECHARGED_MAX_CATCH_UP_STEPS;
        }

        const readSnapshot = () => {
          const snapshot = adapter.getPlayerSnapshot?.();
          return snapshot && typeof snapshot === "object" ? snapshot : null;
        };

        let tickResult = {
          ok: true,
          stepped: false,
        };
        let previousPlayerSnapshot = state?.previousPlayerSnapshot && typeof state.previousPlayerSnapshot === "object"
          ? state.previousPlayerSnapshot
          : null;
        let currentPlayerSnapshot = readSnapshot();
        let steppedAtLeastOnce = false;

        for (let stepIndex = 0; stepIndex < stepsToRun; stepIndex += 1) {
          tickResult = adapter.tick(intent);
          if (tickResult?.ok !== true || tickResult?.stepped !== true) {
            break;
          }
          previousPlayerSnapshot = currentPlayerSnapshot;
          currentPlayerSnapshot = readSnapshot();
          steppedAtLeastOnce = true;
          nextAccumulatorMs -= RECHARGED_FIXED_STEP_MS;
        }

        if (state && typeof state === "object") {
          state.lastTickOk = tickResult?.ok === true && tickResult?.stepped === true;
          state.lastStepAtMs = nowMs;
          state.stepAccumulatorMs = Math.max(0, nextAccumulatorMs);
          if (steppedAtLeastOnce) {
            state.previousPlayerSnapshot = previousPlayerSnapshot && typeof previousPlayerSnapshot === "object"
              ? previousPlayerSnapshot
              : currentPlayerSnapshot;
            state.currentPlayerSnapshot = currentPlayerSnapshot;
          } else if (!state.currentPlayerSnapshot || typeof state.currentPlayerSnapshot !== "object") {
            state.currentPlayerSnapshot = currentPlayerSnapshot;
            state.previousPlayerSnapshot = currentPlayerSnapshot;
          }
        }

        const nextPayload = adapter.getBootPayload?.();
        const nextPlayerSnapshot = currentPlayerSnapshot || readSnapshot();
        if (nextPayload && typeof nextPayload === "object") {
          window.__LumoRechargedBoot = {
            ...(payload && typeof payload === "object" ? payload : {}),
            ...nextPayload,
            player: nextPlayerSnapshot && typeof nextPlayerSnapshot === "object"
              ? nextPlayerSnapshot
              : (payload?.player && typeof payload.player === "object" ? payload.player : null),
            adapter,
          };
        }
      } catch (_error) {
        if (state && typeof state === "object") {
          state.lastTickOk = false;
        }
      }
    }

    function readRechargedPlayerSnapshot(payload) {
      try {
        const nestedPlayer = payload && typeof payload.player === "object" ? payload.player : null;
        const flatX = Number.isFinite(payload?.playerX) ? payload.playerX : null;
        const flatY = Number.isFinite(payload?.playerY) ? payload.playerY : null;
        const nestedX = Number.isFinite(nestedPlayer?.x) ? nestedPlayer.x : null;
        const nestedY = Number.isFinite(nestedPlayer?.y) ? nestedPlayer.y : null;
        const x = flatX !== null ? flatX : nestedX;
        const y = flatY !== null ? flatY : nestedY;
        const status = typeof payload?.playerStatus === "string"
          ? payload.playerStatus
          : (
            nestedPlayer?.grounded === true
              ? "grounded"
              : (nestedPlayer?.falling === true ? "falling" : "")
          );
        return {
          x,
          y,
          velocity: {
            x: Number.isFinite(nestedPlayer?.velocity?.x) ? nestedPlayer.velocity.x : null,
            y: Number.isFinite(nestedPlayer?.velocity?.y) ? nestedPlayer.velocity.y : null,
          },
          grounded: nestedPlayer?.grounded === true,
          falling: nestedPlayer?.falling === true,
          rising: nestedPlayer?.rising === true,
          facingX: Number.isFinite(nestedPlayer?.facingX) ? nestedPlayer.facingX : null,
          locomotion: typeof nestedPlayer?.locomotion === "string" ? nestedPlayer.locomotion : "",
          status,
          hidden: status === "respawning-out-of-bounds",
        };
      } catch (_error) {
        return {
          x: null,
          y: null,
          velocity: { x: null, y: null },
          grounded: false,
          falling: false,
          rising: false,
          facingX: null,
          locomotion: "",
          status: "",
          hidden: false,
        };
      }
    }

    function readRechargedFlareSnapshots(payload, state) {
      try {
        const adapter = payload?.adapter && typeof payload.adapter === "object" ? payload.adapter : null;
        const adapterPlayerSnapshot = adapter?.getPlayerSnapshot?.();
        const adapterStatePlayerSnapshot = adapter?.getState?.()?.player;
        const adapterWorldPlayerSnapshot = adapter?.getWorldSnapshot?.()?.player;
        const playerSnapshot = (
          (adapterPlayerSnapshot && typeof adapterPlayerSnapshot === "object" ? adapterPlayerSnapshot : null)
          || (state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object" ? state.currentPlayerSnapshot : null)
          || (adapterStatePlayerSnapshot && typeof adapterStatePlayerSnapshot === "object" ? adapterStatePlayerSnapshot : null)
          || (adapterWorldPlayerSnapshot && typeof adapterWorldPlayerSnapshot === "object" ? adapterWorldPlayerSnapshot : null)
          || (payload?.player && typeof payload.player === "object" ? payload.player : null)
        );
        const flares = Array.isArray(playerSnapshot?.flares) ? playerSnapshot.flares : [];
        return flares
          .map((flare) => ({
            id: Number.isFinite(flare?.id) ? flare.id : null,
            x: Number.isFinite(flare?.x) ? flare.x : null,
            y: Number.isFinite(flare?.y) ? flare.y : null,
            vx: Number.isFinite(flare?.vx) ? flare.vx : 0,
            vy: Number.isFinite(flare?.vy) ? flare.vy : 0,
            radius: Number.isFinite(flare?.radius) && flare.radius > 0 ? flare.radius : 4,
          }))
          .filter((flare) => flare.x !== null && flare.y !== null);
      } catch (_error) {
        return [];
      }
    }

    function readRechargedPulseSnapshot(payload, state) {
      try {
        const adapter = payload?.adapter && typeof payload.adapter === "object" ? payload.adapter : null;
        const adapterPlayerSnapshot = adapter?.getPlayerSnapshot?.();
        const playerSnapshot = (
          (adapterPlayerSnapshot && typeof adapterPlayerSnapshot === "object" ? adapterPlayerSnapshot : null)
          || (state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object" ? state.currentPlayerSnapshot : null)
        );
        const pulse = playerSnapshot?.pulse && typeof playerSnapshot.pulse === "object" ? playerSnapshot.pulse : null;
        if (!pulse) {
          return null;
        }
        return {
          active: pulse.active === true,
          r: Number.isFinite(pulse?.r) ? pulse.r : 0,
          alpha: Number.isFinite(pulse?.alpha) ? pulse.alpha : 0,
          thickness: Number.isFinite(pulse?.thickness) ? pulse.thickness : 2,
          id: Number.isFinite(pulse?.id) ? pulse.id : 0,
          x: Number.isFinite(pulse?.x) ? pulse.x : (Number.isFinite(playerSnapshot?.x) ? playerSnapshot.x : null),
          y: Number.isFinite(pulse?.y) ? pulse.y : (Number.isFinite(playerSnapshot?.y) ? playerSnapshot.y : null),
        };
      } catch (_error) {
        return null;
      }
    }

    function readRechargedBoostSnapshot(payload, state) {
      try {
        const adapter = payload?.adapter && typeof payload.adapter === "object" ? payload.adapter : null;
        const adapterPlayerSnapshot = adapter?.getPlayerSnapshot?.();
        const playerSnapshot = (
          (adapterPlayerSnapshot && typeof adapterPlayerSnapshot === "object" ? adapterPlayerSnapshot : null)
          || (state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object" ? state.currentPlayerSnapshot : null)
        );
        return {
          active: playerSnapshot?.boostActive === true,
        };
      } catch (_error) {
        return { active: false };
      }
    }

    function readRechargedEntitySnapshots(payload, state) {
      try {
        const adapter = payload?.adapter && typeof payload.adapter === "object" ? payload.adapter : null;
        const adapterPlayerSnapshot = adapter?.getPlayerSnapshot?.();
        const playerSnapshot = (
          (adapterPlayerSnapshot && typeof adapterPlayerSnapshot === "object" ? adapterPlayerSnapshot : null)
          || (state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object" ? state.currentPlayerSnapshot : null)
        );
        const entities = Array.isArray(playerSnapshot?.entities) ? playerSnapshot.entities : [];
        return entities
          .map((entity) => ({
            id: typeof entity?.id === "string" ? entity.id : null,
            type: typeof entity?.type === "string" ? entity.type : "dummy",
            x: Number.isFinite(entity?.x) ? entity.x : null,
            y: Number.isFinite(entity?.y) ? entity.y : null,
            size: Number.isFinite(entity?.size) && entity.size > 0 ? entity.size : 24,
            alive: entity?.alive === true,
            active: entity?.active === true,
            state: typeof entity?.state === "string" ? entity.state : "idle",
            hitFlashTicks: Number.isFinite(entity?.hitFlashTicks) ? entity.hitFlashTicks : 0,
            illuminated: entity?.illuminated === true,
            flareExposure: Number.isFinite(entity?.flareExposure) ? entity.flareExposure : 0,
            consumesFlare: entity?.consumesFlare === true,
          }))
          .filter((entity) => entity.id !== null && entity.x !== null && entity.y !== null && entity.active === true);
      } catch (_error) {
        return [];
      }
    }

    // Reads decor from world snapshots while keeping decor flow separate from runtime entities.
    function readRechargedDecorSnapshots(payload) {
      try {
        const adapter = payload?.adapter && typeof payload.adapter === "object" ? payload.adapter : null;
        const adapterWorldSnapshot = adapter?.getWorldSnapshot?.();
        const sourceDecor = Array.isArray(payload?.decorItems)
          ? payload.decorItems
          : Array.isArray(adapterWorldSnapshot?.decorItems)
            ? adapterWorldSnapshot.decorItems
            : [];
        return sourceDecor
          .map((decor, index) => ({
            decorId: typeof decor?.decorId === "string" ? decor.decorId : `decor-${index + 1}`,
            decorType: typeof decor?.decorType === "string" ? decor.decorType : "decor",
            x: Number.isFinite(decor?.x) ? decor.x : null,
            y: Number.isFinite(decor?.y) ? decor.y : null,
            order: Number.isFinite(decor?.order) ? decor.order : index,
            flipX: decor?.flipX === true,
            variant: Number.isFinite(decor?.variant) || typeof decor?.variant === "string" ? decor.variant : null,
            img: typeof decor?.img === "string" ? decor.img : null,
            drawW: Number.isFinite(decor?.drawW) ? decor.drawW : null,
            drawH: Number.isFinite(decor?.drawH) ? decor.drawH : null,
            drawOffX: Number.isFinite(decor?.drawOffX) ? decor.drawOffX : 0,
            drawOffY: Number.isFinite(decor?.drawOffY) ? decor.drawOffY : 0,
            drawAnchor: typeof decor?.drawAnchor === "string" ? decor.drawAnchor : "BL",
          }))
          .filter((decor) => decor.x !== null && decor.y !== null)
          .sort((left, right) => (left.order - right.order) || left.decorId.localeCompare(right.decorId));
      } catch (_error) {
        return [];
      }
    }

    function buildRechargedWorldToCanvasMapper({ canvas, worldWidthPx, worldHeightPx, targetX, targetY }) {
      const viewportWorldWidth = Math.max(1, Math.min(canvas.width, Math.round(worldWidthPx)));
      const viewportWorldHeight = Math.max(1, Math.min(canvas.height, Math.round(worldHeightPx)));
      const maxCameraX = Math.max(0, Math.round(worldWidthPx) - viewportWorldWidth);
      const maxCameraY = Math.max(0, Math.round(worldHeightPx) - viewportWorldHeight);
      const cameraX = Math.max(0, Math.min(maxCameraX, Math.round(targetX - viewportWorldWidth * 0.5)));
      const cameraY = Math.max(0, Math.min(maxCameraY, Math.round(targetY - viewportWorldHeight * 0.5)));
      const offsetX = Math.floor((canvas.width - viewportWorldWidth) * 0.5);
      const offsetY = Math.floor((canvas.height - viewportWorldHeight) * 0.5);

      return {
        viewportWorldWidth,
        viewportWorldHeight,
        worldToCanvasRect(rectX, rectY, rectW, rectH) {
          return {
            x: Math.round(rectX - cameraX + offsetX),
            y: Math.round(rectY - cameraY + offsetY),
            w: Math.max(1, Math.round(rectW)),
            h: Math.max(1, Math.round(rectH)),
          };
        },
      };
    }

    function ensureRechargedTileVisualState(state) {
      if (!state || typeof state !== "object") {
        return null;
      }

      if (!state.rechargedTileVisualState || typeof state.rechargedTileVisualState !== "object") {
        const catalogByTileId = new Map();
        const catalogById = new Map();
        const catalog = Array.isArray(window.LUMO_CATALOG_TILES) ? window.LUMO_CATALOG_TILES : [];
        for (const entry of catalog) {
          if (!entry || typeof entry !== "object") continue;
          if (Number.isFinite(entry.tileId)) {
            catalogByTileId.set(entry.tileId | 0, entry);
          }
          if (typeof entry.id === "string" && entry.id.length > 0) {
            catalogById.set(entry.id, entry);
          }
        }
        state.rechargedTileVisualState = {
          catalogByTileId,
          catalogById,
          imageByKey: new Map(),
        };
      }

      return state.rechargedTileVisualState;
    }

    function ensureRechargedDecorVisualState(state) {
      if (!state || typeof state !== "object") {
        return null;
      }

      if (!state.rechargedDecorVisualState || typeof state.rechargedDecorVisualState !== "object") {
        state.rechargedDecorVisualState = {
          imageByKey: new Map(),
        };
      }

      return state.rechargedDecorVisualState;
    }

    // Mirrors V1 tile visual selection: tile id -> catalog entry image + draw metadata (no neighbor autotile pass).
    function drawRechargedTileV1Visual(ctx, mapper, state, supportTile, worldUnitsToPx, tileSize) {
      const visualState = ensureRechargedTileVisualState(state);
      if (!visualState || !supportTile || typeof supportTile !== "object") {
        return false;
      }

      const numericTileId = Number.isFinite(supportTile?.tileId) ? (supportTile.tileId | 0) : null;
      const catalogTileId = typeof supportTile?.catalogTileId === "string" ? supportTile.catalogTileId : null;
      const catalogDef = (catalogTileId && visualState.catalogById.get(catalogTileId))
        || (numericTileId !== null ? visualState.catalogByTileId.get(numericTileId) : null)
        || null;
      const imageSrc = typeof supportTile?.img === "string"
        ? supportTile.img
        : (typeof catalogDef?.img === "string" ? catalogDef.img : null);
      if (!imageSrc) {
        return false;
      }

      let img = visualState.imageByKey.get(imageSrc);
      if (!img) {
        img = new Image();
        img.src = imageSrc;
        img._ok = false;
        img.onload = () => { img._ok = true; };
        img.onerror = () => { img._ok = false; };
        visualState.imageByKey.set(imageSrc, img);
      }
      if (img._ok !== true) {
        return false;
      }

      const footprintW = Number.isFinite(supportTile?.w) && supportTile.w > 0 ? supportTile.w : 1;
      const footprintH = Number.isFinite(supportTile?.h) && supportTile.h > 0 ? supportTile.h : 1;
      const catalogFootprintW = Number.isFinite(catalogDef?.footprint?.w) && catalogDef.footprint.w > 0 ? catalogDef.footprint.w : 1;
      const catalogFootprintH = Number.isFinite(catalogDef?.footprint?.h) && catalogDef.footprint.h > 0 ? catalogDef.footprint.h : 1;
      const resolveCatalogScaledDraw = (catalogDraw, catalogFootprint, authoredFootprint) => {
        const normalizedCatalogDraw = Number.isFinite(catalogDraw) ? catalogDraw : tileSize;
        const normalizedCatalogFootprint = Number.isFinite(catalogFootprint) && catalogFootprint > 0 ? catalogFootprint : 1;
        const perCellDraw = normalizedCatalogDraw / normalizedCatalogFootprint;
        if (Number.isFinite(perCellDraw) && perCellDraw > 0) {
          return Math.max(1, Math.round(perCellDraw * authoredFootprint));
        }
        return Math.max(1, Math.round(tileSize * authoredFootprint));
      };
      const drawW = Number.isFinite(supportTile?.drawW)
        ? supportTile.drawW
        : resolveCatalogScaledDraw(catalogDef?.drawW, catalogFootprintW, footprintW);
      const drawH = Number.isFinite(supportTile?.drawH)
        ? supportTile.drawH
        : resolveCatalogScaledDraw(catalogDef?.drawH, catalogFootprintH, footprintH);
      const drawOffX = Number.isFinite(supportTile?.drawOffX)
        ? supportTile.drawOffX
        : (Number.isFinite(catalogDef?.drawOffX) ? catalogDef.drawOffX : 0);
      const drawOffY = Number.isFinite(supportTile?.drawOffY)
        ? supportTile.drawOffY
        : (Number.isFinite(catalogDef?.drawOffY) ? catalogDef.drawOffY : 0);
      const drawAnchor = typeof supportTile?.drawAnchor === "string"
        ? supportTile.drawAnchor
        : (typeof catalogDef?.drawAnchor === "string" ? catalogDef.drawAnchor : "TL");

      const tileX = Number.isFinite(supportTile?.x) ? supportTile.x : null;
      const tileY = Number.isFinite(supportTile?.y) ? supportTile.y : null;
      if (tileX === null || tileY === null) {
        return false;
      }

      const tileWorldX = tileX * worldUnitsToPx;
      const tileWorldY = tileY * worldUnitsToPx;
      const worldDrawX = tileWorldX + drawOffX;
      const worldDrawY = drawAnchor === "BL"
        ? ((tileY + footprintH) * worldUnitsToPx) - drawH + drawOffY
        : tileWorldY + drawOffY;
      const drawRect = mapper.worldToCanvasRect(worldDrawX, worldDrawY, Math.max(1, drawW), Math.max(1, drawH));
      ctx.drawImage(img, drawRect.x, drawRect.y, drawRect.w, drawRect.h);
      return true;
    }

    // Draws one decor entry as a visual-only layer; never contributes collision or gameplay geometry.
    function drawRechargedDecorVisual(ctx, mapper, state, decor, worldUnitsToPx, tileSize, worldWidthRaw, worldHeightRaw) {
      const looksTileBased = Number.isFinite(decor?.x)
        && Number.isFinite(decor?.y)
        && decor.x <= worldWidthRaw + tileSize
        && decor.y <= worldHeightRaw + tileSize;
      const worldX = looksTileBased ? decor.x * worldUnitsToPx : decor.x;
      const worldY = looksTileBased ? decor.y * worldUnitsToPx : decor.y;
      const drawW = Number.isFinite(decor?.drawW) && decor.drawW > 0 ? decor.drawW : tileSize;
      const drawH = Number.isFinite(decor?.drawH) && decor.drawH > 0 ? decor.drawH : tileSize;
      const drawOffX = Number.isFinite(decor?.drawOffX) ? decor.drawOffX : 0;
      const drawOffY = Number.isFinite(decor?.drawOffY) ? decor.drawOffY : 0;
      const drawAnchor = String(decor?.drawAnchor || "BL").trim().toUpperCase() === "TL" ? "TL" : "BL";
      const worldDrawX = worldX + drawOffX;
      const worldDrawY = drawAnchor === "BL"
        ? (worldY + worldUnitsToPx) - drawH + drawOffY
        : worldY + drawOffY;
      const drawRect = mapper.worldToCanvasRect(worldDrawX, worldDrawY, Math.max(1, drawW), Math.max(1, drawH));
      const visualState = ensureRechargedDecorVisualState(state);
      const imageSrc = typeof decor?.img === "string" && decor.img.trim().length > 0 ? decor.img : null;

      if (imageSrc && visualState) {
        let img = visualState.imageByKey.get(imageSrc);
        if (!img) {
          img = new Image();
          img.src = imageSrc;
          img._ok = false;
          img.onload = () => { img._ok = true; };
          img.onerror = () => { img._ok = false; };
          visualState.imageByKey.set(imageSrc, img);
        }
        if (img._ok === true) {
          if (decor?.flipX === true) {
            ctx.save();
            ctx.translate(drawRect.x + drawRect.w, drawRect.y);
            ctx.scale(-1, 1);
            ctx.drawImage(img, 0, 0, drawRect.w, drawRect.h);
            ctx.restore();
          } else {
            ctx.drawImage(img, drawRect.x, drawRect.y, drawRect.w, drawRect.h);
          }
          return;
        }
      }

      // Lightweight fallback while art coverage grows: tinted visual marker, still in decor layer only.
      const variantTag = decor?.variant;
      const variantHash = typeof variantTag === "string"
        ? variantTag.length
        : Number.isFinite(variantTag) ? (Math.abs(variantTag) | 0) : 0;
      const tintHue = 95 + (variantHash % 4) * 18;
      ctx.fillStyle = `hsla(${tintHue}, 68%, 52%, 0.70)`;
      ctx.fillRect(drawRect.x, drawRect.y, drawRect.w, drawRect.h);
      ctx.strokeStyle = "rgba(15, 23, 42, 0.45)";
      ctx.lineWidth = 1;
      ctx.strokeRect(drawRect.x + 0.5, drawRect.y + 0.5, Math.max(1, drawRect.w - 1), Math.max(1, drawRect.h - 1));
    }

    function renderRechargedCanvasFrame(canvas, state) {
      if (!canvas || typeof canvas.getContext !== "function") {
        return false;
      }

      try {
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          return false;
        }

        const payload = readLatestRechargedBootPayload() || {};
        const player = readRechargedPlayerSnapshot(payload);
        const flareSnapshots = readRechargedFlareSnapshots(payload, state);
        const pulseSnapshot = readRechargedPulseSnapshot(payload, state);
        const boostSnapshot = readRechargedBoostSnapshot(payload, state);
        const entitySnapshots = readRechargedEntitySnapshots(payload, state);
        const decorSnapshots = readRechargedDecorSnapshots(payload);
        const previousSnapshot = readRechargedPlayerSnapshot({
          player: state?.previousPlayerSnapshot && typeof state.previousPlayerSnapshot === "object"
            ? state.previousPlayerSnapshot
            : payload?.player,
        });
        const currentSnapshot = readRechargedPlayerSnapshot({
          player: state?.currentPlayerSnapshot && typeof state.currentPlayerSnapshot === "object"
            ? state.currentPlayerSnapshot
            : payload?.player,
        });
        const alphaRaw = Number.isFinite(state?.stepAccumulatorMs)
          ? state.stepAccumulatorMs / RECHARGED_FIXED_STEP_MS
          : 0;
        const alpha = Math.max(0, Math.min(1, alphaRaw));
        const lerp = (from, to, t) => from + (to - from) * t;
        const playerCenterX = Number.isFinite(previousSnapshot.x) && Number.isFinite(currentSnapshot.x)
          ? lerp(previousSnapshot.x, currentSnapshot.x, alpha)
          : (Number.isFinite(player.x) ? player.x : null);
        const playerFootY = Number.isFinite(previousSnapshot.y) && Number.isFinite(currentSnapshot.y)
          ? lerp(previousSnapshot.y, currentSnapshot.y, alpha)
          : (Number.isFinite(player.y) ? player.y : null);
        const tileSize = Number.isFinite(payload?.tileSize) && payload.tileSize > 0 ? payload.tileSize : 24;
        const worldWidthRaw = Number.isFinite(payload?.worldWidth)
          ? payload.worldWidth
          : (Number.isFinite(payload?.cols) ? payload.cols : Math.max(1, Math.round(canvas.width / tileSize)));
        const worldHeightRaw = Number.isFinite(payload?.worldHeight)
          ? payload.worldHeight
          : (Number.isFinite(payload?.rows) ? payload.rows : Math.max(1, Math.round(canvas.height / tileSize)));
        const supportTiles = Array.isArray(payload?.supportTiles) ? payload.supportTiles : [];
        const maxSupportTileSpan = supportTiles.reduce((maxSpan, tile) => {
          const spanW = Number.isFinite(tile?.w) ? tile.w : 0;
          const spanH = Number.isFinite(tile?.h) ? tile.h : 0;
          return Math.max(maxSpan, spanW, spanH);
        }, 0);
        const coordinatesLookTileBased = (
          (Number.isFinite(player.x) && player.x > worldWidthRaw + tileSize) ||
          (Number.isFinite(player.y) && player.y > worldHeightRaw + tileSize) ||
          (maxSupportTileSpan > 0 && maxSupportTileSpan <= 4)
        );
        const worldUnitsToPx = coordinatesLookTileBased ? tileSize : 1;
        const worldWidthPx = Math.max(tileSize, Math.round(worldWidthRaw * worldUnitsToPx));
        const worldHeightPx = Math.max(tileSize, Math.round(worldHeightRaw * worldUnitsToPx));
        const mapper = buildRechargedWorldToCanvasMapper({
          canvas,
          worldWidthPx,
          worldHeightPx,
          targetX: Number.isFinite(playerCenterX) ? playerCenterX : worldWidthPx * 0.5,
          targetY: Number.isFinite(playerFootY) ? playerFootY : worldHeightPx - 1,
        });

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const backdropGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        backdropGradient.addColorStop(0, "#0b1220");
        backdropGradient.addColorStop(1, "#111b31");
        ctx.fillStyle = backdropGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const playfieldRect = mapper.worldToCanvasRect(0, 0, worldWidthPx, worldHeightPx);
        ctx.fillStyle = "rgba(15, 23, 42, 0.52)";
        ctx.fillRect(playfieldRect.x, playfieldRect.y, playfieldRect.w, playfieldRect.h);

        // Draw support tiles with V1 tile assets/placement rules first.
        for (const supportTile of supportTiles) {
          const tileX = Number.isFinite(supportTile?.x) ? supportTile.x : null;
          const tileY = Number.isFinite(supportTile?.y) ? supportTile.y : null;
          const tileW = Number.isFinite(supportTile?.w) ? supportTile.w : null;
          const tileH = Number.isFinite(supportTile?.h) ? supportTile.h : null;
          if (tileX === null || tileY === null || tileW === null || tileH === null || tileW <= 0 || tileH <= 0) {
            continue;
          }

          const worldRectX = tileX * worldUnitsToPx;
          const worldRectY = tileY * worldUnitsToPx;
          const worldRectW = tileW * worldUnitsToPx;
          const worldRectH = tileH * worldUnitsToPx;
          const supportCanvasRect = mapper.worldToCanvasRect(worldRectX, worldRectY, worldRectW, worldRectH);
          const drewV1Visual = drawRechargedTileV1Visual(ctx, mapper, state, supportTile, worldUnitsToPx, tileSize);
          if (drewV1Visual) {
            continue;
          }

          // V1 fallback: plain tile fill from legacy tile behavior color when no image is available yet.
          const fallbackTileDef = (window?.Lumo?.Tileset && Number.isFinite(supportTile?.tileId))
            ? window.Lumo.Tileset[supportTile.tileId | 0]
            : null;
          ctx.fillStyle = fallbackTileDef?.color || "#2b3646";
          ctx.fillRect(supportCanvasRect.x, supportCanvasRect.y, supportCanvasRect.w, supportCanvasRect.h);
          ctx.fillStyle = "rgba(255,255,255,0.03)";
          ctx.fillRect(supportCanvasRect.x, supportCanvasRect.y, supportCanvasRect.w, Math.min(1, supportCanvasRect.h));
        }

        // Decor is rendered as its own visual lane between tiles and active gameplay actors.
        for (const decor of decorSnapshots) {
          drawRechargedDecorVisual(ctx, mapper, state, decor, worldUnitsToPx, tileSize, worldWidthRaw, worldHeightRaw);
        }

        if (player.hidden !== true) {
          drawRechargedPlayerSprite(ctx, mapper, state, playerCenterX, playerFootY, tileSize, boostSnapshot, currentSnapshot);
        }

        for (const entity of entitySnapshots) {
          if (entity?.active !== true) {
            continue;
          }
          const entityRect = mapper.worldToCanvasRect(
            entity.x,
            entity.y,
            entity.size,
            entity.size,
          );
          const flareExposure = Math.max(0, Math.min(1, entity.flareExposure || 0));
          if (entity.illuminated === true) {
            const glowRadius = Math.max(entityRect.w, entityRect.h) * (1.2 + flareExposure);
            const glow = ctx.createRadialGradient(
              entityRect.x + entityRect.w * 0.5,
              entityRect.y + entityRect.h * 0.5,
              1,
              entityRect.x + entityRect.w * 0.5,
              entityRect.y + entityRect.h * 0.5,
              glowRadius,
            );
            glow.addColorStop(0, entity.consumesFlare ? "rgba(251, 146, 60, 0.30)" : "rgba(56, 189, 248, 0.32)");
            glow.addColorStop(1, "rgba(56, 189, 248, 0)");
            ctx.fillStyle = glow;
            ctx.fillRect(
              entityRect.x - glowRadius,
              entityRect.y - glowRadius,
              entityRect.w + glowRadius * 2,
              entityRect.h + glowRadius * 2,
            );
          }
          const hitAlpha = entity.hitFlashTicks > 0 ? 0.9 : 0.45;
          ctx.fillStyle = entity.hitFlashTicks > 0 ? `rgba(250, 204, 21, ${hitAlpha})` : "rgba(239, 68, 68, 0.72)";
          ctx.fillRect(entityRect.x, entityRect.y, entityRect.w, entityRect.h);
          ctx.fillStyle = entity.type === "dark_creature_01" ? "rgba(15, 23, 42, 0.8)" : "rgba(30, 41, 59, 0.8)";
          ctx.fillRect(
            entityRect.x + 2,
            entityRect.y + 2,
            Math.max(1, entityRect.w - 4),
            Math.max(1, entityRect.h - 4),
          );
        }

        if (
          player.hidden !== true &&
          pulseSnapshot?.active === true &&
          Number.isFinite(playerCenterX) &&
          Number.isFinite(playerFootY)
        ) {
          const pulseCenterX = Number.isFinite(pulseSnapshot.x) ? pulseSnapshot.x : playerCenterX;
          const pulseCenterY = Number.isFinite(pulseSnapshot.y) ? pulseSnapshot.y : playerFootY;
          const pulseWorldRadius = Math.max(0.5, pulseSnapshot.r);
          const pulseRect = mapper.worldToCanvasRect(
            pulseCenterX - pulseWorldRadius,
            pulseCenterY - pulseWorldRadius,
            pulseWorldRadius * 2,
            pulseWorldRadius * 2,
          );
          const centerX = pulseRect.x + pulseRect.w * 0.5;
          const centerY = pulseRect.y + pulseRect.h * 0.5;
          const canvasPulseRadius = Math.max(0.5, pulseRect.w * 0.5);
          const alpha = Math.max(0, Math.min(1, pulseSnapshot.alpha));
          const band = Math.max(20, 28);
          const inner = Math.max(0.5, canvasPulseRadius - band);
          const outer = Math.max(inner + 0.5, canvasPulseRadius);

          ctx.strokeStyle = `rgba(170,120,255,${alpha.toFixed(3)})`;
          ctx.lineWidth = Math.max(1, pulseSnapshot.thickness || 2);
          ctx.beginPath();
          ctx.arc(centerX, centerY, canvasPulseRadius, 0, Math.PI * 2);
          ctx.stroke();

          const ringGradient = ctx.createRadialGradient(centerX, centerY, inner, centerX, centerY, outer);
          ringGradient.addColorStop(0.00, "rgba(170,120,255,0.00)");
          ringGradient.addColorStop(1.00, `rgba(170,120,255,${(alpha * 0.10).toFixed(3)})`);
          ctx.strokeStyle = ringGradient;
          ctx.lineWidth = band;
          ctx.beginPath();
          ctx.arc(centerX, centerY, (inner + outer) * 0.5, 0, Math.PI * 2);
          ctx.stroke();
        }

        let visibleFlares = 0;
        for (const flare of flareSnapshots) {
          const flareLooksTileBased = coordinatesLookTileBased
            && Number.isFinite(flare.x)
            && Number.isFinite(flare.y)
            && flare.x <= worldWidthRaw + tileSize
            && flare.y <= worldHeightRaw + tileSize;
          const flareWorldX = flareLooksTileBased ? flare.x * worldUnitsToPx : flare.x;
          const flareWorldY = flareLooksTileBased ? flare.y * worldUnitsToPx : flare.y;
          const flareRadius = Math.max(2, Math.round(flare.radius));
          const flareRect = mapper.worldToCanvasRect(
            flareWorldX - flareRadius,
            flareWorldY - flareRadius,
            flareRadius * 2,
            flareRadius * 2,
          );
          const centerX = flareRect.x + flareRect.w * 0.5;
          const centerY = flareRect.y + flareRect.h * 0.5;
          if (centerX >= 0 && centerX <= canvas.width && centerY >= 0 && centerY <= canvas.height) {
            visibleFlares += 1;
          }
          const glowRadius = Math.max(flareRect.w, flareRect.h) * 1.8;
          const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, glowRadius);
          glowGradient.addColorStop(0, "rgba(251, 191, 36, 0.95)");
          glowGradient.addColorStop(1, "rgba(251, 191, 36, 0)");
          ctx.fillStyle = glowGradient;
          ctx.fillRect(centerX - glowRadius, centerY - glowRadius, glowRadius * 2, glowRadius * 2);

          ctx.fillStyle = "#fde68a";
          ctx.fillRect(flareRect.x, flareRect.y, flareRect.w, flareRect.h);
          ctx.fillStyle = "#f97316";
          ctx.fillRect(flareRect.x + 1, flareRect.y + 1, Math.max(1, flareRect.w - 2), Math.max(1, flareRect.h - 2));
        }

        // Minimal fallback marker: if flare state exists but no flare is visible, draw simple circles
        // so renderer-vs-state issues can be diagnosed in live Lumo.html quickly.
        if (flareSnapshots.length > 0 && visibleFlares === 0) {
          ctx.fillStyle = "#facc15";
          for (const flare of flareSnapshots.slice(0, 3)) {
            const fallbackRect = mapper.worldToCanvasRect(flare.x - 3, flare.y - 3, 6, 6);
            const fallbackCenterX = fallbackRect.x + fallbackRect.w * 0.5;
            const fallbackCenterY = fallbackRect.y + fallbackRect.h * 0.5;
            ctx.beginPath();
            ctx.arc(fallbackCenterX, fallbackCenterY, 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }

        drawRechargedHudReplica(canvas, state);

        if (state && typeof state === "object") {
          state.lastPlayerX = Number.isFinite(playerCenterX) ? playerCenterX : null;
          state.lastPlayerY = Number.isFinite(playerFootY) ? playerFootY : null;
          state.lastFlareCount = flareSnapshots.length;
          state.lastFlareVisibleCount = visibleFlares;
          state.lastPulseActive = pulseSnapshot?.active === true;
          state.lastBoostActive = boostSnapshot?.active === true;
          state.lastEntityCount = entitySnapshots.length;
          state.renderAlpha = alpha;
          state.lastRenderOk = true;
        }
        return true;
      } catch (_error) {
        if (state && typeof state === "object") {
          state.lastRenderOk = false;
        }
        return false;
      }
    }

    function resolveAutoplayTickStatus(queryBootResult) {
      try {
        if (queryBootResult?.autoplay !== true) {
          return null;
        }

        if (!Array.isArray(queryBootResult?.warnings)) {
          return queryBootResult?.booted === true;
        }

        const hasAutoplayWarning = queryBootResult.warnings.some((warning) => (
          typeof warning === "string" && warning.includes("Autoplay tick burst did not complete cleanly.")
        ));

        return hasAutoplayWarning !== true && queryBootResult?.booted === true;
      } catch (_error) {
        return false;
      }
    }


    function syncRechargedCanvasDrawingBuffer(canvas, state) {
      if (!canvas || typeof canvas !== "object") {
        return;
      }

      const nextWidth = Math.max(1, Math.floor(canvas.clientWidth || canvas.offsetWidth || 0));
      const nextHeight = Math.max(1, Math.floor(canvas.clientHeight || canvas.offsetHeight || 0));

      if (canvas.width !== nextWidth) {
        canvas.width = nextWidth;
      }
      if (canvas.height !== nextHeight) {
        canvas.height = nextHeight;
      }

      if (state && typeof state === "object") {
        state.width = canvas.width;
        state.height = canvas.height;
      }
    }

    function installRechargedCanvasResizeSync(canvas, state) {
      if (!canvas || typeof canvas !== "object") {
        return;
      }

      const resizeHandler = () => {
        syncRechargedCanvasDrawingBuffer(canvas, state);
      };

      resizeHandler();
      try {
        window.addEventListener("resize", resizeHandler, { passive: true });
      } catch (_error) {
        // Resize sync is best-effort and must never throw.
      }
    }

    function drawRechargedPlayerSprite(ctx, mapper, state, playerCenterX, playerFootY, tileSize, boostSnapshot, playerSnapshot) {
      if (!ctx || !mapper || !state) {
        return;
      }

      const spriteCache = ensureRechargedPlayerSpriteCache(state);
      if (!spriteCache) {
        return;
      }

      const snapshotFacingX = Number.isFinite(playerSnapshot?.facingX) ? playerSnapshot.facingX : 0;
      const snapshotVelocityX = Number.isFinite(playerSnapshot?.velocity?.x) ? playerSnapshot.velocity.x : 0;
      if (Math.abs(snapshotFacingX) > 0) {
        state.playerFacing = snapshotFacingX < 0 ? -1 : 1;
      } else if (Math.abs(snapshotVelocityX) > RECHARGED_PLAYER_HORIZONTAL_SPEED_EPSILON) {
        state.playerFacing = snapshotVelocityX < 0 ? -1 : 1;
      } else if (!Number.isFinite(state.playerFacing) || state.playerFacing === 0) {
        state.playerFacing = 1;
      }
      state.previousRenderPlayerCenterX = playerCenterX;

      const animationState = resolveRechargedPlayerAnimationState(
        playerSnapshot,
        typeof state.playerAnimationState === "string" ? state.playerAnimationState : "idle",
      );
      state.playerAnimationState = animationState;

      const nowMs = typeof performance?.now === "function" ? performance.now() : Date.now();
      const activeSprite = animationState === "idle"
        ? resolveRechargedIdleSpriteFrame(state, spriteCache, animationState, nowMs)
        : (animationState === "run"
          ? resolveRechargedRunSpriteFrame(state, spriteCache, animationState, playerSnapshot, nowMs)
          : (spriteCache[animationState] || spriteCache.idle));
      const safeSprite = activeSprite?.complete === true
        ? activeSprite
        : (animationState === "run" ? spriteCache.run : spriteCache.idle);
      if (!safeSprite?.complete) {
        return;
      }

      // V1 parity: Recharged render follows V1 hitbox footprint (22x28),
      // then draws the visual sprite at V1 visual size (24x38) anchored to feet.
      const playerWorldRect = {
        x: playerCenterX - (RECHARGED_PLAYER_HITBOX_WIDTH * 0.5),
        y: playerFootY + 1 - RECHARGED_PLAYER_HITBOX_HEIGHT,
        w: RECHARGED_PLAYER_HITBOX_WIDTH,
        h: RECHARGED_PLAYER_HITBOX_HEIGHT,
      };
      const playerCanvasRect = mapper.worldToCanvasRect(playerWorldRect.x, playerWorldRect.y, playerWorldRect.w, playerWorldRect.h);
      const footY = playerCanvasRect.y + playerCanvasRect.h;
      const sourceWidth = Math.max(1, safeSprite.naturalWidth || safeSprite.width || 1);
      const sourceHeight = Math.max(1, safeSprite.naturalHeight || safeSprite.height || 1);
      let spriteHeight = Math.max(
        1,
        playerCanvasRect.h * (RECHARGED_PLAYER_SPRITE_HEIGHT / RECHARGED_PLAYER_HITBOX_HEIGHT),
      );
      let spriteWidth = Math.max(
        1,
        playerCanvasRect.w * (RECHARGED_PLAYER_SPRITE_WIDTH / RECHARGED_PLAYER_HITBOX_WIDTH),
      );
      if (animationState === "brake") {
        const brakeTargetHeight = playerCanvasRect.h * (RECHARGED_PLAYER_BRAKE_SPRITE_HEIGHT / RECHARGED_PLAYER_HITBOX_HEIGHT);
        const brakeScale = brakeTargetHeight / sourceHeight;
        spriteHeight = Math.max(1, sourceHeight * brakeScale);
        spriteWidth = Math.max(1, sourceWidth * brakeScale);
        const maxBrakeWidth = playerCanvasRect.w * (RECHARGED_PLAYER_BRAKE_SPRITE_MAX_WIDTH / RECHARGED_PLAYER_HITBOX_WIDTH);
        if (spriteWidth > maxBrakeWidth) {
          const shrink = maxBrakeWidth / spriteWidth;
          spriteWidth *= shrink;
          spriteHeight *= shrink;
        }
      }
      const drawX = playerCanvasRect.x + (playerCanvasRect.w - spriteWidth) * 0.5;
      const drawY = footY - spriteHeight;

      ctx.fillStyle = "rgba(15, 23, 42, 0.35)";
      ctx.fillRect(playerCanvasRect.x + 2, footY, Math.max(2, playerCanvasRect.w - 4), 2);

      if (boostSnapshot?.active === true) {
        const trailWidth = Math.max(2, Math.floor(playerCanvasRect.w * 0.4));
        const trailX = playerCanvasRect.x + Math.floor((playerCanvasRect.w - trailWidth) * 0.5);
        const trailY = playerCanvasRect.y + Math.floor(playerCanvasRect.h * 0.2);
        const trailH = Math.max(4, Math.floor(playerCanvasRect.h * 0.9));
        const trailGradient = ctx.createLinearGradient(0, trailY, 0, trailY + trailH);
        trailGradient.addColorStop(0, "rgba(56, 189, 248, 0.45)");
        trailGradient.addColorStop(1, "rgba(56, 189, 248, 0.00)");
        ctx.fillStyle = trailGradient;
        ctx.fillRect(trailX, trailY, trailWidth, trailH);
      }

      // Keep feet anchored to collision truth while flipping sprite by movement direction.
      ctx.save();
      if ((state.playerFacing || 1) < 0) {
        const centerX = drawX + spriteWidth * 0.5;
        ctx.translate(centerX, 0);
        ctx.scale(-1, 1);
        ctx.translate(-centerX, 0);
      }
      ctx.drawImage(safeSprite, drawX, drawY, spriteWidth, spriteHeight);
      ctx.restore();
    }

    function startRechargedCanvasVerificationLoop(state) {
      if (!state || typeof state !== "object") {
        return;
      }

      const canvas = document.getElementById("game");
      const runFrame = () => {
        try {
          state.frameCount = Number.isFinite(state.frameCount) ? state.frameCount + 1 : 1;
          tickLiveRechargedAdapter(state);
          const payload = readLatestRechargedBootPayload() || {};
          updateRechargedHudOverlay(state?.hud, payload, state);
          renderRechargedCanvasFrame(canvas, state);
        } catch (_error) {
          state.lastRenderOk = false;
        }

        try {
          window.requestAnimationFrame(runFrame);
        } catch (_error) {
          // Verification loop is best-effort and must never throw.
        }
      };

      try {
        window.requestAnimationFrame(runFrame);
      } catch (_error) {
        // Verification loop is best-effort and must never throw.
      }
    }

    // Loads legacy app.js only when Recharged mode is not active or did not boot.
    function loadLegacyBootScript() {
      return new Promise((resolve) => {
        const script = document.createElement("script");
        script.src = "src/app.js";
        script.defer = true;
        script.onload = () => resolve(true);
        script.onerror = () => resolve(false);
        document.body.appendChild(script);
      });
    }

    // Runs query-driven Recharged opt-in boot with safe legacy fallback behavior.
    async function bootLumoRuntime() {
      const rechargedCanvasVerification = ensureLumoRechargedCanvasVerificationState();
      let queryBootResult = null;
      let liveAdapter = null;

      try {
        queryBootResult = await bootLumoRechargedFromQuery({
          search: window.location.search,
          createAdapter(options = {}) {
            const adapter = createLumoRechargedBootAdapter(options);
            liveAdapter = adapter;
            return adapter;
          },
        });
      } catch (error) {
        queryBootResult = {
          ok: false,
          enabled: true,
          booted: false,
          mode: "recharged",
          status: "invalid",
          errors: [error?.message || "Lumo query boot failed."],
          warnings: [],
        };
      }

      if (queryBootResult && typeof queryBootResult === "object" && liveAdapter && typeof liveAdapter === "object") {
        queryBootResult.adapter = liveAdapter;
      }
      window.__LumoRechargedBoot = queryBootResult;
      try {
        const canvas = document.getElementById("game");
        rechargedCanvasVerification.active = queryBootResult?.enabled === true && queryBootResult?.booted === true;
        rechargedCanvasVerification.canvasId = typeof canvas?.id === "string" ? canvas.id : "";
        rechargedCanvasVerification.autoplay = queryBootResult?.autoplay === true;
        rechargedCanvasVerification.lastTickOk = resolveAutoplayTickStatus(queryBootResult);
        const payload = readLatestRechargedBootPayload();
        const initialPlayerSnapshot = payload?.player && typeof payload.player === "object" ? payload.player : null;
        rechargedCanvasVerification.previousPlayerSnapshot = initialPlayerSnapshot;
        rechargedCanvasVerification.currentPlayerSnapshot = initialPlayerSnapshot;
        rechargedCanvasVerification.lastPlayerX = Number.isFinite(payload?.playerX) ? payload.playerX : null;
        rechargedCanvasVerification.lastPlayerY = Number.isFinite(payload?.playerY) ? payload.playerY : null;

        if (rechargedCanvasVerification.active === true) {
          rechargedCanvasVerification.hud = createRechargedHudOverlay();
          updateRechargedHudOverlay(rechargedCanvasVerification.hud, payload || {}, rechargedCanvasVerification);
          rechargedCanvasVerification.input = installRechargedInputIntentSync();
          syncRechargedCanvasDrawingBuffer(canvas, rechargedCanvasVerification);
          installRechargedCanvasResizeSync(canvas, rechargedCanvasVerification);
          startRechargedCanvasVerificationLoop(rechargedCanvasVerification);
        }
      } catch (_error) {
        // Keeps verification support non-fatal and behavior-neutral.
      }

      if (queryBootResult?.enabled === true && queryBootResult?.booted === true) {
        console.info("[Lumo] Recharged query boot active", queryBootResult);
        return;
      }

      if (queryBootResult?.enabled === true && queryBootResult?.booted !== true) {
        console.warn("[Lumo] Recharged query boot failed; falling back to legacy boot", queryBootResult);
      }

      const legacyLoaded = await loadLegacyBootScript();
      if (!legacyLoaded) {
        console.error("[Lumo] Legacy app.js failed to load.");
      }
    }

    void bootLumoRuntime();
  </script>
</body>
</html>
