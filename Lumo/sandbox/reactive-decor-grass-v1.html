<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lumo Reactive Decor Sandbox v4 — Living World</title>
<style>
  html, body {
    margin:0;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 20%, rgba(255,150,55,.08), transparent 35%),
      linear-gradient(180deg, #140f0a 0%, #060504 75%);
    color:#ffd9a0;
    font-family: system-ui, Segoe UI, sans-serif;
  }
  #hud {
    position:fixed;
    left:18px;
    top:14px;
    z-index:5;
    padding:12px 14px;
    border:1px solid rgba(255,190,100,.18);
    border-radius:14px;
    background:rgba(10,7,5,.72);
    box-shadow: inset 0 0 22px rgba(255,130,40,.06), 0 10px 35px rgba(0,0,0,.35);
    backdrop-filter: blur(5px);
    font-size:13px;
    line-height:1.45;
  }
  #hud b { color:#fff0c6; }
  #hud .small { color:rgba(255,217,160,.62); }
  canvas {
    display:block;
    width:100vw;
    height:100vh;
  }
</style>
</head>
<body>
  <div id="hud">
    <b>Lumo Reactive Decor Sandbox v4</b><br>
    Levande dekor-lager • kod-only • 100 tiles<br>
    <span class="small">← → / A D = move, Space = jump, F = flare, E = pulse</span><br>
    <span class="small">Ny pass: organisk gräsprofil, ring-reaktion, osynkade vindvågor, energy wells.</span>
  </div>
  <canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha:false });

  const TILE = 32;
  const WORLD_TILES = 100;
  const WORLD_W = WORLD_TILES * TILE;
  const WORLD_H = 18 * TILE;
  const groundY = WORLD_H - 88;

  const keys = new Set();
  addEventListener("keydown", e => {
    keys.add(e.code);
    if (["Space","ArrowUp"].includes(e.code)) e.preventDefault();
    if (e.code === "KeyE") pulse();
    if (e.code === "KeyF") throwFlare();
  });
  addEventListener("keyup", e => keys.delete(e.code));

  function resize() {
    const dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  addEventListener("resize", resize);
  resize();

  const player = {
    x: 140, y: groundY - 28, vx:0, vy:0, r:13,
    onGround:false, facing:1, energy:1
  };

  // Sandbox judgement movement: slower horizontal, taller + softer jump.
  const MOVE = {
    groundAccel: 0.34,
    airAccel: 0.18,
    groundFriction: 0.78,
    airFriction: 0.965,
    maxSpeed: 3.45,
    jumpVelocity: -10.45,
    gravityUp: 0.255,
    gravityDown: 0.315,
    maxFall: 8.2
  };

  const camera = { x:0 };
  let time = 0;
  let pulseWave = null;
  const flares = [];

  // Energy wells: visual recharge places for testing.
  const energyWells = [
    { x: 600, y: groundY - 18, r: 62 },
    { x: 1800, y: groundY - 18, r: 72 }
  ];

  // Organic wind: no global synchronized tilt. Each patch gets its own
  // travelling gust waves with seed, direction, speed, width and lifetime.
  const activeGusts = [];
  let gustClock = 0;

  function spawnOrganicGust() {
    const patch = grassPatches[Math.floor(Math.random() * grassPatches.length)];
    if (!patch) return;
    const dir = Math.random() < 0.5 ? -1 : 1;
    activeGusts.push({
      patch,
      dir,
      t: 0,
      life: 2.2 + Math.random() * 1.8,
      speed: 90 + Math.random() * 120,
      width: 130 + Math.random() * 190,
      strength: (0.45 + Math.random() * 0.75) * dir,
      startX: dir > 0 ? patch.x - 160 - Math.random() * 130 : patch.x + patch.w + 160 + Math.random() * 130,
      wobble: Math.random() * Math.PI * 2
    });
  }

  function updateOrganicWind(dt) {
    gustClock += dt;
    // Irregular, not constant: sometimes silence, sometimes two nearby waves.
    const chance = 0.012 + 0.006 * Math.sin(time * 0.17);
    if (Math.random() < chance) spawnOrganicGust();

    for (const g of activeGusts) g.t += dt;
    for (let i = activeGusts.length - 1; i >= 0; i -= 1) {
      if (activeGusts[i].t > activeGusts[i].life) activeGusts.splice(i, 1);
    }
  }

  function organicWindAt(patch, bx, bladeIndex) {
    let force = 0;
    for (const g of activeGusts) {
      if (g.patch !== patch) continue;
      const waveX = g.startX + g.dir * g.speed * g.t;
      const d = Math.abs(bx - waveX);
      const local = clamp01(1 - d / g.width);
      if (local <= 0) continue;
      const envelope = Math.sin(clamp01(g.t / g.life) * Math.PI);
      const micro = 0.72 + 0.38 * Math.sin(time * 1.1 + bladeIndex * 0.27 + g.wobble);
      force += g.strength * local * local * envelope * micro;
    }
    return force;
  }

  function organicHeightProfile(patch, bx) {
    // Broken macro variation: multiple asymmetric waves + tiny noise.
    // No perfect low-high-low shape.
    const u = clamp01((bx - patch.x) / Math.max(1, patch.w));
    const a = Math.sin((u * 1.37 + patch.seed * 0.113) * Math.PI * 2);
    const b = Math.sin((u * 2.61 + patch.seed * 0.071) * Math.PI * 2);
    const c = Math.sin((u * 4.23 + patch.seed * 0.193) * Math.PI * 2);
    const noise = seeded(Math.floor(u * 13) * 9.17 + patch.seed);
    return clamp(0.62 + a * 0.17 + b * 0.13 + c * 0.07 + (noise - 0.5) * 0.15, 0.48, 1.16);
  }

  function playerGrassReaction(bx, reactRadius) {
    // Ring-shaped reaction:
    // far: no response
    // mid-distance: bends toward Lumo
    // closest: relaxes/uprights to avoid ugly crossing through Lumo
    const dx = player.x - bx;
    const dist = Math.abs(dx);
    const outer = clamp01(1 - dist / reactRadius);
    const innerRelax = clamp01(1 - dist / 34); // nearest blades stand back up
    const ring = outer * outer * (1 - innerRelax * 0.92);
    return {
      dir: Math.sign(dx || 1),
      amount: ring,
      openSpace: innerRelax
    };
  }


  function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function clamp01(v){ return clamp(v,0,1); }
  function easeOut(t){ return 1 - Math.pow(1 - clamp01(t), 3); }
  function easeInOut(t){ t=clamp01(t); return t*t*(3-2*t); }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function rand01(seed){ return Math.sin(seed * 127.1 + 311.7) * 43758.5453 % 1; }
  function seeded(seed){ const v = Math.sin(seed * 12.9898) * 43758.5453; return v - Math.floor(v); }

  // --- Reactive decor data ---
  const grassPatches = [
    {
      x: 340, y: groundY, w: 410, density: 2.15, seed: 2,
      minH: 18, maxH: 46, reactRadius: 190, strength: 1.05,
      bottomColor: [18, 42, 28], topColor: [156, 255, 176],
      idleSpeed: .72, idleAmp: 4.6, reactAmp: 30
    },
    {
      x: 1040, y: groundY, w: 560, density: 2.35, seed: 7,
      minH: 22, maxH: 58, reactRadius: 235, strength: 1.12,
      bottomColor: [54, 31, 16], topColor: [255, 205, 105],
      idleSpeed: .68, idleAmp: 5.2, reactAmp: 34
    },
    {
      x: 2045, y: groundY, w: 470, density: 2.45, seed: 13,
      minH: 26, maxH: 64, reactRadius: 220, strength: 1.0,
      bottomColor: [13, 22, 22], topColor: [115, 255, 205],
      idleSpeed: .64, idleAmp: 5.4, reactAmp: 31
    },
    {
      x: 2810, y: groundY, w: 340, density: 2.25, seed: 19,
      minH: 20, maxH: 50, reactRadius: 205, strength: 1.25,
      bottomColor: [18, 45, 30], topColor: [190, 255, 185],
      idleSpeed: .76, idleAmp: 5.0, reactAmp: 34
    },
  ];

  const glowPlants = [
    { x: 790, y: groundY, size: 28, hue: 105, bloom:0, target:0, reverseDelay:0, label:"Light Moss" },
    { x: 1690, y: groundY, size: 32, hue: 38, bloom:0, target:0, reverseDelay:0, label:"Lantern Bud" },
    { x: 2520, y: groundY, size: 30, hue: 165, bloom:0, target:0, reverseDelay:0, label:"Breathing Spore" },
  ];

  const crystals = [
    { x: 1280, y: groundY, size: 58, sigh:0, lastPulse:false, sporeCooldown:0 },
    { x: 2260, y: groundY, size: 46, sigh:0, lastPulse:false, sporeCooldown:0 },
    { x: 3030, y: groundY, size: 54, sigh:0, lastPulse:false, sporeCooldown:0 },
  ];

  const eyes = [
    { x: 580, y: groundY - 120 },
    { x: 1420, y: groundY - 145 },
    { x: 2380, y: groundY - 110 },
    { x: 3160, y: groundY - 130 },
  ];

  const motes = Array.from({length: 150}, (_,i)=>({
    x: 180 + Math.random()*(WORLD_W-360),
    y: 70 + Math.random()*(groundY-120),
    vx:0, vy:0,
    s: .6 + Math.random()*1.8,
    phase: Math.random()*10,
    born:false
  }));

  const extraSpores = [];

  const fogWisps = Array.from({length: 26}, (_,i)=>({
    x: 140 + i*(WORLD_W-280)/25 + (Math.random()*80-40),
    y: groundY - 45 - Math.random()*80,
    phase: Math.random()*10,
    amp: 18 + Math.random()*18,
    w: 70 + Math.random()*80
  }));

  function pulse(){
    pulseWave = { x: player.x, y: player.y, t:0, max:260 };
  }
  function throwFlare(){
    flares.push({
      x: player.x + player.facing*18, y: player.y - 4,
      vx: player.facing*5.6, vy:-2.6,
      t:0, life:5.5
    });
  }

  function spawnSpores(x,y,count=16,hue=145){
    for(let i=0;i<count;i++){
      const a = -Math.PI/2 + (Math.random()-.5)*1.8;
      const sp = 0.6 + Math.random()*1.8;
      extraSpores.push({
        x, y,
        vx: Math.cos(a)*sp + (Math.random()-.5)*.35,
        vy: Math.sin(a)*sp - Math.random()*.45,
        t:0,
        life: 1.7 + Math.random()*1.4,
        s: .8 + Math.random()*1.8,
        hue
      });
    }
  }

  function update(dt){
    time += dt;
    const left = keys.has("ArrowLeft") || keys.has("KeyA");
    const right = keys.has("ArrowRight") || keys.has("KeyD");
    const jump = keys.has("Space") || keys.has("ArrowUp");

    const accel = player.onGround ? MOVE.groundAccel : MOVE.airAccel;
    if (left) { player.vx -= accel; player.facing = -1; }
    if (right){ player.vx += accel; player.facing = 1; }
    player.vx *= player.onGround ? MOVE.groundFriction : MOVE.airFriction;
    player.vx = clamp(player.vx, -MOVE.maxSpeed, MOVE.maxSpeed);

    if (jump && player.onGround) {
      player.vy = MOVE.jumpVelocity;
      player.onGround = false;
    }

    player.vy += player.vy < 0 ? MOVE.gravityUp : MOVE.gravityDown;
    player.vy = clamp(player.vy, -18, MOVE.maxFall);

    player.x += player.vx;
    player.y += player.vy;

    if (player.y > groundY - player.r) {
      player.y = groundY - player.r;
      player.vy = 0;
      player.onGround = true;
    }
    player.x = clamp(player.x, 45, WORLD_W-45);

    if (pulseWave) {
      pulseWave.t += dt;
      if (pulseWave.t > .85) pulseWave = null;
    }

    for (const f of flares) {
      f.t += dt;
      f.x += f.vx;
      f.y += f.vy;
      f.vy += .14;
      if (f.y > groundY - 8) { f.y = groundY - 8; f.vy *= -0.25; f.vx *= 0.72; }
    }
    for (let i=flares.length-1;i>=0;i--) if (flares[i].t > flares[i].life) flares.splice(i,1);

    updateGlowPlantBloom(dt);
    updateCrystals(dt);
    updateParticles(dt);
    updateOrganicWind(dt);
    updateEnergy(dt);

    camera.x += ((player.x - innerWidth*.42) - camera.x) * 0.045;
    camera.x = clamp(camera.x, 0, Math.max(0, WORLD_W - innerWidth));
  }

  function updateGlowPlantBloom(dt){
    for (const p of glowPlants) {
      const nearLight = reactionAt(p.x, p.y-20, 245) > .20;
      if (nearLight) {
        p.target = 1;
        p.reverseDelay = .4;
      } else {
        p.reverseDelay -= dt;
        if (p.reverseDelay <= 0) p.target = 0;
      }
      const speed = p.target > p.bloom ? 1/1.15 : 1/1.45;
      p.bloom += Math.sign(p.target - p.bloom) * speed * dt;
      if ((p.target === 1 && p.bloom > 1) || (p.target === 0 && p.bloom < 0)) p.bloom = p.target;
      p.bloom = clamp01(p.bloom);
    }
  }

  function updateCrystals(dt){
    for (const c of crystals) {
      c.sigh = Math.max(0, c.sigh - dt * .9);
      c.sporeCooldown = Math.max(0, c.sporeCooldown - dt);
      const activePulse = pulseWave && reactionAt(c.x, c.y-25, 260) > .4;
      if (activePulse && !c.lastPulse) {
        c.sigh = 1;
        if (c.sporeCooldown <= 0) {
          spawnSpores(c.x, c.y - c.size*.7, 18, 165);
          c.sporeCooldown = 1.2;
        }
      }
      c.lastPulse = !!activePulse;
    }
  }


  function updateEnergy(dt){
    for (const w of energyWells){
      const d = Math.hypot(player.x - w.x, player.y - w.y);
      if (d < w.r) {
        player.energy = Math.min(1, player.energy + dt * 0.25);
      }
    }
  }

  function updateParticles(dt){
    for (const m of motes) {
      let ax = Math.sin(time*.25 + m.phase)*0.002;
      let ay = Math.cos(time*.21 + m.phase)*0.002;
      const targets = [{x:player.x,y:player.y, radius:180, force:.012}, ...flares.map(f=>({x:f.x,y:f.y,radius:145,force:.02}))];
      for (const target of targets) {
        const dx = target.x - m.x, dy = target.y - m.y;
        const d = Math.hypot(dx,dy) || 1;
        const k = clamp01(1 - d/target.radius);
        ax += (dx/d) * target.force * k*k;
        ay += (dy/d) * target.force * k*k;
      }
      m.vx = (m.vx + ax) * .96;
      m.vy = (m.vy + ay) * .96;
      m.x += m.vx;
      m.y += m.vy;
      if (m.x < 40 || m.x > WORLD_W-40 || m.y < 30 || m.y > groundY-20) {
        m.x = clamp(m.x, 40, WORLD_W-40);
        m.y = clamp(m.y, 30, groundY-20);
        m.vx *= -.35; m.vy *= -.35;
      }
    }

    for (const s of extraSpores) {
      s.t += dt;
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= .985;
      s.vy = s.vy*.985 - .004;
    }
    for(let i=extraSpores.length-1;i>=0;i--) {
      if(extraSpores[i].t > extraSpores[i].life) extraSpores.splice(i,1);
    }
  }

  function reactionAt(x, y, radius=180) {
    let r = 0;
    const dx = player.x - x, dy = player.y - y;
    const d = Math.hypot(dx,dy);
    r = Math.max(r, clamp01(1 - d/radius));

    for (const f of flares) {
      const fd = Math.hypot(f.x-x, f.y-y);
      r = Math.max(r, clamp01(1 - fd/(radius*.88)) * .9);
    }
    if (pulseWave) {
      const age = pulseWave.t / .85;
      const waveR = easeOut(age) * pulseWave.max;
      const pd = Math.hypot(pulseWave.x-x, pulseWave.y-y);
      const band = clamp01(1 - Math.abs(pd - waveR)/42);
      r = Math.max(r, band);
    }
    return clamp01(r);
  }

  function rgb(c,a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

  function drawWorld(){
    const w = innerWidth, h = innerHeight;
    ctx.fillStyle = "#070504";
    ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-camera.x, 0);

    const grad = ctx.createLinearGradient(0,0,0,WORLD_H);
    grad.addColorStop(0,"#19100b");
    grad.addColorStop(.55,"#0b0806");
    grad.addColorStop(1,"#050403");
    ctx.fillStyle = grad;
    ctx.fillRect(camera.x,0,w,WORLD_H);

    for (let i=0;i<40;i++) {
      const x = i*95 + 20;
      const y = 110 + Math.sin(i*1.7)*24;
      ctx.fillStyle = i%3===0 ? "rgba(255,155,65,.035)" : "rgba(255,255,255,.025)";
      ctx.fillRect(x, y, 42 + (i%4)*20, groundY-y-8);
      ctx.fillStyle = "rgba(0,0,0,.22)";
      ctx.fillRect(x+3, y+4, 4, groundY-y-18);
    }

    ctx.fillStyle = "#20130c";
    ctx.fillRect(0, groundY, WORLD_W, WORLD_H-groundY);
    ctx.fillStyle = "rgba(255,170,80,.07)";
    for (let x=0;x<WORLD_W;x+=TILE) {
      ctx.fillRect(x, groundY, 1, WORLD_H-groundY);
      if ((x/TILE)%5===0) ctx.fillRect(x+2, groundY+12, 18, 2);
    }
    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.fillRect(0, groundY+52, WORLD_W, WORLD_H-groundY-52);

    drawFogWisps();
    drawGlowPlants();
    drawCrystals();
    drawWatcherEyes();
    drawReactiveGrass();
    drawEnergyWells();
    drawMotes();
    drawFlares();
    drawPulse();
    drawPlayer();

    ctx.restore();
    drawVignette();
  }

  function drawReactiveGrass(){
    ctx.save();
    ctx.lineCap = "round";

    for (const patch of grassPatches) {
      if (patch.x + patch.w < camera.x - 80 || patch.x > camera.x + innerWidth + 80) continue;

      const bladeCount = Math.max(1, Math.floor(patch.w * patch.density));
      const step = patch.w / bladeCount;

      for (let i=0;i<bladeCount;i++) {
        const jitter = (seeded(i*11.7 + patch.seed) - .5) * step * .62;
        const bx = patch.x + i*step + jitter;
        const hSeed = seeded(i*3.37 + patch.seed*5.1);
        const macro = organicHeightProfile(patch, bx);
        const bladeH = lerp(patch.minH, patch.maxH, Math.pow(hSeed, .72)) * macro;
        const baseY = patch.y + 3;

        const react = playerGrassReaction(bx, patch.reactRadius);
        const phase = seeded(i*8.91 + patch.seed*9.2) * Math.PI * 2;
        const speed = patch.idleSpeed * lerp(.72, 1.34, seeded(i*4.1 + patch.seed));
        const idle = Math.sin(time*speed + phase) * patch.idleAmp * lerp(.55,1.35,seeded(i*1.91+patch.seed));

        const reactBend = react.dir * react.amount * patch.reactAmp * patch.strength;
        const openLean = -react.dir * react.openSpace * 2.4; // tiny “give space”, not a big push

        const flareReact = flares.reduce((max,f)=>{
          const fd = Math.abs(f.x-bx);
          return Math.max(max, clamp01(1 - fd/(patch.reactRadius*.75)));
        },0);

        const pulseReact = pulseWave
          ? clamp01(1 - Math.abs(Math.hypot(pulseWave.x-bx, pulseWave.y-baseY) - easeOut(pulseWave.t/.85)*pulseWave.max)/55)
          : 0;

        const flareDir = flares.length ? Math.sign(flares[0].x - bx || 1) : react.dir;
        const windBend = organicWindAt(patch, bx, i) * 24;

        const bend = idle + reactBend + openLean + windBend + Math.sin(time*5.5+i)*pulseReact*8 + flareReact*10*flareDir;

        const topX = bx + bend;
        const topY = baseY - bladeH;

        const alphaBase = .31 + react.amount*.22 + flareReact*.12 + pulseReact*.22 + Math.abs(windBend)*.006;
        const g = ctx.createLinearGradient(bx, baseY, topX, topY);
        g.addColorStop(0, rgb(patch.bottomColor, alphaBase*.92));
        g.addColorStop(.68, rgb([
          lerp(patch.bottomColor[0], patch.topColor[0], .48),
          lerp(patch.bottomColor[1], patch.topColor[1], .48),
          lerp(patch.bottomColor[2], patch.topColor[2], .48),
        ], alphaBase));
        g.addColorStop(1, rgb(patch.topColor, alphaBase + .12));

        ctx.strokeStyle = g;
        ctx.lineWidth = 0.34 + seeded(i*2.23+patch.seed)*0.30;
        ctx.beginPath();
        ctx.moveTo(bx, baseY);
        ctx.bezierCurveTo(
          bx + bend*.10, baseY - bladeH*.32,
          bx + bend*.52, baseY - bladeH*.70,
          topX, topY
        );
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawGlowPlants(){
    for (const p of glowPlants) {
      const b = easeInOut(p.bloom);
      const breathe = .5 + .5*Math.sin(time*.62 + p.x*.01);
      const glow = .18 + b*.82 + breathe*.08;
      ctx.save();
      ctx.translate(p.x, p.y);

      const g = ctx.createRadialGradient(0,-18,0,0,-18,p.size*(1.5+glow*1.6));
      g.addColorStop(0, `hsla(${p.hue},100%,70%,${.24*glow})`);
      g.addColorStop(.35, `hsla(${p.hue},100%,55%,${.12*glow})`);
      g.addColorStop(1, `hsla(${p.hue},100%,45%,0)`);
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0,-18,p.size*2.6,0,Math.PI*2); ctx.fill();

      const open = b;
      for (let i=0;i<9;i++) {
        const spread = 0.34 * open;
        const a = -Math.PI/2 + (i-4)*spread;
        const len = p.size*(.30 + .70*open) * (0.82 + seeded(i+p.x)*.24);
        ctx.strokeStyle = `rgba(140,255,170,${.13 + .42*open})`;
        ctx.lineWidth = 1.4 + open*.9;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.quadraticCurveTo(Math.cos(a)*len*.30, -p.size*(.24+.24*open), Math.cos(a)*len, Math.sin(a)*len);
        ctx.stroke();
      }
      ctx.fillStyle = `rgba(255,220,135,${.20 + .70*glow})`;
      ctx.beginPath(); ctx.arc(0,-18,2.5 + open*4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function drawCrystals(){
    for (const c of crystals) {
      const ambient = reactionAt(c.x, c.y-25, 260) * .5;
      const sigh = easeOut(c.sigh);
      const scaleY = 1 + sigh*.045;
      const scaleX = 1 + sigh*.025;

      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.scale(scaleX, scaleY);

      const aura = ctx.createRadialGradient(0,-c.size*.55,0,0,-c.size*.55,c.size*(1.6+ambient+sigh*.9));
      aura.addColorStop(0, `rgba(95,255,220,${.08 + ambient*.16 + sigh*.20})`);
      aura.addColorStop(1, "rgba(95,255,220,0)");
      ctx.fillStyle = aura;
      ctx.beginPath(); ctx.arc(0,-c.size*.55,c.size*2.1,0,Math.PI*2); ctx.fill();

      ctx.fillStyle = `rgba(60,110,105,${.64 + ambient*.20 + sigh*.12})`;
      ctx.strokeStyle = `rgba(185,255,225,${.22 + ambient*.42 + sigh*.36})`;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(0,-c.size);
      ctx.lineTo(c.size*.28,-c.size*.45);
      ctx.lineTo(c.size*.16,0);
      ctx.lineTo(-c.size*.18,0);
      ctx.lineTo(-c.size*.32,-c.size*.48);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      ctx.strokeStyle = `rgba(255,250,210,${.12 + ambient*.42 + sigh*.48})`;
      ctx.beginPath(); ctx.moveTo(0,-c.size*.92); ctx.lineTo(0,-c.size*.08); ctx.stroke();
      ctx.restore();
    }
  }

  function drawWatcherEyes(){
    for (const e of eyes) {
      const r = reactionAt(e.x, e.y, 210);
      const open = easeInOut(r);
      if (open <= .02) continue;
      ctx.save();
      ctx.translate(e.x,e.y);
      ctx.globalAlpha = open;
      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.beginPath(); ctx.ellipse(0,0,17,6*open,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,175,65,${.35 + .45*open})`;
      ctx.beginPath(); ctx.arc((player.x-e.x)*0.018,0,2.2+open*1.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function drawFogWisps(){
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (const f of fogWisps) {
      const dist = Math.hypot(player.x-f.x, player.y-f.y);
      const split = clamp01(1 - dist/160);
      const dir = Math.sign(f.x-player.x || 1);
      const x = f.x + Math.sin(time*.13 + f.phase)*f.amp + dir*split*42;
      const y = f.y + Math.cos(time*.11 + f.phase)*10;
      ctx.fillStyle = `rgba(120,180,150,${.025 + split*.025})`;
      ctx.beginPath();
      ctx.ellipse(x,y,f.w*(1+split*.3),16*(1-split*.35),Math.sin(f.phase)*0.2,0,Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawMotes(){
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (const m of motes) {
      if (m.x < camera.x - 20 || m.x > camera.x + innerWidth + 20) continue;
      const a = .08 + .14*(.5+.5*Math.sin(time*.9+m.phase));
      ctx.fillStyle = `rgba(255,190,95,${a})`;
      ctx.beginPath(); ctx.arc(m.x,m.y,m.s,0,Math.PI*2); ctx.fill();
    }

    for (const s of extraSpores) {
      const life = 1 - s.t/s.life;
      if (s.x < camera.x - 20 || s.x > camera.x + innerWidth + 20) continue;
      ctx.fillStyle = `hsla(${s.hue},100%,75%,${.22*life})`;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.s*(.7+life),0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }


  function drawEnergyWells(){
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (const w of energyWells){
      const breathe = 0.75 + 0.25 * Math.sin(time * 0.9 + w.x * 0.01);
      const g = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, w.r * 2.2);
      g.addColorStop(0, `rgba(120,255,200,${0.22 * breathe})`);
      g.addColorStop(.42, `rgba(255,190,85,${0.08 * breathe})`);
      g.addColorStop(1, "rgba(120,255,200,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(w.x, w.y, w.r*2.2, 0, Math.PI*2); ctx.fill();

      ctx.strokeStyle = `rgba(170,255,215,${0.16 * breathe})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(w.x, w.y, w.r*.45 + Math.sin(time*1.1)*2, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  function drawFlares(){
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (const f of flares) {
      const life = 1 - f.t/f.life;
      const g = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,100*life);
      g.addColorStop(0,`rgba(120,255,190,${.38*life})`);
      g.addColorStop(.25,`rgba(255,180,90,${.18*life})`);
      g.addColorStop(1,"rgba(255,120,40,0)");
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(f.x,f.y,100*life,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(230,255,210,${.8*life})`;
      ctx.beginPath(); ctx.arc(f.x,f.y,4,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawPulse(){
    if (!pulseWave) return;
    const t = pulseWave.t/.85;
    const r = easeOut(t)*pulseWave.max;
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = `rgba(100,255,220,${(1-t)*.55})`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(pulseWave.x,pulseWave.y,r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(255,190,80,${(1-t)*.25})`;
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.arc(pulseWave.x,pulseWave.y,r*.92,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x,player.y);
    ctx.globalCompositeOperation = "lighter";
    const g = ctx.createRadialGradient(0,0,0,0,0,92);
    g.addColorStop(0,"rgba(120,255,190,.55)");
    g.addColorStop(.28,"rgba(255,180,80,.22)");
    g.addColorStop(1,"rgba(255,180,80,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0,0,92,0,Math.PI*2); ctx.fill();

    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "#08110e";
    ctx.strokeStyle = "rgba(180,255,220,.9)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0,0,player.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "rgba(215,255,225,.95)";
    ctx.beginPath(); ctx.arc(player.facing*4,-3,3.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawVignette(){
    const g = ctx.createRadialGradient(innerWidth*.5, innerHeight*.48, innerHeight*.25, innerWidth*.5, innerHeight*.5, innerHeight*.85);
    g.addColorStop(0,"rgba(0,0,0,0)");
    g.addColorStop(1,"rgba(0,0,0,.72)");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,innerWidth,innerHeight);
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(.033, (now-last)/1000);
    last = now;
    update(dt);
    drawWorld();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
